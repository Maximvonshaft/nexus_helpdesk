name: tenant-phase2-review-fixes-temp

on:
  pull_request:
    paths:
      - .github/patches/tenant-phase2-review-fixes.patch.gz.b64
      - .github/workflows/tenant-phase2-review-fixes-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase2-review-fixes-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend:scripts/qualification/tenant
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase2-review.db
      AUTO_INIT_DB: 'false'
      SEED_DEMO_DATA: 'false'
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Verify base blobs and apply exact patch
        run: |
          set -Eeuo pipefail
          test "$(git hash-object scripts/qualification/tenant/tenant_principal_backfill.py)" = "f0821fdfdc2845543aa04f52872ff3b0401ae12d"
          test "$(git hash-object scripts/qualification/tenant/tenant_principal_resolution.py)" = "ecacaf79fdf6536cdf18a557959613802951db29"
          test "$(git hash-object scripts/qualification/tenant/test_tenant_principal_backfill.py)" = "b8be679777b70bb136fd130d53e128f4fa67ea01"
          base64 --decode .github/patches/tenant-phase2-review-fixes.patch.gz.b64 > "${RUNNER_TEMP}/review.patch.gz"
          test "$(sha256sum "${RUNNER_TEMP}/review.patch.gz" | awk '{print $1}')" = "317f81f49579054ab657dbc264ce4d1f0d1372271bf4ff905f9c95546050c65d"
          gzip --decompress --stdout "${RUNNER_TEMP}/review.patch.gz" > "${RUNNER_TEMP}/review.patch"
          test "$(sha256sum "${RUNNER_TEMP}/review.patch" | awk '{print $1}')" = "bce7a5e4fb05ee4df72febcf6425d9f361ee06e10f976a641911c8764a7c8bc0"
          test "$(grep -c '^diff --git ' "${RUNNER_TEMP}/review.patch")" = "3"
          git apply --check --whitespace=error-all "${RUNNER_TEMP}/review.patch"
          git apply --whitespace=error-all "${RUNNER_TEMP}/review.patch"

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Verify focused contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/tenant/tenant_principal_resolution.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py
          pytest -q \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py
          git diff --check

      - name: Remove transfer files and commit verified fixes
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/patches/tenant-phase2-review-fixes.patch.gz.b64 \
            .github/workflows/tenant-phase2-review-fixes-temp.yml
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/patches/tenant-phase2-review-fixes.patch.gz.b64',
              '.github/workflows/tenant-phase2-review-fixes-temp.yml',
              'scripts/qualification/tenant/tenant_principal_backfill.py',
              'scripts/qualification/tenant/tenant_principal_resolution.py',
              'scripts/qualification/tenant/test_tenant_principal_backfill.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): harden deterministic backfill receipts (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
