name: Temporary Committed Handoff Patch

on:
  push:
    branches:
      - refactor/generic-agent-runtime-final-b7e41d
    paths:
      - .github/workflows/temporary-committed-handoff-patch.yml

permissions:
  contents: write

concurrency:
  group: temporary-committed-handoff-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: refactor/generic-agent-runtime-final-b7e41d
          fetch-depth: 0
          persist-credentials: true

      - name: Apply bounded patch and self-delete
        run: python scripts/temporary_committed_handoff_patch.py

      - name: Verify clean patch shape
        run: |
          test ! -e scripts/temporary_committed_handoff_patch.py
          test ! -e .github/workflows/temporary-committed-handoff-patch.yml
          git diff --check
          python -m compileall -q backend/app/services/agent_runtime backend/tests/test_agent_runtime_architecture.py

      - name: Commit final clean Head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(agent): require committed Tool evidence for handoff"
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d
