name: PR 763 Backend Repair Export

on:
  push:
    branches:
      - repair/763-backend-241b

permissions:
  contents: write

concurrency:
  group: pr-763-backend-repair-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout isolated repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: repair/763-backend-241b
          fetch-depth: 0
          persist-credentials: true
      - name: Build exact source archive
        shell: bash
        run: |
          set -Eeuo pipefail
          tar --exclude=.git --exclude=.github/workflows/pr763-backend-repair-export.yml -czf /tmp/nexus-pr763-backend-repair.tar.gz .
      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nexus-pr763-backend-repair-source
          path: /tmp/nexus-pr763-backend-repair.tar.gz
          if-no-files-found: error
          retention-days: 3
      - name: Self-delete export workflow
        shell: bash
        run: |
          set -Eeuo pipefail
          rm .github/workflows/pr763-backend-repair-export.yml
          git config user.name nexus-ci-repair
          git config user.email nexus-ci-repair@users.noreply.github.com
          git add .github/workflows/pr763-backend-repair-export.yml
          git commit -m "chore(ci): remove backend repair export workflow"
          git push origin HEAD:repair/763-backend-241b
