name: Temporary Verify Speedaf Suppression V2

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

concurrency:
  group: verify-speedaf-suppression-v2
  cancel-in-progress: false

jobs:
  verify-commit-rebase:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout staging commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}

      - name: Apply exact suppression layout
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/services/speedaf/track_query.py")
          source = path.read_text(encoding="utf-8")
          old = (
              '    payload = f"{timestamp_ms}{secret_key}{data_string}".encode("utf-8")\n'
              '    # codeql[py/weak-sensitive-data-hashing]\n'
              '    digest = hashlib.md5(payload, usedforsecurity=False)\n'
          )
          new = (
              '    payload = f"{timestamp_ms}{secret_key}{data_string}".encode("utf-8")\n'
              '\n'
              '    # codeql[py/weak-sensitive-data-hashing]\n'
              '    digest = hashlib.md5(payload, usedforsecurity=False)\n'
          )
          if source.count(old) != 1:
              raise SystemExit("speedaf_codeql_layout_target_mismatch")
          path.write_text(source.replace(old, new), encoding="utf-8")
          PY
          rm -f .github/workflows/_temporary-verify-speedaf-suppression-v2.yml
          git diff --check
          python -m compileall -q backend/app

      - name: Initialize Python CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: python
          build-mode: none
          queries: security-extended

      - name: Analyze modified source
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          upload: never
          upload-database: false
          output: /tmp/speedaf-codeql
          category: speedaf-protocol-layout-v2

      - name: Enforce clean SARIF
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/security/assert_sarif_clean.py \
            --input /tmp/speedaf-codeql \
            --exceptions config/security/codeql-exceptions.json \
            --output /tmp/speedaf-codeql-summary.json
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path('/tmp/speedaf-codeql-summary.json').read_text(encoding='utf-8'))
          assert summary['status'] == 'pass', summary
          assert summary['raw_result_count'] == 0, summary
          assert summary['result_count'] == 0, summary
          assert summary['unused_exception_count'] == 0, summary
          PY

      - name: Commit, rebase onto latest branch, and push
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: position Speedaf protocol suppression for CodeQL"
          git fetch --no-tags origin feat/conversation-first-agent-routing
          git rebase origin/feat/conversation-first-agent-routing
          git push origin HEAD:feat/conversation-first-agent-routing
