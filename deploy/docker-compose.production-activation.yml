services:
  production-activation-preflight:
    image: ${CONTROLLED_IMAGE:?set immutable controlled image digest}
    restart: "no"
    read_only: true
    network_mode: none
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 64
    environment:
      CONTROLLED_IMAGE: ${CONTROLLED_IMAGE:?set immutable controlled image digest}
      GIT_SHA: ${GIT_SHA:?set exact candidate GIT_SHA}
      PRODUCTION_PROFILE: ${PRODUCTION_PROFILE:-full}
      ACTIVATION_EVIDENCE_SOURCE_SHA: ${ACTIVATION_EVIDENCE_SOURCE_SHA:?set evidence source SHA equal to GIT_SHA}
      ACTIVATION_EVIDENCE_IMAGE_DIGEST: ${ACTIVATION_EVIDENCE_IMAGE_DIGEST:?set evidence image digest equal to CONTROLLED_IMAGE digest}
      PRODUCTION_E2E_EVIDENCE_URL: ${PRODUCTION_E2E_EVIDENCE_URL:-}
      PROVIDER_CANARY_E2E_EVIDENCE_URL: ${PROVIDER_CANARY_E2E_EVIDENCE_URL:-}
      WEBCHAT_AI_PRODUCTION_E2E_EVIDENCE_URL: ${WEBCHAT_AI_PRODUCTION_E2E_EVIDENCE_URL:-}
      TELEPHONY_PRODUCTION_E2E_EVIDENCE_URL: ${TELEPHONY_PRODUCTION_E2E_EVIDENCE_URL:-}
      OUTBOUND_PRODUCTION_E2E_EVIDENCE_URL: ${OUTBOUND_PRODUCTION_E2E_EVIDENCE_URL:-}
      OPERATIONS_PRODUCTION_E2E_EVIDENCE_URL: ${OPERATIONS_PRODUCTION_E2E_EVIDENCE_URL:-}
      PROVIDER_RUNTIME_ENABLED: ${PROVIDER_RUNTIME_ENABLED:-false}
      PROVIDER_RUNTIME_TRAFFIC_MODE: ${PROVIDER_RUNTIME_TRAFFIC_MODE:-control}
      PROVIDER_RUNTIME_KILL_SWITCH: ${PROVIDER_RUNTIME_KILL_SWITCH:-true}
      PROVIDER_RUNTIME_CANARY_PERCENT: ${PROVIDER_RUNTIME_CANARY_PERCENT:-0}
      WEBCHAT_AI_ENABLED: ${WEBCHAT_AI_ENABLED:-false}
      WEBCHAT_AI_AUTO_REPLY_MODE: ${WEBCHAT_AI_AUTO_REPLY_MODE:-off}
      WEBCHAT_HUMAN_CALL_ENABLED: ${WEBCHAT_HUMAN_CALL_ENABLED:-false}
      WEBCHAT_LIVE_AI_VOICE_ENABLED: ${WEBCHAT_LIVE_AI_VOICE_ENABLED:-false}
      WEBCHAT_VOICE_PROVIDER: ${WEBCHAT_VOICE_PROVIDER:-mock}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_API_KEY_FILE: ${LIVEKIT_API_KEY_FILE:-}
      LIVEKIT_API_SECRET_FILE: ${LIVEKIT_API_SECRET_FILE:-}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-}
      LIVEKIT_AGENT_SHARED_SECRET: ${LIVEKIT_AGENT_SHARED_SECRET:-}
      LIVEKIT_AGENT_SHARED_SECRET_FILE: ${LIVEKIT_AGENT_SHARED_SECRET_FILE:-}
      LIVEKIT_WEBHOOK_ENABLED: ${LIVEKIT_WEBHOOK_ENABLED:-false}
      NEXUS_VOICE_STT_MODEL: ${NEXUS_VOICE_STT_MODEL:-}
      NEXUS_VOICE_TTS_MODEL: ${NEXUS_VOICE_TTS_MODEL:-}
      ENABLE_OUTBOUND_DISPATCH: ${ENABLE_OUTBOUND_DISPATCH:-false}
      OUTBOUND_PROVIDER: ${OUTBOUND_PROVIDER:-disabled}
      OPERATIONS_DISPATCH_MODE: ${OPERATIONS_DISPATCH_MODE:-disabled}
      OPERATIONS_DISPATCH_ADAPTER: ${OPERATIONS_DISPATCH_ADAPTER:-disabled}
    command:
      - python
      - /app/scripts/deploy/validate_production_activation.py
      - --environment

  app-controlled:
    environment:
      PRODUCTION_PROFILE: ${PRODUCTION_PROFILE:-full}
      ACTIVATION_EVIDENCE_SOURCE_SHA: ${ACTIVATION_EVIDENCE_SOURCE_SHA:?set evidence source SHA equal to GIT_SHA}
      ACTIVATION_EVIDENCE_IMAGE_DIGEST: ${ACTIVATION_EVIDENCE_IMAGE_DIGEST:?set evidence image digest equal to CONTROLLED_IMAGE digest}
      PRODUCTION_E2E_EVIDENCE_URL: ${PRODUCTION_E2E_EVIDENCE_URL:-}
      PROVIDER_CANARY_E2E_EVIDENCE_URL: ${PROVIDER_CANARY_E2E_EVIDENCE_URL:-}
      WEBCHAT_AI_PRODUCTION_E2E_EVIDENCE_URL: ${WEBCHAT_AI_PRODUCTION_E2E_EVIDENCE_URL:-}
      TELEPHONY_PRODUCTION_E2E_EVIDENCE_URL: ${TELEPHONY_PRODUCTION_E2E_EVIDENCE_URL:-}
      OUTBOUND_PRODUCTION_E2E_EVIDENCE_URL: ${OUTBOUND_PRODUCTION_E2E_EVIDENCE_URL:-}
      OPERATIONS_PRODUCTION_E2E_EVIDENCE_URL: ${OPERATIONS_PRODUCTION_E2E_EVIDENCE_URL:-}
    depends_on:
      migrate-controlled:
        condition: service_completed_successfully
      production-activation-preflight:
        condition: service_completed_successfully
