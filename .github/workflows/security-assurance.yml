name: security-assurance

on:
  pull_request:
    paths:
      - "backend/**"
      - "webapp/**"
      - "scripts/security/**"
      - "config/security/**"
      - ".github/workflows/security-assurance.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Run scanner tests
        run: python -m unittest discover -s scripts/security/tests -p 'test_*.py'
      - name: Scan tracked repository content
        run: |
          mkdir -p artifacts
          python scripts/security/scan_repository.py \
            --root . \
            --allowlist config/security/secret-scan-allowlist.json \
            --output artifacts/security-secret-scan.json
      - name: Enforce bounded redacted report
        if: always()
        run: |
          test -s artifacts/security-secret-scan.json
          test "$(wc -c < artifacts/security-secret-scan.json)" -le 65536
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/security-secret-report-scan.json \
            artifacts/security-secret-scan.json
      - name: Upload bounded evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-secret-scan
          path: |
            artifacts/security-secret-scan.json
            artifacts/security-secret-report-scan.json
          if-no-files-found: error
          retention-days: 14

  dependency-and-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install immutable pip-audit source
        run: python -m pip install --disable-pip-version-check "git+https://github.com/pypa/pip-audit.git@9dfebfe2c75552944362e6ca5a4b5931556accd5"
      - name: Setup Node immutable
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install webapp lockfile
        working-directory: webapp
        run: npm ci
      - name: Audit dependencies and generate SBOMs
        id: audits
        run: |
          set +e
          mkdir -p artifacts
          pip-audit -r backend/requirements.txt --format json --output artifacts/pip-audit.json
          pip_exit=$?
          pip-audit -r backend/requirements.txt --format cyclonedx-json --output artifacts/python-sbom.cdx.json
          pip_sbom_exit=$?
          (cd webapp && npm audit --audit-level=high --json) > artifacts/npm-audit.json
          npm_exit=$?
          (cd webapp && npm sbom --sbom-format=cyclonedx) > artifacts/webapp-sbom.cdx.json
          npm_sbom_exit=$?
          echo "pip_exit=$pip_exit" >> "$GITHUB_OUTPUT"
          echo "pip_sbom_exit=$pip_sbom_exit" >> "$GITHUB_OUTPUT"
          echo "npm_exit=$npm_exit" >> "$GITHUB_OUTPUT"
          echo "npm_sbom_exit=$npm_sbom_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Build bounded dependency evidence
        if: always()
        env:
          PIP_EXIT: ${{ steps.audits.outputs.pip_exit }}
          PIP_SBOM_EXIT: ${{ steps.audits.outputs.pip_sbom_exit }}
          NPM_EXIT: ${{ steps.audits.outputs.npm_exit }}
          NPM_SBOM_EXIT: ${{ steps.audits.outputs.npm_sbom_exit }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path("artifacts")

          def load(name):
              path = root / name
              if not path.exists() or path.stat().st_size > 8 * 1024 * 1024:
                  return None
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except (OSError, ValueError, RecursionError):
                  return None

          def digest(name):
              path = root / name
              if not path.exists():
                  return None
              return hashlib.sha256(path.read_bytes()).hexdigest()

          findings = []
          pip_data = load("pip-audit.json")
          pip_dependencies = []
          if isinstance(pip_data, list):
              pip_dependencies = pip_data
          elif isinstance(pip_data, dict) and isinstance(pip_data.get("dependencies"), list):
              pip_dependencies = pip_data["dependencies"]
          for item in pip_dependencies[:500]:
              if not isinstance(item, dict):
                  continue
              package = str(item.get("name") or "unknown")[:120]
              version = str(item.get("version") or "unknown")[:80]
              vulns = item.get("vulns") if isinstance(item.get("vulns"), list) else []
              for vuln in vulns[:20]:
                  if not isinstance(vuln, dict):
                      continue
                  findings.append({
                      "ecosystem": "python",
                      "package": package,
                      "version": version,
                      "advisory": str(vuln.get("id") or "unknown")[:120],
                      "fix_versions": [str(value)[:80] for value in (vuln.get("fix_versions") or [])[:10]],
                  })
                  if len(findings) >= 100:
                      break
              if len(findings) >= 100:
                  break
          pip_vulns = sum(1 for item in findings if item.get("ecosystem") == "python")

          npm_data = load("npm-audit.json")
          npm_counts = {}
          npm_vulnerabilities = {}
          if isinstance(npm_data, dict):
              metadata = npm_data.get("metadata")
              if isinstance(metadata, dict) and isinstance(metadata.get("vulnerabilities"), dict):
                  npm_counts = {
                      key: int(value)
                      for key, value in metadata["vulnerabilities"].items()
                      if key in {"info", "low", "moderate", "high", "critical", "total"}
                      and isinstance(value, int)
                  }
              if isinstance(npm_data.get("vulnerabilities"), dict):
                  npm_vulnerabilities = npm_data["vulnerabilities"]
          for package, entry in sorted(npm_vulnerabilities.items())[:100]:
              if not isinstance(entry, dict):
                  continue
              severity = str(entry.get("severity") or "unknown")[:40]
              advisories = []
              for via in (entry.get("via") or [])[:20]:
                  if isinstance(via, dict):
                      source = via.get("source")
                      if isinstance(source, (int, str)) and str(source).strip():
                          advisories.append(f"NPM-{str(source).strip()}"[:160])
                  elif isinstance(via, str) and via.strip():
                      advisories.append(via.strip()[:160])
              findings.append({
                  "ecosystem": "npm",
                  "package": str(package)[:120],
                  "severity": severity,
                  "advisories": advisories[:10],
                  "fix_available": bool(entry.get("fixAvailable")),
              })
              if len(findings) >= 200:
                  break

          exits = {
              "pip_audit": int(os.environ.get("PIP_EXIT") or 99),
              "pip_sbom": int(os.environ.get("PIP_SBOM_EXIT") or 99),
              "npm_audit": int(os.environ.get("NPM_EXIT") or 99),
              "npm_sbom": int(os.environ.get("NPM_SBOM_EXIT") or 99),
          }
          blocking = (
              exits["pip_audit"] != 0
              or exits["pip_sbom"] not in {0, 1}
              or exits["npm_audit"] != 0
              or exits["npm_sbom"] != 0
              or pip_vulns > 0
              or npm_counts.get("high", 0) > 0
              or npm_counts.get("critical", 0) > 0
          )
          report = {
              "schema_version": "nexus_security_dependency_assurance_v1",
              "status": "fail" if blocking else "pass",
              "exit_codes": exits,
              "python_vulnerability_count": pip_vulns,
              "npm_vulnerability_counts": npm_counts,
              "findings": findings[:200],
              "findings_truncated": len(findings) > 200,
              "sbom_sha256": {
                  "python": digest("python-sbom.cdx.json"),
                  "webapp": digest("webapp-sbom.cdx.json"),
              },
          }
          encoded = json.dumps(report, sort_keys=True, separators=(",", ":"))
          if len(encoded.encode()) > 65536:
              raise SystemExit("dependency_summary_too_large")
          (root / "dependency-assurance.json").write_text(encoded + "\n", encoding="utf-8")
          PY
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/dependency-report-scan.json \
            artifacts/dependency-assurance.json
      - name: Upload bounded evidence and SBOMs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-assurance
          path: |
            artifacts/dependency-assurance.json
            artifacts/dependency-report-scan.json
            artifacts/python-sbom.cdx.json
            artifacts/webapp-sbom.cdx.json
          if-no-files-found: error
          retention-days: 14
      - name: Enforce dependency gate
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/dependency-assurance.json").read_text(encoding="utf-8"))
          if report.get("status") != "pass":
              raise SystemExit("dependency_assurance_failed")
          PY

  codeql:
    name: codeql-${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Initialize CodeQL immutable
        uses: github/codeql-action/init@8096e4f9571939c23cbd19018c44c665f90096af
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild immutable
        uses: github/codeql-action/autobuild@8096e4f9571939c23cbd19018c44c665f90096af
      - name: Analyze immutable
        uses: github/codeql-action/analyze@8096e4f9571939c23cbd19018c44c665f90096af
        with:
          category: "/language:${{ matrix.language }}"
