schema: nexus.osr.codebase-rationalization-inventory.v1
work_item: 744
baseline_main_sha: 7260652e380e9b19818c079c4d3846a653354d24
status: final_production_convergence_candidate_in_progress
authority:
  governance_issue: 722
  canonical_pr: pending_final_convergence_pr
  canonical_branch: fix/722-final-production-convergence
  absorbed_ui_pr: 762
  prior_convergence_pr: 763
  absorbed_ui_pr_disposition: close_after_absorption_no_parallel_merge
  rule: >
    This is the sole repository rationalization ledger. It records physical
    retirement and delegates product, transport, authorization, Provider,
    worker, database, supply-chain and visual authority to their canonical
    implementations. It does not define a second product, validation system,
    design system, queue, Provider router or GitHub Actions execution chain.
verification:
  entrypoint: python scripts/verify_repository.py
  static_entrypoint: python scripts/verify_repository.py --static-only
  evidence_entrypoint: python scripts/verify_repository.py --evidence-out <path>
  frontend_entrypoint: cd webapp && npm run verify
  browser_entrypoint: cd webapp && npm run e2e
  database_capacity_entrypoint: python scripts/qualification/database_capacity.py
  supply_chain_entrypoint: python scripts/qualification/supply_chain.py
  release_supply_chain_entrypoint: python scripts/qualification/supply_chain.py --release
  github_actions: .github/workflows/canonical-acceptance.yml
  candidate_mutation_during_verification: forbidden
  compatibility_discovery: scripts/ci/check_legacy_surface_registry.py
  exact_head_status: pending_unchanged_head_ci
canonical_authorities:
  operator_product: webapp
  application_shell: webapp/src/app/AppShell.tsx
  navigation: webapp/src/app/navigation.ts
  route_boundaries: webapp/src/app/OperatorPresentation.tsx
  http_transport: webapp/src/lib/apiClient.ts
  ui_framework: '@mui/material@9.2.0'
  icon_framework: '@mui/icons-material@9.2.0'
  mui_theme: webapp/src/theme/nexusTheme.ts
  theme_provider: webapp/src/theme/NexusThemeProvider.tsx
