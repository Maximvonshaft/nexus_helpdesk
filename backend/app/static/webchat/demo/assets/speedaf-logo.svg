<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 318 82" role="img" aria-labelledby="title desc">
  <title id="title">Speedaf Express</title>
  <desc id="desc">Speedaf Express orange wordmark</desc>
  <defs>
    <linearGradient id="speedafOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="0.55" stop-color="#ff5a00"/>
      <stop offset="1" stop-color="#ec4500"/>
    </linearGradient>
    <filter id="soft" x="-8%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#ff5a00" flood-opacity=".13"/>
    </filter>
  </defs>
  <g filter="url(#soft)" transform="skewX(-10)">
    <text x="12" y="48" fill="url(#speedafOrange)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="48" font-style="italic" font-weight="900" letter-spacing="-3.2">Speedaf</text>
    <text x="93" y="72" fill="url(#speedafOrange)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="24" font-style="italic" font-weight="900" letter-spacing=".3">express</text>
  </g>
</svg>
