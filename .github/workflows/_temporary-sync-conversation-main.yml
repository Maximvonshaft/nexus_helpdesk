name: Temporary Sync Conversation Branch With Main

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  statuses: write

concurrency:
  group: sync-conversation-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Publish synchronization run identity
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"conversation-main-sync\",\"description\":\"merging current main\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"

      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Merge current main with explicit authority resolution
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          git config user.name 'nexus-delivery-bot'
          git config user.email 'nexus-delivery-bot@users.noreply.github.com'
          git fetch --no-tags origin main
          if ! git merge --no-commit --no-ff origin/main; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U | sort)
            expected=(
              backend/app/api/ticket_perf.py
              backend/tests/test_nexus_osr_admin_api.py
              backend/tests/test_retired_persistence_absence.py
            )
            mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
            if [[ "$(printf '%s\n' "${conflicts[@]}")" != "$(printf '%s\n' "${expected_sorted[@]}")" ]]; then
              for path in "${conflicts[@]}"; do
                context="merge-conflict-${path//\//-}"
                context="${context:0:100}"
                curl --fail-with-body --silent --show-error \
                  --request POST \
                  --header "Authorization: Bearer ${GH_TOKEN}" \
                  --header "Accept: application/vnd.github+json" \
                  --header "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
                  --data "$(jq -n --arg context "$context" --arg path "$path" --arg url "https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}" '{state:"failure",context:$context,description:$path,target_url:$url}')"
              done
              printf 'Unexpected unmerged paths:\n'
              printf '%s\n' "${conflicts[@]}"
              exit 1
            fi
            for path in "${expected_sorted[@]}"; do
              git checkout origin/main -- "$path"
              git add "$path"
            done
            test -z "$(git diff --name-only --diff-filter=U)"
          fi
          rm -f .github/workflows/_temporary-sync-conversation-main.yml
          git add -A
          git diff --cached --check

      - name: Verify merged conversation-first candidate
        env:
          PYTHONPATH: backend
          APP_ENV: test
          AUTO_INIT_DB: 'false'
          SEED_DEMO_DATA: 'false'
          ALLOW_DEV_AUTH: 'false'
          PROVIDER_RUNTIME_ENABLED: 'false'
          PRIVATE_AI_RUNTIME_ENABLED: 'false'
          WEBCHAT_AI_ENABLED: 'false'
          WEBCHAT_AI_AUTO_REPLY_MODE: off
          SPEEDAF_MCP_ENABLED: 'false'
          SPEEDAF_TRACK_QUERY_ENABLED: 'false'
          SPEEDAF_WORK_ORDER_CREATE_ENABLED: 'false'
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/conversation-main-sync
          python -m compileall -q backend/app backend/tests
          python -m pytest -q \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_osr_audit_integration.py \
            2>&1 | tee /tmp/conversation-main-sync/pytest.log

      - name: Upload merged regression diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: conversation-main-sync-${{ github.sha }}
          path: /tmp/conversation-main-sync
          if-no-files-found: warn
          retention-days: 7

      - name: Commit merged candidate and push
        shell: bash
        run: |
          set -Eeuo pipefail
          git commit -m 'chore: merge current main into conversation-first delivery'
          git push origin HEAD:feat/conversation-first-agent-routing
