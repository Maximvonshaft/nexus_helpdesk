name: public-production-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public NexusDesk base URL"
        required: true
        default: "https://www.leakle.com"
        type: string
      expected_git_sha:
        description: "Optional exact /healthz git_sha expected on the public route"
        required: false
        default: ""
        type: string
      expected_image_tag:
        description: "Optional exact /healthz image_tag expected on the public route"
        required: false
        default: ""
        type: string
      origin:
        description: "Origin used for WebChat CORS and fast-reply smoke"
        required: true
        default: "https://www.leakle.com"
        type: string
      require_ai_reply:
        description: "Require fast-reply to be generated by an AI provider, not safe fallback"
        required: true
        default: true
        type: boolean
      max_latency_ms:
        description: "Fail fast-reply if observed public latency is above this value"
        required: true
        default: "25000"
        type: string
      skip_fast_reply:
        description: "Only check health, ready, demo assets, and CORS"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  public-webchat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public WebChat smoke
        env:
          BASE_URL: ${{ inputs.base_url }}
          EXPECTED_GIT_SHA: ${{ inputs.expected_git_sha }}
          EXPECTED_IMAGE_TAG: ${{ inputs.expected_image_tag }}
          WEBCHAT_SMOKE_ORIGIN: ${{ inputs.origin }}
          REQUIRE_AI_REPLY: ${{ inputs.require_ai_reply }}
          SKIP_FAST_REPLY: ${{ inputs.skip_fast_reply }}
          WEBCHAT_FAST_REPLY_MAX_LATENCY_MS: ${{ inputs.max_latency_ms }}
          OUT_DIR: artifacts/public-production-smoke
        run: python scripts/smoke/public_webchat_smoke.py

      - name: Upload public smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-production-smoke-evidence
          path: artifacts/public-production-smoke
          if-no-files-found: warn

      - name: Summarize public smoke
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          lines = [
              "## Public production smoke",
              "",
              "- Target: `${{ inputs.base_url }}`",
              "- Expected git SHA: `${{ inputs.expected_git_sha }}`",
              "- Expected image tag: `${{ inputs.expected_image_tag }}`",
              "- Require AI reply: `${{ inputs.require_ai_reply }}`",
              "- Skip fast-reply: `${{ inputs.skip_fast_reply }}`",
              "- Max latency ms: `${{ inputs.max_latency_ms }}`",
          ]

          summary_path = Path("artifacts/public-production-smoke/summary.json")
          if summary_path.exists():
              payload = json.loads(summary_path.read_text(encoding="utf-8"))
              compact = {
                  "public": payload.get("healthz"),
                  "readyz": payload.get("readyz"),
                  "fast_reply": payload.get("fast_reply"),
                  "errors": payload.get("errors"),
              }
              lines.extend(["", "```json", json.dumps(compact, indent=2, ensure_ascii=False), "```"])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY
