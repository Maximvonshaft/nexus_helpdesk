name: Domain Runtime Eval

on:
  pull_request:
    paths:
      - 'backend/app/services/domain_intelligence/**'
      - 'backend/app/domain_packs/**'
      - 'backend/app/services/webchat_fast_ai_service.py'
      - 'backend/scripts/run_domain_runtime_eval.py'
      - 'backend/tests/test_domain_query_understanding.py'
      - 'backend/tests/test_webchat_domain_shadow_trace.py'
      - 'backend/tests/fixtures/domain_intent_cases.json'
      - 'scripts/probe_domain_webchat_shadow_trace_e2e.py'
      - 'scripts/probe_domain_webchat_shadow_trace_e2e.sh'
      - '.github/workflows/domain-runtime-eval.yml'

jobs:
  domain-runtime-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run domain unit tests
        run: |
          PYTHONPATH=backend python -m pytest -q backend/tests/test_domain_query_understanding.py backend/tests/test_webchat_domain_shadow_trace.py
      - name: Run domain fixture eval
        run: |
          PYTHONPATH=backend python backend/scripts/run_domain_runtime_eval.py --fixture backend/tests/fixtures/domain_intent_cases.json --strict
      - name: Run WebChat shadow trace E2E probe
        run: |
          bash scripts/probe_domain_webchat_shadow_trace_e2e.sh
