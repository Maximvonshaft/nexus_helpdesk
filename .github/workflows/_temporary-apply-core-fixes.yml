name: Temporary Apply Core Conversation Fixes

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  statuses: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Register apply run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"core-fixes-apply\",\"description\":\"applying transparent core patches\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
      - name: Checkout exact Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Apply transparent patches and compile
        shell: bash
        run: |
          set -Eeuo pipefail
          cat \
            .github/core-fix-agent-routing.patch \
            .github/core-fix-conversation-ai.patch \
            .github/core-fix-confirmation-gates.patch \
            .github/core-fix-runtime-bridge.patch \
            .github/core-fix-tool-options.patch \
            .github/core-fix-orchestration-audit.patch \
            .github/core-fix-debug-bundle.patch \
            .github/core-fix-osr-audit.patch \
            > /tmp/core-fixes.patch
          git apply --check /tmp/core-fixes.patch
          git apply /tmp/core-fixes.patch
          rm -f \
            .github/core-fix-agent-routing.patch \
            .github/core-fix-conversation-ai.patch \
            .github/core-fix-confirmation-gates.patch \
            .github/core-fix-runtime-bridge.patch \
            .github/core-fix-tool-options.patch \
            .github/core-fix-orchestration-audit.patch \
            .github/core-fix-debug-bundle.patch \
            .github/core-fix-osr-audit.patch \
            .github/workflows/_temporary-apply-core-fixes.yml
          git diff --check
          python -m compileall -q backend/app
      - name: Commit core fixes
        id: commit
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete ticketless runtime core"
          git push origin HEAD:feat/conversation-first-agent-routing
          echo "final_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish final identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.commit.outputs.final_sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${FINAL_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"core-fixes-apply\",\"description\":\"transparent core patches applied\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
