schema: nexus.osr.codebase-rationalization-inventory.v2
purpose: canonical_repository_authority_and_anti_reintroduction_contract
mutable_delivery_status_forbidden: true
mutable_fields_forbidden:
  - branch
  - pull_request
  - commit_sha
  - workflow_run
  - delivery_status
  - candidate_status
  - production_status
source_of_delivery_truth:
  - current GitHub branch and pull-request objects
  - exact commit checks and workflow artifacts
  - deployment and runtime evidence bound to immutable identities

canonical_authorities:
  operator_product: webapp
  application_shell: webapp/src/app/AppShell.tsx
  navigation: webapp/src/app/navigation.ts
  http_transport: webapp/src/lib/apiClient.ts
  ui_framework: '@mui/material@9.2.0'
  theme: webapp/src/theme/nexusTheme.ts
  operator_presentation: webapp/src/app/OperatorPresentation.tsx
  ticket_domain: backend/app/services/canonical_ticket_service.py
  safe_effective_closure: backend/app/services/ticket_closure_readiness.py
  ticket_closure_api: backend/app/api/ticket_closure.py
  permissions: backend/app/services/permissions.py
  visibility_scope: backend/app/services/scope_permissions.py
  provider_router: backend/app/services/provider_runtime/router.py
  provider_traffic_selection: backend/app/services/provider_runtime/traffic_selection.py
  background_job_attempt_boundary: backend/app/services/background_job_transaction_boundary.py
  outbound_attempt_boundary: backend/app/services/outbound_dispatch_transaction_boundary.py
  queue_business_health: backend/app/services/queue_health.py
  worker_progress: backend/app/services/worker_progress.py
  controlled_worker_entrypoint: backend/scripts/run_worker_supervised.py
  controlled_worker_healthcheck: backend/scripts/check_worker_progress.py
  schema_migration: backend/alembic
  compatibility_lifecycle: config/architecture/compatibility-lifecycle.v1.json
  repository_verification: scripts/verify_repository.py
  remote_execution: .github/workflows/canonical-acceptance.yml

retired_paths_must_be_absent:
  - frontend
  - webapp/src/features/support-console
  - webapp/src/shared/ui
  - webapp/src/shared/api
  - webapp/src/components/ui
  - webapp/src/lib/api.ts
  - webapp/src/lib/webchatRealtime.ts
  - webapp/src/styles/tokens.css
  - webapp/src/styles/components.css
  - webapp/src/features/knowledge/KnowledgeReadOnlyPage.tsx
  - backend/app/services/external_channel_bridge.py
  - backend/app/services/external_channel_runtime_service.py
  - backend/app/services/outbound_adapters/whatsapp.py
  - backend/app/services/webchat_ai_decision_runtime/prompt_builder.py
  - artifacts/supply-chain

single_authority_rules:
  - one authenticated operator product
  - one application shell and navigation authority
  - one generic UI framework and theme
  - one frontend HTTP transport lifecycle
  - one public authority per backend responsibility
  - no role-name authorization outside the capability authority
  - no runtime schema DDL outside Alembic
  - no ticket closure from status or technical success alone
  - no worker health claim without durable progress freshness
  - one GitHub Actions workflow and one required gate
  - no verification evidence written into the candidate tree

compatibility_rules:
  policy: compatibility may delegate or provide bounded read-only history only
  business_logic_in_shims: forbidden
  provider_calls_from_compatibility: forbidden
  legacy_state_creation: forbidden
  schema_mutation: forbidden
  removal_deadlines_owned_by: config/architecture/compatibility-lifecycle.v1.json

verification:
  static: python scripts/verify_repository.py --static-only --expected-sha <exact-sha>
  complete: python scripts/verify_repository.py --expected-sha <exact-sha>
  frontend: cd webapp && npm run verify
  browser: cd webapp && npm run e2e
  postgres: python scripts/qualification/postgres_acceptance.py
  release_supply_chain: python scripts/qualification/supply_chain.py --release --evidence-dir <outside-repository>
  candidate_mutation_during_verification: forbidden

protected_non_duplicates:
  public_webchat_widget:
    path: backend/app/static/webchat
    reason: separate customer-facing surface, not an operator console
  alembic_history:
    path: backend/alembic/versions
    reason: deterministic upgrade, restore and rollback authority
  versioned_machine_contracts:
    reason: schema identity, not parallel implementation

production_authority:
  granted_by_repository_file: false
  deployment_requires_exact_action_authorization: true
  provider_enablement_requires_exact_action_authorization: true
  destructive_data_retirement_requires_exact_action_authorization: true
