name: postgres-migration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: |
          cd backend
          alembic heads
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Strict production-like readiness check
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
          STORAGE_BACKEND: s3
          OPENCLAW_TRANSPORT: mcp
          OPENCLAW_CLI_FALLBACK_ENABLED: "false"
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ack
          WEBCHAT_ALLOWED_ORIGINS: https://example.test
        run: cd backend && python scripts/validate_production_readiness.py
