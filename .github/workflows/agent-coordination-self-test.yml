name: Materialize exact-head convergence

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: materialize-exact-head-convergence-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work/744-canonical-operator-console-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply bounded exact-head convergence
        run: |
          set +e
          mkdir -p artifacts/materialize
          python - <<'PY' 2>&1 | tee artifacts/materialize/rc-adapter.log
          import re
          from pathlib import Path
          path = Path('.github/workflows/rc-test-candidate.yml')
          text = path.read_text(encoding='utf-8')
          pattern = r"      - name: Validate registry and release contracts\n        run: \|\n.*?(?=\n      - name: Install locked browser test dependencies)"
          replacement = "      - name: Validate registry and release contracts\n        id: rc-preflight\n        run: python scripts/release/rc_preflight.py --artifact-root artifacts/rc-test\n"
          updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'current RC preflight block: expected one match, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY
          adapter_code=${PIPESTATUS[0]}
          if [ "${adapter_code}" -eq 0 ]; then
            python scripts/ci/materialize_rc_preflight_workflow.py 2>&1 | tee artifacts/materialize/result.log
            code=${PIPESTATUS[0]}
          else
            code=${adapter_code}
          fi
          set -e
          if [ "${code}" -eq 0 ]; then
            python -m py_compile \
              scripts/ci/materialize_rc_preflight_workflow.py \
              scripts/ci/actions_authority_inventory.py \
              scripts/ci/reconcile_external_channel_inventory.py \
              scripts/release/rc_preflight.py \
              backend/tests/test_canonical_policy_projection_contract.py \
              backend/tests/test_webchat_voice_p0_static.py \
              backend/tests/test_webchat_voice_static_headers.py
            grep -q 'id: rc-preflight' .github/workflows/rc-test-candidate.yml
            grep -q 'artifacts/tenant-runtime/contracts.xml' .github/workflows/tenant-runtime-authority-gate.yml
            ! grep -R -E 'uses: actions/(checkout|setup-python|setup-node|upload-artifact)@v[0-9]+' .github/workflows
            git diff --check
          fi
          exit "${code}"

      - name: Upload bounded materializer diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: materialize-exact-head-${{ github.event.pull_request.head.sha }}
          path: artifacts/materialize/*.log
          if-no-files-found: error
          retention-days: 1

      - name: Restore governance authority and remove one-shot assets
        run: |
          set -Eeuo pipefail
          git show d6b53c8d5a36fdaf193cb2403b98349fc47da712:.github/workflows/agent-coordination-self-test.yml > .github/workflows/agent-coordination-self-test.yml
          rm -f scripts/ci/materialize_rc_preflight_workflow.py
          rm -f .github/workflows/materialize-rc-preflight-once.yml

      - name: Commit final exact-head convergence
        env:
          EXPECTED_PARENT: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_PARENT}"
          git config user.name "Nexus implementation bot"
          git config user.email "noreply@github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(governance): align exact-head contracts and harden Actions"
          git push origin HEAD:work/744-canonical-operator-console-consolidation
