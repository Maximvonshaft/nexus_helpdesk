name: Temporary Resolve Main Synchronization

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  resolve-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      WEBCHAT_AI_AUTO_REPLY_MODE: off
      SPEEDAF_MCP_ENABLED: "false"
    steps:
      - name: Register exact merge resolution run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"main-synchronization\",\"description\":\"resolving three audited conflicts\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Merge current main with audited resolutions
        id: merge
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_code=$?
          set -e
          if [[ "$merge_code" != "0" && "$merge_code" != "1" ]]; then
            exit "$merge_code"
          fi
          unresolved="$(git diff --name-only --diff-filter=U | sort)"
          expected=$'backend/app/api/ticket_perf.py\nbackend/tests/test_nexus_osr_admin_api.py\nbackend/tests/test_retired_persistence_absence.py'
          if [[ "$unresolved" != "$expected" ]]; then
            printf 'Unexpected merge conflict set.\nExpected:\n%s\nActual:\n%s\n' "$expected" "$unresolved" >&2
            exit 1
          fi
          git checkout --theirs -- \
            backend/app/api/ticket_perf.py \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py
          git add \
            backend/app/api/ticket_perf.py \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py
          rm -f \
            .github/workflows/_temporary-sync-main.yml \
            .github/workflows/_temporary-sync-conversation-main.yml
          git add -A
          test -z "$(git diff --name-only --diff-filter=U)"
          git diff --check --cached
          git merge-base --is-ancestor origin/main HEAD || test -f .git/MERGE_HEAD
          python -m compileall -q backend/app backend/scripts scripts/qualification scripts/release
      - name: Run merge-sensitive regression
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py \
            backend/tests/test_ticket_detail_summary.py \
            backend/tests/test_ticket_summary_evidence_truth.py
      - name: Commit merged candidate and push
        id: commit
        shell: bash
        run: |
          set -Eeuo pipefail
          git commit -m "merge: synchronize conversation-first branch with latest main"
          git merge-base --is-ancestor origin/main HEAD
          git push origin HEAD:feat/conversation-first-agent-routing
          echo "final_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch canonical acceptance for merged Head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/dispatches" \
            --data '{"ref":"feat/conversation-first-agent-routing"}'
      - name: Publish synchronized candidate identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FINAL_SHA: ${{ steps.commit.outputs.final_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          canonical_run_id=""
          for _attempt in $(seq 1 30); do
            runs="$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/runs?branch=feat%2Fconversation-first-agent-routing&event=workflow_dispatch&per_page=20")"
            canonical_run_id="$(jq -r --arg sha "${FINAL_SHA}" '.workflow_runs[] | select(.head_sha == $sha) | .id' <<<"${runs}" | head -n 1)"
            if [[ -n "${canonical_run_id}" && "${canonical_run_id}" != "null" ]]; then
              break
            fi
            sleep 2
          done
          test -n "${canonical_run_id}"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${FINAL_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"main-synchronization\",\"description\":\"latest main merged; canonical run=${canonical_run_id}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${FINAL_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"canonical-acceptance-dispatched\",\"description\":\"run_id=${canonical_run_id}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${canonical_run_id}\"}"
