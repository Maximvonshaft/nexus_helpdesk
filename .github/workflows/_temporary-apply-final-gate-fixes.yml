name: Temporary Apply Final Gate Fixes

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact staging Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Apply and validate exact fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          git apply --check .github/final-gate-fixes.patch
          git apply .github/final-gate-fixes.patch
          rm -f .github/final-gate-fixes.patch
          rm -f .github/workflows/_temporary-apply-final-gate-fixes.yml
          git diff --check
          grep -F 'TENANT_RUNTIME_AUTHORITY_MODE: shadow' .github/workflows/canonical-acceptance.yml
          python -m json.tool config/security/codeql-exceptions.json >/dev/null
          grep -F 'py/weak-sensitive-data-hashing' config/security/codeql-exceptions.json
          grep -F 'hashlib.md5(payload, usedforsecurity=False)' backend/app/services/speedaf/track_query.py
      - name: Commit final fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: close tenant authority and protocol signing gates"
          git push origin HEAD:feat/conversation-first-agent-routing
