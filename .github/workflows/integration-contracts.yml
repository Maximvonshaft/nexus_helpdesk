name: integration-contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-contracts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./integration_contracts_ci.db
      NEXUSDESK_SMOKE_MODE: mock
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert checkout identity
        if: github.event_name == 'pull_request'
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          pip install -r backend/requirements.txt
          pip install "pytest==8.3.5"

      - name: Compile integration API
        run: python -m compileall backend/app/api/integration.py backend/tests/test_integration_contracts.py

      - name: Run integration contract tests
        run: pytest -q backend/tests/test_integration_contracts.py

      - name: Verify smoke orchestration without external effects
        run: bash scripts/smoke/smoke_all_round_a.sh --dry-run

      - name: Verify smoke script syntax
        run: find scripts/smoke -name '*.sh' -print0 | xargs -0 -n1 bash -n
