name: Temporary Apply Conversation Fixes

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Apply validated conversation-first fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          gzip -dc .github/conversation-fixes.patch.gz > /tmp/conversation-fixes.patch
          git apply --check /tmp/conversation-fixes.patch
          git apply /tmp/conversation-fixes.patch
          rm -f \
            .github/conversation-fixes.patch.gz \
            .github/workflows/_temporary-apply-conversation-fixes.yml \
            .github/workflows/_temporary-candidate-source-export.yml
          git diff --check
          python -m compileall -q backend/app backend/scripts scripts/qualification scripts/release
      - name: Commit exact final tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete conversation-first routing foundation"
          git push origin HEAD:feat/conversation-first-agent-routing
      - name: Dispatch canonical acceptance for final Head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/dispatches" \
            --data '{"ref":"feat/conversation-first-agent-routing"}'
