name: Temporary PR 774 Isolated Backend Closure

on:
  push:
    branches:
      - fix/pr774-final-backend-closure

permissions:
  contents: write

concurrency:
  group: pr774-isolated-backend-closure
  cancel-in-progress: true

jobs:
  fix-test-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout exact isolated branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: fix/pr774-final-backend-closure

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply four backend root fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          git rev-parse HEAD > /tmp/start-sha
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'replacement mismatch {path}: expected=1 actual={count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          core = 'backend/app/services/nexus_osr/tool_execution_service_core.py'
          replace_once(
              core,
              'from ...webchat_models import WebchatConversation\n',
              'from ...webchat_models import WebchatConversation, WebchatHandoffRequest\n',
          )
          replace_once(
              core,
              '''        summary = availability_summary(
                  db,
                  tenant_key=control.tenant_key,
                  country_code=control.country_code,
                  channel_key=control.channel_key,
              )
              ''',
              '''        request_row = (
                  db.get(WebchatHandoffRequest, current.current_handoff_request_id)
                  if current.current_handoff_request_id is not None
                  else None
              )
              if request_row is not None and request_row.conversation_id != current.id:
                  request_row = None
              summary = availability_summary(
                  db,
                  tenant_key=control.tenant_key,
                  country_code=control.country_code,
                  channel_key=control.channel_key,
                  request_row=request_row,
              )
              ''',
          )
          replace_once(
              core,
              '''def _availability_customer_summary(summary: dict[str, Any]) -> str:
                  online = int(summary.get("online_agents") or 0)
                  available = int(summary.get("available_capacity") or 0)
                  queued = int(summary.get("queue_count") or 0)
                  if online <= 0:
                      return "No human support agent is currently online."
                  if available > 0:
                      return f"Human support is available with {available} open conversation slot(s)."
                  return f"Human support is currently at capacity with {queued} conversation(s) waiting."
              ''',
              '''def _availability_customer_summary(summary: dict[str, Any]) -> str:
                  online = int(summary.get("online_agents") or 0)
                  available = int(summary.get("available_capacity") or 0)
                  queued = int(summary.get("queue_count") or 0)
                  raw_position = summary.get("queue_position")
                  position = int(raw_position) if isinstance(raw_position, int) else None
                  if online <= 0:
                      return "No human support agent is currently online."
                  if available > 0:
                      return (
                          "Human support is available with "
                          f"{available} open conversation slot(s)."
                      )
                  if position is not None and position > 0:
                      ahead = max(0, position - 1)
                      if ahead == 0:
                          return (
                              "Human support is currently at capacity. "
                              "This customer is next in the eligible queue."
                          )
                      return (
                          "Human support is currently at capacity with "
                          f"{ahead} conversation(s) ahead of this customer."
                      )
                  return (
                      "Human support is currently at capacity with "
                      f"{queued} conversation(s) waiting."
                  )
              ''',
          )

          Path('backend/app/services/nexus_osr/tool_execution_service.py').write_text(
              '''"""Stable public import path for the canonical governed tool executor."""

from __future__ import annotations

from . import tool_execution_service_core as _core
from .tool_execution_service_core import *  # noqa: F401,F403

_production_handlers = _core._production_handlers
_availability_customer_summary = _core._availability_customer_summary


def __getattr__(name: str):
    return getattr(_core, name)
''',
              encoding='utf-8',
          )

          reply_service = 'backend/app/services/conversation_operator_service.py'
          replace_once(
              reply_service,
              '    return _message_payload(message)\n',
              '    return {"ok": True, **_message_payload(message)}\n',
          )

          voice_test = 'backend/tests/test_webchat_voice_api.py'
          replace_once(
              voice_test,
              'def test_public_create_voice_session_binds_conversation_without_ticket():\n',
              'def test_public_create_voice_session_lazily_binds_ticket_for_voice():\n',
          )
          replace_once(
              voice_test,
              '''        row = db.query(WebchatVoiceSession).filter(WebchatVoiceSession.public_id == payload["voice_session_id"]).one()
                  assert row.ticket_id is None
                  assert row.provider == "mock"
                  events = db.query(WebchatEvent).filter(
                      WebchatEvent.conversation_id == row.conversation_id,
                      WebchatEvent.ticket_id.is_(None),
                  ).all()
              ''',
              '''        row = db.query(WebchatVoiceSession).filter(
                      WebchatVoiceSession.public_id == payload["voice_session_id"]
                  ).one()
                  assert row.ticket_id is not None
                  assert row.provider == "mock"
                  conversation = db.get(WebchatConversation, row.conversation_id)
                  assert conversation is not None
                  assert conversation.ticket_id == row.ticket_id
                  events = db.query(WebchatEvent).filter(
                      WebchatEvent.conversation_id == row.conversation_id,
                      WebchatEvent.ticket_id == row.ticket_id,
                  ).all()
              ''',
          )

          compensation = 'backend/tests/test_webchat_voice_room_compensation.py'
          replace_once(
              compensation,
              '''    canonical_list = client.get(
                  "/api/support/conversations",
                  params={"view": "all", "channel": "all", "limit": 100},
                  headers=_admin_headers(),
              )
              assert canonical_list.status_code == 200, canonical_list.text
              assert any(
                  item["session_key"].endswith(f":{payload['conversation_id']}")
                  for item in canonical_list.json()["items"]
              )
              ''',
              '',
          )
          PY

          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py

      - name: Commit clean isolated result
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/start-sha)"
          git fetch --no-tags origin fix/pr774-final-backend-closure
          test "$(git rev-parse origin/fix/pr774-final-backend-closure)" = "$start_sha"
          git rm .github/workflows/_temporary-pr774-isolated-backend-closure.yml
          git rm .github/pr774-isolated-backend-trigger
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: close PR 774 canonical backend regressions'
          git push origin HEAD:fix/pr774-final-backend-closure
