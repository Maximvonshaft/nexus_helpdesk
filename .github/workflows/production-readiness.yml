name: production-readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  production-readiness-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: cd backend && alembic upgrade head

      - name: Strict production readiness check
        env:
          APP_ENV: production
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          SECRET_KEY: ci-production-readiness-secret-change-in-real-prod-1234567890
          ALLOWED_ORIGINS: https://console.example.com
          WEBCHAT_ALLOWED_ORIGINS: https://www.example.com
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ack
          STORAGE_BACKEND: s3
          S3_BUCKET: ci-dummy-bucket
          S3_REGION: us-east-1
          OPENCLAW_TRANSPORT: mcp
          OPENCLAW_DEPLOYMENT_MODE: remote_gateway
          OPENCLAW_CLI_FALLBACK_ENABLED: "false"
          METRICS_ENABLED: "true"
          METRICS_TOKEN: ci-metrics-token
          REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
        run: cd backend && python scripts/validate_production_readiness.py
