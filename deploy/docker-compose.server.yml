x-app-image: &app_image
  image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
  env_file:
    - path: .env.prod
      required: false
  environment: &app_env
    APP_ENV: production
    AUTO_INIT_DB: "false"
    SEED_DEMO_DATA: "false"
    WEBCHAT_RATE_LIMIT_BACKEND: ${WEBCHAT_RATE_LIMIT_BACKEND:-database}
    WEBCHAT_WS_ENABLED: ${WEBCHAT_WS_ENABLED:-false}
    WEBCHAT_WS_ADMIN_ENABLED: ${WEBCHAT_WS_ADMIN_ENABLED:-false}
    WEBCHAT_WS_PUBLIC_ENABLED: ${WEBCHAT_WS_PUBLIC_ENABLED:-false}
    WEBCHAT_WS_BROKER: ${WEBCHAT_WS_BROKER:-database}
    WEBCHAT_WS_REPLAY_POLL_MS: ${WEBCHAT_WS_REPLAY_POLL_MS:-500}
    WEBCHAT_WS_FALLBACK_POLL_MS: ${WEBCHAT_WS_FALLBACK_POLL_MS:-4000}
    WEBCHAT_WS_HEARTBEAT_MS: ${WEBCHAT_WS_HEARTBEAT_MS:-25000}
    WEBCHAT_WS_HELLO_TIMEOUT_MS: ${WEBCHAT_WS_HELLO_TIMEOUT_MS:-5000}
    WEBCHAT_WS_MAX_CONNECTIONS: ${WEBCHAT_WS_MAX_CONNECTIONS:-1000}
    WEBCHAT_WS_MAX_CONNECTIONS_PER_USER: ${WEBCHAT_WS_MAX_CONNECTIONS_PER_USER:-10}
    REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    DB_SLOW_QUERY_MS: ${DB_SLOW_QUERY_MS:-500}
    GIT_SHA: ${GIT_SHA:-unknown}
    BUILD_TIME: ${BUILD_TIME:-unknown}
    IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    APP_VERSION: ${APP_VERSION:-server}
    FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
  volumes: &app_volumes
    - /run/secrets:/run/secrets:ro
    - ../data/uploads:/app/backend/uploads
  logging: &json_logging
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  restart: unless-stopped

x-worker-healthcheck: &worker_healthcheck
  test:
    - CMD-SHELL
    - "python -c \"from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_worker.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('worker-ok')\""
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  postgres:
    logging: *json_logging
    image: postgres:16-alpine
    env_file:
      - path: .env.prod
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexusdesk} -d $${POSTGRES_DB:-nexusdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    logging: *json_logging
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
        APP_VERSION: ${APP_VERSION:-server}
        FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
    image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    env_file:
      - path: .env.prod
        required: false
    environment:
      <<: *app_env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-30}
    volumes: *app_volumes
    ports:
      - "127.0.0.1:18081:8080"
    command:
      - /bin/sh
      - -c
      - >-
        exec gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        --workers "$${WEB_CONCURRENCY:-2}"
        --timeout "$${WEB_TIMEOUT:-30}"
        --bind 0.0.0.0:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker-outbound:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-outbound --queue outbound
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-background:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-background --queue background
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-handoff-snapshot:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-handoff-snapshot --queue handoff-snapshot
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-webchat-ai:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-webchat-ai --queue webchat-ai
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  webcall-ai-agent:
    <<: *app_image
    profiles:
      - webcall-ai
    command: python -m app.services.webcall_ai_production.agent_worker
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'webcall_ai_production.agent_worker' in cmd, cmd; from app.services.webcall_ai_production.agent_worker import health; assert health()['ok']; print('webcall-ai-agent-ok')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      app:
        condition: service_healthy

  legacy-worker:
    <<: *app_image
    profiles:
      - legacy-worker
    command: python scripts/run_worker.py --worker-id worker-main --queue all
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    profiles: ["edge-nginx"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
