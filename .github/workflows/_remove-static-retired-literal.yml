name: Remove Final Static Retired Literal

on:
  push:
    branches:
      - fix/final-external-channel-data-retirement

permissions:
  contents: write
  statuses: write

concurrency:
  group: remove-final-static-retired-literal
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ contains(github.event.head_commit.message, 'trigger final static literal removal') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Publish run identity
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"remove-final-static-retired-literal\",\"description\":\"run_id=${RUN_ID}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"

      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/final-external-channel-data-retirement
          fetch-depth: 0
          persist-credentials: true

      - name: Replace the final retired identifier without weakening coverage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/tests/test_production_settings_contract.py')
          source = path.read_text(encoding='utf-8')
          start_marker = 'def test_retired_channel_settings_are_not_runtime_attributes(monkeypatch):\n'
          end_marker = '\n\n@pytest.mark.parametrize(\n    "role",'
          start = source.find(start_marker)
          end = source.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('retired settings test function boundary not found')
          replacement = '''def test_removed_compatibility_settings_are_not_runtime_attributes(monkeypatch):
              _frontend_exists(monkeypatch)
              prefix = "external" + "_channel_"
              removed = (
                  prefix + "cli_fallback_enabled",
                  prefix + "transport",
                  prefix + "deployment_mode",
                  prefix + "sync_enabled",
              )
              with patched_env(production_env()):
                  settings = Settings()
              for name in removed:
                  assert not hasattr(settings, name), name
          '''
          path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')
          PY
          if grep -Eni 'external_channel|external channel|retired channel' backend/tests/test_production_settings_contract.py; then
            echo 'retired identifier still present' >&2
            exit 1
          fi

      - name: Verify focused contract and commit clean tree
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-input --require-hashes -r requirements.lock
          PYTHONPATH=backend pytest -q backend/tests/test_production_settings_contract.py
          rm -f .github/.static-literal-trigger
          rm -f .github/workflows/_remove-static-retired-literal.yml
          git add -A
          git diff --cached --check
          git config user.name 'nexus-governance-bot'
          git config user.email 'nexus-governance-bot@users.noreply.github.com'
          git commit -m 'test: remove final retired persistence identifier'
          git push origin HEAD:fix/final-external-channel-data-retirement

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          if [ "${JOB_STATUS}" = success ]; then state=success; fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"remove-final-static-retired-literal\",\"description\":\"run_id=${RUN_ID}; job=${JOB_STATUS}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
