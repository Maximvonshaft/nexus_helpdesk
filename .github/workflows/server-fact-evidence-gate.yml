name: server-fact-evidence-gate

on:
  pull_request:
    paths:
      - "backend/app/services/server_fact_evidence.py"
      - "backend/app/services/webchat_service.py"
      - "backend/app/api/webchat.py"
      - "backend/app/api/webchat_ws.py"
      - "backend/app/api/support_conversations.py"
      - "backend/app/services/webchat_osr_audit_service.py"
      - "backend/tests/test_server_fact_evidence.py"
      - ".github/workflows/server-fact-evidence-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/server-fact-evidence-gate.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile evidence boundary
        run: |
          python -m py_compile \
            backend/app/services/server_fact_evidence.py \
            backend/app/services/webchat_service.py \
            backend/app/api/webchat.py \
            backend/app/api/webchat_ws.py \
            backend/app/api/support_conversations.py \
            backend/app/services/webchat_osr_audit_service.py \
            backend/tests/test_server_fact_evidence.py
      - name: Run focused tests
        run: |
          pytest -q \
            backend/tests/test_server_fact_evidence.py \
            backend/tests/test_outbound_safety.py \
            backend/tests/test_ai_customer_visible_contracts.py \
            backend/tests/test_webchat_handoff_control.py
      - name: Prove client boolean is not authoritative
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('backend/app/services/webchat_service.py').read_text(encoding='utf-8')
          assert 'has_fact_evidence=server_evidence.present' in text
          assert 'has_fact_evidence=has_fact_evidence' not in text
          assert 'resolve_server_fact_evidence' in text
          PY
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
