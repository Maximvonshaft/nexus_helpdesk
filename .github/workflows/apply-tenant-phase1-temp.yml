name: apply-tenant-phase1-temp

on:
  pull_request:
    paths:
      - .github/patches/tenant-phase1.patch.gz.b64
      - .github/workflows/apply-tenant-phase1-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-tenant-phase1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Clone exact PR branch quietly
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git clone --quiet --depth 1 --branch "${HEAD_BRANCH}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'

      - name: Verify and apply exact implementation patch
        run: |
          set -Eeuo pipefail
          encoded=.github/patches/tenant-phase1.patch.gz.b64
          archive="${RUNNER_TEMP}/tenant-phase1-code.patch.gz"
          patch="${RUNNER_TEMP}/tenant-phase1-code.patch"
          base64 --decode "${encoded}" > "${archive}"
          echo "archive_sha=$(sha256sum "${archive}" | awk '{print $1}')"
          test "$(sha256sum "${archive}" | awk '{print $1}')" = "c3e6b295b7ade0c023f8c387d24c795752547af08951902989c442e44dbf2fc0"
          gzip -dc "${archive}" > "${patch}"
          echo "patch_sha=$(sha256sum "${patch}" | awk '{print $1}')"
          grep '^diff --git' "${patch}"
          test "$(sha256sum "${patch}" | awk '{print $1}')" = "14c4c199f66b0b4bb81a2c3fcd2ae9797967a01df6661ae0be1eb179000b1535"
          git apply --check --verbose "${patch}"
          git apply --verbose "${patch}"

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Verify focused Phase 1 implementation
        env:
          PYTHONPATH: backend
          APP_ENV: test
          DATABASE_URL: sqlite:////tmp/tenant-phase1-focused.db
          AUTO_INIT_DB: 'false'
          SEED_DEMO_DATA: 'false'
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/models.py \
            backend/alembic/versions/20260713_0059_add_tenant_principal.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          pytest -q \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py \
            backend/tests/test_osr_model_registration.py
          python -m unittest scripts/qualification/tenant/test_tenant_principal_preflight.py
          rm -f /tmp/tenant-phase1-alembic.db
          export DATABASE_URL=sqlite:////tmp/tenant-phase1-alembic.db
          (cd backend && alembic upgrade head)
          test "$(cd backend && alembic current | awk '{print $1}')" = "20260713_0059"
          (cd backend && alembic downgrade -1)
          test "$(cd backend && alembic current | awk '{print $1}')" = "20260711_0058"
          (cd backend && alembic upgrade head)
          test "$(cd backend && alembic current | awk '{print $1}')" = "20260713_0059"
          git diff --check

      - name: Commit verified non-workflow implementation
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f .github/patches/tenant-phase1.patch.gz.b64
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              'backend/app/models.py',
              'backend/alembic/versions/20260713_0059_add_tenant_principal.py',
              'backend/tests/test_tenant_principal_additive_schema.py',
              'docs/architecture/tenant-principal-migration.md',
              'scripts/qualification/tenant/tenant_principal_preflight.py',
              'scripts/qualification/tenant/test_tenant_principal_preflight.py',
              '.github/patches/tenant-phase1.patch.gz.b64',
          }
          actual = set(subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git commit -m 'feat(tenant): add relational principal Phase 1 (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
