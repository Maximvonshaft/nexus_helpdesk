name: Temporary Generic Agent Full Regression

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: generic-agent-full-regression-b7e41d
  cancel-in-progress: true

env:
  PYTHONPATH: backend

jobs:
  verify:
    if: github.event.pull_request.number == 793 && github.event.pull_request.head.ref == 'refactor/generic-agent-runtime-final-b7e41d'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    outputs:
      backend_failures_b64: ${{ steps.backend-summary.outputs.summary_b64 }}
      frontend_failures_b64: ${{ steps.frontend-summary.outputs.summary_b64 }}
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: true
          ref: refactor/generic-agent-runtime-final-b7e41d
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install exact dependencies
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          npm --prefix webapp ci --ignore-scripts --no-audit --no-fund
      - name: Build final candidate tree
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/generic-agent-full-evidence
          {
            git rev-parse HEAD > /tmp/generic-agent-full-start-sha
            python scripts/_generic_agent_full_regression_fix.py
            python scripts/_generic_agent_authority_fix.py
            python scripts/_generic_agent_execution_args_fix.py
            python scripts/_generic_agent_execution_depth_fix.py
            python scripts/_generic_agent_regression_migration_fix.py
            python scripts/_generic_agent_persona_projection_fix.py
            python scripts/_generic_agent_provider_capability_fix.py
            python scripts/_generic_agent_idempotency_fix.py
            python scripts/_generic_agent_static_gate_fix.py
            python scripts/_generic_agent_compatibility_retirement_fix.py
            python scripts/_generic_agent_final_core_bootstrap.py
            python scripts/_generic_agent_final_core.py
            python scripts/_generic_agent_final_voice_api.py
            python scripts/_generic_agent_final_voice_context.py
            python scripts/_generic_agent_final_voice_actions.py
            python scripts/_generic_agent_final_voice_lifecycle.py
            python scripts/_generic_agent_final_voice_tests.py
            python scripts/_generic_agent_final_tests.py
            git rm -f scripts/_generic_agent_full_regression_fix.py
            git rm -f scripts/_generic_agent_authority_fix.py
            git rm -f scripts/_generic_agent_execution_args_fix.py
            git rm -f scripts/_generic_agent_execution_depth_fix.py
            git rm -f scripts/_generic_agent_regression_migration_fix.py
            git rm -f scripts/_generic_agent_persona_projection_fix.py
            git rm -f scripts/_generic_agent_provider_capability_fix.py
            git rm -f scripts/_generic_agent_idempotency_fix.py
            git rm -f scripts/_generic_agent_static_gate_fix.py
            git rm -f scripts/_generic_agent_compatibility_retirement_fix.py
            git rm -f scripts/_generic_agent_final_core_bootstrap.py
            git rm -f scripts/_generic_agent_final_core.py
            git rm -f scripts/_generic_agent_final_voice_api.py
            git rm -f scripts/_generic_agent_final_voice_context.py
            git rm -f scripts/_generic_agent_final_voice_actions.py
            git rm -f scripts/_generic_agent_final_voice_lifecycle.py
            git rm -f scripts/_generic_agent_final_voice_tests.py
            git rm -f scripts/_generic_agent_final_tests.py
            git rm -f .github/workflows/_temporary-generic-agent-full-regression.yml
            test -z "$(find .github/workflows -maxdepth 1 -type f -name '_temporary-*' -print)"
            python -m compileall -q backend/app
            python scripts/ci/check_agent_runtime_residue.py
            git diff --check
          } 2>&1 | tee /tmp/generic-agent-full-evidence/build.log
      - name: Run complete backend regression
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p /tmp/generic-agent-full-evidence
          python -m pytest -q backend/tests \
            2>&1 | tee /tmp/generic-agent-full-evidence/pytest.log
      - name: Capture backend failure identifiers
        id: backend-summary
        if: steps.backend.outcome == 'failure'
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          path = Path('/tmp/generic-agent-full-evidence/pytest.log')
          lines = path.read_text(encoding='utf-8', errors='replace').splitlines() if path.exists() else []
          failed = [line for line in lines if line.startswith(('FAILED ', 'ERROR '))]
          totals = [line for line in lines if ' failed' in line and ' passed' in line and line.startswith('=')]
          summary = '\n'.join([*failed[-150:], *totals[-1:]]) or 'backend regression failed without a short-summary identifier'
          encoded = base64.b64encode(summary.encode('utf-8')).decode('ascii')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'summary_b64={encoded}\n')
          PY
      - name: Run frontend architecture
        id: frontend-architecture
        continue-on-error: true
        working-directory: webapp
        run: npm run architecture
      - name: Run frontend lint
        id: frontend-lint
        continue-on-error: true
        working-directory: webapp
        run: npm run lint
      - name: Run frontend typecheck
        id: frontend-typecheck
        continue-on-error: true
        working-directory: webapp
        run: npm run typecheck
      - name: Run frontend unit contracts
        id: frontend-test
        continue-on-error: true
        working-directory: webapp
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee /tmp/generic-agent-full-evidence/frontend-test.log
      - name: Build frontend production bundle
        id: frontend-build
        continue-on-error: true
        working-directory: webapp
        run: npm run build
      - name: Capture frontend failure stages
        id: frontend-summary
        if: steps.frontend-architecture.outcome == 'failure' || steps.frontend-lint.outcome == 'failure' || steps.frontend-typecheck.outcome == 'failure' || steps.frontend-test.outcome == 'failure' || steps.frontend-build.outcome == 'failure'
        shell: bash
        env:
          ARCHITECTURE: ${{ steps.frontend-architecture.outcome }}
          LINT: ${{ steps.frontend-lint.outcome }}
          TYPECHECK: ${{ steps.frontend-typecheck.outcome }}
          TEST: ${{ steps.frontend-test.outcome }}
          BUILD: ${{ steps.frontend-build.outcome }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          stages = {
              'architecture': os.environ['ARCHITECTURE'],
              'lint': os.environ['LINT'],
              'typecheck': os.environ['TYPECHECK'],
              'test': os.environ['TEST'],
              'build': os.environ['BUILD'],
          }
          lines = [f'{name}: {state}' for name, state in stages.items()]
          test_log = Path('/tmp/generic-agent-full-evidence/frontend-test.log')
          if test_log.exists() and stages['test'] == 'failure':
              raw = test_log.read_text(encoding='utf-8', errors='replace').splitlines()
              relevant = [
                  line for line in raw
                  if 'FAIL' in line or 'AssertionError' in line or 'Error:' in line
              ]
              lines.extend(relevant[-40:])
          encoded = base64.b64encode('\n'.join(lines).encode('utf-8')).decode('ascii')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'summary_b64={encoded}\n')
          PY
      - name: Upload bounded verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generic-agent-full-${{ github.event.pull_request.head.sha }}
          path: /tmp/generic-agent-full-evidence
          if-no-files-found: warn
          retention-days: 7
      - name: Enforce complete regression success
        if: steps.backend.outcome == 'failure' || steps.frontend-architecture.outcome == 'failure' || steps.frontend-lint.outcome == 'failure' || steps.frontend-typecheck.outcome == 'failure' || steps.frontend-test.outcome == 'failure' || steps.frontend-build.outcome == 'failure'
        run: exit 1
      - name: Commit clean candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/generic-agent-full-start-sha)"
          git fetch --no-tags origin refactor/generic-agent-runtime-final-b7e41d
          test "$(git rev-parse origin/refactor/generic-agent-runtime-final-b7e41d)" = "$start_sha"
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'refactor(agent): enforce one governed generic runtime'
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d

  failure-summary:
    if: always() && (needs.verify.outputs.backend_failures_b64 != '' || needs.verify.outputs.frontend_failures_b64 != '')
    needs: verify
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Print bounded failure identifiers
        env:
          BACKEND_FAILURES_B64: ${{ needs.verify.outputs.backend_failures_b64 }}
          FRONTEND_FAILURES_B64: ${{ needs.verify.outputs.frontend_failures_b64 }}
        run: |
          python - <<'PY'
          import base64
          import os

          for label, name in (
              ('BACKEND', 'BACKEND_FAILURES_B64'),
              ('FRONTEND', 'FRONTEND_FAILURES_B64'),
          ):
              encoded = os.environ.get(name, '')
              if encoded:
                  print(f'[{label}]')
                  print(base64.b64decode(encoded).decode('utf-8', errors='replace'))
          PY
