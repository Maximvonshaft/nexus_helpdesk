name: manual-staging-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed NexusDesk base URL, for example https://support.example.com"
        required: true
        type: string
      expected_status:
        description: "Expected /readyz status value"
        required: true
        default: "ready"
        type: string
      check_webchat_assets:
        description: "Check WebChat static demo/widget assets"
        required: true
        default: true
        type: boolean
      check_metrics:
        description: "Check /metrics with X-Metrics-Token from secret STAGING_METRICS_TOKEN"
        required: true
        default: false
        type: boolean
      cors_origin:
        description: "Optional exact Origin for CORS preflight; leave blank to skip"
        required: false
        default: ""
        type: string
      check_outbound_email_admin:
        description: "Run real admin browser smoke for /outbound-email using staging admin secrets"
        required: true
        default: false
        type: boolean
      check_outbound_email_test_send:
        description: "Send one real SMTP test email after explicit confirmation"
        required: true
        default: false
        type: boolean
      outbound_email_test_send_confirm:
        description: "Required only for real SMTP send: I_UNDERSTAND_THIS_SENDS_REAL_EMAIL"
        required: false
        default: ""
        type: string
      outbound_email_account_id:
        description: "Optional positive Outbound Email account id; blank selects the first active account"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  manual-staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate smoke inputs without secrets
        id: target
        shell: bash
        env:
          RAW_BASE_URL: ${{ inputs.base_url }}
          RAW_EXPECTED_STATUS: ${{ inputs.expected_status }}
          RAW_CORS_ORIGIN: ${{ inputs.cors_origin }}
          RAW_ACCOUNT_ID: ${{ inputs.outbound_email_account_id }}
          RAW_TEST_SEND_CONFIRM: ${{ inputs.outbound_email_test_send_confirm }}
          CHECK_TEST_SEND: ${{ inputs.check_outbound_email_test_send }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os
          import re
          from urllib.parse import urlsplit

          CONFIRM = "I_UNDERSTAND_THIS_SENDS_REAL_EMAIL"

          def fail(message: str) -> None:
              raise SystemExit(f"invalid_manual_smoke_input={message}")

          def clean_single_line(name: str, *, allow_empty: bool = False) -> str:
              value = os.environ.get(name, "").strip()
              if not value and not allow_empty:
                  fail(f"{name}_required")
              if len(value) > 2048 or any(ord(char) < 32 or ord(char) == 127 for char in value):
                  fail(f"{name}_contains_control_or_is_too_long")
              return value

          def normalize_endpoint(name: str, *, allow_empty: bool = False) -> str:
              raw = clean_single_line(name, allow_empty=allow_empty)
              if not raw:
                  return ""
              parsed = urlsplit(raw)
              if parsed.scheme.lower() not in {"http", "https"}:
                  fail(f"{name}_scheme")
              if not parsed.hostname or "@" in parsed.netloc:
                  fail(f"{name}_authority")
              if parsed.path not in {"", "/"} or parsed.query or parsed.fragment:
                  fail(f"{name}_must_be_origin_or_root")
              try:
                  port = parsed.port
              except ValueError:
                  fail(f"{name}_port")
              host = parsed.hostname.lower()
              if ":" in host:
                  fail(f"{name}_ipv6_not_supported")
              authority = host if port is None else f"{host}:{port}"
              return f"{parsed.scheme.lower()}://{authority}"

          base_url = normalize_endpoint("RAW_BASE_URL")
          cors_origin = normalize_endpoint("RAW_CORS_ORIGIN", allow_empty=True)
          expected_status = clean_single_line("RAW_EXPECTED_STATUS")
          if re.fullmatch(r"[a-z][a-z0-9_-]{0,31}", expected_status) is None:
              fail("expected_status_format")

          account_id = clean_single_line("RAW_ACCOUNT_ID", allow_empty=True)
          if account_id and (not account_id.isdigit() or int(account_id) <= 0):
              fail("outbound_email_account_id_must_be_positive_integer")

          check_test_send = os.environ.get("CHECK_TEST_SEND", "false").lower() == "true"
          confirmation = clean_single_line("RAW_TEST_SEND_CONFIRM", allow_empty=True)
          if check_test_send and confirmation != CONFIRM:
              fail("real_email_confirmation_required")

          outputs = {
              "base_url": base_url,
              "expected_status": expected_status,
              "cors_origin": cors_origin,
              "account_id": account_id,
              "test_send_authorized": "true" if check_test_send else "false",
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Checkout repository immutable
        if: ${{ inputs.check_outbound_email_admin || inputs.check_outbound_email_test_send }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
        with:
          persist-credentials: false

      - name: Setup Node for optional browser smoke immutable
        if: ${{ inputs.check_outbound_email_admin }}
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Setup Python for optional test-send gate immutable
        if: ${{ inputs.check_outbound_email_test_send }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Check healthz and readyz
        id: health_ready
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
          EXPECTED_READY_STATUS: ${{ steps.target.outputs.expected_status }}
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -fsS --max-time 8 "$SMOKE_BASE_URL/healthz" -o /tmp/healthz.json
          curl -fsS --max-time 8 "$SMOKE_BASE_URL/readyz" -o /tmp/readyz.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          expected = os.environ["EXPECTED_READY_STATUS"]
          health = json.loads(Path("/tmp/healthz.json").read_text(encoding="utf-8"))
          ready = json.loads(Path("/tmp/readyz.json").read_text(encoding="utf-8"))
          if health.get("status") != "ok":
              raise SystemExit(f"healthz_status_not_ok={health.get('status')}")
          if ready.get("status") != expected:
              raise SystemExit(f"readyz_status_unexpected={ready.get('status')} expected={expected}")
          print("healthz_ok")
          print("readyz_ok")
          print("migration_revision=" + str(ready.get("migration_revision")))
          print("app_version=" + str(health.get("app_version") or health.get("version") or "unknown"))
          PY

      - name: Check security headers on root
        id: security_headers
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -fsSI --max-time 8 "$SMOKE_BASE_URL/" -o /tmp/root_headers.txt
          python3 - <<'PY'
          from pathlib import Path

          raw = Path("/tmp/root_headers.txt").read_text(errors="ignore")
          lower = raw.lower()
          required = [
              "x-content-type-options:",
              "x-frame-options:",
              "referrer-policy:",
              "content-security-policy:",
              "permissions-policy:",
          ]
          missing = [item for item in required if item not in lower]
          if missing:
              raise SystemExit("missing_security_headers=" + ",".join(missing))
          print("security_headers_ok")
          PY

      - name: Check WebChat assets
        id: webchat_assets
        if: ${{ inputs.check_webchat_assets }}
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -fsSI --max-time 8 "$SMOKE_BASE_URL/webchat/demo.html" -o /tmp/webchat_demo_headers.txt
          curl -fsSI --max-time 8 "$SMOKE_BASE_URL/webchat/widget.js" -o /tmp/webchat_widget_headers.txt
          if ! grep -qi 'content-type:' /tmp/webchat_demo_headers.txt; then
            echo 'missing webchat demo content-type'
            exit 3
          fi
          if ! grep -qi 'content-type:' /tmp/webchat_widget_headers.txt; then
            echo 'missing webchat widget content-type'
            exit 3
          fi
          echo 'webchat_assets_ok'

      - name: Check optional CORS preflight
        id: cors_preflight
        if: ${{ steps.target.outputs.cors_origin != '' }}
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
          SMOKE_CORS_ORIGIN: ${{ steps.target.outputs.cors_origin }}
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -fsSI --max-time 8 \
            -X OPTIONS \
            -H "Origin: $SMOKE_CORS_ORIGIN" \
            -H 'Access-Control-Request-Method: POST' \
            -H 'Access-Control-Request-Headers: content-type,x-request-id,x-webchat-visitor-token' \
            "$SMOKE_BASE_URL/api/webchat/init" -o /tmp/cors_headers.txt
          if ! grep -qi '^access-control-allow-origin:' /tmp/cors_headers.txt; then
            echo 'missing access-control-allow-origin header'
            cat /tmp/cors_headers.txt
            exit 4
          fi
          echo 'cors_preflight_ok'

      - name: Check optional metrics endpoint
        id: metrics_check
        if: ${{ inputs.check_metrics }}
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
          STAGING_METRICS_TOKEN: ${{ secrets.STAGING_METRICS_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -z "${STAGING_METRICS_TOKEN:-}" ]; then
            echo 'STAGING_METRICS_TOKEN secret is required when check_metrics=true'
            exit 5
          fi
          curl -fsS --max-time 8 -H "X-Metrics-Token: $STAGING_METRICS_TOKEN" "$SMOKE_BASE_URL/metrics" -o /tmp/metrics.txt
          if ! grep -q '^# HELP' /tmp/metrics.txt; then
            echo 'metrics output does not look like Prometheus text exposition'
            exit 6
          fi
          echo 'metrics_endpoint_ok'

      - name: Run optional Outbound Email admin browser smoke
        id: outbound_email_admin
        if: ${{ inputs.check_outbound_email_admin }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.base_url }}
          NEXUS_REAL_ADMIN_SMOKE: "1"
          NEXUS_ADMIN_USERNAME: ${{ secrets.STAGING_ADMIN_USERNAME }}
          NEXUS_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -z "${NEXUS_ADMIN_USERNAME:-}" ] || [ -z "${NEXUS_ADMIN_PASSWORD:-}" ]; then
            echo 'STAGING_ADMIN_USERNAME and STAGING_ADMIN_PASSWORD secrets are required for Outbound Email admin browser smoke'
            exit 7
          fi
          cd webapp
          npm ci
          npx playwright install --with-deps chrome
          npx playwright test e2e/outbound-email-admin-real.spec.ts

      - name: Run optional Outbound Email production test-send gate
        id: outbound_email_send
        if: ${{ inputs.check_outbound_email_test_send && steps.target.outputs.test_send_authorized == 'true' }}
        env:
          NEXUS_BASE_URL: ${{ steps.target.outputs.base_url }}
          NEXUS_ADMIN_USERNAME: ${{ secrets.STAGING_ADMIN_USERNAME }}
          NEXUS_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          OUTBOUND_EMAIL_TEST_TO: ${{ secrets.OUTBOUND_EMAIL_TEST_TO }}
          OUTBOUND_EMAIL_ACCOUNT_ID: ${{ steps.target.outputs.account_id }}
          OUTBOUND_EMAIL_TEST_SEND_CONFIRM: I_UNDERSTAND_THIS_SENDS_REAL_EMAIL
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -z "${NEXUS_ADMIN_USERNAME:-}" ] || [ -z "${NEXUS_ADMIN_PASSWORD:-}" ]; then
            echo 'STAGING_ADMIN_USERNAME and STAGING_ADMIN_PASSWORD secrets are required for Outbound Email test-send gate'
            exit 8
          fi
          if [ -z "${OUTBOUND_EMAIL_TEST_TO:-}" ]; then
            echo 'OUTBOUND_EMAIL_TEST_TO secret is required for Outbound Email test-send gate'
            exit 9
          fi
          python scripts/smoke/outbound_email_test_send_gate.py

      - name: Summarize smoke result safely
        if: always()
        env:
          SUMMARY_TARGET: ${{ steps.target.outputs.base_url }}
          SUMMARY_CORS_ORIGIN: ${{ steps.target.outputs.cors_origin }}
          SUMMARY_HEALTH_READY: ${{ steps.health_ready.outcome }}
          SUMMARY_SECURITY_HEADERS: ${{ steps.security_headers.outcome }}
          SUMMARY_WEBCHAT_ASSETS: ${{ steps.webchat_assets.outcome }}
          SUMMARY_CORS: ${{ steps.cors_preflight.outcome }}
          SUMMARY_METRICS: ${{ steps.metrics_check.outcome }}
          SUMMARY_EMAIL_ADMIN: ${{ steps.outbound_email_admin.outcome }}
          SUMMARY_EMAIL_SEND: ${{ steps.outbound_email_send.outcome }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os

          lines = [
              "## Manual staging smoke summary",
              "",
              f"- Target: `{os.environ.get('SUMMARY_TARGET', '[validation-failed]')}`",
              f"- Health/ready: `{os.environ.get('SUMMARY_HEALTH_READY', 'not-run')}`",
              f"- Security headers: `{os.environ.get('SUMMARY_SECURITY_HEADERS', 'not-run')}`",
              f"- WebChat assets: `{os.environ.get('SUMMARY_WEBCHAT_ASSETS', 'not-run')}`",
              f"- CORS origin: `{os.environ.get('SUMMARY_CORS_ORIGIN', '')}`",
              f"- CORS preflight: `{os.environ.get('SUMMARY_CORS', 'not-run')}`",
              f"- Metrics check: `{os.environ.get('SUMMARY_METRICS', 'not-run')}`",
              f"- Outbound Email admin browser smoke: `{os.environ.get('SUMMARY_EMAIL_ADMIN', 'not-run')}`",
              f"- Outbound Email test-send gate: `{os.environ.get('SUMMARY_EMAIL_SEND', 'not-run')}`",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY
