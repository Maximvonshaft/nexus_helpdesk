name: fix-ticket-event-osr-current-writes-temp

on:
  pull_request:
    paths:
      - .github/workflows/fix-ticket-event-osr-current-writes-temp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/ticket-event-osr-current-writes.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest

      - name: Align current OSR writes with shared classification
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          audit_path = Path('backend/app/services/webchat_osr_audit_service.py')
          source = audit_path.read_text(encoding='utf-8')
          old = '''        event_type=EventType.field_updated,\n        event_class=TicketEventClass.INTERNAL_AUDIT,\n        note="OSR runtime decision audit recorded",\n'''
          new = '''        event_type=EventType.field_updated,\n        event_class=TicketEventClass.PROVIDER,\n        note="OSR runtime decision audit recorded",\n'''
          if source.count(old) != 1:
              raise SystemExit('WebChat OSR audit writer block drifted')
          audit_path.write_text(source.replace(old, new), encoding='utf-8')

          escalation_path = Path('backend/app/services/nexus_osr/escalation_orchestration_service.py')
          source = escalation_path.read_text(encoding='utf-8')
          old = '''        event_type=EventType.field_updated,\n        event_class=TicketEventClass.INTERNAL_AUDIT,\n        note="Nexus OSR escalation orchestration",\n'''
          new = '''        event_type=EventType.field_updated,\n        event_class=TicketEventClass.INTERNAL_AUDIT,\n        field_name="ticket.escalation_orchestration",\n        note="Nexus OSR escalation orchestration",\n'''
          if source.count(old) != 1:
              raise SystemExit('OSR escalation writer block drifted')
          escalation_path.write_text(source.replace(old, new), encoding='utf-8')

          test_path = Path('backend/tests/test_ticket_event_osr_current_writes.py')
          test_path.write_text('''from __future__ import annotations\n\nfrom types import SimpleNamespace\n\nfrom app.services.ticket_event_classification import resolve_ticket_event_class\nfrom app.services.ticket_event_sanitizer import TICKET_EVENT_CONTRACT\nfrom app.services.ticket_event_writer import TicketEventClass\nfrom app.services import webchat_osr_audit_service\nfrom app.services.nexus_osr import escalation_orchestration_service\n\n\ndef _governed(captured: dict[str, object]) -> dict[str, object]:\n    event_class = captured["event_class"]\n    assert isinstance(event_class, TicketEventClass)\n    return {\n        **dict(captured["payload"]),\n        "event_contract": TICKET_EVENT_CONTRACT,\n        "event_class": event_class.value,\n        "schema_version": 1,\n    }\n\n\ndef _assert_repair_classifies_current_write(captured: dict[str, object]) -> None:\n    assert resolve_ticket_event_class(\n        captured["event_type"],\n        field_name=captured.get("field_name"),\n        payload=_governed(captured),\n        note=captured.get("note"),\n    ) is captured["event_class"]\n\n\ndef test_webchat_osr_audit_current_write_is_provider_repair_classifiable(monkeypatch) -> None:\n    captured: dict[str, object] = {}\n\n    def capture(_db, **kwargs):\n        captured.update(kwargs)\n\n    monkeypatch.setattr(webchat_osr_audit_service.TicketEventWriter, "add", capture)\n    monkeypatch.setattr(webchat_osr_audit_service, "safe_write_webchat_event", lambda *args, **kwargs: None)\n\n    webchat_osr_audit_service._record_osr_ticket_event(\n        SimpleNamespace(),\n        ticket=SimpleNamespace(id=11),\n        conversation=SimpleNamespace(id=12),\n        turn=SimpleNamespace(id=13),\n        visitor_message=SimpleNamespace(id=14),\n        summary={"mode": "audit_only", "audit_id": 15},\n    )\n\n    assert captured["event_class"] is TicketEventClass.PROVIDER\n    _assert_repair_classifies_current_write(captured)\n\n\ndef test_osr_escalation_without_handoff_is_internal_repair_classifiable(monkeypatch) -> None:\n    captured: dict[str, object] = {}\n\n    def capture(_db, **kwargs):\n        captured.update(kwargs)\n\n    class FakeSession:\n        def flush(self) -> None:\n            return None\n\n    monkeypatch.setattr(escalation_orchestration_service.TicketEventWriter, "add", capture)\n    monkeypatch.setattr(escalation_orchestration_service, "safe_write_webchat_event", lambda *args, **kwargs: None)\n\n    escalation_orchestration_service._write_orchestration_events(\n        FakeSession(),\n        ticket=SimpleNamespace(id=21),\n        conversation=SimpleNamespace(id=22),\n        payload={\n            "source": "nexus_osr",\n            "action": "create_ticket",\n            "human_status": "unavailable",\n            "audit_id": 23,\n            "ticket_created": True,\n        },\n    )\n\n    assert captured["event_class"] is TicketEventClass.INTERNAL_AUDIT\n    assert captured["field_name"] == "ticket.escalation_orchestration"\n    _assert_repair_classifies_current_write(captured)\n''', encoding='utf-8')
          PY

      - name: Verify current-write and domain contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/services/webchat_osr_audit_service.py \
            backend/app/services/nexus_osr/escalation_orchestration_service.py \
            backend/tests/test_ticket_event_osr_current_writes.py
          pytest -q \
            backend/tests/test_ticket_event_osr_current_writes.py \
            backend/tests/test_ticket_event_classification.py \
            backend/tests/test_ticket_event_repair.py \
            backend/tests/test_server_fact_evidence.py \
            backend/tests/test_nexus_osr_escalation_orchestration.py \
            backend/tests/test_nexus_osr_webchat_escalation_hook.py
          git diff --check

      - name: Commit verified non-workflow correction
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git add \
            backend/app/services/webchat_osr_audit_service.py \
            backend/app/services/nexus_osr/escalation_orchestration_service.py \
            backend/tests/test_ticket_event_osr_current_writes.py
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" = "3"
          git config user.name 'nexus-osr-ticket-event-bot'
          git config user.email 'nexus-osr-ticket-event-bot@users.noreply.github.com'
          git commit -m 'fix(audit): keep current OSR events repair-classifiable (#566)'
          git push origin HEAD:"${HEAD_BRANCH}"
