name: WebCall PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scope-guard:
    name: scope-guard
    runs-on: ubuntu-latest
    outputs:
      webcall_relevant: ${{ steps.changed_files.outputs.webcall_relevant }}
      webcall_checks_required: ${{ steps.changed_files.outputs.webcall_checks_required }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate knowledge retrieval probe shell syntax
        shell: bash
        run: bash -n scripts/probe_knowledge_retrieval_e2e.sh

      - name: Validate changed file scope
        id: changed_files
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sort > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

          is_webcall_relevant_file() {
            case "$1" in
              .github/workflows/pr-webcall-guard.yml) return 0 ;;
              .gitignore) return 0 ;;
              Dockerfile) return 0 ;;
              backend/.env.example) return 0 ;;
              backend/alembic/env.py) return 0 ;;
              backend/alembic/versions/20260525_0033_knowledge_chunks_runtime_context.py) return 0 ;;
              backend/alembic/versions/20260526_0034_knowledge_rag_business_facts.py) return 0 ;;
              backend/alembic/versions/20260527_0035_webchat_handoff_control.py) return 0 ;;
              backend/alembic/versions/20260527_0038_webchat_inbox_read_state.py) return 0 ;;
              backend/app/api/admin_provider_credentials.py) return 0 ;;
              backend/app/api/admin_provider_runtime.py) return 0 ;;
              backend/app/api/admin_webcall_ai.py) return 0 ;;
              backend/app/api/knowledge_items.py) return 0 ;;
              backend/app/api/ticket_perf.py) return 0 ;;
              backend/app/api/tickets.py) return 0 ;;
              backend/app/api/speedaf_actions.py) return 0 ;;
              backend/app/api/speedaf_cancel.py) return 0 ;;
              backend/app/api/webcall_ai.py) return 0 ;;
              backend/app/api/webchat.py) return 0 ;;
              backend/app/api/webchat_fast.py) return 0 ;;
              backend/app/api/webchat_ws.py) return 0 ;;
              backend/app/main.py) return 0 ;;
              backend/app/models_control_plane.py) return 0 ;;
              backend/app/schemas_control_plane.py) return 0 ;;
              backend/app/settings.py) return 0 ;;
              backend/app/static/webchat/demo/DEPLOYMENT_NOTES.md) return 0 ;;
              backend/app/static/webchat/demo/index.html) return 0 ;;
              backend/app/static/webchat/demo/js/app.js) return 0 ;;
              backend/app/static/webchat/widget.js) return 0 ;;
              backend/app/services/ai_runtime/codex_app_server_provider.py) return 0 ;;
              backend/app/services/ai_runtime/codex_auth_provider.py) return 0 ;;
              backend/app/services/ai_runtime/openclaw_responses_provider.py) return 0 ;;
              backend/app/services/ai_runtime/provider_router.py) return 0 ;;
              backend/app/services/ai_runtime/schemas.py) return 0 ;;
              backend/app/services/ai_runtime_context.py) return 0 ;;
              backend/app/services/knowledge_document_service.py) return 0 ;;
              backend/app/services/knowledge_grounding_service.py) return 0 ;;
              backend/app/services/knowledge_prompt_service.py) return 0 ;;
              backend/app/services/knowledge_retrieval_service.py) return 0 ;;
