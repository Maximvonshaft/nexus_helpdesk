name: Materialize exact-head convergence

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: materialize-exact-head-convergence-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work/744-canonical-operator-console-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply bounded exact-head convergence
        run: |
          set -Eeuo pipefail
          python scripts/ci/materialize_rc_preflight_workflow.py
          python -m py_compile \
            scripts/ci/materialize_rc_preflight_workflow.py \
            scripts/ci/actions_authority_inventory.py \
            scripts/ci/reconcile_external_channel_inventory.py \
            scripts/release/rc_preflight.py \
            backend/tests/test_canonical_policy_projection_contract.py \
            backend/tests/test_webchat_voice_p0_static.py \
            backend/tests/test_webchat_voice_static_headers.py
          grep -q 'id: rc-preflight' .github/workflows/rc-test-candidate.yml
          grep -q 'artifacts/tenant-runtime/contracts.xml' .github/workflows/tenant-runtime-authority-gate.yml
          ! grep -R -E 'uses: actions/(checkout|setup-python|setup-node|upload-artifact)@v[0-9]+' .github/workflows
          git diff --check

      - name: Restore governance authority and remove one-shot assets
        run: |
          set -Eeuo pipefail
          git show HEAD^:.github/workflows/agent-coordination-self-test.yml > .github/workflows/agent-coordination-self-test.yml
          rm -f scripts/ci/materialize_rc_preflight_workflow.py
          rm -f .github/workflows/materialize-rc-preflight-once.yml

      - name: Commit final exact-head convergence
        env:
          EXPECTED_PARENT: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_PARENT}"
          git config user.name "Nexus implementation bot"
          git config user.email "noreply@github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(governance): align exact-head contracts and harden Actions"
          git push origin HEAD:work/744-canonical-operator-console-consolidation
