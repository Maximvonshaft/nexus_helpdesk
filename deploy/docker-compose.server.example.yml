services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexusdesk}
      POSTGRES_USER: ${POSTGRES_USER:-nexusdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusdesk} -d ${POSTGRES_DB:-nexusdesk}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexusdesk/helpdesk:server-main
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: ${OPENCLAW_DEPLOYMENT_MODE:-remote_gateway}
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      WEBCHAT_ALLOW_LEGACY_TOKEN_TRANSPORT: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - ../data/uploads:/app/backend/uploads
      - /run/secrets:/run/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-18081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: nexusdesk/helpdesk:server-main
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: ${OPENCLAW_DEPLOYMENT_MODE:-remote_gateway}
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      WEBCHAT_ALLOW_LEGACY_TOKEN_TRANSPORT: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - ../data/uploads:/app/backend/uploads
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_worker.py --worker-id worker-main
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  sync-daemon:
    image: nexusdesk/helpdesk:server-main
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: ${OPENCLAW_DEPLOYMENT_MODE:-remote_gateway}
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - ../data/uploads:/app/backend/uploads
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_openclaw_sync_daemon.py --worker-id worker-openclaw-sync
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  event-daemon:
    image: nexusdesk/helpdesk:server-main
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: ${OPENCLAW_DEPLOYMENT_MODE:-remote_gateway}
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      OPENCLAW_EVENT_DRIVER_ENABLED: "true"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - ../data/uploads:/app/backend/uploads
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_openclaw_event_daemon.py
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
