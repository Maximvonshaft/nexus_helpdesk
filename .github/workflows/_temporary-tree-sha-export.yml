name: Temporary Tree SHA Export

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: read
  statuses: write

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Publish exact tree SHA
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          tree_sha="$(git rev-parse 'HEAD^{tree}')"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"success\",\"context\":\"candidate-tree-export\",\"description\":\"exact tree identity\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}?tree=${tree_sha}\"}"
