# Isolated one-shot diagnostic; self-deletes after publishing bounded evidence.
name: Temporary PR 774 Backend Diagnostic

on:
  push:
    branches:
      - diag/pr774-backend-c23c4f07

permissions:
  contents: write

concurrency:
  group: diag-pr774-backend-c23c4f07
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout exact diagnostic branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Capture first three backend failures
        id: pytest
        shell: bash
        env:
          CI: 'true'
          PYTHONPATH: backend
          APP_ENV: test
          AUTO_INIT_DB: 'false'
          SEED_DEMO_DATA: 'false'
          ALLOW_DEV_AUTH: 'false'
          PROVIDER_RUNTIME_ENABLED: 'false'
          PROVIDER_RUNTIME_TRAFFIC_MODE: control
          PROVIDER_RUNTIME_KILL_SWITCH: 'true'
          PROVIDER_RUNTIME_CANARY_PERCENT: '0'
          PRIVATE_AI_RUNTIME_ENABLED: 'false'
          WEBCHAT_AI_ENABLED: 'false'
          WEBCHAT_AI_AUTO_REPLY_MODE: off
          WEBCHAT_VOICE_ENABLED: 'false'
          WEBCHAT_HUMAN_CALL_ENABLED: 'false'
          WEBCHAT_LIVE_AI_VOICE_ENABLED: 'false'
          ENABLE_OUTBOUND_DISPATCH: 'false'
          OUTBOUND_PROVIDER: disabled
          WHATSAPP_NATIVE_ENABLED: 'false'
          WHATSAPP_DISPATCH_MODE: disabled
          EMAIL_MAILBOX_SYNC_ENABLED: 'false'
          SPEEDAF_MCP_ENABLED: 'false'
          SPEEDAF_TRACK_QUERY_ENABLED: 'false'
          SPEEDAF_WORK_ORDER_CREATE_ENABLED: 'false'
          SPEEDAF_UPDATE_ADDRESS_ENABLED: 'false'
          SPEEDAF_CANCEL_ENABLED: 'false'
          SPEEDAF_VOICE_CALLBACK_ENABLED: 'false'
          OPERATIONS_DISPATCH_MODE: disabled
          OPERATIONS_DISPATCH_ADAPTER: disabled
        run: |
          set +e
          python -m pytest -vv --maxfail=3 backend/tests > /tmp/pytest.log 2>&1
          code=$?
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          mkdir -p diagnostics
          python - <<'PY'
          import re
          from pathlib import Path

          raw = Path('/tmp/pytest.log').read_text(encoding='utf-8', errors='replace')
          start = raw.find('=================================== FAILURES ===================================')
          if start < 0:
              start = max(0, len(raw) - 24000)
          excerpt = raw[start:]
          excerpt = re.sub(r'(?i)Bearer\s+[A-Za-z0-9._~+/=-]{12,}', 'Bearer [redacted]', excerpt)
          excerpt = re.sub(r'\bsk-(?:proj-)?[A-Za-z0-9_-]{12,}\b', 'sk-[redacted]', excerpt)
          excerpt = excerpt[-30000:]
          failed = '\n'.join(line for line in raw.splitlines() if line.startswith('FAILED '))
          output = (
              'PR #774 isolated backend diagnostic\n'
              'Exact source: c23c4f07ba46c69243ecdf4ee91f28af0547253f\n\n'
              'Failed node IDs:\n' + (failed or '[not emitted before termination]') +
              '\n\nFailure excerpt:\n' + excerpt
          )
          Path('diagnostics/pr774-backend-failures.txt').write_text(output, encoding='utf-8')
          PY
      - name: Publish bounded diagnostic and retire workflow
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/_temporary-pr774-backend-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/pr774-backend-failures.txt .github/workflows/_temporary-pr774-backend-diagnostic.yml
          git commit -m 'chore(diag): record PR 774 backend failures and retire probe'
          git push origin HEAD:diag/pr774-backend-c23c4f07
