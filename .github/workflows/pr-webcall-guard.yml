name: WebCall PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scope-guard:
    name: scope-guard
    runs-on: ubuntu-latest
    outputs:
      webcall_relevant: ${{ steps.changed_files.outputs.webcall_relevant }}
      webcall_checks_required: ${{ steps.changed_files.outputs.webcall_checks_required }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed file scope
        id: changed_files
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sort > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

          webcall_relevant=0
          webcall_checks_required=0
          while IFS= read -r file; do
            case "$file" in
              webapp/src/components/webcall/AgentWebCallPanel.tsx) webcall_relevant=1; webcall_checks_required=1 ;;
              webapp/tests/operator-console-contract.test.mjs) webcall_relevant=1; webcall_checks_required=1 ;;
              webapp/package.json) webcall_relevant=1; webcall_checks_required=1 ;;
              webapp/package-lock.json) webcall_relevant=1; webcall_checks_required=1 ;;
              Dockerfile) webcall_relevant=1 ;;
              backend/app/webchat_voice_config.py) webcall_relevant=1; webcall_checks_required=1 ;;
              backend/tests/test_webchat_voice_static_headers.py) webcall_relevant=1; webcall_checks_required=1 ;;
              webapp/src/routes/webcall-ai.tsx) webcall_relevant=1 ;;
              webapp/src/styles.css) webcall_relevant=1 ;;
              backend/.env.example) webcall_relevant=1 ;;
              backend/requirements.txt) webcall_relevant=1 ;;
              backend/app/api/webcall_ai.py) webcall_relevant=1 ;;
              backend/app/api/admin_webcall_ai.py) webcall_relevant=1 ;;
              backend/app/api/admin_provider_credentials.py) webcall_relevant=1 ;;
              backend/app/services/provider_runtime/codex_llm_client.py) webcall_relevant=1 ;;
              backend/app/services/provider_runtime/codex_smoke_chat.py) webcall_relevant=1 ;;
              backend/app/services/provider_runtime/oauth_refresh_manager.py) webcall_relevant=1 ;;
              backend/app/services/webcall_ai_production/**) webcall_relevant=1 ;;
              backend/app/webcall_ai_schemas.py) webcall_relevant=1 ;;
              backend/tests/test_codex_app_server_bridge_proxy.py) webcall_relevant=1 ;;
              backend/tests/test_codex_smoke_chat.py) webcall_relevant=1 ;;
              backend/tests/test_provider_runtime_codex_oauth_webchat.py) webcall_relevant=1 ;;
              backend/tests/test_webcall_ai_production.py) webcall_relevant=1 ;;
              backend/tests/test_webcall_ai_voice_loop.py) webcall_relevant=1 ;;
              deploy/codex_app_server_bridge_proxy.py) webcall_relevant=1 ;;
              deploy/docker-compose.server.yml) webcall_relevant=1 ;;
              docs/engineering/codex_chat_smoke_runbook.md) webcall_relevant=1 ;;
              docs/engineering/voice_provider_bridge_contract.md) webcall_relevant=1 ;;
              docs/engineering/webcall_ai_*) webcall_relevant=1 ;;
              .github/workflows/webcall-ai-final-quality-gate.yml) webcall_relevant=1 ;;
              .github/workflows/webcall-ai-infra-skeleton.yml) webcall_relevant=1 ;;
              .github/workflows/pr-webcall-guard.yml) webcall_relevant=1 ;;
              "") ;;
            esac
          done < /tmp/changed_files.txt

          if [ "$webcall_relevant" -eq 0 ]; then
            echo "webcall_relevant=false" >> "$GITHUB_OUTPUT"
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
            echo "No WebCall guarded files changed; scope guard passed without strict allowlist enforcement."
            exit 0
          fi

          echo "webcall_relevant=true" >> "$GITHUB_OUTPUT"
          if [ "$webcall_checks_required" -eq 1 ]; then
            echo "webcall_checks_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
          fi

          fail=0
          while IFS= read -r file; do
            case "$file" in
              webapp/src/components/webcall/AgentWebCallPanel.tsx) ;;
              webapp/tests/operator-console-contract.test.mjs) ;;
              webapp/package.json) ;;
              webapp/package-lock.json) ;;
              Dockerfile) ;;
              backend/app/webchat_voice_config.py) ;;
              backend/tests/test_webchat_voice_static_headers.py) ;;
              webapp/src/routes/webcall-ai.tsx) ;;
              webapp/src/styles.css) ;;
              backend/.env.example) ;;
              backend/requirements.txt) ;;
              backend/app/api/webcall_ai.py) ;;
              backend/app/api/admin_webcall_ai.py) ;;
              backend/app/api/admin_provider_credentials.py) ;;
              backend/app/services/provider_runtime/codex_llm_client.py) ;;
              backend/app/services/provider_runtime/codex_smoke_chat.py) ;;
              backend/app/services/provider_runtime/oauth_refresh_manager.py) ;;
              backend/app/services/webcall_ai_production/**) ;;
              backend/app/webcall_ai_schemas.py) ;;
              backend/tests/test_codex_app_server_bridge_proxy.py) ;;
              backend/tests/test_codex_smoke_chat.py) ;;
              backend/tests/test_provider_runtime_codex_oauth_webchat.py) ;;
              backend/tests/test_webcall_ai_production.py) ;;
              backend/tests/test_webcall_ai_voice_loop.py) ;;
              deploy/codex_app_server_bridge_proxy.py) ;;
              deploy/docker-compose.server.yml) ;;
              docs/engineering/codex_chat_smoke_runbook.md) ;;
              docs/engineering/voice_provider_bridge_contract.md) ;;
              docs/engineering/webcall_ai_*) ;;
              .github/workflows/webcall-ai-final-quality-gate.yml) ;;
              .github/workflows/webcall-ai-infra-skeleton.yml) ;;
              .github/workflows/pr-webcall-guard.yml) ;;
              "") ;;
              *)
                echo "::error file=$file::Out-of-scope file changed in WebCall guarded PR."
                fail=1
                ;;
            esac
          done < /tmp/changed_files.txt

          if [ "$fail" -ne 0 ]; then
            echo "Scope guard failed. This PR includes files outside the approved WebCall single-mic/header/test scope."
            exit 1
          fi

          echo "Scope guard passed."

  webcall-blocking-fix-guard:
    name: webcall-blocking-fix-guard
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Verify WebCall blocking fix markers
        shell: bash
        run: |
          set -Eeuo pipefail

          PANEL="webapp/src/components/webcall/AgentWebCallPanel.tsx"
          TEST="webapp/tests/operator-console-contract.test.mjs"

          test -f "$PANEL"
          test -f "$TEST"

          non_livekit_branch="$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path('webapp/src/components/webcall/AgentWebCallPanel.tsx').read_text(encoding='utf-8')
          m = re.search(r"if \(accepted\.provider !== 'livekit'\) \{[\s\S]*?return accepted\n\s*\}", text)
          print(m.group(0) if m else "")
          PY
          )"

          if [ -z "$non_livekit_branch" ]; then
            echo "::error file=$PANEL::Could not find non-LiveKit accept branch."
            exit 1
          fi

          if ! grep -q "await cleanupRoom()" <<<"$non_livekit_branch"; then
            echo "::error file=$PANEL::Expected await cleanupRoom() in non-LiveKit accept branch."
            exit 1
          fi

          if ! grep -q "webcall non-livekit accept path cleans up acquired microphone track" "$TEST"; then
            echo "::error file=$TEST::Expected non-livekit cleanup contract test is missing."
            exit 1
          fi

          if ! grep -q "await cleanupRoom\\(\\)" "$TEST"; then
            echo "::error file=$TEST::Expected cleanup assertion marker is missing from contract tests."
            exit 1
          fi

          echo "Blocking fix guard passed."

  webapp-quality:
    name: webapp-quality
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            webapp/package-lock.json
            package-lock.json

      - name: Install webapp dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -f webapp/package-lock.json ]; then
            npm --prefix webapp ci
          else
            npm --prefix webapp install
          fi

      - name: Lint
        run: npm --prefix webapp run lint

      - name: Typecheck
        run: npm --prefix webapp run typecheck

      - name: Test
        run: npm --prefix webapp test

      - name: Build
        run: npm --prefix webapp run build

  backend-webcall-tests:
    name: backend-webcall-tests
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        shell: bash
        run: |
          set -Eeuo pipefail

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          if [ -f backend/requirements.txt ]; then
            python -m pip install -r backend/requirements.txt
          fi
          if [ -f backend/requirements-dev.txt ]; then
            python -m pip install -r backend/requirements-dev.txt
          fi
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[test]" || python -m pip install -e .
          fi
          if [ -f backend/pyproject.toml ]; then
            python -m pip install -e "backend[test]" || python -m pip install -e backend
          fi

          python -m pip install pytest

      - name: Run backend WebCall tests
        shell: bash
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_webchat_voice_static_headers.py \
            backend/tests/test_webchat_voice_p0_static.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py \
            backend/tests/test_webchat_voice_room_compensation.py
