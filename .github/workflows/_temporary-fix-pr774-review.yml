name: Temporary Close PR 774 Resume Ownership

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

concurrency:
  group: close-pr-774-resume-ownership
  cancel-in-progress: true

jobs:
  fix-test-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Converge resume authority and tests
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "$(git rev-parse HEAD)" > /tmp/start-sha
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"replacement mismatch {path}: expected 1, got {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          def append_once(path: str, marker: str, content: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if marker in text:
                  raise SystemExit(f"test marker already exists: {marker}")
              file.write_text(text.rstrip() + "\n\n\n" + dedent(content).strip() + "\n", encoding="utf-8")

          handoff = "backend/app/services/webchat_handoff_service.py"
          helper = dedent(
              '''
              def can_resume_ticketless_handoff(
                  *,
                  handoff: WebchatHandoffRequest,
                  conversation: WebchatConversation,
                  user: User,
                  capabilities: set[str],
              ) -> bool:
                  """Return whether this actor may resume AI for a ticketless handoff.

                  Global resume capability remains authoritative for supervisors. Ordinary
                  agents may only resume an accepted conversation they currently own in
                  both the durable handoff request and the conversation occupancy snapshot.
                  """

                  if handoff.status not in _OPEN:
                      return False
                  if CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities:
                      return True
                  return bool(
                      handoff.status == "accepted"
                      and handoff.assigned_agent_id == user.id
                      and conversation.active_agent_id == user.id
                      and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
                  )


              '''
          )
          replace_once(handoff, "def _ticketless_payload(\n", helper + "def _ticketless_payload(\n")
          replace_once(
              handoff,
              '''    capabilities = resolve_capabilities(current_user, db)
                  assigned_owner_can_resume = bool(
                      request_row.status == "accepted"
                      and request_row.assigned_agent_id == current_user.id
                      and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
                  )
              ''',
              '''    capabilities = resolve_capabilities(current_user, db)
              ''',
          )
          replace_once(
              handoff,
              '''            "can_resume_ai": bool(
                              request_row.status in _OPEN
                              and (
                                  CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities
                                  or assigned_owner_can_resume
                              )
                          ),
              ''',
              '''            "can_resume_ai": can_resume_ticketless_handoff(
                              handoff=request_row,
                              conversation=conversation,
                              user=current_user,
                              capabilities=capabilities,
                          ),
              ''',
          )
          replace_once(
              handoff,
              '''    request_row = _core._request_by_id(db, request_id, lock=True)
                  capabilities = resolve_capabilities(current_user, db)
                  assigned_owner_can_resume = bool(
                      request_row.status == "accepted"
                      and request_row.assigned_agent_id == current_user.id
                      and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
                  )
                  if (
                      CAP_WEBCHAT_HANDOFF_RESUME_AI not in capabilities
                      and not assigned_owner_can_resume
                  ):
                      raise HTTPException(
                          status_code=status.HTTP_403_FORBIDDEN,
                          detail="webchat_handoff_resume_ai_requires_capability_or_ownership",
                      )
                  conversation, _control = _ticketless_context(
                      db,
                      request_row=request_row,
                      current_user=current_user,
                  )
              ''',
              '''    request_row = _core._request_by_id(db, request_id, lock=True)
                  conversation, _control = _ticketless_context(
                      db,
                      request_row=request_row,
                      current_user=current_user,
                  )
                  capabilities = resolve_capabilities(current_user, db)
                  if not can_resume_ticketless_handoff(
                      handoff=request_row,
                      conversation=conversation,
                      user=current_user,
                      capabilities=capabilities,
                  ):
                      raise HTTPException(
                          status_code=status.HTTP_403_FORBIDDEN,
                          detail="webchat_handoff_resume_ai_requires_capability_or_ownership",
                      )
              ''',
          )

          operator = "backend/app/services/conversation_operator_service.py"
          replace_once(operator, "    CAP_WEBCHAT_HANDOFF_RESUME_AI,\n", "")
          replace_once(
              operator,
              "from .webchat_ai_turn_service import ai_snapshot\n",
              "from .webchat_ai_turn_service import ai_snapshot\nfrom .webchat_handoff_service import can_resume_ticketless_handoff\n",
          )
          replace_once(
              operator,
              '''        "can_resume_ai": handoff.status in {"requested", "accepted"}
                      and CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities,
              ''',
              '''        "can_resume_ai": can_resume_ticketless_handoff(
                          handoff=handoff,
                          conversation=conversation,
                          user=user,
                          capabilities=capabilities,
                      ),
              ''',
          )

          append_once(
              "backend/tests/test_conversation_first_agent_routing.py",
              "test_only_current_ticketless_owner_can_resume_without_global_capability",
              '''
              def test_only_current_ticketless_owner_can_resume_without_global_capability(db_session):
                  owner = _agent(db_session, suffix="resume-owner")
                  other = _agent(db_session, suffix="resume-other")
                  conversation = _conversation(db_session, suffix="resume-owned")
                  set_agent_state(
                      db_session,
                      user=owner,
                      presence_status="online",
                      max_concurrent_conversations=1,
                  )
                  request_row = request_handoff(
                      db_session,
                      conversation=conversation,
                      source="ai_runtime",
                      trigger_type="runtime_handoff",
                      reason_code="needs_human",
                  )
                  db_session.refresh(conversation)
                  assert request_row.assigned_agent_id == owner.id
                  assert conversation.active_agent_id == owner.id

                  owner_thread = read_conversation_thread(
                      db_session,
                      conversation=conversation,
                      user=owner,
                  )
                  other_thread = read_conversation_thread(
                      db_session,
                      conversation=conversation,
                      user=other,
                  )
                  assert owner_thread["handoff"]["can_resume_ai"] is True
                  assert other_thread["handoff"]["can_resume_ai"] is False

                  with pytest.raises(HTTPException) as exc:
                      resume_ai_for_handoff(
                          db_session,
                          request_id=request_row.id,
                          current_user=other,
                          note="Must not resume another operator's conversation.",
                      )
                  assert exc.value.status_code == 403

                  resumed = resume_ai_for_handoff(
                      db_session,
                      request_id=request_row.id,
                      current_user=owner,
                      note="Current owner returns the customer to AI.",
                  )
                  assert resumed["status"] == "resumed_ai"
              ''',
          )
          PY

          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_conversation_first_agent_routing_residuals.py \
            backend/tests/test_conversation_resume_scope_integrity.py \
            backend/tests/test_ticketless_support_scope_isolation.py \
            backend/tests/test_operator_agent_capacity_governance.py \
            backend/tests/test_support_availability_queue_position.py

      - name: Commit only the clean business result
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/start-sha)"
          git fetch --no-tags origin feat/conversation-first-agent-routing
          test "$(git rev-parse origin/feat/conversation-first-agent-routing)" = "$start_sha"
          git rm .github/workflows/_temporary-fix-pr774-review.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app backend/tests
          git diff --cached --check
          git commit -m "fix: enforce ownership-aware ticketless AI resume"
          git push origin HEAD:feat/conversation-first-agent-routing
