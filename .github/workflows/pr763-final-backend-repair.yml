name: PR 763 Final Backend Repair

on:
  push:
    branches:
      - repair/763-final-backend-5ef0

permissions:
  contents: write

concurrency:
  group: pr-763-final-backend-repair
  cancel-in-progress: true

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, '[repair-status]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
    steps:
      - name: Checkout isolated repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: repair/763-final-backend-5ef0
          fetch-depth: 0
          persist-credentials: true
      - name: Assemble and apply verified convergence patch
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee /tmp/pr763-final-backend-repair.log) 2>&1
          wc -c .ci/pr763-final-backend.patch.b64.*
          cat .ci/pr763-final-backend.patch.b64.* | tr -d '\n' | base64 --decode > /tmp/pr763-final-backend.patch
          wc -c /tmp/pr763-final-backend.patch
          git apply --check /tmp/pr763-final-backend.patch
          git apply /tmp/pr763-final-backend.patch
          git checkout 285d7e214f0869577cec429806dd3c348bfdab8b -- .github/workflows/canonical-acceptance.yml
          rm -f .github/workflows/backend-convergence-maintenance.yml
          rm -f .github/workflows/pr763-final-backend-repair.yml
          rm -rf scripts/maintenance
          rm -f backend/tests/conftest.py
          rm -f .ci/pr763-final-backend.patch.b64.*
          rm -f .ci/pr763-final-backend-repair-failure.txt
          rmdir .ci 2>/dev/null || true
          git diff --check
      - name: Commit clean candidate locally
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name nexus-final-repair
          git config user.email nexus-final-repair@users.noreply.github.com
          git add -A
          git diff --cached --check
          git diff --cached --exit-code && exit 1 || true
          git commit -m "fix(backend): close canonical regression and restore acceptance authority"
          test -z "$(git status --porcelain)"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Verify sole static authority
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/verify_repository.py --static-only --expected-sha "$(git rev-parse HEAD)"
      - name: Run original failure domains
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q \
            backend/tests/test_admin_password_policy.py \
            backend/tests/test_background_job_transaction_boundary.py \
            backend/tests/test_canonical_metrics_registry.py \
            backend/tests/test_controlled_least_privilege.py \
            backend/tests/test_deploy_contracts.py \
            backend/tests/test_email_outbound_runtime.py \
            backend/tests/test_infrastructure_decision.py \
            backend/tests/test_live_voice_credential_rotation_runbook.py \
            backend/tests/test_outbound_message_semantics.py \
            backend/tests/test_production_dispatch_gates.py \
            backend/tests/test_provider_runtime_router.py \
            backend/tests/test_queue_business_health.py \
            backend/tests/test_round24_hardening.py \
            backend/tests/test_round27_frontend_hardening.py \
            backend/tests/test_storage_readiness.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_handoff_control.py \
            backend/tests/test_webchat_handoff_snapshot_service.py \
            backend/tests/test_webchat_ws_static_contracts.py \
            backend/tests/test_worker_queue_isolation.py \
            backend/tests/test_worker_webchat_ai_reconciler_watchdog.py
      - name: Push validated isolated candidate
        shell: bash
        run: git push origin HEAD:repair/763-final-backend-5ef0
      - name: Publish explicit failure status
        if: failure()
        shell: bash
        run: |
          set -Eeuo pipefail
          cp /tmp/pr763-final-backend-repair.log /tmp/pr763-final-backend-repair-failure.log 2>/dev/null || true
          git fetch origin repair/763-final-backend-5ef0
          git reset --hard origin/repair/763-final-backend-5ef0
          mkdir -p .ci
          {
            printf 'run_id=%s\nstatus=failed\nhead=%s\n\n' "$GITHUB_RUN_ID" "$GITHUB_SHA"
            cat /tmp/pr763-final-backend-repair-failure.log 2>/dev/null || true
          } > .ci/pr763-final-backend-repair-failure.txt
          git config user.name nexus-final-repair
          git config user.email nexus-final-repair@users.noreply.github.com
          git add .ci/pr763-final-backend-repair-failure.txt
          git commit -m "[repair-status] final backend repair failed"
          git push origin HEAD:repair/763-final-backend-5ef0
