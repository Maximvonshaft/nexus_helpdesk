              assert api_source.count("tenant_id=tenant_key") >= 10


          def test_role_description_accepts_explicit_null_and_preserves_omission(db_session):
              tenant = Tenant(tenant_key="review-description", display_name="Review Description")
              actor = User(
                  tenant=tenant,
                  username="description-governor",
                  display_name="Description Governor",
                  password_hash="x",
                  role=UserRole.admin,
                  is_active=True,
              )
              template = RoleTemplate(
                  tenant=tenant,
                  role_key="description-role",
                  display_name="Description Role",
                  description="Remove me",
                  base_role="agent",
                  risk_level="standard",
                  draft_capabilities_json=["ticket.read"],
                  is_active=True,
              )
              db_session.add_all([tenant, actor, template])
              db_session.commit()

              governance_service.update_role_template(
