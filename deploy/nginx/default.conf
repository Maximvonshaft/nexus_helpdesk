limit_req_zone $binary_remote_addr zone=webchat_fast:10m rate=60r/m;

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  location = /api/webchat/fast-reply {
    client_max_body_size 32k;
    limit_req zone=webchat_fast burst=20 nodelay;
    proxy_pass http://app:8080/api/webchat/fast-reply;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_send_timeout 8s;
    proxy_read_timeout 8s;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://app:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300;
  }

  location /metrics {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://app:8080/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Metrics-Token $http_x_metrics_token;
  }

  location /healthz {
    proxy_pass http://app:8080/healthz;
  }

  location /readyz {
    proxy_pass http://app:8080/readyz;
  }
}
