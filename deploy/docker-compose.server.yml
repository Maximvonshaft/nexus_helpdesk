# Compatibility filename only.
#
# The sole App/Worker topology is docker-compose.controlled.yml. This alias adds
# only the canonical local-PostgreSQL overlay for installations that keep the
# database on the same host. Requires Docker Compose 2.20+ for top-level include.
# New automation should invoke the canonical files directly through
# deploy/nexus-prod-compose.sh rather than depending on this alias.

include:
  - path:
      - ./docker-compose.controlled.yml
      - ./docker-compose.controlled-postgres.yml
    env_file: ./.env.controlled.local-postgres
