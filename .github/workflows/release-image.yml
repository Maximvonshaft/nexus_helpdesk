name: release-image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "OCI image name. Defaults to ghcr.io/<owner>/<repo>/helpdesk."
        required: false
        type: string
      app_version_prefix:
        description: "Release metadata prefix, for example candidate or main."
        required: true
        default: candidate
        type: string
      push_image:
        description: "Push the image to the registry."
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-release-image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.release_meta.outputs.image_tag }}
      git_sha: ${{ steps.release_meta.outputs.git_sha }}
      build_time: ${{ steps.release_meta.outputs.build_time }}
      app_version: ${{ steps.release_meta.outputs.app_version }}
      frontend_build_sha: ${{ steps.release_meta.outputs.frontend_build_sha }}
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx immutable
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Compute release metadata
        id: release_meta
        shell: bash
        env:
          RELEASE_IMAGE_NAME_INPUT: ${{ inputs.image_name }}
          RELEASE_APP_VERSION_PREFIX_INPUT: ${{ inputs.app_version_prefix }}
        run: |
          set -Eeuo pipefail

          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_name="$RELEASE_IMAGE_NAME_INPUT"
          if [ -z "$image_name" ]; then
            image_name="ghcr.io/${repo_lc}/helpdesk"
          fi
          image_name="$(printf '%s' "$image_name" | tr '[:upper:]' '[:lower:]')"
          image_leaf="${image_name##*/}"
          if [[ ! "$image_name" =~ ^[a-z0-9][a-z0-9._:/-]{0,255}$ ]] \
            || [[ "$image_name" == *"//"* ]] \
            || [[ "$image_name" == *".."* ]] \
            || [[ "$image_name" == */ ]] \
            || [[ "$image_name" == *: ]] \
            || [[ "$image_leaf" == *:* ]]; then
            echo "::error::image_name must be an untagged safe OCI image name"
            exit 2
          fi

          prefix="$RELEASE_APP_VERSION_PREFIX_INPUT"
          prefix="$(printf '%s' "$prefix" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[^a-z0-9_]+//; s/[^a-z0-9_]+$//')"
          prefix="${prefix:0:96}"
          if [ -z "$prefix" ]; then
            prefix="candidate"
          fi

          git_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_time="$(date -u +%Y%m%dT%H%M%SZ)"
          app_version="${prefix}-${short_sha}"
          image_tag="${image_name}:${app_version}-${build_time}"
          frontend_build_sha="$git_sha"

          {
            printf 'git_sha=%s\n' "$git_sha"
            printf 'build_time=%s\n' "$build_time"
            printf 'app_version=%s\n' "$app_version"
            printf 'image_tag=%s\n' "$image_tag"
            printf 'frontend_build_sha=%s\n' "$frontend_build_sha"
          } >> "$GITHUB_OUTPUT"

          {
            printf 'GIT_SHA=%s\n' "$git_sha"
            printf 'COMMIT_SHA=%s\n' "$git_sha"
            printf 'APP_GIT_SHA=%s\n' "$git_sha"
            printf 'BUILD_TIME=%s\n' "$build_time"
            printf 'APP_BUILD_TIME=%s\n' "$build_time"
            printf 'APP_VERSION=%s\n' "$app_version"
            printf 'IMAGE_TAG=%s\n' "$image_tag"
            printf 'APP_IMAGE_TAG=%s\n' "$image_tag"
            printf 'FRONTEND_BUILD_SHA=%s\n' "$frontend_build_sha"
            printf 'APP_FRONTEND_BUILD_SHA=%s\n' "$frontend_build_sha"
          } > release-metadata.env

          cat release-metadata.env >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GHCR immutable
        if: startsWith(steps.release_meta.outputs.image_tag, 'ghcr.io/')
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release image immutable
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push_image }}
          load: ${{ ! inputs.push_image }}
          tags: ${{ steps.release_meta.outputs.image_tag }}
          build-args: |
            GIT_SHA=${{ steps.release_meta.outputs.git_sha }}
            BUILD_TIME=${{ steps.release_meta.outputs.build_time }}
            IMAGE_TAG=${{ steps.release_meta.outputs.image_tag }}
            APP_VERSION=${{ steps.release_meta.outputs.app_version }}
            FRONTEND_BUILD_SHA=${{ steps.release_meta.outputs.frontend_build_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release metadata immutable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-metadata
          path: release-metadata.env
          if-no-files-found: error
