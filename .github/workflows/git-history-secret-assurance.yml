name: git-history-secret-assurance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: git-history-secret-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  git-history-secret-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Compile history scanner
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/security/scanner.py \
            scripts/security/scan_git_history.py \
            scripts/security/scan_artifacts.py

      - name: Run security scanner tests
        run: |
          set -Eeuo pipefail
          python -m unittest discover -s scripts/security/tests -p 'test_*.py' -v

      - name: Scan reachable history and validate bounded evidence
        run: |
          set +e
          mkdir -p artifacts

          python scripts/security/scan_git_history.py \
            --root . \
            --allowlist config/security/secret-scan-allowlist.json \
            --output artifacts/security-git-history-scan.json \
            > artifacts/security-git-history-stdout.json 2>&1
          scan_status=$?

          evidence=(artifacts/security-git-history-stdout.json)
          if [[ -f artifacts/security-git-history-scan.json ]]; then
            evidence+=(artifacts/security-git-history-scan.json)
          fi

          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/security-git-history-report-scan.json \
            "${evidence[@]}"
          artifact_status=$?

          printf '{"artifact_scan_exit_code":%d,"history_scan_exit_code":%d}\n' \
            "$artifact_status" "$scan_status" \
            > artifacts/security-git-history-exit-status.json

          cat artifacts/security-git-history-stdout.json
          if [[ -f artifacts/security-git-history-report-scan.json ]]; then
            cat artifacts/security-git-history-report-scan.json
          fi

          if [[ ! -f artifacts/security-git-history-scan.json ]]; then
            exit 2
          fi
          if [[ "$artifact_status" -ne 0 ]]; then
            exit "$artifact_status"
          fi
          exit "$scan_status"

      - name: Upload bounded history evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: git-history-secret-assurance
          path: |
            artifacts/security-git-history-scan.json
            artifacts/security-git-history-stdout.json
            artifacts/security-git-history-report-scan.json
            artifacts/security-git-history-exit-status.json
          if-no-files-found: error
          retention-days: 14
