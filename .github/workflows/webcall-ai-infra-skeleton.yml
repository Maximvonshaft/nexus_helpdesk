name: webcall-ai-infra-skeleton

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/api/webcall_ai.py"
      - "backend/app/api/admin_webcall_ai.py"
      - "backend/app/services/webcall_ai_production/**"
      - "backend/app/webcall_ai_schemas.py"
      - "backend/tests/test_webcall_ai_production.py"
      - "webapp/src/routes/webcall-ai.tsx"
      - "webapp/src/router.tsx"
      - "deploy/docker-compose.server.yml"
      - ".github/workflows/webcall-ai-infra-skeleton.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webcall-ai-infra-skeleton-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run WebCall AI infrastructure skeleton backend tests
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:////tmp/webcall_ai_production_ci.db
        run: pytest -q backend/tests/test_webcall_ai_production.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Run webapp typecheck
        run: |
          npm --prefix webapp ci
          npm --prefix webapp run typecheck
