name: osr-resilience-qualification

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/app/enums.py"
      - "backend/app/model_registry.py"
      - "backend/app/models.py"
      - "backend/app/settings.py"
      - "backend/app/services/background_jobs.py"
      - "backend/tests/resilience/**"
      - "backend/scripts/resilience/**"
      - "backend/alembic/**"
      - "backend/requirements.txt"
      - "scripts/security/scan_artifacts.py"
      - ".github/workflows/osr-resilience-qualification.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-worker-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_resilience
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_resilience"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      EXACT_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://nexus:nexus@127.0.0.1:5432/nexus_resilience
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      JOB_LOCK_SECONDS: "5"
    steps:
      - name: Checkout immutable exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact source identity
        run: test "$(git rev-parse HEAD)" = "$EXACT_SOURCE_SHA"
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Verify report contract
        run: |
          set -Eeuo pipefail
          python -m py_compile backend/scripts/resilience/build_resilience_report.py
          pytest -q backend/tests/resilience/test_resilience_report.py
      - name: Verify one Alembic head
        working-directory: backend
        run: |
          set -Eeuo pipefail
          test "$(alembic heads | sed '/^[[:space:]]*$/d' | wc -l)" -eq 1
      - name: Upgrade disposable PostgreSQL to exact head
        working-directory: backend
        run: alembic upgrade head
      - name: Execute concurrency and crash-recovery scenarios
        id: qualification
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/resilience
          pytest -q \
            backend/tests/resilience/test_postgres_worker_recovery.py \
            --junitxml=artifacts/resilience/junit.xml
          code=$?
          printf '%s\n' "$code" > artifacts/resilience/pytest-exit-code
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Build bounded safe report
        shell: bash
        run: |
          set +e
          code="$(cat artifacts/resilience/pytest-exit-code)"
          python backend/scripts/resilience/build_resilience_report.py \
            --junit artifacts/resilience/junit.xml \
            --pytest-exit-code "$code" \
            --source-sha "$EXACT_SOURCE_SHA" \
            --output artifacts/resilience/report.json
          report_code=$?
          printf '%s\n' "$report_code" > artifacts/resilience/report-exit-code
          exit 0
      - name: Scan bounded report for prohibited material
        shell: bash
        run: |
          set +e
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/resilience/artifact-scan.json \
            artifacts/resilience/report.json
          code=$?
          printf '%s\n' "$code" > artifacts/resilience/artifact-scan-exit-code
          exit 0
      - name: Remove raw JUnit evidence
        if: always()
        run: rm -f artifacts/resilience/junit.xml
      - name: Upload bounded qualification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: osr-resilience-qualification
          path: |
            artifacts/resilience/report.json
            artifacts/resilience/artifact-scan.json
          retention-days: 14
          if-no-files-found: error
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
      - name: Enforce qualification gate
        if: always()
        run: |
          set -Eeuo pipefail
          test "$(cat artifacts/resilience/pytest-exit-code)" = "0"
          test "$(cat artifacts/resilience/report-exit-code)" = "0"
          test "$(cat artifacts/resilience/artifact-scan-exit-code)" = "0"
          test "$(python -c 'import json; print(json.load(open("artifacts/resilience/report.json"))["status"])')" = "pass"
