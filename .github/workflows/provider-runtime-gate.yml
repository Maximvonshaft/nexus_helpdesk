name: provider-runtime-gate

on:
  pull_request:
    paths:
      - "backend/app/api/admin_provider_runtime.py"
      - "backend/app/services/provider_runtime/**"
      - "backend/app/services/provider_runtime_status.py"
      - "backend/app/services/webcall_ai/demo_lab.py"
      - "backend/app/services/webcall_ai_production/providers/base.py"
      - "backend/app/services/webcall_ai_production/providers/provider_runtime_llm.py"
      - "backend/app/services/webcall_ai_production/providers/router.py"
      - "backend/app/services/webcall_ai_production/config.py"
      - "backend/app/services/webcall_ai_production/orchestrator.py"
      - "backend/app/services/webchat_runtime_output_parser.py"
      - "backend/app/services/webchat_runtime_ai_service.py"
      - "backend/app/services/webchat_rate_limit.py"
      - "backend/tests/test_admin_provider_runtime_routing_api.py"
      - "backend/tests/test_provider_runtime_*.py"
      - "backend/tests/test_webcall_ai_demo_status_safety.py"
      - "backend/tests/test_webcall_ai_provider_runtime_llm.py"
      - "backend/tests/test_webcall_ai_production.py"
      - "backend/tests/test_webchat_runtime_ai_service.py"
      - "backend/tests/test_webchat_rate_limit_bucket.py"
      - "backend/tests/test_webchat_ai_turn_runtime.py"
      - "docs/ops/PRIVATE_AI_RUNTIME_ROLLOUT_RUNBOOK.md"
      - "deploy/.env.candidate.example"
      - "deploy/.env.prod.example"
      - ".github/workflows/provider-runtime-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-runtime-routes:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Router, traffic selection, and output contracts
        run: |
          pytest -q \
            backend/tests/test_provider_runtime_output_contracts.py \
            backend/tests/test_provider_runtime_private_ai_runtime_adapter.py \
            backend/tests/test_provider_runtime_router.py \
            backend/tests/test_provider_runtime_traffic_selection.py \
            backend/tests/test_provider_runtime_review_regressions.py \
            backend/tests/test_provider_runtime_audit_contract.py

  provider-runtime-webcall-adapter:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: WebCall Provider Runtime authority
        run: |
          pytest -q \
            backend/tests/test_webcall_ai_provider_runtime_llm.py \
            backend/tests/test_webcall_ai_production.py

  provider-runtime-admin-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Admin, status, and bounded evidence
        run: |
          pytest -q \
            backend/tests/test_admin_provider_runtime_routing_api.py \
            backend/tests/test_provider_runtime_status.py \
            backend/tests/test_provider_runtime_token_leakage.py \
            backend/tests/test_webcall_ai_demo_status_safety.py

  provider-runtime-release-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Compile Provider and Admin runtime paths
        run: |
          python -m compileall -q \
            backend/app/api/admin_provider_runtime.py \
            backend/app/services/provider_runtime \
            backend/app/services/provider_runtime_status.py \
            backend/app/services/webcall_ai/demo_lab.py \
            backend/app/services/webcall_ai_production
      - name: WebChat runtime compatibility
        run: |
          pytest -q \
            backend/tests/test_webchat_runtime_ai_service.py \
            backend/tests/test_webchat_rate_limit_bucket.py \
            backend/tests/test_webchat_ai_turn_runtime.py
