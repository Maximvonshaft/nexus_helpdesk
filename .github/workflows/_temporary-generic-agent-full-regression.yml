name: Temporary Generic Agent Full Regression

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: generic-agent-full-regression-b7e41d
  cancel-in-progress: true

env:
  PYTHONPATH: backend

jobs:
  verify:
    if: github.event.pull_request.number == 793 && github.event.pull_request.head.ref == 'refactor/generic-agent-runtime-final-b7e41d'
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    outputs:
      failure_summary_b64: ${{ steps.failure-summary.outputs.summary_b64 }}
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: true
          ref: refactor/generic-agent-runtime-final-b7e41d
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Apply canonical runtime convergence
        run: |
          git rev-parse HEAD > /tmp/generic-agent-full-start-sha
          python scripts/_generic_agent_full_regression_fix.py
          python scripts/_generic_agent_authority_fix.py
          python scripts/_generic_agent_execution_args_fix.py
          python scripts/_generic_agent_execution_depth_fix.py
          python -m compileall -q backend/app
          python scripts/ci/check_agent_runtime_residue.py
      - name: Run complete backend regression
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p /tmp/generic-agent-full-evidence
          python -m pytest -q backend/tests \
            2>&1 | tee /tmp/generic-agent-full-evidence/pytest.log
      - name: Capture bounded backend failure summary
        id: failure-summary
        if: steps.backend.outcome == 'failure'
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          log_path = Path('/tmp/generic-agent-full-evidence/pytest.log')
          text = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else 'pytest log missing'
          lines = text.splitlines()
          start = 0
          for index, line in enumerate(lines):
              if ' short test summary info ' in line or line.startswith('= FAILURES =') or line.startswith('= ERRORS ='):
                  start = index
          bounded = '\n'.join(lines[start:][-400:])
          if not bounded.strip():
              bounded = '\n'.join(lines[-400:]) or 'pytest produced no readable failure output'
          encoded = base64.b64encode(bounded.encode('utf-8')).decode('ascii')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'summary_b64={encoded}\n')
          PY
      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generic-agent-full-${{ github.event.pull_request.head.sha }}
          path: /tmp/generic-agent-full-evidence
          if-no-files-found: warn
          retention-days: 7
      - name: Enforce backend regression success
        if: steps.backend.outcome == 'failure'
        run: exit 1
      - name: Commit clean candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/generic-agent-full-start-sha)"
          git fetch --no-tags origin refactor/generic-agent-runtime-final-b7e41d
          test "$(git rev-parse origin/refactor/generic-agent-runtime-final-b7e41d)" = "$start_sha"
          git rm -f scripts/_generic_agent_full_regression_fix.py
          git rm -f scripts/_generic_agent_authority_fix.py
          git rm -f scripts/_generic_agent_execution_args_fix.py
          git rm -f scripts/_generic_agent_execution_depth_fix.py
          git rm -f .github/workflows/_temporary-generic-agent-full-regression.yml
          git add -A
          test -z "$(find .github/workflows -maxdepth 1 -type f -name '_temporary-*' -print)"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'refactor(agent): enforce one governed generic runtime'
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d

  failure-summary:
    if: always() && needs.verify.outputs.failure_summary_b64 != ''
    needs: verify
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Print bounded backend failure summary
        env:
          FAILURE_SUMMARY_B64: ${{ needs.verify.outputs.failure_summary_b64 }}
        run: |
          python - <<'PY'
          import base64
          import os

          encoded = os.environ.get('FAILURE_SUMMARY_B64', '')
          print(base64.b64decode(encoded).decode('utf-8', errors='replace'))
          PY
