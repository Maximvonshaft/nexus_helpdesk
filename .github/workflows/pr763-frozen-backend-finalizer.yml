name: PR 763 Frozen Backend Finalizer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pr763-frozen-backend-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    if: github.head_ref == 'fix/722-authority-convergence'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CI: "true"
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PROVIDER_RUNTIME_TRAFFIC_MODE: control
      PROVIDER_RUNTIME_KILL_SWITCH: "true"
      PROVIDER_RUNTIME_CANARY_PERCENT: "0"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      WEBCHAT_AI_AUTO_REPLY_MODE: off
      WEBCHAT_VOICE_ENABLED: "false"
      ENABLE_OUTBOUND_DISPATCH: "false"
      OUTBOUND_PROVIDER: disabled
      WHATSAPP_NATIVE_ENABLED: "false"
      WHATSAPP_DISPATCH_MODE: disabled
      EMAIL_MAILBOX_SYNC_ENABLED: "false"
      SPEEDAF_MCP_ENABLED: "false"
      SPEEDAF_TRACK_QUERY_ENABLED: "false"
      SPEEDAF_WORK_ORDER_CREATE_ENABLED: "false"
      SPEEDAF_UPDATE_ADDRESS_ENABLED: "false"
      SPEEDAF_CANCEL_ENABLED: "false"
      SPEEDAF_VOICE_CALLBACK_ENABLED: "false"
      OPERATIONS_DISPATCH_MODE: disabled
      OPERATIONS_DISPATCH_ADAPTER: disabled
    steps:
      - name: Checkout exact finalizer trigger
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Prove frozen input and load verified patch
        shell: bash
        env:
          EXPECTED_BASE: 9bbc103f4dc9758f7c53aae75a994272fbbc2485
          TRIGGER_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$TRIGGER_HEAD"
          test "$(git rev-parse HEAD^)" = "$EXPECTED_BASE"
          test "$(git diff --name-only "$EXPECTED_BASE"..HEAD)" = ".github/workflows/pr763-frozen-backend-finalizer.yml"
          git fetch --no-tags origin \
            refs/heads/repair/763-backend-final-5ef:refs/remotes/origin/repair/763-backend-final-5ef
          for part in 00 01 02 03; do
            git show "refs/remotes/origin/repair/763-backend-final-5ef:.ci/pr763-backend-fix.part${part}.patch"
          done > /tmp/pr763-backend-fix.patch
          echo "e49fc934d5e47f64dd376ca46412e14a81b5f1c905d82948be17a76472a77525  /tmp/pr763-backend-fix.patch" | sha256sum -c -

      - name: Restore canonical authority and apply patch
        shell: bash
        run: |
          set -Eeuo pipefail
          git checkout 241b28025e1d4269fe167bbad9e75171d3f841cb -- .github/workflows/canonical-acceptance.yml
          rm -f .github/workflows/backend-convergence-maintenance.yml
          rm -f .github/workflows/pr763-frozen-backend-finalizer.yml
          rm -f backend/tests/conftest.py
          rm -rf scripts/maintenance
          git apply --check /tmp/pr763-backend-fix.patch
          git apply /tmp/pr763-backend-fix.patch
          test "$(find .github/workflows -maxdepth 1 -type f | sort)" = ".github/workflows/canonical-acceptance.yml"
          git diff --check
          git config user.name "nexus-backend-finalizer"
          git config user.email "nexus-backend-finalizer@users.noreply.github.com"
          git add -A
          git commit -m "fix(backend): close canonical regression and worker fencing gaps"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Verify clean static authority
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-backend-finalizer
          python -m compileall -q backend/app backend/scripts scripts/qualification scripts/release
          python scripts/verify_repository.py --static-only \
            --expected-sha "$(git rev-parse HEAD)" \
            --evidence-out /tmp/nexus-backend-finalizer/repository-static.json \
            2>&1 | tee /tmp/nexus-backend-finalizer/static.log

      - name: Run complete backend regression
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q backend/tests 2>&1 | tee /tmp/nexus-backend-finalizer/pytest.log

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr763-frozen-backend-finalizer-${{ github.event.pull_request.head.sha }}
          path: /tmp/nexus-backend-finalizer
          if-no-files-found: warn
          retention-days: 30

      - name: Push validated final tree only if unchanged
        shell: bash
        env:
          TRIGGER_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          test -z "$(git status --porcelain)"
          remote_head="$(git ls-remote origin refs/heads/fix/722-authority-convergence | awk '{print $1}')"
          test "$remote_head" = "$TRIGGER_HEAD"
          git push origin HEAD:refs/heads/fix/722-authority-convergence
