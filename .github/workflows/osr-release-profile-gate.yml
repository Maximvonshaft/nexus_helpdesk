name: osr-release-profile-gate

on:
  pull_request:
    paths:
      - "backend/app/services/nexus_osr/release_profiles.py"
      - "backend/tests/test_nexus_osr_release_profiles.py"
      - ".github/workflows/osr-release-profile-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-profile-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/osr-release-profile.db
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile contract
        run: |
          python -m py_compile \
            backend/app/services/nexus_osr/release_profiles.py \
            backend/tests/test_nexus_osr_release_profiles.py
      - name: Run profile tests
        run: pytest -q backend/tests/test_nexus_osr_release_profiles.py
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
