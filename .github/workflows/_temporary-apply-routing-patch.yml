name: Temporary Apply Validated Routing Patch

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing

      - name: Apply validated patch atomically
        shell: bash
        run: |
          set -Eeuo pipefail
          parts=(
            .github/_temporary-routing-patch.00
            .github/_temporary-routing-patch.01
            .github/_temporary-routing-patch.02
            .github/_temporary-routing-patch.03
            .github/_temporary-routing-patch.04
          )
          for part in "${parts[@]}"; do
            test -f "$part"
          done
          cat "${parts[@]}" > /tmp/conversation-first.patch
          echo "e5eec078ecac5b3c079c83236910506b56ea71b4c8166f9cde0f9c179c03d8ab  /tmp/conversation-first.patch" | sha256sum -c -
          git apply --check --unidiff-zero /tmp/conversation-first.patch
          git apply --unidiff-zero /tmp/conversation-first.patch

          rm -f "${parts[@]}"
          rm -f .github/_temporary-routing-payload.00 .github/_temporary-routing-payload.01
          rm -f .github/_temporary-routing-patch.*
          rm -f .github/workflows/_temporary-apply-routing-patch.yml

          python -m compileall -q backend/app backend/tests

          git config user.name "nexus-delivery-bot"
          git config user.email "nexus-delivery-bot@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "feat(support): complete conversation-first routing foundation"
          git push origin HEAD:feat/conversation-first-agent-routing
