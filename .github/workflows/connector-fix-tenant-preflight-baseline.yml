name: connector-fix-tenant-preflight-baseline

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/connector-fix-tenant-preflight-baseline.yml"
      - ".github/workflows/tenant-principal-preflight.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Patch baseline scenario deterministically
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/tenant-principal-preflight.yml')
          text = path.read_text(encoding='utf-8')
          old = '''      - name: Prove coherent ownership passes without implicit defaults
        run: |
          set -Eeuo pipefail
          python scripts/qualification/tenant/tenant_principal_preflight.py \\
            --database-url "${DATABASE_URL}" \\
            --mapping artifacts/tenant/mapping-pass.json \\
            --output artifacts/tenant/preflight-pass.json
          test "$(jq -r '.status' artifacts/tenant/preflight-pass.json)" = "pass"
          test "$(jq -r '.implicit_default_backfill_allowed' artifacts/tenant/preflight-pass.json)" = "false"
          test "$(jq -r '.issues.issue_count' artifacts/tenant/preflight-pass.json)" = "0"
'''
          new = '''      - name: Prove the historical default Provider Rule blocks migration
        run: |
          set +e
          python scripts/qualification/tenant/tenant_principal_preflight.py \\
            --database-url "${DATABASE_URL}" \\
            --mapping artifacts/tenant/mapping-pass.json \\
            --output artifacts/tenant/preflight-legacy-default.json
          code=$?
          set -e
          test "$code" = "1"
          test "$(jq -r '.status' artifacts/tenant/preflight-legacy-default.json)" = "fail"
          test "$(jq -r '.issues.counts["tenant.existing_default_forbidden"]' artifacts/tenant/preflight-legacy-default.json)" -ge 1

      - name: Apply one explicit disposable mapping for the historical Provider Rule
        run: |
          set -Eeuo pipefail
          psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -v ON_ERROR_STOP=1 <<'SQL'
          UPDATE provider_routing_rules
          SET tenant_id = 'tenant-a', updated_at = clock_timestamp()
          WHERE tenant_id = 'default'
            AND channel_key = 'website'
            AND scenario = 'webchat_fast_reply'
            AND id = '00000000-0031-4000-8000-000000000031';
          SQL
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM provider_routing_rules WHERE tenant_id = 'default'")" = "0"

      - name: Prove coherent ownership passes after explicit remediation
        run: |
          set -Eeuo pipefail
          python scripts/qualification/tenant/tenant_principal_preflight.py \\
            --database-url "${DATABASE_URL}" \\
            --mapping artifacts/tenant/mapping-pass.json \\
            --output artifacts/tenant/preflight-pass.json
          test "$(jq -r '.status' artifacts/tenant/preflight-pass.json)" = "pass"
          test "$(jq -r '.implicit_default_backfill_allowed' artifacts/tenant/preflight-pass.json)" = "false"
          test "$(jq -r '.issues.issue_count' artifacts/tenant/preflight-pass.json)" = "0"
'''
          if old not in text:
              raise SystemExit('COHERENT_PASS_BLOCK_NOT_FOUND')
          text = text.replace(old, new, 1)
          old_scan = '''            artifacts/tenant/preflight-pass.json \\
            artifacts/tenant/preflight-fail.json
'''
          new_scan = '''            artifacts/tenant/preflight-legacy-default.json \\
            artifacts/tenant/preflight-pass.json \\
            artifacts/tenant/preflight-fail.json
'''
          if old_scan not in text:
              raise SystemExit('ARTIFACT_SCAN_BLOCK_NOT_FOUND')
          text = text.replace(old_scan, new_scan, 1)
          old_upload = '''            artifacts/tenant/preflight-pass.json
            artifacts/tenant/preflight-fail.json
'''
          new_upload = '''            artifacts/tenant/preflight-legacy-default.json
            artifacts/tenant/preflight-pass.json
            artifacts/tenant/preflight-fail.json
'''
          if old_upload not in text:
              raise SystemExit('ARTIFACT_UPLOAD_BLOCK_NOT_FOUND')
          text = text.replace(old_upload, new_upload, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          grep -q 'historical default Provider Rule blocks migration' .github/workflows/tenant-principal-preflight.yml
          grep -q 'preflight-legacy-default.json' .github/workflows/tenant-principal-preflight.yml

      - name: Commit qualification correction
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-tenant-qualification"
          git config user.email "nexus-tenant-qualification@users.noreply.github.com"
          git add .github/workflows/tenant-principal-preflight.yml
          git commit -m "test(tenant): prove legacy default remediation is explicit"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
