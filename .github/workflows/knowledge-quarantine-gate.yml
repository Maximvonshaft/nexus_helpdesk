name: knowledge-quarantine-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/models_knowledge_quarantine.py"
      - "backend/app/knowledge_quarantine/**"
      - "backend/app/model_registry.py"
      - "backend/alembic/versions/20260712_0059_knowledge_ingestion_quarantine.py"
      - "backend/tests/test_knowledge_quarantine_*.py"
      - ".github/workflows/knowledge-quarantine-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quarantine-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile quarantine boundary
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/models_knowledge_quarantine.py \
            backend/app/knowledge_quarantine/__init__.py \
            backend/app/knowledge_quarantine/signatures.py \
            backend/app/knowledge_quarantine/policy.py \
            backend/app/knowledge_quarantine/lifecycle.py \
            backend/tests/test_knowledge_quarantine_contract.py \
            backend/tests/test_knowledge_quarantine_fail_closed_edges.py

      - name: Run fail-closed contract tests
        run: pytest -q backend/tests/test_knowledge_quarantine_*.py

      - name: Prove migration round trip
        run: |
          set -Eeuo pipefail
          cd backend
          alembic upgrade head
          test "$(alembic current | awk '{print $1}')" = "20260712_0059"
          alembic downgrade 20260711_0058
          alembic upgrade head

      - name: Prove model and database convergence
        run: |
          set -Eeuo pipefail
          python backend/scripts/check_model_migration_drift.py --report-json quarantine-drift.json
          python - <<'PY'
          import json
          data = json.load(open('quarantine-drift.json', encoding='utf-8'))
          assert data['status'] == 'ok', data
          assert 'app.models_knowledge_quarantine' in data['registered_model_modules'], data
          PY

      - name: Verify table safety contracts
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, inspect
          from app.settings import get_settings
          engine = create_engine(get_settings().database_url, future=True)
          inspector = inspect(engine)
          assert 'knowledge_ingestion_records' in inspector.get_table_names()
          checks = {item.get('name') for item in inspector.get_check_constraints('knowledge_ingestion_records')}
          required = {
              'ck_knowledge_ingestion_lifecycle_status',
              'ck_knowledge_ingestion_signature_status',
              'ck_knowledge_ingestion_malware_status',
              'ck_knowledge_ingestion_cdr_status',
              'ck_knowledge_ingestion_prompt_risk_status',
              'ck_knowledge_ingestion_source_trust',
              'ck_knowledge_ingestion_review_status',
          }
          assert required.issubset(checks), (required - checks)
          engine.dispose()
          PY

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
