name: log-safety-gate

on:
  pull_request:
    paths:
      - "backend/app/services/log_sanitizer.py"
      - "backend/app/services/observability.py"
      - "backend/app/services/nexus_osr/audit_sanitizer.py"
      - "backend/tests/test_observability_log_safety.py"
      - "backend/tests/test_nexus_osr_audit_sanitizer.py"
      - ".github/workflows/log-safety-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terminal-log-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/log-safety-gate.db
      ALLOW_DEV_AUTH: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile logging boundary
        run: |
          python -m py_compile \
            backend/app/services/log_sanitizer.py \
            backend/app/services/observability.py \
            backend/app/services/nexus_osr/audit_sanitizer.py \
            backend/tests/test_observability_log_safety.py

      - name: Run hostile terminal logging tests
        run: pytest -q backend/tests/test_observability_log_safety.py backend/tests/test_nexus_osr_audit_sanitizer.py

      - name: Reject raw terminal JSON formatter patterns
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("backend/app/services/observability.py").read_text(encoding="utf-8")
          assert 'payload.update(extra)' not in source
          assert '"message": record.getMessage()' not in source
          assert 'build_safe_log_payload' in source
          assert 'sanitize_log_event(payload)' in source
          PY

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
