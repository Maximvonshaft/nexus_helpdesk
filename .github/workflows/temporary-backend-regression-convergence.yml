name: Temporary Backend Regression Convergence

# One-shot self-deleting workflow. Accepted Head must not contain this file.
# Execution nonce: canonical-backend-regression-20260721-0915
on:
  push:
    branches:
      - refactor/generic-agent-runtime-final-b7e41d
    paths:
      - .github/workflows/temporary-backend-regression-convergence.yml

permissions:
  contents: write

concurrency:
  group: temporary-backend-regression-convergence
  cancel-in-progress: false

jobs:
  converge:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: refactor/generic-agent-runtime-final-b7e41d
          fetch-depth: 0
          persist-credentials: true

      - name: Align regression tests with canonical authorities
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path.cwd()
          tool_tests = root / "backend/tests/test_nexus_osr_tool_execution_service.py"
          turn_tests = root / "backend/tests/test_webchat_ai_turn_runtime.py"
          workflow = root / ".github/workflows/temporary-backend-regression-convergence.yml"

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 match, found {count}")
              return text.replace(old, new, 1)

          text = tool_tests.read_text(encoding="utf-8")
          text = replace_once(
              text,
              'tool_calls=[{"tool_name": "timeline.event.create", "idempotency_key": "needs-confirm", "requires_confirmation": True}],',
              'tool_calls=[{"tool_name": "timeline.event.create", "idempotency_key": "needs-confirm", "requires_confirmation": True, "arguments": {"summary": "Human confirmation gated event"}}],',
              "confirmation test schema",
          )
          text = replace_once(
              text,
              '"arguments": {"summary": "Customer user@example.com called from +382 67123456 about CH1234567890", "raw_payload": {"token": "secret"}},',
              '"arguments": {"summary": "Customer user@example.com called from +382 67123456 about CH1234567890"},',
              "timeline schema",
          )
          valid_work_order = '{"tracking_number": "CH1234567890", "work_order_type": "WT0103-05", "description": "Customer requested delivery follow-up"}'
          text = replace_once(
              text,
              'tool_calls=[{"tool_name": "speedaf.workOrder.create", "idempotency_key": "speedaf-high-risk"}],',
              f'tool_calls=[{{"tool_name": "speedaf.workOrder.create", "idempotency_key": "speedaf-high-risk", "arguments": {valid_work_order}}}],',
              "high risk test schema",
          )
          text = replace_once(
              text,
              'tool_calls=[{"tool_name": "speedaf.workOrder.create", "idempotency_key": "speedaf-allowed-test"}],',
              f'tool_calls=[{{"tool_name": "speedaf.workOrder.create", "idempotency_key": "speedaf-allowed-test", "arguments": {valid_work_order}}}],',
              "handler test schema",
          )
          text = replace_once(
              text,
              'tool_calls=[{"tool_name": "timeline.event.create"}],',
              'tool_calls=[{"tool_name": "timeline.event.create", "arguments": {"summary": "This Tool must remain unavailable"}}],',
              "empty allowlist schema",
          )
          text = replace_once(
              text,
              '    assert "secret" not in combined.lower()\n',
              '',
              "retired raw-payload assertion",
          )
          tool_tests.write_text(text, encoding="utf-8")

          text = turn_tests.read_text(encoding="utf-8")
          pattern = re.compile(
              r"\n        audit = db\.query\(RuntimeDecisionAuditRecord\)\.filter\(\n"
              r".*?"
              r"        assert context is not None\n",
              re.DOTALL,
          )
          replacement = (
              "\n        # Direct final replies are audited by the Agent turn trace and\n"
              "        # Provider Runtime. RuntimeDecisionAuditRecord and CaseContextRecord are\n"
              "        # reserved for governed Tool decisions/context, not a parallel reply audit.\n"
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise RuntimeError(f"retired direct reply audit expectation: expected 1 match, found {count}")
          text = text.replace(
              "Ticketless AI audit remains inspectable.",
              "Ticketless Agent turn remains inspectable.",
          )
          turn_tests.write_text(text, encoding="utf-8")

          workflow.unlink(missing_ok=True)
          PY

      - name: Run focused regression and static authority
        env:
          PYTHONPATH: backend
          APP_ENV: test
          AUTO_INIT_DB: "false"
          SEED_DEMO_DATA: "false"
          ALLOW_DEV_AUTH: "false"
          PROVIDER_RUNTIME_ENABLED: "false"
          PROVIDER_RUNTIME_KILL_SWITCH: "true"
          PRIVATE_AI_RUNTIME_ENABLED: "false"
          WEBCHAT_AI_ENABLED: "false"
          WEBCHAT_AI_AUTO_REPLY_MODE: off
          WEBCHAT_VOICE_ENABLED: "false"
          ENABLE_OUTBOUND_DISPATCH: "false"
          SPEEDAF_MCP_ENABLED: "false"
        run: |
          test ! -e .github/workflows/temporary-backend-regression-convergence.yml
          git diff --check
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          python -m pytest -q \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py
          python scripts/ci/check_agent_runtime_residue.py
          python scripts/verify_repository.py --static-only

      - name: Commit clean regression convergence
        run: |
          git config user.name "Nexus Canonical Delivery"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(agent): align regressions with canonical authorities"
          git pull --rebase origin refactor/generic-agent-runtime-final-b7e41d
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d
