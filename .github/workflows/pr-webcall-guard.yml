name: WebCall PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scope-guard:
    name: scope-guard
    runs-on: ubuntu-latest
    outputs:
      webcall_relevant: ${{ steps.changed_files.outputs.webcall_relevant }}
      webcall_checks_required: ${{ steps.changed_files.outputs.webcall_checks_required }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed file scope
        id: changed_files
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sort > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

          is_webcall_relevant_file() {
            case "$1" in
              webapp/src/components/webcall/AgentWebCallPanel.tsx) return 0 ;;
              webapp/tests/operator-console-contract.test.mjs) return 0 ;;
              webapp/package.json) return 0 ;;
              webapp/package-lock.json) return 0 ;;
              Dockerfile) return 0 ;;
              backend/app/static/webchat/demo/DEPLOYMENT_NOTES.md) return 0 ;;
              backend/app/static/webchat/demo/index.html) return 0 ;;
              backend/app/webchat_voice_config.py) return 0 ;;
              backend/tests/test_webchat_voice_mock_ui_static.py) return 0 ;;
              backend/tests/test_webchat_voice_static_headers.py) return 0 ;;
              webapp/src/routes/webcall-ai.tsx) return 0 ;;
              webapp/src/styles.css) return 0 ;;
              backend/.env.example) return 0 ;;
              backend/requirements.txt) return 0 ;;
              backend/app/api/webcall_ai.py) return 0 ;;
              backend/app/api/admin_webcall_ai.py) return 0 ;;
              backend/app/api/admin_provider_credentials.py) return 0 ;;
              backend/app/api/knowledge_items.py) return 0 ;;
              backend/app/models_control_plane.py) return 0 ;;
              backend/app/schemas_control_plane.py) return 0 ;;
              backend/app/services/ai_runtime/codex_auth_provider.py) return 0 ;;
              backend/app/services/ai_runtime/codex_app_server_provider.py) return 0 ;;
              backend/app/services/ai_runtime/provider_router.py) return 0 ;;
              backend/app/services/ai_runtime/schemas.py) return 0 ;;
              backend/app/services/ai_runtime_context.py) return 0 ;;
              backend/app/services/knowledge_document_service.py) return 0 ;;
              backend/app/services/knowledge_retrieval_service.py) return 0 ;;
              backend/app/services/knowledge_service.py) return 0 ;;
              backend/app/services/provider_runtime/adapters/codex_app_server.py) return 0 ;;
              backend/app/services/provider_runtime/codex_llm_client.py) return 0 ;;
              backend/app/services/provider_runtime/codex_smoke_chat.py) return 0 ;;
              backend/app/services/provider_runtime/oauth_refresh_manager.py) return 0 ;;
              backend/app/services/provider_runtime/router.py) return 0 ;;
              backend/app/services/provider_runtime/webchat_fast_dispatcher.py) return 0 ;;
              backend/app/services/webchat_fast_ai_service.py) return 0 ;;
              backend/app/services/webchat_fast_config.py) return 0 ;;
              backend/app/services/webcall_ai_production/**) return 0 ;;
              backend/app/webcall_ai_schemas.py) return 0 ;;
              backend/tests/test_codex_app_server_image_contract.py) return 0 ;;
              backend/tests/test_codex_app_server_bridge_proxy.py) return 0 ;;
              backend/tests/test_codex_app_server_private_upstream_proxy.py) return 0 ;;
              backend/tests/test_codex_openclaw_codex_harness_adapter.py) return 0 ;;
              backend/tests/test_codex_private_reply_engine.py) return 0 ;;
              backend/tests/test_codex_runtime_v3_static.py) return 0 ;;
              backend/tests/test_codex_smoke_chat.py) return 0 ;;
              backend/tests/test_oauth_refresh_concurrency.py) return 0 ;;
              backend/tests/test_provider_runtime_codex_oauth_webchat.py) return 0 ;;
              backend/tests/test_provider_runtime_kill_switch_canary.py) return 0 ;;
              backend/tests/test_provider_runtime_router_fallback_e2e.py) return 0 ;;
              backend/tests/test_knowledge_runtime_context.py) return 0 ;;
              backend/tests/test_webchat_codex_app_server_canary_observability.py) return 0 ;;
              backend/tests/test_webchat_codex_app_server_provider.py) return 0 ;;
              backend/tests/test_webchat_fast_ai_provider_router_phase1.py) return 0 ;;
              backend/tests/test_webchat_fast_production_legacy_guard.py) return 0 ;;
              backend/tests/test_webchat_fast_reply_api.py) return 0 ;;
              backend/tests/test_webchat_fast_reply_provider_runtime.py) return 0 ;;
              backend/tests/test_webchat_stream_feature_flag.py) return 0 ;;
              backend/tests/test_webcall_ai_production.py) return 0 ;;
              backend/tests/test_webcall_ai_voice_loop.py) return 0 ;;
              deploy/codex_app_server_bridge_proxy.py) return 0 ;;
              deploy/codex_app_server_private_upstream_proxy.py) return 0 ;;
              deploy/codex_private_reply_engine.py) return 0 ;;
              deploy/codex_openclaw_codex_harness_adapter.py) return 0 ;;
              deploy/docker-compose.server.yml) return 0 ;;
              backend/alembic/versions/20260525_0033_knowledge_chunks_runtime_context.py) return 0 ;;
              docs/architecture/CODEX_APPSERVER_RUNTIME_V3.md) return 0 ;;
              docs/architecture/WEBCHAT_AI_PROVIDER_ROUTER.md) return 0 ;;
              docs/ai-control-center-runtime.md) return 0 ;;
              docs/engineering/codex_appserver_runtime_v3_discovery_report.md) return 0 ;;
              docs/engineering/codex_chat_smoke_runbook.md) return 0 ;;
              docs/engineering/voice_provider_bridge_contract.md) return 0 ;;
              docs/engineering/webcall_ai_*) return 0 ;;
              docs/ops/CODEX_APPSERVER_RUNTIME_V3_ROLLBACK.md) return 0 ;;
              docs/ops/CODEX_APPSERVER_RUNTIME_V3_RUNBOOK.md) return 0 ;;
              docs/security/CODEX_APPSERVER_TOKEN_BOUNDARY.md) return 0 ;;
              scripts/probe_codex_appserver_discovery.sh) return 0 ;;
              scripts/probe_codex_appserver_runtime_v3_sla.sh) return 0 ;;
              tools/nexus-codex-runtime/**) return 0 ;;
              webapp/src/lib/api.ts) return 0 ;;
              webapp/src/lib/types.ts) return 0 ;;
              webapp/src/routes/ai-control.tsx) return 0 ;;
              webapp/src/routes/control-plane.tsx) return 0 ;;
              webapp/tests/novice-ux-regression.test.mjs) return 0 ;;
              .github/workflows/webcall-ai-final-quality-gate.yml) return 0 ;;
              .github/workflows/webcall-ai-infra-skeleton.yml) return 0 ;;
              .github/workflows/pr-webcall-guard.yml) return 0 ;;
              "") return 0 ;;
            esac
            return 1
          }

          requires_webcall_quality_checks() {
            case "$1" in
              webapp/src/components/webcall/AgentWebCallPanel.tsx) return 0 ;;
              webapp/tests/operator-console-contract.test.mjs) return 0 ;;
              webapp/package.json) return 0 ;;
              webapp/package-lock.json) return 0 ;;
              backend/app/webchat_voice_config.py) return 0 ;;
              backend/tests/test_webchat_voice_mock_ui_static.py) return 0 ;;
              backend/tests/test_webchat_voice_static_headers.py) return 0 ;;
            esac
            return 1
          }

          webcall_relevant=0
          webcall_checks_required=0
          while IFS= read -r file; do
            if is_webcall_relevant_file "$file"; then
              webcall_relevant=1
            fi
            if requires_webcall_quality_checks "$file"; then
              webcall_checks_required=1
            fi
          done < /tmp/changed_files.txt

          if [ "$webcall_relevant" -eq 0 ]; then
            echo "webcall_relevant=false" >> "$GITHUB_OUTPUT"
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
            echo "No WebCall guarded files changed; scope guard passed without strict allowlist enforcement."
            exit 0
          fi

          echo "webcall_relevant=true" >> "$GITHUB_OUTPUT"
          if [ "$webcall_checks_required" -eq 1 ]; then
            echo "webcall_checks_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
          fi

          fail=0
          while IFS= read -r file; do
            if ! is_webcall_relevant_file "$file"; then
              echo "::error file=$file::Out-of-scope file changed in WebCall guarded PR."
              fail=1
            fi
          done < /tmp/changed_files.txt

          if [ "$fail" -ne 0 ]; then
            echo "Scope guard failed. This PR includes files outside the approved WebCall/Codex runtime scope."
            exit 1
          fi

          echo "Scope guard passed."

  webcall-blocking-fix-guard:
    name: webcall-blocking-fix-guard
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Verify WebCall blocking fix markers
        shell: bash
        run: |
          set -Eeuo pipefail

          PANEL="webapp/src/components/webcall/AgentWebCallPanel.tsx"
          TEST="webapp/tests/operator-console-contract.test.mjs"

          test -f "$PANEL"
          test -f "$TEST"

          non_livekit_branch="$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path('webapp/src/components/webcall/AgentWebCallPanel.tsx').read_text(encoding='utf-8')
          m = re.search(r"if \(accepted\.provider !== 'livekit'\) \{[\s\S]*?return accepted\n\s*\}", text)
          print(m.group(0) if m else "")
          PY
          )"

          if [ -z "$non_livekit_branch" ]; then
            echo "::error file=$PANEL::Could not find non-LiveKit accept branch."
            exit 1
          fi

          if ! grep -q "await cleanupRoom()" <<<"$non_livekit_branch"; then
            echo "::error file=$PANEL::Expected await cleanupRoom() in non-LiveKit accept branch."
            exit 1
          fi

          if ! grep -q "webcall non-livekit accept path cleans up acquired microphone track" "$TEST"; then
            echo "::error file=$TEST::Expected non-livekit cleanup contract test is missing."
            exit 1
          fi

          if ! grep -q "await cleanupRoom\\(\\)" "$TEST"; then
            echo "::error file=$TEST::Expected cleanup assertion marker is missing from contract tests."
            exit 1
          fi

          echo "Blocking fix guard passed."

  webapp-quality:
    name: webapp-quality
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            webapp/package-lock.json
            package-lock.json

      - name: Install webapp dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -f webapp/package-lock.json ]; then
            npm --prefix webapp ci
          else
            npm --prefix webapp install
          fi

      - name: Lint
        run: npm --prefix webapp run lint

      - name: Typecheck
        run: npm --prefix webapp run typecheck

      - name: Test
        run: npm --prefix webapp test

      - name: Build
        run: npm --prefix webapp run build

  backend-webcall-tests:
    name: backend-webcall-tests
    runs-on: ubuntu-latest
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        shell: bash
        run: |
          set -Eeuo pipefail

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          if [ -f backend/requirements.txt ]; then
            python -m pip install -r backend/requirements.txt
          fi
          if [ -f backend/requirements-dev.txt ]; then
            python -m pip install -r backend/requirements-dev.txt
          fi
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[test]" || python -m pip install -e .
          fi
          if [ -f backend/pyproject.toml ]; then
            python -m pip install -e "backend[test]" || python -m pip install -e backend
          fi

          python -m pip install pytest

      - name: Run backend WebCall tests
        shell: bash
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_webchat_voice_static_headers.py \
            backend/tests/test_webchat_voice_mock_ui_static.py \
            backend/tests/test_webchat_voice_p0_static.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py \
            backend/tests/test_webchat_voice_room_compensation.py
