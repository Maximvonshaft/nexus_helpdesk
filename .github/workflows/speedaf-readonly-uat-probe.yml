name: speedaf-readonly-uat-probe

on:
  workflow_dispatch:
    inputs:
      country_code:
        description: 'Country code for waybillCode/query'
        required: false
        default: 'CH'
        type: string
      strict:
        description: 'Fail workflow if any requested read-only probe fails'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  speedaf-readonly-uat-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: backend
      SPEEDAF_MCP_ENABLED: ${{ secrets.SPEEDAF_UAT_MCP_ENABLED }}
      SPEEDAF_MCP_BASE_URL: ${{ secrets.SPEEDAF_UAT_MCP_BASE_URL }}
      SPEEDAF_MCP_APP_CODE: ${{ secrets.SPEEDAF_UAT_MCP_APP_CODE }}
      SPEEDAF_MCP_SECRET_KEY: ${{ secrets.SPEEDAF_UAT_MCP_SECRET_KEY }}
      SPEEDAF_MCP_CONTENT_TYPE: ${{ vars.SPEEDAF_UAT_MCP_CONTENT_TYPE || 'text/plain' }}
      SPEEDAF_MCP_DATA_MODE: ${{ vars.SPEEDAF_UAT_MCP_DATA_MODE || 'string' }}
      SPEEDAF_MCP_REQUIRE_SIGN: ${{ vars.SPEEDAF_UAT_MCP_REQUIRE_SIGN || 'false' }}
      SPEEDAF_WORK_ORDER_CREATE_ENABLED: 'false'
      SPEEDAF_UPDATE_ADDRESS_ENABLED: 'false'
      SPEEDAF_CANCEL_ENABLED: 'false'
      SPEEDAF_VOICE_CALLBACK_ENABLED: 'false'
      SPEEDAF_READONLY_UAT_WAYBILL_CODE: ${{ secrets.SPEEDAF_UAT_TEST_WAYBILL_CODE }}
      SPEEDAF_READONLY_UAT_CALLER_ID: ${{ secrets.SPEEDAF_UAT_TEST_CALLER_ID }}
      SPEEDAF_READONLY_UAT_COUNTRY_CODE: ${{ inputs.country_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt

      - name: Run readonly Speedaf UAT probe
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          STRICT_FLAG=''
          if [ '${{ inputs.strict }}' = 'true' ]; then STRICT_FLAG='--strict'; fi
          python backend/scripts/speedaf_readonly_uat_probe.py \
            --waybill-code "$SPEEDAF_READONLY_UAT_WAYBILL_CODE" \
            --caller-id "$SPEEDAF_READONLY_UAT_CALLER_ID" \
            --country-code "$SPEEDAF_READONLY_UAT_COUNTRY_CODE" \
            --output-json artifacts/speedaf-readonly-uat-report.json \
            $STRICT_FLAG

      - name: Assert readonly report is sanitized
        if: always()
        run: |
          set -Eeuo pipefail
          REPORT="artifacts/speedaf-readonly-uat-report.json"
          test -f "$REPORT"
          for value in \
            "$SPEEDAF_READONLY_UAT_WAYBILL_CODE" \
            "$SPEEDAF_READONLY_UAT_CALLER_ID" \
            "$SPEEDAF_MCP_APP_CODE" \
            "$SPEEDAF_MCP_SECRET_KEY"; do
            if [ -n "$value" ] && grep -F "$value" "$REPORT" >/dev/null 2>&1; then
              echo 'ERROR: report contains sensitive material.'
              exit 3
            fi
          done

      - name: Upload redacted UAT report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: speedaf-readonly-uat-report
          path: artifacts/speedaf-readonly-uat-report.json
          if-no-files-found: warn
