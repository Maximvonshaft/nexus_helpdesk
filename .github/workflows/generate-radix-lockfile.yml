name: Refresh frontend lockfile

on:
  push:
    branches:
      - feat/customer-service-console-purge
    paths:
      - ".github/workflows/generate-radix-lockfile.yml"

permissions:
  contents: write

jobs:
  refresh-lockfile:
    name: Prune retired frontend dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout frontend convergence branch
        uses: actions/checkout@v4
        with:
          ref: feat/customer-service-console-purge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Regenerate lockfile from declared dependencies
        working-directory: webapp
        run: npm install --package-lock-only --ignore-scripts

      - name: Verify package manifest was not rewritten
        run: git diff --exit-code -- webapp/package.json

      - name: Commit pruned lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webapp/package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile already matches package.json."
          else
            git commit -m "chore(frontend): prune retired dependencies from lockfile"
            git push origin HEAD:feat/customer-service-console-purge
          fi

      - name: Install locked dependencies
        working-directory: webapp
        run: npm ci

      - name: Validate converged frontend
        working-directory: webapp
        run: |
          npm run architecture
          npm test
          npm run typecheck
          npm run lint
          npm run build
          npm run size-report
