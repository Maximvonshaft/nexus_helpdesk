name: One-shot exact lockfile repair

on:
  push:
    branches:
      - fix/722-authority-convergence

permissions:
  contents: write

concurrency:
  group: one-shot-lockfile-repair
  cancel-in-progress: false

jobs:
  repair-lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact repair commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Regenerate and commit only the exact lockfile
        shell: bash
        env:
          EXPECTED_PARENT: a25a314cce9053b098cfcaf03952089d45d22016
          TARGET_BRANCH: fix/722-authority-convergence
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD^)" = "$EXPECTED_PARENT"
          cp webapp/package.json /tmp/package.json.before

          cd webapp
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund \
            --save-dev @types/react@18.3.28 @types/react-dom@18.3.7
          cmp -s package.json /tmp/package.json.before
          npm ci --ignore-scripts --no-audit --no-fund
          node - <<'NODE'
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'))
          const root = lock.packages?.['']
          if (!root) throw new Error('missing lockfile root package')
          for (const name of ['@types/react', '@types/react-dom']) {
            if (root.devDependencies?.[name] !== pkg.devDependencies?.[name]) {
              throw new Error(`${name} lockfile root does not match package.json`)
            }
          }
          if (lock.packages?.['node_modules/@types/react']?.version !== '18.3.28') {
            throw new Error('React type lock is not 18.3.28')
          }
          if (lock.packages?.['node_modules/@types/react-dom']?.version !== '18.3.7') {
            throw new Error('React DOM type lock is not 18.3.7')
          }
          NODE
          cd ..

          test -z "$(git status --porcelain -- webapp/package.json)"
          changed="$(git status --porcelain | awk '{print $2}')"
          test "$changed" = "webapp/package-lock.json"

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add webapp/package-lock.json
          git commit -m "fix(frontend): align React 18 type lockfile"
          git push origin "HEAD:$TARGET_BRANCH"
