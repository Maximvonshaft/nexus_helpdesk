name: Resolved Scope Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - backend/app/services/resolved_scope.py
      - backend/tests/test_resolved_scope_contract.py
      - .github/workflows/resolved-scope-gate.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout immutable PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source identity
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          python -m pip install --disable-pip-version-check pytest

      - name: Compile ResolvedScope contract
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/services/resolved_scope.py \
            backend/tests/test_resolved_scope_contract.py

      - name: Run ResolvedScope contract tests
        env:
          PYTHONPATH: backend
        run: pytest -q backend/tests/test_resolved_scope_contract.py

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
