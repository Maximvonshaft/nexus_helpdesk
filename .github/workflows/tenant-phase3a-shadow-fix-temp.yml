name: tenant-phase3a-shadow-fix-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase3a-shadow-fix-temp.yml
      - .github/patches/tenant-phase3a-shadow-fix.patch.gz.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase3a-shadow.db
      WEBCHAT_RATE_LIMIT_BACKEND: memory
      AUTO_INIT_DB: 'false'
      SEED_DEMO_DATA: 'false'
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Apply and verify hardening
        run: |
          set -Eeuo pipefail
          base64 --decode .github/patches/tenant-phase3a-shadow-fix.patch.gz.b64 > /tmp/fix.patch.gz
          test "$(sha256sum /tmp/fix.patch.gz | awk '{print $1}')" = "7fea41c269dd33416696684f0d90df879bd6b44aebdc68a93cf285bfdb531620"
          gzip -dc /tmp/fix.patch.gz > /tmp/fix.patch
          test "$(sha256sum /tmp/fix.patch | awk '{print $1}')" = "79a3f066179ff44ecde727d6f52648045d8ee501152a75eaeb1bb755d408e070"
          test "$(grep -c '^diff --git ' /tmp/fix.patch)" = "2"
          git apply --index --whitespace=error-all /tmp/fix.patch
          python -m py_compile backend/app/services/webchat_service.py backend/tests/test_webchat_public_tenant_binding.py
          pytest -q backend/tests/test_webchat_public_tenant_binding.py
          git diff --cached --check

      - name: Remove transfer files and commit
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/workflows/tenant-phase3a-shadow-fix-temp.yml \
            .github/patches/tenant-phase3a-shadow-fix.patch.gz.b64
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/tenant-phase3a-shadow-fix-temp.yml',
              '.github/patches/tenant-phase3a-shadow-fix.patch.gz.b64',
              'backend/app/services/webchat_service.py',
              'backend/tests/test_webchat_public_tenant_binding.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): keep shadow WebChat unowned (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
