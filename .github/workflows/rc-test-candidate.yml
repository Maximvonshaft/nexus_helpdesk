name: rc-test-candidate

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "backend/**"
      - "webapp/**"
      - "deploy/docker-compose.rc-test.yml"
      - "deploy/.env.rc-test.example"
      - "scripts/release/**"
      - "docs/ai/remote-skills-registry.yaml"
      - "docs/releases/rc0-*.md"
      - ".github/workflows/rc-test-candidate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rc-test-candidate-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  isolated-rc-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RC_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      RC_ENV_FILE: deploy/.env.rc-test
      RC_EVIDENCE_DIR: artifacts/rc-test
      RC_RUN_BROWSER_SMOKE: "true"
      RC_BASE_URL: http://127.0.0.1:18083
      RC_PUBLIC_ORIGIN: http://127.0.0.1:18083
      COMPOSE_PROJECT_NAME: nexus_rc_test_${{ github.run_id }}

    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Setup Node immutable
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Validate registry and release contracts
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          text = Path("docs/ai/remote-skills-registry.yaml").read_text(encoding="utf-8")
          assert text.startswith("schema: nexus.osr.remote-skills-registry.v1\n")
          assert "name: test_release_candidate_convergence" in text
          assert "auto_upgrade: false" in text
          PY
          python -m py_compile \
            scripts/release/generate_rc_test_env.py \
            scripts/release/seed_rc_test_data.py \
            scripts/release/rc_test_http_smoke.py \
            scripts/release/rc_test_side_effects.py \
            scripts/release/build_rc_test_manifest.py \
            scripts/release/validate_rc_test_manifest.py \
            scripts/release/validate_rc_test_evidence.py
          python -m unittest discover -s scripts/release/tests -p 'test_*.py'
          bash -n scripts/release/run_rc_test_candidate.sh

      - name: Install locked browser test dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Playwright Chrome runtime
        working-directory: webapp
        run: npx playwright install --with-deps chrome

      - name: Generate isolated RC environment
        run: |
          set -Eeuo pipefail
          python scripts/release/generate_rc_test_env.py \
            --source-sha "${RC_SOURCE_SHA}" \
            --compose-project "${COMPOSE_PROJECT_NAME}" \
            --origin "${RC_PUBLIC_ORIGIN}" \
            --output "${RC_ENV_FILE}"
          test "$(stat -c '%a' "${RC_ENV_FILE}")" = "600"

      - name: Execute isolated candidate chain
        run: |
          set +e
          run_log="${RUNNER_TEMP}/rc-run.log"
          bash scripts/release/run_rc_test_candidate.sh 2>&1 | tee "${run_log}"
          code=${PIPESTATUS[0]}
          set -e
          if [[ "${code}" -ne 0 ]]; then
            stage="$(grep -E '^RC_STAGE=[a-z0-9_-]{1,64}$' "${run_log}" | tail -n 1 | cut -d= -f2 || true)"
            stage="${stage:-unknown}"
            if [[ "${stage}" == "browser-smoke" ]]; then
              browser_stage="$(grep -E '^RC_BROWSER_STAGE=[a-z0-9_-]{1,64}$' "${run_log}" | tail -n 1 | cut -d= -f2 || true)"
              if [[ -n "${browser_stage}" ]]; then
                stage="browser-${browser_stage}"
              fi
            fi
            python - "${stage}" "${code}" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path
          stage, code = sys.argv[1:]
          if not re.fullmatch(r"[a-z0-9_-]{1,64}", stage):
              stage = "unknown"
          root = Path("artifacts/rc-test")
          root.mkdir(parents=True, exist_ok=True)
          summary_path = root / "failure-summary.json"
          summary = {
              "schema": "nexus.osr.rc-test-failure-summary.v1",
              "status": "failed",
              "stage": stage,
              "exit_code": int(code),
              "reason_code": "candidate_chain_failed",
              "service_states": {},
          }
          if summary_path.is_file():
              try:
                  current = json.loads(summary_path.read_text(encoding="utf-8"))
              except (OSError, UnicodeError, json.JSONDecodeError):
                  current = {}
              if isinstance(current, dict):
                  states = current.get("service_states")
                  if isinstance(states, dict):
                      summary["service_states"] = states
                  reason = current.get("reason_code")
                  if isinstance(reason, str) and re.fullmatch(r"[a-z0-9_-]{1,80}", reason):
                      summary["reason_code"] = reason
          summary_path.write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          fi
          exit "${code}"

      - name: Scan exact bounded RC evidence
        id: scan-evidence
        if: always()
        run: |
          set +e
          list_file="${RUNNER_TEMP}/rc-evidence-inputs.txt"
          python scripts/release/validate_rc_test_evidence.py \
            artifacts/rc-test \
            --list-output "${list_file}"
          code=$?
          if [[ "${code}" -eq 0 ]]; then
            mapfile -t evidence_files < "${list_file}"
            if [[ "${#evidence_files[@]}" -eq 0 ]]; then
              code=2
            else
              python scripts/security/scan_artifacts.py \
                --root . \
                --output artifacts/rc-test/artifact-scan.json \
                "${evidence_files[@]}"
              code=$?
            fi
          fi
          set -e
          if [[ "${code}" -ne 0 && ! -f artifacts/rc-test/failure-summary.json ]]; then
            python - "${code}" <<'PY'
          import json
          import sys
          from pathlib import Path
          root = Path("artifacts/rc-test")
          root.mkdir(parents=True, exist_ok=True)
          (root / "failure-summary.json").write_text(json.dumps({
              "schema": "nexus.osr.rc-test-failure-summary.v1",
              "status": "failed",
              "stage": "artifact-scan",
              "exit_code": int(sys.argv[1]),
              "reason_code": "evidence_validation_or_scan_failed",
              "service_states": {},
          }, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          fi
          exit "${code}"

      - name: Upload verified-safe bounded RC evidence
        if: ${{ always() && steps.scan-evidence.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rc-test-candidate-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/rc-test
          if-no-files-found: error
          retention-days: 7

      - name: Upload by-construction safe RC failure stage
        if: ${{ always() && steps.scan-evidence.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rc-test-failure-stage-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/rc-test/failure-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Validate safe failure summary
        id: scan-failure-summary
        if: ${{ always() && steps.scan-evidence.outcome == 'failure' }}
        run: |
          set -Eeuo pipefail
          test -f artifacts/rc-test/failure-summary.json
          rm -rf artifacts/rc-test-safe
          mkdir -p artifacts/rc-test-safe
          cp artifacts/rc-test/failure-summary.json artifacts/rc-test-safe/failure-summary.json
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/rc-test-safe/failure-summary-scan.json \
            artifacts/rc-test-safe/failure-summary.json

      - name: Upload scanned RC failure summary
        if: ${{ always() && steps.scan-failure-summary.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rc-test-failure-summary-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/rc-test-safe
          if-no-files-found: error
          retention-days: 7
