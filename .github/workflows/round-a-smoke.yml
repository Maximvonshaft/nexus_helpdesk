name: round-a-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  round-a-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./round_a_ci.db
      APP_ENV: test
      SECRET_KEY: ci-secret-key-change-me-with-enough-length
      NEXUSDESK_SMOKE_MODE: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Backend compile
        run: python -m compileall backend/app backend/scripts

      - name: Deterministic backend tests - outbound safety
        working-directory: backend
        run: pytest -q tests/test_outbound_safety.py

      - name: Deterministic backend tests - next phase max push
        working-directory: backend
        run: pytest -q tests/test_next_phase_max_push.py

      - name: Deterministic backend tests - deploy contracts
        working-directory: backend
        run: pytest -q tests/test_deploy_contracts.py

      - name: Deterministic backend tests - deploy v222 contracts
        working-directory: backend
        run: pytest -q tests/test_deploy_v222_contracts.py

      - name: Deterministic backend tests - round20a rectification
        working-directory: backend
        run: pytest -q tests/test_round20a_rectification.py

      - name: Deterministic backend tests - round20b legacy frontend
        working-directory: backend
        run: pytest -q tests/test_round20b_legacy_frontend.py

      - name: Deterministic backend tests - round27 frontend hardening
        working-directory: backend
        run: pytest -q tests/test_round27_frontend_hardening.py

      - name: Alembic upgrade on disposable SQLite
        working-directory: backend
        run: alembic upgrade head

      - name: Frontend build
        working-directory: webapp
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Smoke dry run
        run: bash scripts/smoke/smoke_all_round_a.sh --dry-run

      - name: Smoke script syntax check
        run: |
          find scripts/smoke -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Secret leak sanity check
        run: |
          ! grep -R "ghp_[A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_]\|SECRET_KEY=.*[A-Za-z0-9]\{40,\}\|S3_SECRET_KEY=.*[A-Za-z0-9]\{40,\}" -n . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=__pycache__ \
            --exclude-dir=frontend_dist \
            --exclude-dir=webapp/dist \
            --exclude-dir=backend/uploads \
            --exclude="*.pyc" \
            --exclude="*.md" \
            --exclude="*.example" \
            --exclude="round-a-smoke.yml"
