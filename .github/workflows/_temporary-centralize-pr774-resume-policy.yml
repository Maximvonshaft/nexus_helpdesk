name: Temporary Centralize PR 774 Resume Policy

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

concurrency:
  group: centralize-pr774-resume-policy
  cancel-in-progress: true

jobs:
  centralize-test-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply single resume-policy authority
        shell: bash
        run: |
          set -Eeuo pipefail
          git rev-parse HEAD > /tmp/pr774-policy-start-sha
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'replacement mismatch {path}: expected=1 actual={count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          policy = Path('backend/app/services/ticketless_handoff_policy.py')
          if policy.exists():
              raise SystemExit('ticketless handoff policy already exists')
          policy.write_text(
              dedent(
                  '''\
                  from __future__ import annotations

                  from typing import Any

                  from .permissions import (
                      CAP_WEBCHAT_HANDOFF_RELEASE,
                      CAP_WEBCHAT_HANDOFF_RESUME_AI,
                  )


                  def can_resume_ticketless_handoff(
                      *,
                      handoff: Any,
                      conversation: Any,
                      user_id: int,
                      capabilities: set[str],
                  ) -> bool:
                      """Return the single server-authoritative AI-resume decision."""

                      if handoff.status not in {"requested", "accepted"}:
                          return False
                      if CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities:
                          return True
                      return bool(
                          handoff.status == "accepted"
                          and handoff.assigned_agent_id == user_id
                          and conversation.active_agent_id == user_id
                          and CAP_WEBCHAT_HANDOFF_RELEASE in capabilities
                      )
                  '''
              ),
              encoding='utf-8',
          )

          handoff = 'backend/app/services/webchat_handoff_service.py'
          replace_once(handoff, '    CAP_WEBCHAT_HANDOFF_RESUME_AI,\n', '')
          replace_once(
              handoff,
              'from .webchat_handoff_service_core import (\n',
              'from .ticketless_handoff_policy import can_resume_ticketless_handoff\nfrom .webchat_handoff_service_core import (\n',
          )
          replace_once(
              handoff,
              '''    capabilities = resolve_capabilities(current_user, db)
              assigned_owner_can_resume = bool(
                  request_row.status == "accepted"
                  and request_row.assigned_agent_id == current_user.id
                  and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
              )
              ''',
              '''    capabilities = resolve_capabilities(current_user, db)
              ''',
          )
          replace_once(
              handoff,
              '''            "can_resume_ai": bool(
                              request_row.status in _OPEN
                              and (
                                  CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities
                                  or assigned_owner_can_resume
                              )
                          ),
              ''',
              '''            "can_resume_ai": can_resume_ticketless_handoff(
                              handoff=request_row,
                              conversation=conversation,
                              user_id=current_user.id,
                              capabilities=capabilities,
                          ),
              ''',
          )
          replace_once(
              handoff,
              '''    request_row = _core._request_by_id(db, request_id, lock=True)
                  capabilities = resolve_capabilities(current_user, db)
                  assigned_owner_can_resume = bool(
                      request_row.status == "accepted"
                      and request_row.assigned_agent_id == current_user.id
                      and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
                  )
                  if (
                      CAP_WEBCHAT_HANDOFF_RESUME_AI not in capabilities
                      and not assigned_owner_can_resume
                  ):
                      raise HTTPException(
                          status_code=status.HTTP_403_FORBIDDEN,
                          detail="webchat_handoff_resume_ai_requires_capability_or_ownership",
                      )
                  conversation, _control = _ticketless_context(
                      db,
                      request_row=request_row,
                      current_user=current_user,
                  )
                  if request_row.status not in _OPEN:
                      raise HTTPException(
                          status_code=status.HTTP_409_CONFLICT,
                          detail="webchat handoff request is already terminal",
                      )
              ''',
              '''    request_row = _core._request_by_id(db, request_id, lock=True)
                  conversation, _control = _ticketless_context(
                      db,
                      request_row=request_row,
                      current_user=current_user,
                  )
                  if request_row.status not in _OPEN:
                      raise HTTPException(
                          status_code=status.HTTP_409_CONFLICT,
                          detail="webchat handoff request is already terminal",
                      )
                  capabilities = resolve_capabilities(current_user, db)
                  if not can_resume_ticketless_handoff(
                      handoff=request_row,
                      conversation=conversation,
                      user_id=current_user.id,
                      capabilities=capabilities,
                  ):
                      raise HTTPException(
                          status_code=status.HTTP_403_FORBIDDEN,
                          detail="webchat_handoff_resume_ai_requires_capability_or_ownership",
                      )
              ''',
          )

          operator = 'backend/app/services/conversation_operator_service.py'
          replace_once(operator, '    CAP_WEBCHAT_HANDOFF_RESUME_AI,\n', '')
          replace_once(
              operator,
              'from .webchat_ai_turn_service import ai_snapshot\n',
              'from .ticketless_handoff_policy import can_resume_ticketless_handoff\nfrom .webchat_ai_turn_service import ai_snapshot\n',
          )
          replace_once(
              operator,
              '''    can_resume_ai = bool(
                  handoff.status in {"requested", "accepted"}
                  and (
                      CAP_WEBCHAT_HANDOFF_RESUME_AI in capabilities
                      or (
                          handoff.status == "accepted"
                          and assigned_to_current_user
                          and conversation.active_agent_id == user.id
                          and CAP_WEBCHAT_HANDOFF_ACCEPT in capabilities
                      )
                  )
              )
              ''',
              '''    can_resume_ai = can_resume_ticketless_handoff(
                  handoff=handoff,
                  conversation=conversation,
                  user_id=user.id,
                  capabilities=capabilities,
              )
              ''',
          )

          test = 'backend/tests/test_ticketless_resume_projection.py'
          replace_once(test, '    CAP_WEBCHAT_HANDOFF_ACCEPT,\n', '    CAP_WEBCHAT_HANDOFF_RELEASE,\n')
          text = Path(test).read_text(encoding='utf-8')
          text = text.replace('{CAP_WEBCHAT_HANDOFF_ACCEPT}', '{CAP_WEBCHAT_HANDOFF_RELEASE}')
          if 'CAP_WEBCHAT_HANDOFF_ACCEPT' in text:
              raise SystemExit('stale accept capability remains in projection test')
          Path(test).write_text(text, encoding='utf-8')
          PY

          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_ticketless_resume_projection.py \
            backend/tests/test_agent_routing_scope_fifo.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_conversation_first_agent_routing_residuals.py \
            backend/tests/test_ticketless_support_scope_isolation.py

      - name: Commit clean policy and remove temporary delivery files
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/pr774-policy-start-sha)"
          git fetch --no-tags origin feat/conversation-first-agent-routing
          test "$(git rev-parse origin/feat/conversation-first-agent-routing)" = "$start_sha"
          git rm .github/workflows/_temporary-centralize-pr774-resume-policy.yml
          git rm .github/pr774-centralize-resume-trigger
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: centralize ticketless AI resume policy'
          git push origin HEAD:feat/conversation-first-agent-routing
