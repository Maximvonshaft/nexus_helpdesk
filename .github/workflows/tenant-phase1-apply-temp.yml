name: tenant-phase1-apply-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase1-apply-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase1-apply-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase1-apply.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Apply six verified non-workflow files
        run: |
          set -Eeuo pipefail
          test "$(git merge-base HEAD origin/main)" = "e96dac837b4f02a297602259953d7c274b9c2063"
          git fetch --no-tags origin e2c947602ea51273c3b2aeed1d7a9aa1696b019c
          git show e2c947602ea51273c3b2aeed1d7a9aa1696b019c:.github/patches/tenant-additive-schema-546.patch.gz.b64 \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/tenant-phase1.patch
          test "$(sha256sum /tmp/tenant-phase1.patch | awk '{print $1}')" = "36a245d920d20b56bc007dcdf1953ca07004bf62fccd00fe6213fe844070f567"
          grep '^diff --git ' /tmp/tenant-phase1.patch
          git apply --index --whitespace=error-all \
            --include='backend/app/models.py' \
            --include='backend/alembic/versions/20260713_0059_add_tenant_principal.py' \
            --include='backend/tests/test_tenant_principal_additive_schema.py' \
            --include='docs/architecture/tenant-principal-migration.md' \
            --include='scripts/qualification/tenant/tenant_principal_preflight.py' \
            --include='scripts/qualification/tenant/test_tenant_principal_preflight.py' \
            /tmp/tenant-phase1.patch

      - name: Verify model, migration and preflight contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/models.py \
            backend/alembic/versions/20260713_0059_add_tenant_principal.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          pytest -q \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py \
            backend/tests/test_osr_model_registration.py \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_ai_config_migration.py \
            backend/tests/test_nexus_osr_operations_dispatch_migration.py \
            backend/tests/test_webchat_cards_migration.py
          python -m unittest scripts/qualification/tenant/test_tenant_principal_preflight.py
          test "$(cd backend && alembic heads | awk '{print $1}')" = "20260713_0059"
          git diff --cached --check

      - name: Remove bootstrap and commit verified Phase 1 files
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/tenant-phase1-apply-temp.yml
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/tenant-phase1-apply-temp.yml',
              'backend/app/models.py',
              'backend/alembic/versions/20260713_0059_add_tenant_principal.py',
              'backend/tests/test_tenant_principal_additive_schema.py',
              'docs/architecture/tenant-principal-migration.md',
              'scripts/qualification/tenant/tenant_principal_preflight.py',
              'scripts/qualification/tenant/test_tenant_principal_preflight.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'feat(tenant): add nullable Tenant principal schema (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
