name: tmp-webcall-pr2-lockfile-sync

on:
  push:
    branches:
      - feature/webcall-visitor-room-pr2

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/webcall-visitor-room-pr2
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Update package lock only
        run: |
          cd webapp
          npm install --package-lock-only --ignore-scripts
      - name: Remove temporary workflow and commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/tmp-webcall-pr2-lockfile-sync.yml
          git status --short
          git add webapp/package-lock.json .github/workflows/tmp-webcall-pr2-lockfile-sync.yml
          git commit -m "chore(webcall): update webapp lockfile for LiveKit client"
          git push origin HEAD:feature/webcall-visitor-room-pr2
