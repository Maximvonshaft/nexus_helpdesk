name: controlled-candidate-convergence

on:
  workflow_run:
    workflows:
      - Canonical Acceptance
    types:
      - completed

permissions: {}

concurrency:
  group: controlled-candidate-convergence-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  CANDIDATE_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  guard-main:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout accepted main commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require successful exact-main Canonical Acceptance
        env:
          SOURCE_SHA: ${{ env.CANDIDATE_SHA }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_RUN_URL: ${{ github.event.workflow_run.html_url }}
          TRIGGER_NAME: ${{ github.event.workflow_run.name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -Eeuo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$TRIGGER_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$TRIGGER_RUN_URL" =~ ^https://github\.com/ ]]
          test "$TRIGGER_NAME" = "Canonical Acceptance"
          test "$TRIGGER_EVENT" = "push"
          test "$TRIGGER_BRANCH" = "main"
          test "$TRIGGER_CONCLUSION" = "success"
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"

  build-assure-publish:
    needs: guard-main
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      SOURCE_SHA: ${{ env.CANDIDATE_SHA }}
      RC_SOURCE_SHA: ${{ env.CANDIDATE_SHA }}
      RC_ENV_FILE: deploy/.env.rc-test
      RC_EVIDENCE_DIR: artifacts/rc-test
      RC_FAILURE_DIR: artifacts/controlled-rc-failure
      ASSURANCE_FAILURE_DIR: artifacts/controlled-image-assurance-failure
      RC_RUN_BROWSER_SMOKE: "true"
      RC_BASE_URL: http://127.0.0.1:18083
      RC_PUBLIC_ORIGIN: http://127.0.0.1:18083
      COMPOSE_PROJECT_NAME: nexus_controlled_${{ github.run_id }}
      CANDIDATE_IMAGE: nexusdesk/helpdesk:rc-test-${{ env.CANDIDATE_SHA }}
      RELEASE_IMAGE_DIR: artifacts/release-image
      CONTROLLED_DIR: artifacts/controlled
      RC_POSTGRES_IMAGE_PIN: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
      RC_NGINX_IMAGE_PIN: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce exact current main
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install locked browser dependencies
        working-directory: webapp
        run: |
          set -Eeuo pipefail
          npm ci
          npx playwright install --with-deps chromium
          mkdir -p ../artifacts/release-image
          npm sbom --sbom-format=cyclonedx > ../artifacts/release-image/frontend.raw.cdx.json

      - name: Execute existing one-build RC chain
        id: controlled_rc
        run: |
          set +e
          run_log="${RUNNER_TEMP}/controlled-rc-run.log"
          rm -f "${run_log}"
          bash scripts/release/run_controlled_rc_gate.sh 2>&1 | tee "${run_log}"
          code=${PIPESTATUS[0]}
          set -e
          if [ "${code}" -ne 0 ]; then
            python scripts/release/capture_controlled_rc_failure.py \
              --capture \
              --log "${run_log}" \
              --evidence-dir "${RC_EVIDENCE_DIR}" \
              --exit-code "${code}"
          fi
          exit "${code}"

      - name: Validate and scan bounded RC failure evidence
        id: rc_failure_scan
        if: ${{ always() && steps.controlled_rc.outcome == 'failure' }}
        run: |
          set -Eeuo pipefail
          summary="${RC_EVIDENCE_DIR}/failure-summary.json"
          python scripts/release/capture_controlled_rc_failure.py --validate "${summary}"
          rm -rf "${RC_FAILURE_DIR}"
          mkdir -p "${RC_FAILURE_DIR}"
          cp "${summary}" "${RC_FAILURE_DIR}/failure-summary.json"
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "${RC_FAILURE_DIR}/artifact-scan.json" \
            "${RC_FAILURE_DIR}/failure-summary.json"
          test "$(jq -r '.status' "${RC_FAILURE_DIR}/artifact-scan.json")" = "pass"

      - name: Upload bounded RC failure evidence
        if: ${{ always() && steps.rc_failure_scan.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: controlled-rc-failure-${{ env.CANDIDATE_SHA }}
          path: artifacts/controlled-rc-failure
          retention-days: 14
          if-no-files-found: error

      - name: Verify runtime imports
        run: |
          set -Eeuo pipefail
          mkdir -p "$RELEASE_IMAGE_DIR"
          docker run --rm --entrypoint sh "$CANDIDATE_IMAGE" -c \
            'set -eu; python -c "import app.main, psycopg, cryptography, argon2"; gunicorn --check-config app.main:app' \
            > "$RELEASE_IMAGE_DIR/runtime-smoke-summary.txt" 2>&1

      - name: Scan same RC image with immutable Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: json
          output: artifacts/release-image/trivy.raw.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: "0"
          scanners: vuln

      - name: Generate same-image CycloneDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.CANDIDATE_IMAGE }}
          format: cyclonedx-json
          output-file: artifacts/release-image/image.raw.cdx.json
          upload-artifact: false

      - name: Evaluate image assurance and compliance
        id: image_assurance
        run: |
          set +e
          bash scripts/release/run_controlled_image_assurance.sh
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit "${code}"

      - name: Build and scan bounded image-assurance failure evidence
        id: assurance_failure_scan
        if: ${{ always() && steps.image_assurance.outcome == 'failure' }}
        env:
          ASSURANCE_EXIT_CODE: ${{ steps.image_assurance.outputs.exit_code }}
        run: |
          set -Eeuo pipefail
          rm -rf "${ASSURANCE_FAILURE_DIR}"
          mkdir -p "${ASSURANCE_FAILURE_DIR}"
          summary="${ASSURANCE_FAILURE_DIR}/failure-summary.json"
          python scripts/release/capture_controlled_image_assurance_failure.py \
            --capture \
            --release-image-dir "${RELEASE_IMAGE_DIR}" \
            --source-sha "${SOURCE_SHA}" \
            --exit-code "${ASSURANCE_EXIT_CODE:-1}" \
            --output "${summary}"
          python scripts/release/capture_controlled_image_assurance_failure.py --validate "${summary}"
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "${ASSURANCE_FAILURE_DIR}/artifact-scan.json" \
            "${summary}"
          test "$(jq -r '.status' "${ASSURANCE_FAILURE_DIR}/artifact-scan.json")" = "pass"

      - name: Upload bounded image-assurance failure evidence
        if: ${{ always() && steps.assurance_failure_scan.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: controlled-image-assurance-failure-${{ env.CANDIDATE_SHA }}
          path: artifacts/controlled-image-assurance-failure
          retention-days: 14
          if-no-files-found: error

      - name: Publish and pull back the assured binary
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: bash scripts/release/publish_controlled_image.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: controlled-build-${{ env.CANDIDATE_SHA }}
          path: |
            artifacts/rc-test
            artifacts/release-image
            artifacts/controlled
          retention-days: 30
          if-no-files-found: error

  recovery:
    needs: guard-main
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: nexus_recovery_admin
          POSTGRES_PASSWORD: nexus_recovery_admin
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_recovery_admin -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      SOURCE_APP_URL: postgresql+psycopg://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      SOURCE_NATIVE_URL: postgresql://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      RESTORE_APP_URL: postgresql+psycopg://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RESTORE_NATIVE_URL: postgresql://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RECOVERY_ADMIN_NATIVE_URL: postgresql://nexus_recovery_admin:nexus_recovery_admin@127.0.0.1:5432/postgres
      RECOVERY_ALLOW_DATABASE_RECREATE: I_UNDERSTAND
      QUALIFICATION_MARKER: QUAL-RCV-001
      RTO_TARGET_SECONDS: "120"
      RPO_TARGET_SECONDS: "60"
      EVIDENCE_ROOT: artifacts/recovery
      SOURCE_SHA: ${{ env.CANDIDATE_SHA }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install recovery dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Reuse repository recovery authority
        run: bash scripts/release/run_controlled_recovery_gate.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: controlled-recovery-${{ env.CANDIDATE_SHA }}
          path: artifacts/recovery/*.json
          retention-days: 30
          if-no-files-found: error

  bind-and-attest:
    needs: [guard-main, build-assure-publish, recovery]
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ env.CANDIDATE_SHA }}
      FINAL_DIR: artifacts/final-controlled-candidate
      CANONICAL_ACCEPTANCE_RUN_ID: ${{ github.event.workflow_run.id }}
      CANONICAL_ACCEPTANCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: controlled-build-${{ env.CANDIDATE_SHA }}
          path: artifacts/build

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: controlled-recovery-${{ env.CANDIDATE_SHA }}
          path: artifacts/recovery

      - name: Resolve immutable registry identity
        id: identity
        run: |
          set -Eeuo pipefail
          receipt=artifacts/build/controlled/registry-publish-receipt.json
          test "$(jq -r '.status' "$receipt")" = pass
          test "$(jq -r '.source_sha' "$receipt")" = "$SOURCE_SHA"
          image="$(jq -r '.registry_image' "$receipt")"
          digest="$(jq -r '.registry_digest' "$receipt")"
          local_id="$(jq -r '.local_image_id' "$receipt")"
          pulled_id="$(jq -r '.pulled_image_id' "$receipt")"
          [[ "$image" =~ ^ghcr\.io/[a-z0-9._/-]+$ ]]
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$local_id" = "$pulled_id"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "local_id=$local_id" >> "$GITHUB_OUTPUT"
          echo "pulled_id=$pulled_id" >> "$GITHUB_OUTPUT"

      - name: Authenticate GHCR for registry attestation
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Attest exact registry digest
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ steps.identity.outputs.image }}
          subject-digest: ${{ steps.identity.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Clear GHCR registry credentials
        if: ${{ always() }}
        run: docker logout ghcr.io

      - name: Build final evidence-bound candidate
        env:
          REGISTRY_IMAGE: ${{ steps.identity.outputs.image }}
          REGISTRY_DIGEST: ${{ steps.identity.outputs.digest }}
          LOCAL_IMAGE_ID: ${{ steps.identity.outputs.local_id }}
          PULLED_IMAGE_ID: ${{ steps.identity.outputs.pulled_id }}
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
        run: bash scripts/release/finalize_controlled_candidate.sh

      - name: Bind Canonical Acceptance and render deployment identity
        run: |
          set -Eeuo pipefail
          manifest="$FINAL_DIR/controlled-candidate-manifest.json"
          image="$(jq -r '.candidate.registry_reference' "$manifest")"
          digest="$(jq -r '.candidate.registry_digest' "$manifest")"
          [[ "$CANONICAL_ACCEPTANCE_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$CANONICAL_ACCEPTANCE_RUN_URL" =~ ^https://github\.com/ ]]
          jq -n \
            --arg source_sha "$SOURCE_SHA" \
            --arg run_id "$CANONICAL_ACCEPTANCE_RUN_ID" \
            --arg run_url "$CANONICAL_ACCEPTANCE_RUN_URL" \
            '{schema:"nexus.canonical-acceptance-receipt.v1",workflow:"Canonical Acceptance",event:"push",conclusion:"success",source_sha:$source_sha,run_id:($run_id|tonumber),run_url:$run_url}' \
            > "$FINAL_DIR/canonical-acceptance-receipt.json"
          cat > "$FINAL_DIR/controlled-candidate.env" <<EOF
          CONTROLLED_IMAGE=${image}
          IMAGE_TAG=${image}
          GIT_SHA=${SOURCE_SHA}
          FRONTEND_BUILD_SHA=$(jq -r '.candidate.frontend_build_sha' "$manifest")
          EXPECTED_MIGRATION_HEAD=$(jq -r '.candidate.migration_revision' "$manifest")
          BUILD_TIME=$(jq -r '.candidate.build_time' "$manifest")
          APP_VERSION=$(jq -r '.candidate.app_version' "$manifest")
          ACTIVATION_EVIDENCE_SOURCE_SHA=${SOURCE_SHA}
          ACTIVATION_EVIDENCE_IMAGE_DIGEST=${digest}
          EOF
          rm -f "$FINAL_DIR/artifact-scan.json"
          python scripts/release/scan_controlled_candidate_artifacts.py \
            --root . \
            --output "$FINAL_DIR/artifact-scan.json" \
            "$FINAL_DIR"/*.json
          test "$(jq -r '.status' "$FINAL_DIR/artifact-scan.json")" = pass

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: controlled-candidate-${{ env.CANDIDATE_SHA }}
          path: artifacts/final-controlled-candidate
          retention-days: 30
          if-no-files-found: error

      - name: Publish bounded summary
        run: |
          set -Eeuo pipefail
          manifest="$FINAL_DIR/controlled-candidate-manifest.json"
          echo '## Controlled candidate published' >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`$(jq -r '.candidate.source_sha' "$manifest")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`$(jq -r '.candidate.registry_reference' "$manifest")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migration: \`$(jq -r '.candidate.migration_revision' "$manifest")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Canonical Acceptance: \`#${CANONICAL_ACCEPTANCE_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo '- Controlled deployment performed: `false`' >> "$GITHUB_STEP_SUMMARY"
          echo '- External effects authorized: `false`' >> "$GITHUB_STEP_SUMMARY"
