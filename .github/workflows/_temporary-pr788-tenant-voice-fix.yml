name: Temporary PR 788 Tenant Voice Fix

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: pr788-tenant-voice-fix
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.number == 788 && github.event.pull_request.head.ref == 'delivery/canonical-routing-final-a31f6c'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: true
          ref: delivery/canonical-routing-final-a31f6c
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Apply tenant-safe voice fix
        run: |
          git rev-parse HEAD > /tmp/pr788-start-sha
          python scripts/_pr788_tenant_voice_fix.py
          python -m compileall -q backend/app
      - name: Run focused tenant and voice regression
        run: |
          python -m pytest -q \
            backend/tests/test_ticketless_voice_ticket_binding.py \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py \
            backend/tests/test_tenant_authority.py
      - name: Commit clean candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/pr788-start-sha)"
          git fetch --no-tags origin delivery/canonical-routing-final-a31f6c
          test "$(git rev-parse origin/delivery/canonical-routing-final-a31f6c)" = "$start_sha"
          git rm scripts/_pr788_tenant_voice_fix.py
          git rm .github/workflows/_temporary-pr788-tenant-voice-fix.yml
          git add -A
          test -z "$(find .github/workflows -maxdepth 1 -type f -name '_temporary-*' -print)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: stamp lazy voice tickets with verified tenant'
          git push origin HEAD:delivery/canonical-routing-final-a31f6c
