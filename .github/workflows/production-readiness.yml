name: production-readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  production-readiness-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: cd backend && alembic upgrade head

      - name: Strict production readiness check
        env:
          APP_ENV: production
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          SECRET_KEY: ci-production-readiness-secret-long-enough
          ALLOWED_ORIGINS: https://helpdesk.example.test
          WEBCHAT_ALLOWED_ORIGINS: https://customer.example.test
          STORAGE_BACKEND: s3
          S3_BUCKET: ci-placeholder-bucket
          S3_REGION: auto
          S3_ACCESS_KEY: ci-placeholder-access-key
          S3_SECRET_KEY: ci-placeholder-secret-key
          OPENCLAW_DEPLOYMENT_MODE: remote_gateway
          OPENCLAW_TRANSPORT: mcp
          OPENCLAW_MCP_URL: wss://openclaw.example.invalid/mcp
          OPENCLAW_MCP_TOKEN_FILE: /tmp/openclaw_mcp_token
          OPENCLAW_CLI_FALLBACK_ENABLED: "false"
          WEBCHAT_ALLOW_LEGACY_TOKEN_TRANSPORT: "false"
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ack
          METRICS_ENABLED: "false"
        run: |
          printf 'ci-placeholder-openclaw-token' > /tmp/openclaw_mcp_token
          chmod 600 /tmp/openclaw_mcp_token
          cd backend && python scripts/validate_production_readiness.py
