name: Temporary PR 785 Finalizer

on:
  push:
    branches:
      - feat/conversation-first-agent-routing-final

permissions:
  contents: write

concurrency:
  group: pr785-finalizer
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout exact remote branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing-final

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Rebuild canonical single-commit candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(git rev-parse HEAD)"
          printf '%s' "$start_sha" > /tmp/pr785-start-sha
          candidate='de2bf34057bb5876d9c30d6ba5d302c35cd9167d'
          voice_authority='ea65c07f6b3179b4bbd589fa658b13ca5395c25b'
          main='2589bcccc631d26aff589f07a91b33914b24413e'
          git cat-file -e "${candidate}^{commit}"
          git cat-file -e "${voice_authority}^{commit}"
          git cat-file -e "${main}^{commit}"
          git reset --hard "$candidate"

          # Keep the proven conversation-first implementation, but restore the
          # canonical voice boundary required by the existing ticket-addressed
          # operator voice APIs. Text chat remains ticketless.
          git show "${voice_authority}:backend/app/api/webchat_voice.py" \
            > backend/app/api/webchat_voice.py
          git show "${voice_authority}:backend/app/services/conversation_first_service.py" \
            > backend/app/services/conversation_first_service.py
          git show "${voice_authority}:backend/app/services/agent_availability_service.py" \
            > backend/app/services/agent_availability_service.py
          git show "${voice_authority}:backend/tests/test_ticketless_voice_ticket_binding.py" \
            > backend/tests/test_ticketless_voice_ticket_binding.py
          git show "${voice_authority}:backend/tests/test_webchat_voice_api.py" \
            > backend/tests/test_webchat_voice_api.py

          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(text: str, old: str, new: str, *, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          # Move current-customer queue position into the sole core executor.
          core_path = Path('backend/app/services/nexus_osr/tool_execution_service_core.py')
          core = core_path.read_text(encoding='utf-8')
          core = replace_once(
              core,
              'from ...webchat_models import WebchatConversation\n',
              'from ...webchat_models import WebchatConversation, WebchatHandoffRequest\n',
              label='tool core import',
          )
          handler_anchor = core.index('def _production_handlers(')
          call_start = core.index('        summary = availability_summary(\n', handler_anchor)
          call_end = core.index('        return ActionExecutionResult(\n', call_start)
          core = core[:call_start] + '''        request_row = (
              db.get(WebchatHandoffRequest, current.current_handoff_request_id)
              if current.current_handoff_request_id is not None
              else None
          )
          if request_row is not None and request_row.conversation_id != current.id:
              request_row = None
          summary = availability_summary(
              db,
              tenant_key=control.tenant_key,
              country_code=control.country_code,
              channel_key=control.channel_key,
              request_row=request_row,
          )
''' + core[call_end:]
          summary_start = core.index('def _availability_customer_summary(')
          summary_end = core.index('\n\ndef _decision_for_policy_gate(', summary_start)
          summary_impl = dedent('''
          def _availability_customer_summary(summary: dict[str, Any]) -> str:
              online = int(summary.get("online_agents") or 0)
              available = int(summary.get("available_capacity") or 0)
              queued = int(summary.get("queue_count") or 0)
              raw_position = summary.get("queue_position")
              position = int(raw_position) if isinstance(raw_position, int) else None
              if online <= 0:
                  return "No human support agent is currently online."
              if available > 0:
                  return (
                      "Human support is available with "
                      f"{available} open conversation slot(s)."
                  )
              if position is not None and position > 0:
                  ahead = max(0, position - 1)
                  if ahead == 0:
                      return (
                          "Human support is currently at capacity. "
                          "This customer is next in the eligible queue."
                      )
                  return (
                      "Human support is currently at capacity with "
                      f"{ahead} conversation(s) ahead of this customer."
                  )
              return (
                  "Human support is currently at capacity with "
                  f"{queued} conversation(s) waiting."
              )
          ''').strip()
          core = core[:summary_start] + summary_impl + core[summary_end:]
          core_path.write_text(core, encoding='utf-8')

          # Public authority is a thin, stable import surface; it does not own a
          # second handler or mutate the private executor.
          Path('backend/app/services/nexus_osr/tool_execution_service.py').write_text(
              dedent('''\
              """Public governed tool-execution authority.

              The private core owns the single executor, handler registry, policy,
              audit and idempotency implementation. This module is the stable public
              import path and does not mutate imported modules.
              """

              from __future__ import annotations

              from . import tool_execution_service_core as _core
              from .tool_execution_service_core import *  # noqa: F401,F403

              _production_handlers = _core._production_handlers
              _availability_customer_summary = _core._availability_customer_summary


              def __getattr__(name: str):
                  return getattr(_core, name)
              '''),
              encoding='utf-8',
          )

          # Prove the text conversation is initially ticketless and the first
          # human voice request lazily creates exactly one canonical Ticket.
          voice_path = Path('backend/tests/test_webchat_voice_api.py')
          voice = voice_path.read_text(encoding='utf-8')
          start = voice.index(
              'def test_public_create_voice_session_binds_conversation_without_ticket():'
          )
          end = voice.index(
              '\n\ndef test_public_create_voice_session_rejects_invalid_token():',
              start,
          )
          replacement = dedent('''
          def test_public_create_voice_session_lazily_binds_canonical_ticket():
              client = TestClient(app)
              conversation_id, visitor_token, ticket_id = _create_webchat_conversation(
                  client,
                  create_ticket=False,
              )
              assert ticket_id is None

              created = client.post(
                  f"/api/webchat/conversations/{conversation_id}/voice/sessions",
                  headers={"X-Webchat-Visitor-Token": visitor_token},
                  json={"locale": "de-CH", "recording_consent": False},
              )

              assert created.status_code == 200, created.text
              payload = created.json()
              assert payload["ok"] is True
              assert payload["voice_session_id"].startswith("wv_")
              assert payload["provider"] == "mock"
              assert payload["status"] == "ringing"
              assert payload["voice_page_url"].endswith(payload["voice_session_id"])
              assert payload["participant_token"].startswith("mock_voice_token_")
              assert "ticket_id" not in payload
              assert payload["recording_status"] == "disabled"
              assert payload["transcript_status"] == "disabled"
              assert payload["summary_status"] == "pending"

              db = SessionLocal()
              try:
                  row = (
                      db.query(WebchatVoiceSession)
                      .filter(WebchatVoiceSession.public_id == payload["voice_session_id"])
                      .one()
                  )
                  conversation = (
                      db.query(WebchatConversation)
                      .filter(WebchatConversation.public_id == conversation_id)
                      .one()
                  )
                  assert row.ticket_id is not None
                  assert conversation.ticket_id == row.ticket_id
                  assert row.provider == "mock"
                  events = (
                      db.query(WebchatEvent)
                      .filter(
                          WebchatEvent.conversation_id == row.conversation_id,
                          WebchatEvent.ticket_id == row.ticket_id,
                      )
                      .all()
                  )
                  event_types = {event.event_type for event in events}
                  assert "voice.session.created" in event_types
                  assert "voice.session.ringing" in event_types
              finally:
                  db.close()
          ''').strip()
          voice_path.write_text(voice[:start] + replacement + voice[end:], encoding='utf-8')
          PY

      - name: Run focused regression
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_agent_routing_scope_fifo.py \
            backend/tests/test_ticketless_resume_projection.py \
            backend/tests/test_ticketless_support_scope_isolation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py

      - name: Publish clean one-commit candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/pr785-start-sha)"
          git fetch --no-tags origin feat/conversation-first-agent-routing-final
          test "$(git rev-parse origin/feat/conversation-first-agent-routing-final)" = "$start_sha"
          git add -A
          git diff --cached --check
          git reset --soft 2589bcccc631d26aff589f07a91b33914b24413e
          git add -A
          test -z "$(find .github -maxdepth 2 -type f -name '*pr785*' -print)"
          test -z "$(find .github/workflows -maxdepth 1 -type f -name '_temporary-*' -print)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '[P0] Deliver conversation-first governed agent routing'
          git push origin HEAD:feat/conversation-first-agent-routing-final \
            --force-with-lease=refs/heads/feat/conversation-first-agent-routing-final:$start_sha
