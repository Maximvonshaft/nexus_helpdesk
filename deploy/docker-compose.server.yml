x-app-image: &app_image
  image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
  env_file:
    - .env.prod
  environment: &app_env
    APP_ENV: production
    AUTO_INIT_DB: "false"
    SEED_DEMO_DATA: "false"
    OPENCLAW_DEPLOYMENT_MODE: remote_gateway
    OPENCLAW_TRANSPORT: mcp
    OPENCLAW_CLI_FALLBACK_ENABLED: "false"
    REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    DB_SLOW_QUERY_MS: ${DB_SLOW_QUERY_MS:-500}
    GIT_SHA: ${GIT_SHA:-unknown}
    BUILD_TIME: ${BUILD_TIME:-unknown}
    IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    APP_VERSION: ${APP_VERSION:-server}
    FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
  volumes: &app_volumes
    - /run/secrets:/run/secrets:ro
    - /opt/nexus_helpdesk/deploy/runtime_secrets/openclaw_responses_token:/run/openclaw_responses_token:ro
    - /opt/nexus_helpdesk/deploy/runtime_secrets/openclaw_native_responses_token:/run/openclaw_native_responses_token:ro
    - ../data/uploads:/app/backend/uploads
  logging: &json_logging
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  restart: unless-stopped

x-worker-healthcheck: &worker_healthcheck
  test:
    - CMD-SHELL
    - "python -c \"from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_worker.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('worker-ok')\""
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  postgres:
    logging: *json_logging
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexusdesk} -d $${POSTGRES_DB:-nexusdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    logging: *json_logging
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
        APP_VERSION: ${APP_VERSION:-server}
        FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
    image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    env_file:
      - .env.prod
    environment:
      <<: *app_env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-30}
    volumes: *app_volumes
    ports:
      - "127.0.0.1:18081:8080"
    command:
      - /bin/sh
      - -c
      - >-
        exec gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        --workers "$${WEB_CONCURRENCY:-2}"
        --timeout "$${WEB_TIMEOUT:-30}"
        --bind 0.0.0.0:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker-outbound:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-outbound --queue outbound
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-background:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-background --queue background
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-handoff-snapshot:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-handoff-snapshot --queue handoff-snapshot
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-webchat-ai:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-webchat-ai --queue webchat-ai
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-openclaw-inbound:
    <<: *app_image
    profiles:
      - openclaw-inbound
    command: python scripts/run_worker.py --worker-id worker-openclaw-inbound --queue openclaw-inbound
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  legacy-worker:
    <<: *app_image
    profiles:
      - legacy-worker
    command: python scripts/run_worker.py --worker-id worker-main --queue all
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  sync-daemon:
    <<: *app_image
    profiles:
      - openclaw
    command: python scripts/run_openclaw_sync_daemon.py --worker-id worker-openclaw-sync
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_openclaw_sync_daemon.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('openclaw-sync-daemon-ok')"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  event-daemon:
    <<: *app_image
    profiles:
      - openclaw
    environment:
      <<: *app_env
      OPENCLAW_EVENT_DRIVER_ENABLED: "true"
    command: python scripts/run_openclaw_event_daemon.py
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_openclaw_event_daemon.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('openclaw-event-daemon-ok')"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    profiles: ["edge-nginx"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
