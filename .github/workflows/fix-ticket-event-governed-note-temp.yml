name: fix-ticket-event-governed-note-temp

on:
  pull_request:
    paths:
      - .github/workflows/fix-ticket-event-governed-note-temp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/ticket-event-governed-note.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest

      - name: Restore fail-closed governed internal-note evidence
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          classifier = Path('backend/app/services/ticket_event_classification.py')
          source = classifier.read_text(encoding='utf-8')
          replacements = [
              (
                  '''def _internal_note_evidence(\n    *,\n    field_name: str,\n    payload: Mapping[str, Any],\n) -> TicketEventClass:\n''',
                  '''def _internal_note_evidence(\n    *,\n    field_name: str,\n    payload: Mapping[str, Any],\n) -> TicketEventClass | None:\n''',
              ),
              (
                  '''    if candidates:\n        return next(iter(candidates))\n    return TicketEventClass.INTERNAL_AUDIT\n''',
                  '''    return next(iter(candidates)) if candidates else None\n''',
              ),
              (
                  '''            if event_type is EventType.field_updated:\n                raise TicketEventClassificationError(\n                    "ticket_event_field_update_unclassified"\n                )\n        elif governed is not evidence:\n''',
                  '''            if event_type is EventType.field_updated:\n                raise TicketEventClassificationError(\n                    "ticket_event_field_update_unclassified"\n                )\n            if event_type is EventType.internal_note_added:\n                raise TicketEventClassificationError(\n                    "ticket_event_internal_note_evidence_missing"\n                )\n        elif governed is not evidence:\n''',
              ),
              (
                  '''    if event_type is EventType.internal_note_added:\n        return _internal_note_evidence(\n            field_name=normalized_field,\n            payload=source,\n        )\n''',
                  '''    if event_type is EventType.internal_note_added:\n        evidence = _internal_note_evidence(\n            field_name=normalized_field,\n            payload=source,\n        )\n        return evidence or TicketEventClass.INTERNAL_AUDIT\n''',
              ),
          ]
          for old, new in replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'classifier source drift for replacement: {old[:80]!r}')
              source = source.replace(old, new)
          classifier.write_text(source, encoding='utf-8')

          tests = Path('backend/tests/test_ticket_event_classification.py')
          test_source = tests.read_text(encoding='utf-8')
          old_name = 'def test_governed_internal_notes_use_event_type_default_and_specialized_evidence() -> None:'
          new_name = 'def test_governed_internal_notes_require_evidence_and_accept_specialized_evidence() -> None:'
          if test_source.count(old_name) != 1:
              raise SystemExit('governed internal-note test name drifted')
          test_source = test_source.replace(old_name, new_name)
          old_assert = '''    assert resolve_ticket_event_class(\n        EventType.internal_note_added,\n        payload={**base, "event_class": "internal_audit"},\n    ) is TicketEventClass.INTERNAL_AUDIT\n'''
          new_assert = '''    with pytest.raises(\n        TicketEventClassificationError,\n        match="internal_note_evidence_missing",\n    ):\n        resolve_ticket_event_class(\n            EventType.internal_note_added,\n            payload={**base, "event_class": "internal_audit"},\n        )\n'''
          if test_source.count(old_assert) != 1:
              raise SystemExit('governed no-evidence assertion drifted')
          test_source = test_source.replace(old_assert, new_assert)
          old_conflict = 'payload={**base, "event_class": conflicting_class},'
          new_conflict = 'payload={**base, "event_class": conflicting_class, "note_id": 43},'
          if test_source.count(old_conflict) != 1:
              raise SystemExit('internal-note conflict loop drifted')
          test_source = test_source.replace(old_conflict, new_conflict)
          tests.write_text(test_source, encoding='utf-8')
          PY

      - name: Verify classifier, repair and current AI events
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/services/ticket_event_classification.py \
            backend/tests/test_ticket_event_classification.py
          pytest -q \
            backend/tests/test_ticket_event_classification.py \
            backend/tests/test_ticket_event_repair.py \
            backend/tests/test_ticket_event_writer.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_ai_decision_runtime.py
          git diff --check

      - name: Commit verified non-workflow correction
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git add \
            backend/app/services/ticket_event_classification.py \
            backend/tests/test_ticket_event_classification.py
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" = "2"
          git config user.name 'nexus-osr-ticket-event-bot'
          git config user.email 'nexus-osr-ticket-event-bot@users.noreply.github.com'
          git commit -m 'fix(audit): reject governed internal notes without evidence (#566)'
          git push origin HEAD:"${HEAD_BRANCH}"
