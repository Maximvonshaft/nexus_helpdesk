name: tenant-runtime-source-snapshot-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-runtime-source-snapshot-temp.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create byte-complete source snapshot
        run: |
          set -Eeuo pipefail
          archive="${RUNNER_TEMP}/tenant-runtime-source.tar.gz"
          checksum="${RUNNER_TEMP}/tenant-runtime-source.sha256"
          tar --exclude=.git -czf "${archive}" .
          test -s "${archive}"
          sha256sum "${archive}" > "${checksum}"

      - name: Upload temporary source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-runtime-source-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ${{ runner.temp }}/tenant-runtime-source.tar.gz
            ${{ runner.temp }}/tenant-runtime-source.sha256
          if-no-files-found: error
          retention-days: 1
