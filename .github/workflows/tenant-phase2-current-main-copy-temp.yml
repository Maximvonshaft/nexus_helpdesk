name: tenant-phase2-current-main-copy-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase2-current-main-copy-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase2-current-main-copy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  copy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend:scripts/qualification/tenant
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase2-current-main.db
      AUTO_INIT_DB: 'false'
      SEED_DEMO_DATA: 'false'
      SOURCE_SHA: 98269a481dd8822f2a8eed235e01a46b5c425a6c
    steps:
      - name: Checkout current-main delivery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Fetch exact verified Phase 2 source
        run: |
          set -Eeuo pipefail
          git fetch --no-tags --depth=1 origin "${SOURCE_SHA}"
          test "$(git rev-parse FETCH_HEAD)" = "${SOURCE_SHA}"
          for path in \
            docs/architecture/tenant-principal-migration.md \
            scripts/qualification/tenant/tenant_principal_backfill.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/tenant_principal_resolution.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          do
            mkdir -p "$(dirname "${path}")"
            git show "${SOURCE_SHA}:${path}" > "${path}"
          done
          git diff --check

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Verify copied current-main implementation
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/tenant/tenant_principal_resolution.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py
          pytest -q \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py

      - name: Remove bootstrap and commit six formal files
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/tenant-phase2-current-main-copy-temp.yml
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/tenant-phase2-current-main-copy-temp.yml',
              'docs/architecture/tenant-principal-migration.md',
              'scripts/qualification/tenant/tenant_principal_backfill.py',
              'scripts/qualification/tenant/tenant_principal_preflight.py',
              'scripts/qualification/tenant/tenant_principal_resolution.py',
              'scripts/qualification/tenant/test_tenant_principal_backfill.py',
              'scripts/qualification/tenant/test_tenant_principal_preflight.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'feat(tenant): add bounded principal backfill on current main (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
