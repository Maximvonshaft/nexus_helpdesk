name: tenant-phase3a-rc-apply-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase3a-rc-apply-temp.yml
      - .github/patches/tenant-phase3a-rc-fix.patch.gz.b64
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase3a-rc-apply-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase3a-rc-apply.db
      WEBCHAT_RATE_LIMIT_BACKEND: memory
      AUTO_INIT_DB: 'false'
      SEED_DEMO_DATA: 'false'
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio pyyaml

      - name: Decode and apply verified repair
        run: |
          set -Eeuo pipefail
          archive="${RUNNER_TEMP}/tenant-phase3a-rc-fix.patch.gz"
          patch="${RUNNER_TEMP}/tenant-phase3a-rc-fix.patch"
          base64 --decode .github/patches/tenant-phase3a-rc-fix.patch.gz.b64 > "${archive}"
          test "$(sha256sum "${archive}" | awk '{print $1}')" = "64b329dbda32ac23cbbe32dfbacf0b206426fda01edacc0013214d5003e3a648"
          gzip -dc "${archive}" > "${patch}"
          test "$(sha256sum "${patch}" | awk '{print $1}')" = "4ae49144056b6da6ea40608fc08288f67c173573bf67f2b3e29cf3c3d6b300a8"
          test "$(grep -c '^diff --git ' "${patch}")" = "15"
          git apply --check --whitespace=error-all "${patch}"
          git apply --index --whitespace=error-all "${patch}"

      - name: Verify syntax YAML and shell
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/settings.py \
            backend/app/services/tenant_authority.py \
            backend/app/services/permissions.py \
            backend/app/services/ticket_service.py \
            backend/app/services/lite_service.py \
            backend/app/services/lite_pagination.py \
            backend/app/services/webchat_service.py \
            backend/app/services/support_conversation_scope.py \
            backend/app/api/support_conversations.py \
            scripts/release/seed_rc_test_data.py \
            scripts/release/generate_rc_test_env.py
          bash -n scripts/release/run_rc_test_candidate.sh
          python - <<'PY'
          import yaml
          from pathlib import Path
          yaml.safe_load(Path('.github/workflows/tenant-runtime-authority-gate.yml').read_text(encoding='utf-8'))
          PY

      - name: Verify existing authority contracts
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_tenant_runtime_authority.py \
            backend/tests/test_lite_cases_pagination.py \
            backend/tests/test_ticket_search_query.py \
            backend/tests/test_ticket_detail_summary.py \
            backend/tests/test_ticket_timeline_pagination.py \
            backend/tests/test_production_hardening_permissions.py \
            backend/tests/test_production_settings_contract.py \
            backend/tests/test_settings.py

      - name: Verify WebChat Support and RC repair contracts
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_support_conversations_rbac.py \
            backend/tests/test_support_conversations_api.py \
            scripts/release/tests/test_seed_rc_test_data_contract.py \
            scripts/release/tests/test_generate_rc_test_env.py \
            scripts/release/tests/test_validate_rc_test_manifest.py

      - name: Verify staged repair whitespace
        run: git diff --cached --check

      - name: Remove transfer files and commit formal repair
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          git restore --staged --worktree .github/workflows/tenant-runtime-authority-gate.yml
          rm -f \
            .github/workflows/tenant-phase3a-rc-apply-temp.yml \
            .github/patches/tenant-phase3a-rc-fix.patch.gz.b64
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/tenant-phase3a-rc-source-temp.yml',
              '.github/workflows/tenant-phase3a-rc-apply-temp.yml',
              '.github/patches/tenant-phase3a-rc-fix.patch.gz.b64',
              'backend/app/api/support_conversations.py',
              'backend/app/services/support_conversation_scope.py',
              'backend/app/services/webchat_service.py',
              'backend/tests/test_support_conversations_rbac.py',
              'backend/tests/test_webchat_public_tenant_binding.py',
              'deploy/.env.rc-test.example',
              'docs/architecture/tenant-principal-migration.md',
              'scripts/release/generate_rc_test_env.py',
              'scripts/release/run_rc_test_candidate.sh',
              'scripts/release/seed_rc_test_data.py',
              'scripts/release/tests/test_generate_rc_test_env.py',
              'scripts/release/tests/test_seed_rc_test_data_contract.py',
              'scripts/release/tests/test_validate_rc_test_manifest.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): bind public WebChat and RC operator authority (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
