name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest || true

      - name: Compile backend
        run: python -m compileall backend/app backend/scripts

      - name: Run tests when present
        run: |
          if find backend tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null | grep -q .; then
            pytest
          else
            echo 'No pytest tests found; compile/import gate only.'
          fi

      - name: Production readiness import check
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///./helpdesk_ci.db
        run: cd backend && python scripts/validate_production_readiness.py || true
