  rule: >
    This is the sole repository rationalization ledger. It records physical
    retirement and delegates product, transport, authorization and visual
    authority to their canonical implementations; it does not define a second
    product, design system or GitHub Actions execution chain.
verification:
  entrypoint: python scripts/verify_repository.py
  static_entrypoint: python scripts/verify_repository.py --static-only
  frontend_entrypoint: cd webapp && npm run verify
  browser_entrypoint: cd webapp && npm run e2e
  github_actions: retired_and_absent
  exact_head_status: verified
canonical_authorities:
  operator_product: webapp
  application_shell: webapp/src/app/AppShell.tsx
  navigation: webapp/src/app/navigation.ts
  http_transport: webapp/src/lib/apiClient.ts
  ui_framework: '@mui/material@9.2.0'
  icon_framework: '@mui/icons-material@9.2.0'
  mui_theme: webapp/src/theme/nexusTheme.ts
  theme_provider: webapp/src/theme/NexusThemeProvider.tsx
  operator_presentation: webapp/src/app/OperatorPresentation.tsx
  operational_status: webapp/src/domain/operationalPresentation.ts
  backend_policy: backend/app/services/permissions.py
  visibility_scope: backend/app/services/scope_permissions.py
  canonical_hrefs: backend/app/services/canonical_route_projection.py
deletion_slices:
