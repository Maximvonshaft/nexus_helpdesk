name: tenant-phase2-contract-gate-temp

on:
  pull_request:
    paths:
      - .github/patches/tenant-phase2-contract-gate.patch.gz.b64
      - .github/workflows/tenant-phase2-contract-gate-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase2-contract-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend:scripts/qualification/tenant
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase2-contract.db
      AUTO_INIT_DB: 'false'
      SEED_DEMO_DATA: 'false'
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Verify and apply exact contract patch
        run: |
          set -Eeuo pipefail
          test "$(git hash-object .github/workflows/tenant-principal-backfill-gate.yml)" = "aed19b2ea541a416d6f730644f442ca808073fb9"
          test "$(git hash-object docs/architecture/tenant-principal-migration.md)" = "48c58cb37a39cbc29caf88f2a0257548f14e434a"
          base64 --decode .github/patches/tenant-phase2-contract-gate.patch.gz.b64 > "${RUNNER_TEMP}/contract.patch.gz"
          test "$(sha256sum "${RUNNER_TEMP}/contract.patch.gz" | awk '{print $1}')" = "8af7b682ee1497b2282d3eef44aefc425316de8ecf4f3478004be1bba8f1f678"
          gzip --decompress --stdout "${RUNNER_TEMP}/contract.patch.gz" > "${RUNNER_TEMP}/contract.patch"
          test "$(sha256sum "${RUNNER_TEMP}/contract.patch" | awk '{print $1}')" = "25bef2403eaeb32efcd1d579e21723dc0710c71d697c24c7d5087bc08e117d00"
          test "$(grep -c '^diff --git ' "${RUNNER_TEMP}/contract.patch")" = "2"
          git apply --check --whitespace=error-all "${RUNNER_TEMP}/contract.patch"
          git apply --whitespace=error-all "${RUNNER_TEMP}/contract.patch"
          git diff --check

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Re-run Tenant qualification contracts
        run: |
          set -Eeuo pipefail
          pytest -q \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py

      - name: Remove transfer files and commit formal contract
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/patches/tenant-phase2-contract-gate.patch.gz.b64 \
            .github/workflows/tenant-phase2-contract-gate-temp.yml
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/patches/tenant-phase2-contract-gate.patch.gz.b64',
              '.github/workflows/tenant-phase2-contract-gate-temp.yml',
              '.github/workflows/tenant-principal-backfill-gate.yml',
              'docs/architecture/tenant-principal-migration.md',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'test(tenant): verify committed backfill receipts (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
