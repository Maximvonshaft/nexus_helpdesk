name: knowledge-runtime-eval

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/app/services/knowledge_runtime_v2/**"
      - "backend/app/services/knowledge_retrieval_service.py"
      - "backend/app/services/ai_runtime_context.py"
      - "backend/app/services/tracking_fact_service.py"
      - "backend/app/api/webchat.py"
      - "backend/app/services/webchat_runtime_ai_service.py"
      - "backend/app/models_control_plane.py"
      - "backend/app/settings.py"
      - "backend/alembic/versions/*knowledge_runtime*"
      - "backend/scripts/run_knowledge_eval.py"
      - "backend/tests/fixtures/knowledge_eval_cases.json"
      - ".github/workflows/knowledge-runtime-eval.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/services/knowledge_runtime_v2/**"
      - "backend/app/services/knowledge_retrieval_service.py"
      - "backend/app/services/ai_runtime_context.py"
      - "backend/app/services/tracking_fact_service.py"
      - "backend/app/api/webchat.py"
      - "backend/app/services/webchat_runtime_ai_service.py"
      - "backend/app/models_control_plane.py"
      - "backend/app/settings.py"
      - "backend/alembic/versions/*knowledge_runtime*"
      - "backend/scripts/run_knowledge_eval.py"
      - "backend/tests/fixtures/knowledge_eval_cases.json"
      - ".github/workflows/knowledge-runtime-eval.yml"

permissions:
  contents: read

jobs:
  eval:
    name: knowledge-runtime-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Knowledge Runtime eval
        env:
          PYTHONPATH: backend
          APP_ENV: test
          KNOWLEDGE_RUNTIME_VERSION: v2
          KNOWLEDGE_EMBEDDINGS_ENABLED: "true"
          KNOWLEDGE_EMBEDDING_PROVIDER: deterministic_hash
        run: |
          python backend/scripts/run_knowledge_eval.py \
            --min-recall-at-5 1.0 \
            --max-hallucination-rate 0 \
            --max-unsupported-answer-rate 0 \
            --min-handoff-correctness 1.0
