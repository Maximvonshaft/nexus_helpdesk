name: frontend-convergence-gate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - frontend/**
      - webapp/**
      - .github/workflows/frontend-convergence-gate.yml

permissions:
  contents: read

concurrency:
  group: frontend-convergence-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  exact-head-single-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact checkout identity
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install locked dependencies
        working-directory: webapp
        run: npm ci

      - name: Verify single frontend and browser behavior
        working-directory: webapp
        run: |
          set -Eeuo pipefail
          npm run architecture 2>&1 | tee frontend-architecture.log
          npm test
          npm run typecheck
          npm run lint
          npm run build
          npm run size-report
          npx playwright install --with-deps chromium
          npm run e2e

      - name: Verify bounded exact diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --check "${BASE_SHA}"...HEAD

      - name: Upload exact-head audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-convergence-audit
          path: |
            webapp/frontend-architecture.log
            webapp/playwright-report
            webapp/test-results
          if-no-files-found: ignore
          retention-days: 14
