deletion_slices:
  - id: github_actions_full_retirement
    disposition: SUPERSEDED_DELETE
    state: deleted_on_canonical_branch
    paths:
      - .github/workflows
      - config/governance/actions-authority.v1.json
      - config/governance/release-candidate-preconditions.v1.json
      - scripts/ci/actions_authority_inventory.py
      - scripts/release/exact_main_candidate_preconditions.py
      - docs/superpowers/plans/2026-07-14-actions-authority-convergence.md
    replacement: scripts/verify_repository.py
  - id: duplicate_frontend_products
    disposition: SUPERSEDED_DELETE
    state: deleted_on_canonical_branch
    paths:
      - frontend
      - webapp/src/features/support-console
      - webapp/src/lib/api.ts
    replacement:
      - webapp/src/app/AppShell.tsx
      - webapp/src/features/operator-workspace
      - webapp/src/lib/apiClient.ts
  - id: duplicate_design_system
    disposition: DUPLICATE_DELETE
    state: deleted_on_canonical_branch
    paths:
      - webapp/src/shared/ui
      - webapp/src/shared/api
      - webapp/src/components/ui
      - webapp/src/styles/tokens.css
      - webapp/src/styles/components.css
    replacement:
      - '@mui/material@9.2.0'
      - webapp/src/theme/nexusTheme.ts
      - webapp/src/theme/NexusThemeProvider.tsx
      - webapp/src/app/OperatorPresentation.tsx
  - id: duplicate_workspace_presentation
    disposition: DUPLICATE_DELETE
    state: deleted_on_canonical_branch
    paths:
      - webapp/src/features/operator-workspace/OperatorWorkspaceCommon.tsx
      - inline ActionPanel in webapp/src/features/operator-workspace/OperatorWorkspacePage.tsx
      - route-private FullPageBoundary and WorkspaceLoading implementations
      - page-private TechnicalDisclosure and StatusCount implementations
    replacement:
      - webapp/src/app/OperatorPresentation.tsx
      - webapp/src/lib/format.ts
      - webapp/src/features/operator-workspace/OperatorWorkspaceActions.tsx
      - webapp/src/features/operator-workspace/operatorWorkspaceState.ts
  - id: unreachable_frontend_modules
    disposition: DEAD_DELETE
    state: deleted_on_canonical_branch
    paths:
      - webapp/src/components/ui/Card.tsx
      - webapp/src/components/ui/DataTable.tsx
      - webapp/src/components/ui/GuidedWorkflow.tsx
      - webapp/src/components/ui/KeyValue.tsx
      - webapp/src/components/ui/MetricCard.tsx
      - webapp/src/components/ui/SegmentedControl.tsx
      - webapp/src/components/ui/Skeleton.tsx
      - webapp/src/components/ui/Toast.tsx
      - webapp/src/hooks/useAutoRefresh.ts
      - webapp/src/lib/cn.ts
      - webapp/src/lib/outboundChannels.ts
      - webapp/src/lib/uxCopy.ts
      - webapp/src/lib/webchatRealtime.ts
      - webapp/src/lib/webchatVoiceTypes.ts
  - id: duplicate_knowledge_surface
    disposition: DUPLICATE_DELETE
    state: deleted_on_canonical_branch
    paths:
      - webapp/src/features/knowledge/KnowledgeReadOnlyPage.tsx
    replacement:
      - webapp/src/features/knowledge/KnowledgePage.tsx
  - id: provider_and_support_parallel_authority
    disposition: CONSOLIDATE_IN_PLACE
    state: implemented_and_regression_gated
    retired_or_tombstoned:
      - /api/webchat/admin/conversations
      - /api/support/conversations/detail
      - standalone /support-memory route
    replacement:
      - /api/support/conversations
      - /api/webchat/admin/tickets/{ticket_id}/thread
      - backend/app/services/provider_runtime/traffic_selection.py
      - backend/app/services/provider_runtime/router.py
  - id: worker_crash_and_stale_attempt_residue
    disposition: CORRECTNESS_REPLACE
    state: implemented_on_current_candidate_pending_fault_injection
    retired_behavior:
      - outbound processing rows permanently stranded after worker crash
      - worker-name-only locks without unique attempt identity
      - stale worker completion accepted after lease transfer
      - transaction-boundary installation failure silently ignored
    replacement:
      - unique claim tokens
      - conditional lease refresh
      - durable ownership checks before completion
      - stale processing recovery to retry/dead state
  - id: mutable_build_and_connection_defaults
    disposition: GOVERNED_REPLACE
    state: implemented_on_current_candidate_pending_runtime_qualification
    retired_behavior:
      - PostgreSQL pool_size 10 and max_overflow 20 in every process
      - unpinned Docker base images
      - build-time apk upgrade
      - direct Python dependency version ranges
    replacement:
      - role-specific bounded pools
      - privacy-safe database capacity snapshot
      - immutable image digests
      - exact direct Python dependency versions
      - release SBOM, provenance and signature requirements
  - id: external_channel_stop_new_writes
    disposition: LEGACY_ACTIVE_MIGRATE_THEN_DELETE
    state: runtime_mutations_retired_historical_reads_protected
    retired_behavior:
      - legacy link and sync mutation APIs
      - legacy event consume/replay/drop APIs
      - legacy sync and attachment background jobs
      - legacy operator queue projection and mutation
    replacement:
      - provider_runtime and native channel authorities
      - historical read-only compatibility under #572
  - id: schema_mutation_single_authority
    disposition: GOVERNED_REPLACE
    state: runtime_ddl_removed
    retired_behavior:
      - request-path SQLite CREATE TABLE fallbacks
    replacement:
      - backend/alembic only
  - id: voice_capability_separation
    disposition: CONSOLIDATE_IN_PLACE
    state: explicit_non_overlapping_capabilities
    replacement:
      - WEBCHAT_HUMAN_CALL_ENABLED
      - WEBCHAT_LIVE_AI_VOICE_ENABLED
  - id: application_configuration_composition
    disposition: CONSOLIDATE_IN_PLACE
    state: explicit_router_registration_and_typed_safe_settings_groups
    replacement:
      - backend/app/bootstrap/routers.py
      - backend/app/settings_groups.py
