name: connector-release-readiness-head-diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/connector-release-readiness-head-diagnostics.yml"
      - "backend/app/services/nexus_osr/release_profiles.py"
      - "backend/app/services/nexus_osr/business_readiness_service.py"
      - "backend/app/api/osr_readiness.py"
      - "backend/app/settings.py"
      - "backend/app/main.py"
      - "backend/scripts/run_worker.py"
      - "backend/tests/test_nexus_osr_release_profiles.py"
      - "backend/tests/test_nexus_osr_business_readiness.py"
      - "backend/tests/test_run_worker_heartbeat.py"
      - "backend/tests/test_production_settings_contract.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/osr-readiness-head-diagnostics.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Capture exact-head diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          pytest -q \
            backend/tests/test_nexus_osr_release_profiles.py \
            backend/tests/test_nexus_osr_business_readiness.py \
            backend/tests/test_run_worker_heartbeat.py \
            backend/tests/test_production_settings_contract.py \
            --tb=short > diagnostics/pytest.log 2>&1
          code=$?
          printf '%s\n' "$code" > diagnostics/exit_code
          git rev-parse HEAD > diagnostics/EXACT_HEAD
          tail -n 400 diagnostics/pytest.log > diagnostics/pytest-tail.log
          exit 0
      - name: Upload exact-head diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-readiness-head-diagnostics
          path: diagnostics
          retention-days: 1
          if-no-files-found: error
