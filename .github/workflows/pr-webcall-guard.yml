name: WebCall PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scope-guard:
    name: scope-guard
    runs-on: ubuntu-latest
    outputs:
      webcall_relevant: ${{ steps.changed_files.outputs.webcall_relevant }}
      webcall_checks_required: ${{ steps.changed_files.outputs.webcall_checks_required }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate knowledge retrieval probe shell syntax
        shell: bash
        run: bash -n scripts/probe_knowledge_retrieval_e2e.sh

      - name: Validate changed file scope
        id: changed_files
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sort > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

          is_webcall_relevant_file() {
            case "$1" in
              .github/workflows/pr-webcall-guard.yml) return 0 ;;
              .github/workflows/backend-ci.yml) return 0 ;;
              .github/workflows/domain-runtime-eval.yml) return 0 ;;
              .github/workflows/knowledge-runtime-*.yml) return 0 ;;
              .github/workflows/postgres-migration.yml) return 0 ;;
              .github/workflows/production-readiness.yml) return 0 ;;
              .github/workflows/release-image.yml) return 0 ;;
              .github/workflows/speedaf-*.yml) return 0 ;;
              .github/workflows/webcall-*.yml) return 0 ;;
              .gitignore) return 0 ;;
              Dockerfile) return 0 ;;
              backend/.env.example) return 0 ;;
              backend/alembic/env.py) return 0 ;;
              backend/alembic/versions/*knowledge*.py) return 0 ;;
              backend/alembic/versions/*whatsapp*.py) return 0 ;;
              backend/alembic/versions/*webchat*.py) return 0 ;;
              backend/app/api/admin_provider_credentials.py) return 0 ;;
              backend/app/api/admin_provider_runtime.py) return 0 ;;
              backend/app/api/admin_webcall_ai.py) return 0 ;;
              backend/app/api/admin_whatsapp*.py) return 0 ;;
              backend/app/api/auth.py) return 0 ;;
              backend/app/api/__init__.py) return 0 ;;
              backend/app/api/knowledge_items.py) return 0 ;;
              backend/app/api/speedaf_actions.py) return 0 ;;
              backend/app/api/speedaf_cancel.py) return 0 ;;
              backend/app/api/support_intelligence.py) return 0 ;;
              backend/app/api/ticket_perf.py) return 0 ;;
              backend/app/api/webcall_ai.py) return 0 ;;
              backend/app/api/webchat*.py) return 0 ;;
              backend/app/api/whatsapp_lite.py) return 0 ;;
              backend/app/api/whatsapp_native*.py) return 0 ;;
              backend/app/main.py) return 0 ;;
              backend/app/models.py) return 0 ;;
              backend/app/models_control_plane.py) return 0 ;;
              backend/app/schemas_control_plane.py) return 0 ;;
              backend/app/settings.py) return 0 ;;
              backend/app/static/webchat/**) return 0 ;;
              backend/app/services/ai_runtime/**) return 0 ;;
              backend/app/services/ai_runtime_context.py) return 0 ;;
              backend/app/services/ai_config_service.py) return 0 ;;
              backend/app/services/background_jobs.py) return 0 ;;
              backend/app/services/background_job_transaction_boundary.py) return 0 ;;
              backend/app/services/control_tower_service.py) return 0 ;;
              backend/app/services/domain_intelligence/flags.py) return 0 ;;
              backend/app/services/domain_intelligence/webchat_shadow_bridge.py) return 0 ;;
              backend/app/services/knowledge_*.py) return 0 ;;
              backend/app/services/knowledge_runtime_v2/**) return 0 ;;
              backend/app/services/lite_service.py) return 0 ;;
              backend/app/services/message_dispatch.py) return 0 ;;
              backend/app/services/observability.py) return 0 ;;
              backend/app/services/openclaw_client_factory.py) return 0 ;;
              backend/app/services/operator_queue.py) return 0 ;;
              backend/app/services/outbound_adapters/**) return 0 ;;
              backend/app/services/outbound_channel_registry.py) return 0 ;;
              backend/app/services/permissions.py) return 0 ;;
              backend/app/services/provider_runtime/**) return 0 ;;
              backend/app/services/realtime_broker.py) return 0 ;;
              backend/app/services/release_metadata.py) return 0 ;;
              backend/app/services/spa_fallback_hardening.py) return 0 ;;
              backend/app/services/storage.py) return 0 ;;
              backend/app/services/support_intelligence_service.py) return 0 ;;
              backend/app/services/text_decoding.py) return 0 ;;
              backend/app/services/timeline_service.py) return 0 ;;
              backend/app/services/tracking_fact_service.py) return 0 ;;
              backend/app/services/webcall_ai/**) return 0 ;;
              backend/app/services/webcall_ai_production/**) return 0 ;;
              backend/app/services/webchat_*.py) return 0 ;;
              backend/app/services/webchat_ai_decision_runtime/**) return 0 ;;
              backend/app/services/whatsapp_native*.py) return 0 ;;
              backend/app/services/speedaf/**) return 0 ;;
              backend/app/webcall_ai_schemas.py) return 0 ;;
              backend/app/webchat_models.py) return 0 ;;
              backend/app/webchat_voice_config.py) return 0 ;;
              backend/app/voice_schemas.py) return 0 ;;
              backend/requirements.txt) return 0 ;;
              backend/scripts/openclaw_bridge_server.js) return 0 ;;
              backend/scripts/*knowledge*.py) return 0 ;;
              backend/scripts/*speedaf*.py) return 0 ;;
              backend/tests/test_admin_whatsapp*.py) return 0 ;;
              backend/tests/test_background_job_transaction_boundary.py) return 0 ;;
              backend/tests/test_channel_workbench_backend_contracts.py) return 0 ;;
              backend/tests/test_codex*.py) return 0 ;;
              backend/tests/test_domain_query_understanding.py) return 0 ;;
              backend/tests/test_knowledge*.py) return 0 ;;
              backend/tests/test_oauth_refresh_concurrency.py) return 0 ;;
              backend/tests/test_operator_queue_concurrency.py) return 0 ;;
              backend/tests/test_outbound*.py) return 0 ;;
              backend/tests/test_persona*.py) return 0 ;;
              backend/tests/test_production_settings_contract.py) return 0 ;;
              backend/tests/test_provider_runtime*.py) return 0 ;;
              backend/tests/test_rbac_capability_contracts.py) return 0 ;;
              backend/tests/test_release_metadata.py) return 0 ;;
              backend/tests/test_release_metadata_consistency_gate.py) return 0 ;;
              backend/tests/test_round*.py) return 0 ;;
              backend/tests/test_spa_fallback_hardening.py) return 0 ;;
              backend/tests/test_speedaf*.py) return 0 ;;
              backend/tests/test_support_intelligence_config.py) return 0 ;;
              backend/tests/test_whatsapp*.py) return 0 ;;
              backend/tests/test_webcall*.py) return 0 ;;
              backend/tests/test_webchat*.py) return 0 ;;
              backend/tests/test_webchat_domain_shadow_trace.py) return 0 ;;
              backend/tests/fixtures/knowledge_eval_cases.json) return 0 ;;
              backend/tests/fixtures/domain_intent_cases.json) return 0 ;;
              connectors/whatsapp-sidecar/**) return 0 ;;
              deploy/**) return 0 ;;
              docs/ai-control-center-runtime.md) return 0 ;;
              docs/architecture/**) return 0 ;;
              docs/deployment/release-metadata.md) return 0 ;;
              docs/engineering/**) return 0 ;;
              docs/frontend-upgrade/**) return 0 ;;
              docs/ops/**) return 0 ;;
              docs/runbooks/**) return 0 ;;
              docs/security/**) return 0 ;;
              docs/speedaf-mcp-uat-github-workflow.md) return 0 ;;
              scripts/**) return 0 ;;
              tools/nexus-codex-runtime/**) return 0 ;;
              webapp/package-lock.json) return 0 ;;
              webapp/package.json) return 0 ;;
              webapp/src/**) return 0 ;;
              webapp/tests/**) return 0 ;;
              "") return 0 ;;
            esac
            return 1
          }

          requires_webcall_quality_checks() {
            case "$1" in
              backend/app/api/webchat_voice.py) return 0 ;;
              backend/app/services/webchat_service.py) return 0 ;;
              backend/app/services/webchat_voice_service.py) return 0 ;;
              backend/app/voice_schemas.py) return 0 ;;
              backend/tests/test_channel_workbench_backend_contracts.py) return 0 ;;
              backend/tests/test_webchat_voice_api.py) return 0 ;;
              webapp/src/components/webcall/AgentWebCallPanel.tsx) return 0 ;;
              webapp/src/routes/webcall-ai.tsx) return 0 ;;
              webapp/src/routes/webcall-ai-demo.tsx) return 0 ;;
              webapp/src/routes/webcall-operator.tsx) return 0 ;;
              webapp/src/routes/webcall.tsx) return 0 ;;
              webapp/tests/operator-console-contract.test.mjs) return 0 ;;
              webapp/tests/webcall-livekit-lazy-contract.test.mjs) return 0 ;;
              webapp/tests/webcall-operator-workbench-contract.test.mjs) return 0 ;;
              webapp/package.json) return 0 ;;
              webapp/package-lock.json) return 0 ;;
              backend/app/webchat_voice_config.py) return 0 ;;
              backend/tests/test_webchat_voice_mock_ui_static.py) return 0 ;;
              backend/tests/test_webchat_voice_static_headers.py) return 0 ;;
            esac
            return 1
          }

          webcall_relevant=0
          webcall_checks_required=0
          while IFS= read -r file; do
            if is_webcall_relevant_file "$file"; then
              webcall_relevant=1
            fi
            if requires_webcall_quality_checks "$file"; then
              webcall_checks_required=1
            fi
          done < /tmp/changed_files.txt

          if [ "$webcall_relevant" -eq 0 ]; then
            echo "webcall_relevant=false" >> "$GITHUB_OUTPUT"
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
            echo "No WebCall guarded files changed; scope guard passed without strict allowlist enforcement."
            exit 0
          fi

          echo "webcall_relevant=true" >> "$GITHUB_OUTPUT"
          if [ "$webcall_checks_required" -eq 1 ]; then
            echo "webcall_checks_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "webcall_checks_required=false" >> "$GITHUB_OUTPUT"
          fi

          fail=0
          while IFS= read -r file; do
            if ! is_webcall_relevant_file "$file"; then
              echo "::error file=$file::Out-of-scope file changed in WebCall guarded PR."
              fail=1
            fi
          done < /tmp/changed_files.txt

          if [ "$fail" -ne 0 ]; then
            echo "Scope guard failed. This PR includes files outside the approved WebCall/Codex runtime scope."
            exit 1
          fi

  backend-webcall-tests:
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend WebCall tests
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./webcall_guard.db
          LIVEKIT_API_KEY: test-key
          LIVEKIT_API_SECRET: test-secret
          LIVEKIT_URL: wss://livekit.test
          WEBCALL_BROWSER_ENTRY_ENABLED: "true"
        run: |
          pytest -q tests/test_webchat_voice_api.py tests/test_webchat_voice_static_headers.py tests/test_webchat_voice_mock_ui_static.py tests/test_channel_workbench_backend_contracts.py

  webcall-blocking-fix-guard:
    needs: scope-guard
    if: needs.scope-guard.outputs.webcall_checks_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci
      - name: Run operator console contract tests
        working-directory: webapp
        run: node --test tests/operator-console-contract.test.mjs tests/webcall-operator-workbench-contract.test.mjs tests/webcall-livekit-lazy-contract.test.mjs
