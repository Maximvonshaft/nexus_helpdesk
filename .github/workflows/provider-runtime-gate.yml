name: provider-runtime-gate

on:
  pull_request:
    paths:
      - "backend/alembic/versions/*provider*runtime*.py"
      - "backend/app/models.py"
      - "backend/app/api/admin_provider_runtime.py"
      - "backend/app/services/provider_runtime/**"
      - "backend/app/services/provider_runtime_status.py"
      - "backend/app/services/webcall_ai/demo_lab.py"
      - "backend/app/services/webcall_ai_production/providers/base.py"
      - "backend/app/services/webcall_ai_production/providers/provider_runtime_llm.py"
      - "backend/app/services/webcall_ai_production/providers/router.py"
      - "backend/app/services/webcall_ai_production/config.py"
      - "backend/app/services/webcall_ai_production/orchestrator.py"
      - "backend/app/services/webchat_runtime_output_parser.py"
      - "backend/app/services/webchat_runtime_ai_service.py"
      - "backend/app/services/webchat_rate_limit.py"
      - "backend/tests/test_admin_provider_runtime_routing_api.py"
      - "backend/tests/test_provider_runtime_*.py"
      - "backend/tests/test_webcall_ai_demo_status_safety.py"
      - "backend/tests/test_webcall_ai_provider_runtime_llm.py"
      - "backend/tests/test_webcall_ai_production.py"
      - "backend/tests/test_webchat_structured_runtime.py"
      - "backend/tests/test_webchat_runtime_ai_service.py"
      - "backend/tests/test_webchat_rate_limit_bucket.py"
      - "backend/tests/test_webchat_ai_turn_runtime.py"
      - "docs/ops/PRIVATE_AI_RUNTIME_ROLLOUT_RUNBOOK.md"
      - "deploy/.env.candidate.example"
      - "deploy/.env.prod.example"
      - ".github/workflows/provider-runtime-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-runtime-routes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 exact commit observed 2026-07-13
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install test dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Output and adapter contracts
        run: |
          pytest -q \
            backend/tests/test_provider_runtime_output_contracts.py \
            backend/tests/test_provider_runtime_private_ai_runtime_adapter.py
      - name: Traffic-selection contract
        run: pytest -q backend/tests/test_provider_runtime_traffic_selection.py
      - name: Router contract
        run: pytest -q backend/tests/test_provider_runtime_router.py
      - name: Review regression contract
        run: pytest -q backend/tests/test_provider_runtime_review_regressions.py
      - name: Persisted authority and audit contract
        run: pytest -q backend/tests/test_provider_runtime_audit_contract.py

  provider-runtime-webcall-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 exact commit observed 2026-07-13
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install test dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: WebCall profile and Provider selection
        run: |
          pytest -q \
            backend/tests/test_webcall_ai_provider_runtime_llm.py::test_provider_runtime_llm_auto_selects_hybrid_profile \
            backend/tests/test_webcall_ai_provider_runtime_llm.py::test_provider_router_returns_provider_runtime_llm
      - name: Generic request identity and authoritative route
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_private_runtime_alias_routes_through_authoritative_router
      - name: Control authority remains neutral
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_webcall_control_mode_suppresses_direct_alias_candidate
      - name: Stable explicit-session partial canary
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_webcall_partial_canary_is_stable_per_voice_session
      - name: Shadow failure remains neutral
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_webcall_shadow_failure_is_neutral_and_non_authoritative
      - name: Parse rejection audit is bounded
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_parse_reject_audit_uses_fixed_code_without_provider_marker
      - name: Kill switch remains authoritative
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_webcall_kill_switch_suppresses_alias_even_with_invalid_lower_settings
      - name: Unsupported alias audit is bounded
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_webcall_rejects_unapproved_provider_alias_without_adapter_call
      - name: Session turn preserves stable identity
        run: pytest -q backend/tests/test_webcall_ai_provider_runtime_llm.py::test_session_turn_persists_provider_runtime_result_and_governed_evidence
      - name: WebCall production orchestration
        run: pytest -q backend/tests/test_webcall_ai_production.py

  provider-runtime-admin-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 exact commit observed 2026-07-13
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install test dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Routing and bounded Admin audit contract
        run: pytest -q backend/tests/test_admin_provider_runtime_routing_api.py
      - name: Provider Runtime status contract
        run: pytest -q backend/tests/test_provider_runtime_status.py
      - name: Provider Runtime token-leakage contract
        run: pytest -q backend/tests/test_provider_runtime_token_leakage.py
      - name: Demo status-safety contract
        run: pytest -q backend/tests/test_webcall_ai_demo_status_safety.py

  provider-runtime-release-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 exact commit observed 2026-07-13
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install test dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Compile Provider and Admin runtime paths
        run: |
          python -m compileall -q \
            backend/app/api/admin_provider_runtime.py \
            backend/app/services/provider_runtime \
            backend/app/services/provider_runtime_status.py \
            backend/app/services/webcall_ai/demo_lab.py \
            backend/app/services/webcall_ai_production \
            backend/app/services/webchat_runtime_output_parser.py
      - name: WebChat parser contract
        run: pytest -q backend/tests/test_webchat_structured_runtime.py
      - name: WebChat runtime compatibility
        run: |
          pytest -q \
            backend/tests/test_webchat_runtime_ai_service.py \
            backend/tests/test_webchat_rate_limit_bucket.py \
            backend/tests/test_webchat_ai_turn_runtime.py
