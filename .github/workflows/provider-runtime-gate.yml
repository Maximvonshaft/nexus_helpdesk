name: provider-runtime-gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/services/provider_runtime/**'
      - 'backend/app/services/webchat_runtime_ai_service.py'
      - 'backend/app/services/webchat_rate_limit.py'
      - 'backend/app/services/speedaf/**'
      - 'backend/app/api/admin_provider_runtime.py'
      - 'backend/tests/test_provider_runtime_*.py'
      - 'backend/tests/test_webchat_runtime_ai_service.py'
      - 'backend/tests/test_webchat_rate_limit_bucket.py'
      - 'backend/tests/test_speedaf*.py'
      - 'backend/alembic/versions/*provider*.py'
      - '.github/workflows/provider-runtime-gate.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provider-runtime-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio jsonschema cryptography httpx

      - name: Repository hygiene gate
        run: |
          set -Eeuo pipefail
          if git ls-files | grep -E '^(\.venv/|__pycache__/|\.pytest_cache/)'; then
            echo 'ERROR: generated local artifacts are tracked by Git.'
            exit 1
          fi
          if ! grep -qxF '.venv/' .gitignore; then
            echo 'ERROR: .venv/ must be ignored.'
            exit 1
          fi
          if git grep -nE 'codex_app_server|codex_direct|openai_responses|webchat_fast_reply|Please provide your tracking number' -- backend/app backend/scripts deploy webapp/src scripts; then
            echo 'ERROR: retired provider/runtime or canned reply marker found in executable production paths.'
            exit 1
          fi

      - name: Alembic revision integrity gate
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          from collections import defaultdict

          seen = defaultdict(list)
          for path in sorted(Path('backend/alembic/versions').glob('*.py')):
              text = path.read_text(encoding='utf-8')
              match = re.search(r"^revision\s*=\s*['\"]([^'\"]+)['\"]", text, re.M)
              if match:
                  seen[match.group(1)].append(str(path))
          duplicates = {rev: files for rev, files in seen.items() if len(files) > 1}
          if duplicates:
              print('DUPLICATE_REVISIONS_FOUND')
              for rev, files in duplicates.items():
                  print(rev, files)
              raise SystemExit(1)
          print(f'alembic_revision_count={len(seen)}')
          print('duplicate_revisions=0')
          PY

      - name: Direct Alembic SQLite upgrade gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:////tmp/nexus_provider_runtime_gate.db
          ALLOW_DEV_AUTH: 'false'
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          set -Eeuo pipefail
          rm -f /tmp/nexus_provider_runtime_gate.db
          cd backend
          python -m alembic upgrade head

      - name: Provider Runtime targeted tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 600 python -m pytest -q \
            backend/tests/test_provider_runtime_output_contracts.py \
            backend/tests/test_provider_runtime_private_ai_runtime_adapter.py \
            backend/tests/test_provider_runtime_router.py \
            backend/tests/test_provider_runtime_status.py \
            backend/tests/test_provider_runtime_token_leakage.py \
            backend/tests/test_webchat_runtime_ai_service.py \
            backend/tests/test_webchat_rate_limit_bucket.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_speedaf_client_contract.py \
            backend/tests/test_speedaf_status_map.py \
            backend/tests/test_speedaf_track_query.py \
            backend/tests/test_speedaf_tracking_fact_source.py

      - name: Application route contract
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from app.main import app

          routes = sorted(getattr(route, 'path', '') for route in app.routes)
          expected = {
              '/api/admin/provider-runtime/status',
              '/api/webchat/init',
          }
          missing = sorted(expected.difference(routes))
          if missing:
              print('missing_expected_routes=' + repr(missing))
              print('provider_route_candidates=' + repr([path for path in routes if 'provider' in path.lower()]))
              print('webchat_init_candidates=' + repr([path for path in routes if 'webchat' in path.lower() and 'init' in path.lower()]))
              raise SystemExit(1)
          retired = [
              path
              for path in routes
              if 'provider-credentials/codex' in path
              or 'webchat-fast' in path
              or 'fast-reply' in path
          ]
          if retired:
              print('retired_routes_present=' + repr(retired))
              raise SystemExit(1)
          print('application_route_contract_ok')
          PY
