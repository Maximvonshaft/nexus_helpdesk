name: whatsapp-sidecar-ci

on:
  pull_request:
    paths:
      - "connectors/whatsapp-sidecar/**"
      - ".github/workflows/whatsapp-sidecar-ci.yml"
  push:
    branches: [main]
    paths:
      - "connectors/whatsapp-sidecar/**"
      - ".github/workflows/whatsapp-sidecar-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  whatsapp-sidecar-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: connectors/whatsapp-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: connectors/whatsapp-sidecar/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
