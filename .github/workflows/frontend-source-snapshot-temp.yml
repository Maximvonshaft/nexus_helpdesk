name: frontend-source-snapshot-temp

on:
  pull_request:
    paths:
      - .github/workflows/frontend-source-snapshot-temp.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create byte-complete source snapshot
        run: |
          set -Eeuo pipefail
          archive="${RUNNER_TEMP}/frontend-source-snapshot.tar.gz"
          checksum="${RUNNER_TEMP}/frontend-source-snapshot.sha256"
          tar --exclude=.git -czf "${archive}" .
          test -s "${archive}"
          sha256sum "${archive}" > "${checksum}"

      - name: Upload temporary source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: frontend-source-snapshot-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ${{ runner.temp }}/frontend-source-snapshot.tar.gz
            ${{ runner.temp }}/frontend-source-snapshot.sha256
          if-no-files-found: error
          retention-days: 1
