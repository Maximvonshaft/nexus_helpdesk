name: PR 763 Lock And E2E Repair

on:
  push:
    branches:
      - repair/763-lock-e2e-a25a

permissions:
  contents: write

concurrency:
  group: pr-763-lock-e2e-repair
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout isolated repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: repair/763-lock-e2e-a25a
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Generate canonical React 18 lockfile and update browser contract
        shell: bash
        run: |
          set -Eeuo pipefail
          cd webapp
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund \
            --save-dev-exact @types/react@18.3.28 @types/react-dom@18.3.7
          python - <<'PY'
          from pathlib import Path
          path = Path('e2e/operator-authorized-scope.spec.ts')
          text = path.read_text(encoding='utf-8')
          updated = text.replace("CH · 网页客服", "CH · WebChat")
          if updated == text:
              raise SystemExit('expected stale WebChat assertions were not found')
          path.write_text(updated, encoding='utf-8')
          PY
          cd ..
          rm .github/workflows/pr763-lock-e2e-repair.yml
          git diff --check
      - name: Commit validated repair and self-delete workflow
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-ci-repair"
          git config user.email "nexus-ci-repair@users.noreply.github.com"
          git add webapp/package.json webapp/package-lock.json webapp/e2e/operator-authorized-scope.spec.ts .github/workflows/pr763-lock-e2e-repair.yml
          git diff --cached --exit-code && exit 1 || true
          git commit -m "fix(frontend): align React 18 lockfile and browser scope contract"
          git push origin HEAD:repair/763-lock-e2e-a25a
