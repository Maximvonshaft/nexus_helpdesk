name: webapp-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapp-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee frontend-contract.log

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Size report
        run: npm run size-report

      - name: Install Playwright browser
        run: npx playwright install --with-deps chrome

      - name: Playwright e2e smoke
        run: npm run e2e

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webapp-diagnostics
          path: |
            webapp/frontend-contract.log
            webapp/playwright-report
            webapp/test-results
          if-no-files-found: ignore
          retention-days: 14
