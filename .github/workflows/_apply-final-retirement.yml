name: Apply Verified Final Retirement Patch

on:
  push:
    branches:
      - fix/final-external-channel-data-retirement

permissions:
  contents: write

concurrency:
  group: apply-final-retirement-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'complete retired persistence convergence') }}
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/final-external-channel-data-retirement
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and verify exact patch
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(find .github -maxdepth 1 -type f -name 'final-retirement.patch.gz.b64.part*' | sort)
          test "${#parts[@]}" -gt 0
          cat "${parts[@]}" > /tmp/final-retirement.patch.gz.b64
          base64 --decode /tmp/final-retirement.patch.gz.b64 > /tmp/final-retirement.patch.gz
          gzip -dc /tmp/final-retirement.patch.gz > /tmp/final-retirement.patch
          echo '3c573b2b25429ac63fba8bdaea4d539d698b2b3447cc6d87703879ebe6d55bd6  /tmp/final-retirement.patch' | sha256sum --check --strict
          git apply --check /tmp/final-retirement.patch

      - name: Apply atomically and remove delivery tooling
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/final-retirement.patch
          git rm -f --ignore-unmatch vendor/chatwoot
          rm -f .github/final-retirement.patch.gz.b64.part*
          rm -f .github/workflows/_apply-final-retirement.yml
          git add -A
          git diff --cached --check
          git config user.name 'nexus-governance-bot'
          git config user.email 'nexus-governance-bot@users.noreply.github.com'
          git commit -m 'fix: complete retired persistence convergence'
          git push origin HEAD:fix/final-external-channel-data-retirement
