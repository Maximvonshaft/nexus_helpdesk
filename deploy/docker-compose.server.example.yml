# Example production compose for NexusDesk server deployment.
# Copy to deploy/docker-compose.server.yml when preparing a server-specific stack.
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped

  worker:
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_worker.py --worker-id worker-main
    restart: unless-stopped
    depends_on:
      - app
