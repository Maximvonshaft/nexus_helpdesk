name: external-channel-retirement-gate

# ExternalChannel is retired; this lightweight full-tree scan runs for every main change
# so a new reference cannot bypass the gate by entering an unanticipated directory.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-channel-retirement-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  external-channel-retirement-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Compile checkers
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/ci/check_external_channel_retirement.py \
            scripts/ci/render_external_channel_active_inventory.py

      - name: Run focused retirement tests
        run: |
          set -Eeuo pipefail
          python -m unittest -v scripts.ci.tests.test_check_external_channel_retirement

      - name: Render active inventory and verify removed assets
        run: |
          set -Eeuo pipefail
          python scripts/ci/render_external_channel_active_inventory.py \
            --repo-root . \
            --base config/governance/external-channel-assets.v1.json \
            --removed config/governance/external-channel-removed-assets.v1.json \
            --output .tmp/external-channel-active-assets.v1.json

      - name: Verify tracked repository inventory
        run: |
          set +e
          python scripts/ci/check_external_channel_retirement.py \
            --repo-root . \
            --manifest .tmp/external-channel-active-assets.v1.json \
            > external-channel-retirement-result.json 2>&1
          status=$?
          cat external-channel-retirement-result.json
          exit "$status"

      - name: Upload bounded inventory evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: external-channel-retirement-result
          path: |
            external-channel-retirement-result.json
            .tmp/external-channel-active-assets.v1.json
          if-no-files-found: error
          retention-days: 14
