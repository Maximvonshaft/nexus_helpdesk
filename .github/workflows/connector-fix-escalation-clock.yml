name: connector-fix-escalation-clock

on:
  push:
    branches:
      - ci/escalation-clock-612-20260712
    paths:
      - ".github/workflows/connector-fix-escalation-clock.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout owned branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ci/escalation-clock-612-20260712
          fetch-depth: 0
          persist-credentials: true
      - name: Apply deterministic test-only patch
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/tests/test_nexus_osr_webchat_escalation_hook.py')
          text = path.read_text(encoding='utf-8')

          old = 'import sys\nfrom pathlib import Path\n'
          new = 'import sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('IMPORT_BLOCK_NOT_FOUND')

          old = 'from app.services import webchat_ai_safe_service  # noqa: E402\n'
          new = (
              'from app.services import webchat_ai_safe_service  # noqa: E402\n'
              'from app.services.nexus_osr.policies import HumanHoursPolicy  # noqa: E402\n'
          )
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('POLICY_IMPORT_NOT_FOUND')

          old = '''@pytest.fixture(autouse=True)
          def reset_webchat_settings(monkeypatch):
              monkeypatch.setattr(webchat_ai_safe_service.settings, "webchat_ai_auto_reply_mode", "safe_ai")
              monkeypatch.setattr(webchat_ai_safe_service.settings, "osr_escalation_orchestration_enabled", False, raising=False)
          '''
          new = '''@pytest.fixture(autouse=True)
          def reset_webchat_settings(monkeypatch):
              monkeypatch.setattr(webchat_ai_safe_service.settings, "webchat_ai_auto_reply_mode", "safe_ai")
              monkeypatch.setattr(webchat_ai_safe_service.settings, "osr_escalation_orchestration_enabled", False, raising=False)
              original_evaluate = HumanHoursPolicy.evaluate
              fixed_now = datetime(2026, 7, 6, 12, 0, 0, tzinfo=timezone.utc)

              def evaluate_at_fixed_time(self, now=None):
                  return original_evaluate(self, fixed_now if now is None else now)

              monkeypatch.setattr(HumanHoursPolicy, "evaluate", evaluate_at_fixed_time)
          '''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('FIXTURE_BLOCK_NOT_FOUND')

          anchor = '''def add_hours(db, *, online: bool, country_code: str = "ZZ", channel: str = "webchat", queue_key: str = "zz-webchat") -> None:
          '''
          addition = '''def test_online_hours_boundary_is_explicit_and_not_wall_clock_dependent():
              policy = HumanHoursPolicy(
                  queue_key="zz-webchat",
                  timezone_name="UTC",
                  weekly_hours={
                      day: [("00:00", "23:59")]
                      for day in ("mon", "tue", "wed", "thu", "fri", "sat", "sun")
                  },
              )
              assert policy.evaluate(datetime(2026, 7, 6, 12, 0, tzinfo=timezone.utc)).is_online is True
              assert policy.evaluate(datetime(2026, 7, 6, 23, 59, 30, tzinfo=timezone.utc)).is_online is False


          '''
          if addition not in text:
              if anchor not in text:
                  raise SystemExit('TEST_INSERTION_ANCHOR_NOT_FOUND')
              text = text.replace(anchor, addition + anchor, 1)

          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile backend/tests/test_nexus_osr_webchat_escalation_hook.py
          git diff --check
      - name: Install focused dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Run focused regression
        env:
          PYTHONPATH: backend
          APP_ENV: test
          DATABASE_URL: sqlite:////tmp/escalation-clock-612.db
        run: pytest -q backend/tests/test_nexus_osr_webchat_escalation_hook.py
      - name: Commit exact test repair
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-ci-determinism"
          git config user.email "nexus-ci-determinism@users.noreply.github.com"
          git add backend/tests/test_nexus_osr_webchat_escalation_hook.py
          git commit -m "test(osr): freeze Human Hours escalation clock"
          git push origin HEAD:ci/escalation-clock-612-20260712
