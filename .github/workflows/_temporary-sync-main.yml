name: Temporary Synchronize Conversation Branch With Main

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  synchronize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Register synchronization run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"main-synchronization\",\"description\":\"merging latest main\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Remove synchronizer and merge current main
        id: merge
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_temporary-sync-main.yml
          git commit -m "chore: remove temporary main synchronizer"
          git fetch --no-tags origin main
          git merge --no-ff -m "merge: synchronize conversation-first branch with latest main" origin/main
          git merge-base --is-ancestor origin/main HEAD
          git diff --check origin/main...HEAD
          python -m compileall -q backend/app backend/scripts scripts/qualification scripts/release
          git push origin HEAD:feat/conversation-first-agent-routing
          echo "final_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch canonical acceptance for merged Head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/dispatches" \
            --data '{"ref":"feat/conversation-first-agent-routing"}'
      - name: Publish merged candidate identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FINAL_SHA: ${{ steps.merge.outputs.final_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          canonical_run_id=""
          for _attempt in $(seq 1 30); do
            runs="$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/runs?branch=feat%2Fconversation-first-agent-routing&event=workflow_dispatch&per_page=20")"
            canonical_run_id="$(jq -r --arg sha "${FINAL_SHA}" '.workflow_runs[] | select(.head_sha == $sha) | .id' <<<"${runs}" | head -n 1)"
            if [[ -n "${canonical_run_id}" && "${canonical_run_id}" != "null" ]]; then
              break
            fi
            sleep 2
          done
          test -n "${canonical_run_id}"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${FINAL_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"canonical-acceptance-dispatched\",\"description\":\"run_id=${canonical_run_id}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${canonical_run_id}\"}"
