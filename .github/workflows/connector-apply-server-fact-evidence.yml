name: connector-apply-server-fact-evidence

on:
  push:
    branches:
      - audit/p1-server-evidence-548-20260711
    paths:
      - ".github/scripts/connector_apply_server_fact_evidence.py"
      - ".github/workflows/connector-apply-server-fact-evidence.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: connector-server-fact-evidence
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/p1-server-evidence-548-20260711
          fetch-depth: 0
          persist-credentials: true
      - name: Apply deterministic integration
        run: |
          set -Eeuo pipefail
          python .github/scripts/connector_apply_server_fact_evidence.py
          python -m py_compile \
            backend/app/services/server_fact_evidence.py \
            backend/app/services/webchat_service.py \
            backend/app/api/webchat.py \
            backend/app/api/webchat_ws.py \
            backend/app/api/support_conversations.py \
            backend/app/services/webchat_osr_audit_service.py \
            backend/tests/test_server_fact_evidence.py
          git diff --check
          grep -q 'has_fact_evidence=server_evidence.present' backend/app/services/webchat_service.py
          ! grep -q 'has_fact_evidence=has_fact_evidence' backend/app/services/webchat_service.py
      - name: Commit integration
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-safety-automation"
          git config user.email "nexus-safety-automation@users.noreply.github.com"
          git add \
            backend/app/services/webchat_service.py \
            backend/app/api/webchat.py \
            backend/app/api/webchat_ws.py \
            backend/app/api/support_conversations.py \
            backend/app/services/webchat_osr_audit_service.py
          git commit -m "fix(safety): bind manual facts to server evidence"
          git push origin HEAD:audit/p1-server-evidence-548-20260711
