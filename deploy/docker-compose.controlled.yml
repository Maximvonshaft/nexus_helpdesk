name: ${COMPOSE_PROJECT_NAME:-nexusdesk_controlled}

x-controlled-app: &controlled_app
  image: ${CONTROLLED_IMAGE:?set immutable ghcr.io/...@sha256:... CONTROLLED_IMAGE}
  environment: &controlled_environment
    APP_ENV: production
    AUTO_INIT_DB: "false"
    SEED_DEMO_DATA: "false"
    ALLOW_DEV_AUTH: "false"
    ALLOW_LEGACY_INTEGRATION_API_KEY: "false"
    TENANT_RUNTIME_AUTHORITY_MODE: enforce
    DATABASE_ECHO: "false"
    RELEASE_CANDIDATE: "true"
    GIT_SHA: ${GIT_SHA:?set exact candidate GIT_SHA}
    BUILD_TIME: ${BUILD_TIME:?set candidate BUILD_TIME}
    IMAGE_TAG: ${IMAGE_TAG:?set IMAGE_TAG equal to CONTROLLED_IMAGE}
    APP_VERSION: ${APP_VERSION:?set APP_VERSION}
    FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:?set exact frontend SHA}
    EXPECTED_MIGRATION_HEAD: ${EXPECTED_MIGRATION_HEAD:?set expected Alembic Head}
    READINESS_REQUIRE_RELEASE_METADATA: "true"
    LOG_JSON: "true"
    PROMETHEUS_MULTIPROC_DIR: /var/run/nexus-prometheus
    REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
    DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    STORAGE_BACKEND: local
    UPLOAD_ROOT: /app/backend/uploads
    WEBCHAT_RATE_LIMIT_BACKEND: database
    WEBCHAT_ALLOW_NO_ORIGIN: "false"
    WEBCHAT_ALLOW_LEGACY_TOKEN_TRANSPORT: "false"
    WEBCHAT_WS_ENABLED: ${WEBCHAT_WS_ENABLED:-false}
    WEBCHAT_WS_PUBLIC_ENABLED: ${WEBCHAT_WS_PUBLIC_ENABLED:-false}
    WEBCHAT_WS_ADMIN_ENABLED: ${WEBCHAT_WS_ADMIN_ENABLED:-false}
    WEBCHAT_WS_BROKER: ${WEBCHAT_WS_BROKER:-database}
    WEBCHAT_AI_ENABLED: ${WEBCHAT_AI_ENABLED:-false}
    WEBCHAT_AI_AUTO_REPLY_MODE: ${WEBCHAT_AI_AUTO_REPLY_MODE:-off}
    WEBCHAT_AI_RECONCILER_ENABLED: ${WEBCHAT_AI_RECONCILER_ENABLED:-false}
    WEBCHAT_HUMAN_CALL_ENABLED: ${WEBCHAT_HUMAN_CALL_ENABLED:-false}
    WEBCHAT_LIVE_AI_VOICE_ENABLED: ${WEBCHAT_LIVE_AI_VOICE_ENABLED:-false}
    WEBCHAT_VOICE_PROVIDER: ${WEBCHAT_VOICE_PROVIDER:-mock}
    WEBCHAT_VOICE_ROUTING_MODE: ${WEBCHAT_VOICE_ROUTING_MODE:-human_first}
    WEBCHAT_VOICE_ALLOWED_PATH_PREFIXES: ${WEBCHAT_VOICE_ALLOWED_PATH_PREFIXES:-/webcall}
    WEBCHAT_VOICE_CONNECT_SRC: ${WEBCHAT_VOICE_CONNECT_SRC:-}
    WEBCHAT_VOICE_RECORDING_ENABLED: "false"
    WEBCHAT_VOICE_TRANSCRIPTION_ENABLED: "false"
    LIVEKIT_URL: ${LIVEKIT_URL:-}
    LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-}
    LIVEKIT_WEBHOOK_ENABLED: ${LIVEKIT_WEBHOOK_ENABLED:-false}
    NEXUS_VOICE_STT_MODEL: ${NEXUS_VOICE_STT_MODEL:-}
    NEXUS_VOICE_TTS_MODEL: ${NEXUS_VOICE_TTS_MODEL:-}
    NEXUS_VOICE_TRANSFER_LLM_MODEL: ${NEXUS_VOICE_TRANSFER_LLM_MODEL:-}
    NEXUS_VOICE_TURN_DETECTION: ${NEXUS_VOICE_TURN_DETECTION:-stt}
    NEXUS_VOICE_AGENT_REQUEST_TIMEOUT_SECONDS: ${NEXUS_VOICE_AGENT_REQUEST_TIMEOUT_SECONDS:-30}
    NEXUS_VOICE_AGENT_HEARTBEAT_SECONDS: ${NEXUS_VOICE_AGENT_HEARTBEAT_SECONDS:-30}
    NEXUS_VOICE_GREETING: ${NEXUS_VOICE_GREETING:-Hello. How can I help you today?}
    NEXUS_VOICE_HANDOFF_WAIT_MESSAGE: ${NEXUS_VOICE_HANDOFF_WAIT_MESSAGE:-Your request is waiting for a human support agent. Please stay on the line.}
    PROVIDER_RUNTIME_ENABLED: ${PROVIDER_RUNTIME_ENABLED:-false}
    PROVIDER_RUNTIME_TRAFFIC_MODE: ${PROVIDER_RUNTIME_TRAFFIC_MODE:-control}
    PROVIDER_RUNTIME_KILL_SWITCH: ${PROVIDER_RUNTIME_KILL_SWITCH:-true}
    PROVIDER_RUNTIME_CANARY_PERCENT: ${PROVIDER_RUNTIME_CANARY_PERCENT:-0}
    PRIVATE_AI_RUNTIME_ENABLED: ${PRIVATE_AI_RUNTIME_ENABLED:-false}
    KNOWLEDGE_EMBEDDINGS_ENABLED: ${KNOWLEDGE_EMBEDDINGS_ENABLED:-false}
    ENABLE_OUTBOUND_DISPATCH: "false"
    OUTBOUND_PROVIDER: disabled
    OUTBOUND_EMAIL_PRODUCTION_PILOT_ENABLED: "false"
    WHATSAPP_NATIVE_ENABLED: "false"
    WHATSAPP_DISPATCH_MODE: disabled
    EMAIL_MAILBOX_SYNC_ENABLED: "false"
    ALLOW_LEGACY_ORIGINLESS_OUTBOUND: "false"
    WEBCHAT_TRACKING_FACT_LOOKUP_ENABLED: "false"
    SPEEDAF_MCP_ENABLED: "false"
    SPEEDAF_TRACK_QUERY_ENABLED: "false"
    SPEEDAF_WORK_ORDER_CREATE_ENABLED: "false"
    SPEEDAF_UPDATE_ADDRESS_ENABLED: "false"
    SPEEDAF_CANCEL_ENABLED: "false"
    SPEEDAF_VOICE_CALLBACK_ENABLED: "false"
    OPERATIONS_DISPATCH_MODE: disabled
    OPERATIONS_DISPATCH_ADAPTER: disabled
    WORKER_PROGRESS_MAX_SUCCESS_AGE_SECONDS: ${WORKER_PROGRESS_MAX_SUCCESS_AGE_SECONDS:-90}
    WORKER_PROGRESS_MAX_CYCLE_AGE_SECONDS: ${WORKER_PROGRESS_MAX_CYCLE_AGE_SECONDS:-300}
  networks:
    - controlled
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m
  pids_limit: 256
  stop_grace_period: 30s

x-worker-healthcheck: &worker_healthcheck
  test:
    - CMD
    - python
    - scripts/check_worker_progress.py
  interval: 20s
  timeout: 8s
  retries: 6
  start_period: 30s

services:
  migrate-controlled:
    <<: *controlled_app
    restart: "no"
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: migration
      DATABASE_URL: ${DATABASE_URL_MIGRATION:?set migration PostgreSQL URL}
      METRICS_ENABLED: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE_MIGRATION:-1}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_MIGRATION:-0}
      PROMETHEUS_MULTIPROC_DIR: ""
    volumes:
      - prometheus-multiproc:/var/run/nexus-prometheus
    command:
      - python
      - -m
      - alembic
      - upgrade
      - head

  app-controlled:
    <<: *controlled_app
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: web
      DATABASE_URL: ${DATABASE_URL_APP:?set Web PostgreSQL URL}
      SECRET_KEY: ${SECRET_KEY:?set Web JWT secret}
      RUNTIME_CONTRACT_SIGNING_SECRET: ${RUNTIME_CONTRACT_SIGNING_SECRET:-}
      TELEPHONY_CONTROL_SECRET: ${TELEPHONY_CONTROL_SECRET:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_API_KEY_FILE: ${LIVEKIT_API_KEY_FILE:-}
      LIVEKIT_API_SECRET_FILE: ${LIVEKIT_API_SECRET_FILE:-}
      LIVEKIT_AGENT_SHARED_SECRET: ${LIVEKIT_AGENT_SHARED_SECRET:-}
      LIVEKIT_AGENT_SHARED_SECRET_FILE: ${LIVEKIT_AGENT_SHARED_SECRET_FILE:-}
      METRICS_ENABLED: "true"
      METRICS_TOKEN: ${METRICS_TOKEN:?set dedicated metrics token}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set controlled Web origin}
      WEBCHAT_ALLOWED_ORIGINS: ${WEBCHAT_ALLOWED_ORIGINS:?set controlled WebChat origin}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-127.0.0.1}
      LOCAL_STORAGE_BACKUP_REQUIRED: "true"
      LOCAL_STORAGE_BACKUP_PATH: /var/backups/nexusdesk/uploads
      LOCAL_STORAGE_BACKUP_MARKER_PATH: /var/backups/nexusdesk/uploads/.nexus-backup-verified.json
      LOCAL_STORAGE_BACKUP_MAX_AGE_SECONDS: ${LOCAL_STORAGE_BACKUP_MAX_AGE_SECONDS:-86400}
      LOCAL_STORAGE_BACKUP_ENFORCE_FRESHNESS: "true"
      LOCAL_STORAGE_BACKUP_ACKNOWLEDGED: "true"
      REQUIRE_REMOTE_STORAGE_IN_PRODUCTION: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE_WEB:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_WEB:-5}
    volumes:
      - ${NEXUS_UPLOADS_HOST_PATH:?set uploads path}:/app/backend/uploads:rw
      - ${NEXUS_UPLOAD_BACKUP_HOST_PATH:?set upload backup path}:/var/backups/nexusdesk/uploads:ro
      - prometheus-multiproc:/var/run/nexus-prometheus
    ports:
      - "127.0.0.1:${CONTROLLED_APP_PORT:-18095}:8080"
    command:
      - python
      - -m
      - gunicorn
      - app.main:app
      - --config
      - /app/backend/gunicorn.conf.py
      - -k
      - uvicorn.workers.UvicornWorker
      - --workers
      - "2"
      - --timeout
      - "30"
      - --bind
      - 0.0.0.0:8080
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          response=urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=4);
          assert response.status == 200
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 30s
    depends_on:
      migrate-controlled:
        condition: service_completed_successfully

  livekit-agent-controlled:
    <<: *controlled_app
    profiles:
      - telephony
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: livekit-agent
      PROMETHEUS_MULTIPROC_DIR: ""
      METRICS_ENABLED: "false"
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_API_KEY_FILE: ${LIVEKIT_API_KEY_FILE:-}
      LIVEKIT_API_SECRET_FILE: ${LIVEKIT_API_SECRET_FILE:-}
      LIVEKIT_AGENT_SHARED_SECRET: ${LIVEKIT_AGENT_SHARED_SECRET:-}
      LIVEKIT_AGENT_SHARED_SECRET_FILE: ${LIVEKIT_AGENT_SHARED_SECRET_FILE:-}
      NEXUS_INTERNAL_API_URL: http://app-controlled:8080
    command:
      - python
      - -m
      - app.livekit_agent_worker
      - start
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          response=urllib.request.urlopen('http://127.0.0.1:8081/', timeout=4);
          assert response.status == 200
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      app-controlled:
        condition: service_healthy

  worker-outbound-controlled:
    <<: *controlled_app
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: worker-outbound
      NEXUS_WORKER_ID: worker-outbound-controlled
      NEXUS_WORKER_QUEUE: outbound
      DATABASE_URL: ${DATABASE_URL_OUTBOUND:?set Outbound Worker PostgreSQL URL}
      METRICS_ENABLED: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE_OUTBOUND:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_OUTBOUND:-2}
    volumes:
      - ${NEXUS_UPLOADS_HOST_PATH:?set uploads path}:/app/backend/uploads:ro
      - prometheus-multiproc:/var/run/nexus-prometheus
    command:
      - python
      - scripts/run_worker_supervised.py
      - --worker-id
      - worker-outbound-controlled
      - --queue
      - outbound
    healthcheck: *worker_healthcheck
    depends_on:
      app-controlled:
        condition: service_healthy

  worker-background-controlled:
    <<: *controlled_app
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: worker-background
      NEXUS_WORKER_ID: worker-background-controlled
      NEXUS_WORKER_QUEUE: background
      DATABASE_URL: ${DATABASE_URL_BACKGROUND:?set Background Worker PostgreSQL URL}
      TELEPHONY_CONTROL_SECRET: ${TELEPHONY_CONTROL_SECRET:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_API_KEY_FILE: ${LIVEKIT_API_KEY_FILE:-}
      LIVEKIT_API_SECRET_FILE: ${LIVEKIT_API_SECRET_FILE:-}
      METRICS_ENABLED: "false"
      QUEUE_METRICS_SNAPSHOT_INTERVAL_SECONDS: ${QUEUE_METRICS_SNAPSHOT_INTERVAL_SECONDS:-15}
      DB_POOL_SIZE: ${DB_POOL_SIZE_BACKGROUND:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_BACKGROUND:-2}
    volumes:
      - ${NEXUS_UPLOADS_HOST_PATH:?set uploads path}:/app/backend/uploads:rw
      - prometheus-multiproc:/var/run/nexus-prometheus
    command:
      - python
      - scripts/run_worker_supervised.py
      - --worker-id
      - worker-background-controlled
      - --queue
      - background
    healthcheck: *worker_healthcheck
    depends_on:
      app-controlled:
        condition: service_healthy

  worker-webchat-ai-controlled:
    <<: *controlled_app
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: worker-webchat-ai
      NEXUS_WORKER_ID: worker-webchat-ai-controlled
      NEXUS_WORKER_QUEUE: webchat-ai
      DATABASE_URL: ${DATABASE_URL_WEBCHAT_AI:?set WebChat AI Worker PostgreSQL URL}
      RUNTIME_CONTRACT_SIGNING_SECRET: ${RUNTIME_CONTRACT_SIGNING_SECRET:-}
      METRICS_ENABLED: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE_WEBCHAT_AI:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_WEBCHAT_AI:-1}
    volumes:
      - prometheus-multiproc:/var/run/nexus-prometheus
    command:
      - python
      - scripts/run_worker_supervised.py
      - --worker-id
      - worker-webchat-ai-controlled
      - --queue
      - webchat-ai
    healthcheck: *worker_healthcheck
    depends_on:
      app-controlled:
        condition: service_healthy

  worker-handoff-snapshot-controlled:
    <<: *controlled_app
    restart: unless-stopped
    environment:
      <<: *controlled_environment
      NEXUS_PROCESS_ROLE: worker-handoff-snapshot
      NEXUS_WORKER_ID: worker-handoff-snapshot-controlled
      NEXUS_WORKER_QUEUE: handoff-snapshot
      DATABASE_URL: ${DATABASE_URL_HANDOFF:?set Handoff Worker PostgreSQL URL}
      METRICS_ENABLED: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE_HANDOFF:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW_HANDOFF:-1}
    volumes:
      - prometheus-multiproc:/var/run/nexus-prometheus
    command:
      - python
      - scripts/run_worker_supervised.py
      - --worker-id
      - worker-handoff-snapshot-controlled
      - --queue
      - handoff-snapshot
    healthcheck: *worker_healthcheck
    depends_on:
      app-controlled:
        condition: service_healthy

networks:
  controlled:
    driver: bridge

volumes:
  prometheus-multiproc:
