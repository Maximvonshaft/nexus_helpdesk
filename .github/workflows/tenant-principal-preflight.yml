name: tenant-principal-preflight

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/qualification/tenant/**"
      - "docs/architecture/tenant-principal-migration.md"
      - ".github/workflows/tenant-principal-preflight.yml"
      - "backend/app/models.py"
      - "backend/app/models_*.py"
      - "backend/app/webchat_models.py"
      - "backend/alembic/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-ownership-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile and unit-test mapping contract
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          python -m unittest scripts/qualification/tenant/test_tenant_principal_preflight.py

      - name: Upgrade disposable PostgreSQL to exact head
        working-directory: backend
        run: alembic upgrade head

      - name: Seed one coherent Tenant ownership chain
        run: |
          python - <<'PY'
          from app.db import SessionLocal
          from app.enums import SourceChannel, TicketPriority, TicketSource, TicketStatus, UserRole
          from app.model_registry import register_all_models
          from app.models import ChannelAccount, Customer, Market, Team, Ticket, User

          register_all_models()
          db = SessionLocal()
          try:
              market = Market(code="ME-A", name="Synthetic Market A", country_code="ME", is_active=True)
              db.add(market); db.flush()
              team = Team(name="Synthetic Team A", team_type="qualification", market_id=market.id, is_active=True)
              db.add(team); db.flush()
              user = User(
                  username="tenant-qualification-a",
                  display_name="Synthetic Agent A",
                  email=None,
                  password_hash="synthetic-not-a-real-credential",
                  role=UserRole.agent,
                  team_id=team.id,
                  is_active=True,
              )
              channel = ChannelAccount(
                  provider="synthetic",
                  account_id="tenant-qualification-channel-a",
                  display_name="Synthetic Channel A",
                  market_id=market.id,
                  is_active=True,
              )
              customer = Customer(name="Synthetic Customer")
              db.add_all([user, channel, customer]); db.flush()
              ticket = Ticket(
                  ticket_no="QUAL-TENANT-0001",
                  title="Synthetic Tenant Qualification",
                  description="Synthetic data only",
                  customer_id=customer.id,
                  source=TicketSource.manual,
                  source_channel=SourceChannel.internal,
                  priority=TicketPriority.medium,
                  status=TicketStatus.new,
                  assignee_id=user.id,
                  team_id=team.id,
                  created_by=user.id,
                  market_id=market.id,
                  country_code="ME",
                  channel_account_id=channel.id,
              )
              db.add(ticket)
              db.commit()
          finally:
              db.close()
          PY
          mkdir -p artifacts/tenant
          cat > artifacts/tenant/mapping-pass.json <<'JSON'
          {
            "schema_version": "nexus_tenant_backfill_mapping_v1",
            "tenants": [{"tenant_key": "tenant-a", "display_name": "Synthetic Tenant A"}],
            "market_codes": {"ME-A": "tenant-a"},
            "team_ids": {},
            "user_ids": {},
            "channel_account_ids": {},
            "ticket_ids": {},
            "customer_ids": {}
          }
          JSON

      - name: Prove coherent ownership passes without implicit defaults
        run: |
          set -Eeuo pipefail
          python scripts/qualification/tenant/tenant_principal_preflight.py \
            --database-url "${DATABASE_URL}" \
            --mapping artifacts/tenant/mapping-pass.json \
            --output artifacts/tenant/preflight-pass.json
          test "$(jq -r '.status' artifacts/tenant/preflight-pass.json)" = "pass"
          test "$(jq -r '.implicit_default_backfill_allowed' artifacts/tenant/preflight-pass.json)" = "false"
          test "$(jq -r '.issues.issue_count' artifacts/tenant/preflight-pass.json)" = "0"

      - name: Add a cross-Tenant Customer conflict and forbidden default value
        run: |
          python - <<'PY'
          from app.db import SessionLocal
          from app.enums import SourceChannel, TicketPriority, TicketSource, TicketStatus, UserRole
          from app.models import ChannelAccount, Customer, Market, Team, Ticket, User
          from app.models_webchat_binding import WebchatPublicOriginBinding

          db = SessionLocal()
          try:
              customer = db.query(Customer).filter(Customer.name == "Synthetic Customer").one()
              market = Market(code="CH-B", name="Synthetic Market B", country_code="CH", is_active=True)
              db.add(market); db.flush()
              team = Team(name="Synthetic Team B", team_type="qualification", market_id=market.id, is_active=True)
              db.add(team); db.flush()
              user = User(
                  username="tenant-qualification-b",
                  display_name="Synthetic Agent B",
                  email=None,
                  password_hash="synthetic-not-a-real-credential",
                  role=UserRole.agent,
                  team_id=team.id,
                  is_active=True,
              )
              channel = ChannelAccount(
                  provider="synthetic",
                  account_id="tenant-qualification-channel-b",
                  display_name="Synthetic Channel B",
                  market_id=market.id,
                  is_active=True,
              )
              db.add_all([user, channel]); db.flush()
              db.add(Ticket(
                  ticket_no="QUAL-TENANT-0002",
                  title="Synthetic Cross Tenant Qualification",
                  description="Synthetic data only",
                  customer_id=customer.id,
                  source=TicketSource.manual,
                  source_channel=SourceChannel.internal,
                  priority=TicketPriority.medium,
                  status=TicketStatus.new,
                  assignee_id=user.id,
                  team_id=team.id,
                  created_by=user.id,
                  market_id=market.id,
                  country_code="CH",
                  channel_account_id=channel.id,
              ))
              db.add(WebchatPublicOriginBinding(
                  normalized_origin="https://synthetic.invalid",
                  tenant_key="default",
                  channel_key="webchat",
                  display_name="Synthetic forbidden default",
                  is_active=True,
              ))
              db.commit()
          finally:
              db.close()
          PY
          cat > artifacts/tenant/mapping-fail.json <<'JSON'
          {
            "schema_version": "nexus_tenant_backfill_mapping_v1",
            "tenants": [
              {"tenant_key": "tenant-a", "display_name": "Synthetic Tenant A"},
              {"tenant_key": "tenant-b", "display_name": "Synthetic Tenant B"}
            ],
            "market_codes": {"ME-A": "tenant-a", "CH-B": "tenant-b"},
            "team_ids": {},
            "user_ids": {},
            "channel_account_ids": {},
            "ticket_ids": {},
            "customer_ids": {}
          }
          JSON

      - name: Prove conflicts and default values fail closed
        run: |
          set +e
          python scripts/qualification/tenant/tenant_principal_preflight.py \
            --database-url "${DATABASE_URL}" \
            --mapping artifacts/tenant/mapping-fail.json \
            --output artifacts/tenant/preflight-fail.json
          code=$?
          set -e
          test "$code" = "1"
          test "$(jq -r '.status' artifacts/tenant/preflight-fail.json)" = "fail"
          test "$(jq -r '.issues.counts["tenant.customer_cross_tenant_conflict"]' artifacts/tenant/preflight-fail.json)" -ge 1
          test "$(jq -r '.issues.counts["tenant.existing_default_forbidden"]' artifacts/tenant/preflight-fail.json)" -ge 1
          ! grep -q 'Synthetic Customer' artifacts/tenant/preflight-fail.json
          ! grep -q 'QUAL-TENANT' artifacts/tenant/preflight-fail.json

      - name: Scan bounded evidence for prohibited material
        run: |
          set -Eeuo pipefail
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/tenant/artifact-scan.json \
            artifacts/tenant/preflight-pass.json \
            artifacts/tenant/preflight-fail.json
          test "$(jq -r '.status' artifacts/tenant/artifact-scan.json)" = "pass"

      - name: Upload bounded preflight evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tenant-principal-preflight
          path: |
            artifacts/tenant/preflight-pass.json
            artifacts/tenant/preflight-fail.json
            artifacts/tenant/artifact-scan.json
          retention-days: 14
          if-no-files-found: error

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
