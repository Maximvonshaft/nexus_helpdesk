name: connector-fix-empty-worker-contract

on:
  pull_request:
    paths:
      - ".github/workflows/connector-fix-empty-worker-contract.yml"
      - "backend/app/settings.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Remove contradictory empty-worker validation
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/app/settings.py')
          text = path.read_text(encoding='utf-8')
          block = (
              '        if not self.nexus_osr_required_workers:\n'
              '            raise RuntimeError("NEXUS_OSR_REQUIRED_WORKERS must declare at least one worker")\n'
          )
          count = text.count(block)
          if count == 1:
              text = text.replace(block, '', 1)
          elif count != 0:
              raise SystemExit(f'EMPTY_WORKER_VALIDATION_COUNT={count}')
          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile backend/app/settings.py
          ! grep -q 'NEXUS_OSR_REQUIRED_WORKERS must declare at least one worker' backend/app/settings.py
          git diff --check
      - name: Commit exact correction
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "nexus-readiness-automation"
          git config user.email "nexus-readiness-automation@users.noreply.github.com"
          git add backend/app/settings.py
          git commit -m "fix(readiness): derive workers from release profile by default"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
