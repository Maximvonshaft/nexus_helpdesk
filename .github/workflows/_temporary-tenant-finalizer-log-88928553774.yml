name: Temporary Explicit Tenant Request Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - .github/workflows/_temporary-tenant-finalizer-log-88928553774.yml

permissions:
  contents: write

concurrency:
  group: external-explicit-tenant-request-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      EXPECTED_SOURCE: cdec15284116fc14ef048bbcb478dbbf8a985ac0
      EXPECTED_HEAD: 2c0ad1aa566706457eda4db8bb576179656825c0
      TARGET_BRANCH: fix/governance-tenant-authority-final
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      ENABLE_OUTBOUND_DISPATCH: "false"
      OUTBOUND_PROVIDER: disabled
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: fix/governance-tenant-authority-final
          persist-credentials: true

      - name: Apply bounded review remediation
        shell: bash
        run: |
          set -Eeuo pipefail
          observed_head="$(git rev-parse HEAD)"
          test "$observed_head" = "$EXPECTED_HEAD"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$EXPECTED_SOURCE"
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, authority: str) -> str:
              observed = text.count(old)
              if observed != 1:
                  raise SystemExit(
                      f'{authority} anchor mismatch: observed={observed} expected=1'
                  )
              return text.replace(old, new, 1)

          api_path = Path('backend/app/api/knowledge_items.py')
          api = api_path.read_text(encoding='utf-8')
          helper_marker = 'def _item_out(row) -> KnowledgeItemOut:\n'
          helper = (
              'def _explicit_requested_tenant(payload, field_name: str) -> str | None:\n'
              '    fields_set = getattr(payload, "model_fields_set", set())\n'
              '    return getattr(payload, field_name) if field_name in fields_set else None\n\n\n'
          )
          api = replace_once(api, helper_marker, helper + helper_marker, 'tenant request helper')

          create_old = (
              '    ensure_can_manage_ai_configs(current_user, db)\n'
              '    tenant_key = _actor_tenant_key(db, current_user)\n'
              '    with managed_session(db):\n'
              '        row = knowledge_service.create_item(\n'
          )
          create_new = (
              '    ensure_can_manage_ai_configs(current_user, db)\n'
              '    requested_tenant = _explicit_requested_tenant(payload, "tenant_id")\n'
              '    tenant_key = _actor_tenant_key(\n'
              '        db, current_user, requested=requested_tenant\n'
              '    )\n'
              '    with managed_session(db):\n'
              '        row = knowledge_service.create_item(\n'
          )
          api = replace_once(api, create_old, create_new, 'knowledge create tenant authority')

          runtime_old = (
              '    tenant_key = _actor_tenant_key(\n'
              '        db, current_user, requested=payload.tenant_key\n'
              '    )\n'
          )
          runtime_new = (
              '    requested_tenant = _explicit_requested_tenant(payload, "tenant_key")\n'
              '    tenant_key = _actor_tenant_key(\n'
              '        db, current_user, requested=requested_tenant\n'
              '    )\n'
          )
          api = replace_once(api, runtime_old, runtime_new, 'runtime context tenant authority')
          api_path.write_text(api, encoding='utf-8')

          test_path = Path('backend/tests/test_knowledge_tenant_authority.py')
          tests = test_path.read_text(encoding='utf-8')
          tests = replace_once(
              tests,
              'from app.db import Base\n',
              'from app.db import Base\nfrom app.models import Tenant\n',
              'tenant test model import',
          )
          tests = replace_once(
              tests,
              'from app.schemas_control_plane import KnowledgeConflictCheckRequest\n',
              'from app.schemas_control_plane import (\n'
              '    KnowledgeConflictCheckRequest,\n'
              '    KnowledgeItemCreate,\n'
              '    KnowledgeRuntimeContextTestRequest,\n'
              ')\n',
              'tenant test schema imports',
          )
          tests = replace_once(
              tests,
              '    assert "requested=payload.tenant_key" in source\n',
              '    assert "_explicit_requested_tenant" in source\n',
              'tenant source contract',
          )
          tests += '''


def test_explicit_tenant_fields_are_distinguished_from_schema_defaults():
    create_omitted = KnowledgeItemCreate(
        item_key="tenant-default-omitted", title="Tenant default omitted"
    )
    assert create_omitted.tenant_id == "default"
    assert knowledge_items._explicit_requested_tenant(
        create_omitted, "tenant_id"
    ) is None

    create_explicit = KnowledgeItemCreate(
        item_key="tenant-explicit", title="Tenant explicit", tenant_id="tenant-a"
    )
    assert knowledge_items._explicit_requested_tenant(
        create_explicit, "tenant_id"
    ) == "tenant-a"

    runtime_omitted = KnowledgeRuntimeContextTestRequest(q="parcel status")
    assert runtime_omitted.tenant_key == "default"
    assert knowledge_items._explicit_requested_tenant(
        runtime_omitted, "tenant_key"
    ) is None

    runtime_explicit = KnowledgeRuntimeContextTestRequest(
        q="parcel status", tenant_key="default"
    )
    assert knowledge_items._explicit_requested_tenant(
        runtime_explicit, "tenant_key"
    ) == "default"


def test_platform_and_tenant_actors_resolve_requested_tenants_correctly(db_session):
    tenant = Tenant(tenant_key="tenant-a", display_name="Tenant A", is_active=True)
    db_session.add(tenant)
    db_session.commit()

    platform_actor = SimpleNamespace(tenant_id=None)
    assert knowledge_items._actor_tenant_key(
        db_session, platform_actor, requested="tenant-a"
    ) == "tenant-a"

    tenant_actor = SimpleNamespace(tenant_id=tenant.id)
    assert knowledge_items._actor_tenant_key(
        db_session, tenant_actor, requested=None
    ) == "tenant-a"

    with pytest.raises(HTTPException) as cross_tenant:
        knowledge_items._actor_tenant_key(
            db_session, tenant_actor, requested="default"
        )
    assert cross_tenant.value.status_code == 403
'''
          test_path.write_text(tests, encoding='utf-8')

          changed = set(
              __import__('subprocess').check_output(
                  ['git', 'diff', '--name-only'], text=True
              ).splitlines()
          )
          expected = {
              'backend/app/api/knowledge_items.py',
              'backend/tests/test_knowledge_tenant_authority.py',
          }
          if changed != expected:
              raise SystemExit(f'unexpected changed paths: {sorted(changed)!r}')
          PY
          git diff --check
          echo "OBSERVED_HEAD=$observed_head" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Verify explicit tenant authority
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app backend/tests
          python -m pytest -q \
            backend/tests/test_knowledge_tenant_authority.py \
            backend/tests/test_knowledge_runtime_context.py \
            backend/tests/test_knowledge_studio_contract.py \
            backend/tests/test_governance_review_regressions.py \
            backend/tests/test_governance_completion_contract.py

      - name: Publish reviewed remediation
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/api/knowledge_items.py \
            backend/tests/test_knowledge_tenant_authority.py
          git diff --cached --check
          git commit -m "fix(knowledge): preserve explicit tenant request semantics"
          git push --force-with-lease="refs/heads/$TARGET_BRANCH:$OBSERVED_HEAD" \
            origin "HEAD:refs/heads/$TARGET_BRANCH"
