name: osr-eval

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/evals/nexus_osr/**"
      - "backend/scripts/run_nexus_osr_eval.py"
      - "backend/tests/test_nexus_osr_eval_*.py"
      - "backend/app/services/nexus_osr/runtime_decision_contract.py"
      - ".github/workflows/osr-eval.yml"
      - "docs/ops/NEXUS_OSR_EVAL_RUNBOOK.md"
  push:
    branches: [main]
    paths:
      - "backend/evals/nexus_osr/**"
      - "backend/scripts/run_nexus_osr_eval.py"
      - "backend/tests/test_nexus_osr_eval_*.py"
      - "backend/app/services/nexus_osr/runtime_decision_contract.py"
      - ".github/workflows/osr-eval.yml"
      - "docs/ops/NEXUS_OSR_EVAL_RUNBOOK.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governed-eval:
    name: governed-osr-eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: backend
      APP_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend and test dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest

      - name: Compile eval implementation
        run: |
          set -Eeuo pipefail
          python -m compileall \
            backend/evals/nexus_osr \
            backend/scripts/run_nexus_osr_eval.py \
            backend/tests/test_nexus_osr_eval_schema.py \
            backend/tests/test_nexus_osr_eval_runner.py

      - name: Run schema, golden, coverage and redaction tests
        run: |
          set -Eeuo pipefail
          python -m pytest -q \
            backend/tests/test_nexus_osr_eval_schema.py \
            backend/tests/test_nexus_osr_eval_runner.py

      - name: Generate deterministic bounded evidence
        run: |
          set -Eeuo pipefail
          rm -rf artifacts/osr-eval
          python backend/scripts/run_nexus_osr_eval.py \
            --strict \
            --max-artifact-bytes 65536 \
            --output-dir artifacts/osr-eval \
            > /tmp/osr-eval-report.json

      - name: Validate artifact cardinality, size and safety contract
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("artifacts/osr-eval")
          expected = {"summary.json", "failures.json", "coverage.json", "manifest.json"}
          actual = {path.name for path in root.glob("*.json")}
          if actual != expected:
              raise SystemExit(f"unexpected_artifacts:{sorted(actual)}")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          if manifest.get("bounded") is not True or manifest.get("redacted") is not True:
              raise SystemExit("artifact_safety_contract_failed")
          for path in root.glob("*.json"):
              if path.stat().st_size > 65536:
                  raise SystemExit(f"artifact_too_large:{path.name}:{path.stat().st_size}")
          report = json.loads(Path("/tmp/osr-eval-report.json").read_text(encoding="utf-8"))
          if not report["run"]["ok"]:
              raise SystemExit("governed_eval_failed")
          if report["safety"] != {
              "source_classification": "synthetic_redacted",
              "production_payloads_collected": False,
              "customer_visible_behavior_changes": False,
              "messages_sent": 0,
              "tools_executed": 0,
              "production_mutations": 0,
              "raw_case_payloads_emitted": False,
          }:
              raise SystemExit("eval_read_only_contract_failed")
          PY

      - name: Check diff whitespace
        shell: bash
        run: |
          set -Eeuo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$base_sha" ]]; then
            base_sha="${{ github.event.before }}"
          fi
          if [[ -n "$base_sha" ]] && git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            git diff --check "$base_sha"...HEAD
          else
            git show --check --format=fuller --no-renames HEAD
          fi

      - name: Upload bounded eval evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: osr-eval-${{ github.sha }}
          path: artifacts/osr-eval
          if-no-files-found: error
          retention-days: 7
