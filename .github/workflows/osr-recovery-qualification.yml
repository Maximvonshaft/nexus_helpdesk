name: osr-recovery-qualification

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/qualification/recovery/**"
      - "scripts/deploy/backup_postgres.sh"
      - "scripts/deploy/rollback_release.sh"
      - "docs/ops/nexus-osr-recovery-qualification.md"
      - "docs/superpowers/specs/2026-07-13-recovery-qualification-design.md"
      - "docs/superpowers/plans/2026-07-13-recovery-qualification.md"
      - "backend/alembic/**"
      - "backend/app/model_registry.py"
      - ".github/workflows/osr-recovery-qualification.yml"
  push:
    branches: [main]
    paths:
      - "scripts/qualification/recovery/**"
      - "scripts/deploy/backup_postgres.sh"
      - "scripts/deploy/rollback_release.sh"
      - "backend/alembic/**"
      - "backend/app/model_registry.py"
      - ".github/workflows/osr-recovery-qualification.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  postgres-recovery-qualification:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus_recovery_admin
          POSTGRES_PASSWORD: nexus_recovery_admin
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_recovery_admin -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      SOURCE_APP_URL: postgresql+psycopg://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      SOURCE_NATIVE_URL: postgresql://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      RESTORE_APP_URL: postgresql+psycopg://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RESTORE_NATIVE_URL: postgresql://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RECOVERY_ADMIN_NATIVE_URL: postgresql://nexus_recovery_admin:nexus_recovery_admin@127.0.0.1:5432/postgres
      RECOVERY_ALLOW_DATABASE_RECREATE: "I_UNDERSTAND"
      QUALIFICATION_MARKER: QUAL-RCV-001
      RTO_TARGET_SECONDS: "120"
      RPO_TARGET_SECONDS: "60"
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize bounded evidence
        run: |
          set -Eeuo pipefail
          rm -rf -- artifacts/recovery
          install -d -m 700 -- artifacts/recovery
          cat > artifacts/recovery/qualification-context.json <<JSON
          {"schema_version":"nexus_recovery_qualification_context_v1","source_sha":"${{ github.event.pull_request.head.sha || github.sha }}","database_engine":"postgresql-16-pgvector","rto_target_seconds":${RTO_TARGET_SECONDS},"rpo_target_seconds":${RPO_TARGET_SECONDS},"production_data_used":false,"production_mutation_performed":false}
          JSON

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install qualification dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          psql --version
          pg_dump --version
          pg_restore --version

      - name: Create isolated disposable recovery roles
        run: |
          set -Eeuo pipefail
          psql "$RECOVERY_ADMIN_NATIVE_URL" -X --set ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE nexus_recovery_source
            LOGIN PASSWORD 'nexus_recovery_source'
            NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOREPLICATION NOBYPASSRLS;
          CREATE ROLE nexus_recovery_restore
            LOGIN PASSWORD 'nexus_recovery_restore'
            NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOREPLICATION NOBYPASSRLS;
          SQL
          test "$(psql "$RECOVERY_ADMIN_NATIVE_URL" -XAt --set ON_ERROR_STOP=1 -c "
            SELECT count(*)
            FROM pg_roles
            WHERE rolname IN ('nexus_recovery_source', 'nexus_recovery_restore')
              AND rolcanlogin
              AND NOT rolsuper
              AND NOT rolcreatedb
              AND NOT rolcreaterole
              AND NOT rolreplication
              AND NOT rolbypassrls;
          ")" = "2"

      - name: Compile and run recovery contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/recovery/build_recovery_evidence.py \
            scripts/qualification/recovery/test_recovery_contracts.py
          python -m unittest -v scripts.qualification.recovery.test_recovery_contracts
          bash -n \
            scripts/qualification/recovery/run_recovery_qualification.sh \
            scripts/deploy/backup_postgres.sh \
            scripts/deploy/rollback_release.sh

      - name: Run disposable PostgreSQL recovery qualification
        id: qualification
        continue-on-error: true
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVIDENCE_ROOT: artifacts/recovery
        run: bash scripts/qualification/recovery/run_recovery_qualification.sh

      - name: Remove backup bytes before evidence processing
        if: always()
        run: |
          set -Eeuo pipefail
          rm -rf -- artifacts/recovery/backups
          test ! -e artifacts/recovery/backups

      - name: Finalize qualification status
        if: always()
        env:
          QUALIFICATION_OUTCOME: ${{ steps.qualification.outcome }}
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          payload = {
              "schema_version": "nexus_recovery_qualification_status_v1",
              "qualification_outcome": os.environ.get("QUALIFICATION_OUTCOME") or "unknown",
              "production_data_used": False,
              "production_mutation_performed": False,
          }
          Path("artifacts/recovery/qualification-status.json").write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Scan bounded recovery evidence
        id: artifact_scan
        if: always()
        run: |
          set +e
          mapfile -t FILES < <(find artifacts/recovery -maxdepth 1 -type f -name '*.json' -printf '%p\n' | sort)
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/recovery/artifact-scan.json \
            "${FILES[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload clean bounded qualification evidence
        if: always() && steps.artifact_scan.outputs.exit_code == '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: osr-recovery-qualification
          path: artifacts/recovery/*.json
          retention-days: 14
          if-no-files-found: error

      - name: Upload sanitized recovery failure status
        if: always() && steps.artifact_scan.outputs.exit_code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: osr-recovery-qualification-failure-status
          path: artifacts/recovery/qualification-status.json
          retention-days: 14
          if-no-files-found: error

      - name: Enforce recovery qualification
        if: always()
        env:
          QUALIFICATION_OUTCOME: ${{ steps.qualification.outcome }}
          ARTIFACT_EXIT: ${{ steps.artifact_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          test "$QUALIFICATION_OUTCOME" = "success"
          test "$ARTIFACT_EXIT" = "0"
          test "$(jq -r '.status' artifacts/recovery/recovery-evidence.json)" = "pass"
          test "$(jq -r '.status' artifacts/recovery/artifact-scan.json)" = "pass"

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
