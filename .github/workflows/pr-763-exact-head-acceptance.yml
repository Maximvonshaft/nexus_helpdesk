name: PR 763 exact-head acceptance

on:
  push:
    branches:
      - ci/763-exact-head-7bb8e6d

permissions:
  contents: read

concurrency:
  group: pr-763-exact-head-acceptance
  cancel-in-progress: true

env:
  CI: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: backend
  APP_ENV: test
  SECRET_KEY: pr-763-acceptance-only-never-production
  AUTO_INIT_DB: "false"
  SEED_DEMO_DATA: "false"
  ALLOW_DEV_AUTH: "false"
  OUTBOUND_PROVIDER: disabled
  ENABLE_OUTBOUND_DISPATCH: "false"
  EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
  EXTERNAL_CHANNEL_TRANSPORT: disabled
  EXTERNAL_CHANNEL_SYNC_ENABLED: "false"
  EXTERNAL_CHANNEL_INBOUND_AUTO_SYNC_ENABLED: "false"
  EXTERNAL_CHANNEL_EVENT_DRIVER_ENABLED: "false"
  EXTERNAL_CHANNEL_BRIDGE_ENABLED: "false"
  EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
  KNOWLEDGE_EMBEDDINGS_ENABLED: "false"
  WEBCHAT_TRACKING_FACT_LOOKUP_ENABLED: "false"
  PROVIDER_RUNTIME_ENABLED: "false"
  PROVIDER_RUNTIME_TRAFFIC_MODE: control
  PROVIDER_RUNTIME_CANARY_PERCENT: "0"
  PROVIDER_RUNTIME_KILL_SWITCH: "true"

jobs:
  authority:
    name: Exact tree and canonical authority
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout acceptance commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prove business tree matches PR head
        shell: bash
        run: |
          set -euo pipefail
          expected="7bb8e6d7d51b3fc7c8f27ae18e4159725c35bd84"
          actual_parent="$(git rev-parse HEAD^)"
          test "$actual_parent" = "$expected"
          changed="$(git diff --name-only HEAD^ HEAD)"
          test "$changed" = ".github/workflows/pr-763-exact-head-acceptance.yml"
          echo "validated_pr_head=$actual_parent"
          echo "acceptance_commit=$(git rev-parse HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify sole implementation authority
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/workflows
          python scripts/verify_repository.py --static-only

  repository-verification:
    name: Full backend frontend and browser verification
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_URL: sqlite+pysqlite:///./pr-763-acceptance.db
    steps:
      - name: Checkout acceptance commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement backend/requirements.txt pytest

      - name: Install frontend and browser dependencies
        working-directory: webapp
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps chrome

      - name: Run complete repository verification
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/workflows
          python scripts/verify_repository.py

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-763-browser-failure-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            webapp/playwright-report/
            webapp/test-results/

  postgres-support-acceptance:
    name: PostgreSQL support authority acceptance
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://nexus:nexus@127.0.0.1:5432/nexus_ci
    steps:
      - name: Checkout acceptance commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement backend/requirements.txt pytest

      - name: Upgrade PostgreSQL schema
        working-directory: backend
        run: |
          alembic upgrade head
          alembic current

      - name: Run PostgreSQL support acceptance gate
        run: python -m pytest -q backend/tests/test_support_conversations_postgres.py

  candidate-image:
    name: Candidate image and health contract
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout acceptance commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate deployment contract
        run: bash scripts/ci/validate_deploy_contract.sh

      - name: Build exact candidate image
        shell: bash
        run: |
          set -euo pipefail
          GIT_SHA="7bb8e6d7d51b3fc7c8f27ae18e4159725c35bd84"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          IMAGE_TAG="nexusdesk/helpdesk:pr-763-${GIT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          docker build \
            --build-arg "GIT_SHA=${GIT_SHA}" \
            --build-arg "BUILD_TIME=${BUILD_TIME}" \
            --build-arg "IMAGE_TAG=${IMAGE_TAG}" \
            --build-arg "APP_VERSION=pr-763-${GIT_SHA}" \
            --build-arg "FRONTEND_BUILD_SHA=${GIT_SHA}" \
            --tag "${IMAGE_TAG}" \
            .
          docker image inspect "${IMAGE_TAG}"

      - name: Verify packaged authorities
        run: |
          docker run --rm --entrypoint sh "$IMAGE_TAG" -c '
            test -f /app/frontend_dist/index.html
            test -f /app/backend/app/main.py
            test ! -e /app/frontend
          '

      - name: Verify health and readiness
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run -d \
            -e APP_ENV=test \
            -e SECRET_KEY=pr-763-container-smoke-only-never-production \
            -e DATABASE_URL=sqlite:////tmp/candidate.db \
            -e AUTO_INIT_DB=true \
            -e SEED_DEMO_DATA=false \
            -e OUTBOUND_PROVIDER=disabled \
            -e ENABLE_OUTBOUND_DISPATCH=false \
            -e EXTERNAL_CHANNEL_TRANSPORT=disabled \
            -e EXTERNAL_CHANNEL_DEPLOYMENT_MODE=disabled \
            -e EXTERNAL_CHANNEL_SYNC_ENABLED=false \
            -e EXTERNAL_CHANNEL_EVENT_DRIVER_ENABLED=false \
            -e EXTERNAL_CHANNEL_BRIDGE_ENABLED=false \
            -e EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED=false \
            -e PROVIDER_RUNTIME_ENABLED=false \
            -e PROVIDER_RUNTIME_TRAFFIC_MODE=control \
            -e PROVIDER_RUNTIME_CANARY_PERCENT=0 \
            -e PROVIDER_RUNTIME_KILL_SWITCH=true \
            -e UPLOAD_ROOT=/tmp/uploads \
            -p 127.0.0.1:18081:8080 \
            "$IMAGE_TAG")"
          cleanup() {
            docker logs "$container_id" || true
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:18081/healthz >/tmp/healthz.json; then
              break
            fi
            sleep 2
          done
          cat /tmp/healthz.json
          curl --fail --show-error --silent http://127.0.0.1:18081/readyz | tee /tmp/readyz.json
