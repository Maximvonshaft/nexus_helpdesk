name: git-history-secret-assurance

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  git-history-secret-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout trusted assurance code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          path: .trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout exact target full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          path: target
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify exact target identity and complete checkout
        env:
          TARGET_SHA: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git -C target rev-parse HEAD)" = "$TARGET_SHA"
          test "$(git -C target rev-parse --is-shallow-repository)" = "false"

      - name: Initialize trusted evidence workspace
        working-directory: target
        run: |
          set -Eeuo pipefail
          rm -rf -- artifacts
          install -d -m 700 -- artifacts

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compile trusted history assurance
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            .trusted/scripts/security/scanner.py \
            .trusted/scripts/security/scan_git_history.py \
            .trusted/scripts/security/scan_artifacts.py \
            .trusted/scripts/security/tests/test_scan_git_history.py \
            .trusted/scripts/security/tests/test_scan_git_history_hardening.py

      - name: Run trusted security scanner tests
        id: scanner_tests
        continue-on-error: true
        env:
          PYTHONPATH: .trusted/scripts/security
        run: |
          set -Eeuo pipefail
          python -m unittest discover -s .trusted/scripts/security/tests -p 'test_*.py' -v

      - name: Scan target complete reachable history with trusted code
        id: history_scan
        if: steps.scanner_tests.outcome == 'success'
        working-directory: target
        run: |
          set +e
          python ../.trusted/scripts/security/scan_git_history.py \
            --root . \
            --allowlist ../.trusted/config/security/secret-scan-allowlist.json \
            --max-blob-bytes 8388608 \
            --output artifacts/security-git-history-scan.json
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Ensure bounded history report exists
        if: always()
        working-directory: target
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          REPORT="artifacts/security-git-history-scan.json"
          if [[ ! -f "$REPORT" || -L "$REPORT" ]]; then
            rm -rf -- "$REPORT"
            REPORT_PATH="$REPORT" python - <<'PY'
          import json
          import os
          from pathlib import Path

          reason = "scanner_tests_failed" if os.environ.get("TEST_OUTCOME") != "success" else "history_report_missing"
          report = {
              "schema_version": "nexus_security_git_history_scan_v1",
              "status": "fail",
              "complete": False,
              "failure_reason": reason,
              "object_id_length": 0,
              "source_sha": None,
              "refs_sha256": None,
              "commit_count": 0,
              "reachable_object_count": 0,
              "reachable_blob_count": 0,
              "reachable_blob_path_count": 0,
              "accounted_blob_count": 0,
              "scanned_text_blob_count": 0,
              "binary_blob_count": 0,
              "oversized_binary_blob_count": 0,
              "unscanned_oversized_blob_count": 0,
              "unscanned_oversized": [],
              "unscanned_oversized_truncated": False,
              "finding_count": 0,
              "suppressed_count": 0,
              "by_rule": [],
              "findings": [],
              "findings_truncated": False,
          }
          Path(os.environ["REPORT_PATH"]).write_text(
              json.dumps(report, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          fi
          test -f "$REPORT"
          test ! -L "$REPORT"
          test -s "$REPORT"
          test "$(wc -c < "$REPORT")" -le 65536

      - name: Validate bounded history evidence with trusted code
        id: artifact_scan
        if: always()
        working-directory: target
        run: |
          set +e
          REPORT="artifacts/security-git-history-scan.json"
          ARTIFACT_REPORT="artifacts/security-git-history-report-scan.json"
          if [[ ! -f "$REPORT" || -L "$REPORT" ]]; then
            echo "exit_code=97" >> "$GITHUB_OUTPUT"
            echo "report_regular=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rm -rf -- "$ARTIFACT_REPORT"
          python ../.trusted/scripts/security/scan_artifacts.py \
            --root . \
            --output "$ARTIFACT_REPORT" \
            "$REPORT"
          code=$?
          if [[ ! -f "$ARTIFACT_REPORT" || -L "$ARTIFACT_REPORT" ]]; then
            code=98
            report_regular=false
          else
            report_regular=true
          fi
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "report_regular=${report_regular}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Finalize always-present status evidence
        if: always()
        working-directory: target
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
          ARTIFACT_EXIT: ${{ steps.artifact_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          ARTIFACT_REPORT="artifacts/security-git-history-report-scan.json"
          STATUS_REPORT="artifacts/security-git-history-exit-status.json"
          if [[ ! -f "$ARTIFACT_REPORT" || -L "$ARTIFACT_REPORT" ]]; then
            rm -rf -- "$ARTIFACT_REPORT"
          fi
          rm -rf -- "$STATUS_REPORT"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_report = Path("artifacts/security-git-history-report-scan.json")
          if not artifact_report.is_file() or artifact_report.is_symlink():
              artifact_report.write_text(
                  json.dumps({
                      "schema_version": "nexus_security_artifact_scan_v1",
                      "status": "fail",
                      "scanned_files": 0,
                      "finding_count": 0,
                      "suppressed_count": 0,
                      "by_rule": {},
                      "findings": [],
                      "truncated": False,
                      "failure_reason": "artifact_report_missing",
                  }, sort_keys=True, separators=(",", ":")) + "\n",
                  encoding="utf-8",
              )
          status = {
              "schema_version": "nexus_security_git_history_assurance_status_v1",
              "scanner_tests": os.environ.get("TEST_OUTCOME") or "unknown",
              "history_scan_exit_code": int(os.environ.get("HISTORY_EXIT") or 98),
              "artifact_scan_exit_code": int(os.environ.get("ARTIFACT_EXIT") or 98),
          }
          Path("artifacts/security-git-history-exit-status.json").write_text(
              json.dumps(status, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          test -f "$ARTIFACT_REPORT"
          test ! -L "$ARTIFACT_REPORT"
          test -s "$ARTIFACT_REPORT"
          test -f "$STATUS_REPORT"
          test ! -L "$STATUS_REPORT"
          test -s "$STATUS_REPORT"

      - name: Upload clean bounded history evidence
        if: always() && steps.artifact_scan.outputs.exit_code == '0' && steps.artifact_scan.outputs.report_regular == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: git-history-secret-assurance
          path: |
            target/artifacts/security-git-history-scan.json
            target/artifacts/security-git-history-report-scan.json
            target/artifacts/security-git-history-exit-status.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload sanitized history failure status
        if: always() && (steps.artifact_scan.outputs.exit_code != '0' || steps.artifact_scan.outputs.report_regular != 'true')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: git-history-secret-assurance-failure-status
          path: target/artifacts/security-git-history-exit-status.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce complete clean history assurance
        if: always()
        working-directory: target
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
          ARTIFACT_EXIT: ${{ steps.artifact_scan.outputs.exit_code || '98' }}
          REPORT_REGULAR: ${{ steps.artifact_scan.outputs.report_regular || 'false' }}
        run: |
          set -Eeuo pipefail
          test "$TEST_OUTCOME" = "success"
          test "$HISTORY_EXIT" = "0"
          test "$ARTIFACT_EXIT" = "0"
          test "$REPORT_REGULAR" = "true"
          python - <<'PY'
          import json
          from pathlib import Path

          history_path = Path("artifacts/security-git-history-scan.json")
          artifact_path = Path("artifacts/security-git-history-report-scan.json")
          if not history_path.is_file() or history_path.is_symlink():
              raise SystemExit("git_history_report_not_regular")
          if not artifact_path.is_file() or artifact_path.is_symlink():
              raise SystemExit("git_history_artifact_report_not_regular")
          history = json.loads(history_path.read_text(encoding="utf-8"))
          artifact = json.loads(artifact_path.read_text(encoding="utf-8"))
          if history.get("status") != "pass" or history.get("complete") is not True:
              raise SystemExit("git_history_assurance_failed")
          if history.get("accounted_blob_count") != history.get("reachable_blob_count"):
              raise SystemExit("git_history_accounting_incomplete")
          if artifact.get("status") != "pass":
              raise SystemExit("git_history_evidence_scan_failed")
          PY
