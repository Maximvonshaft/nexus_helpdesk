name: frontend-convergence-gate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - frontend/**
      - webapp/**
      - .github/workflows/frontend-convergence-gate.yml

permissions:
  contents: read

concurrency:
  group: frontend-convergence-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  exact-head-single-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact checkout identity
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install locked dependencies
        working-directory: webapp
        run: npm ci

      - name: Verify single frontend and browser behavior
        working-directory: webapp
        run: |
          set -Eeuo pipefail
          npm run architecture
          npm test
          npm run typecheck
          npm run lint
          npm run build
          npm run size-report
          npx playwright install --with-deps chromium
          npm run e2e

      - name: Verify bounded exact diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --check "${BASE_SHA}"...HEAD
