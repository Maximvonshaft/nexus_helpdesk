name: frontend-product-foundation-gate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited, ready_for_review]
    paths:
      - ".github/workflows/frontend-product-foundation-gate.yml"
      - "webapp/PRODUCT.md"
      - "webapp/DESIGN.md"
      - "webapp/design/frontend-product-foundation.v1.json"
      - "webapp/tests/frontend-product-foundation-contract.test.mjs"
      - "docs/engineering/frontend-product-foundation.md"
      - "docs/superpowers/specs/2026-07-12-frontend-product-foundation-design.md"
      - "docs/superpowers/plans/2026-07-12-frontend-product-foundation.md"

permissions:
  contents: read

concurrency:
  group: frontend-product-foundation-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contract:
    name: frontend-product-foundation-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Record Node runtime
        run: node --version

      - name: Run product-foundation contract
        run: node --test webapp/tests/frontend-product-foundation-contract.test.mjs

      - name: Check exact diff whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}"...HEAD
