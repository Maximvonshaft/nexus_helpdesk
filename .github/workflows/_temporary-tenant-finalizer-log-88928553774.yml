name: Temporary Tenant Authority External Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - .github/workflows/_temporary-tenant-finalizer-log-88928553774.yml

permissions:
  contents: write

concurrency:
  group: external-tenant-authority-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      EXPECTED_SOURCE: cdec15284116fc14ef048bbcb478dbbf8a985ac0
      EXPECTED_HEAD: 828d657fdf51bfe2f9991af270909fc31d17e97f
      TARGET_BRANCH: fix/governance-tenant-authority-final
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      ENABLE_OUTBOUND_DISPATCH: "false"
      OUTBOUND_PROVIDER: disabled
    steps:
      - name: Checkout exact product transport head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: fix/governance-tenant-authority-final
          persist-credentials: true

      - name: Reconstruct bounded product candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          temporary_head="$(git rev-parse HEAD)"
          test "$temporary_head" = "$EXPECTED_HEAD"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$EXPECTED_SOURCE"
          expected_paths=$'.github/temporary-governance-tenant-authority-finalizer.py\n.github/workflows/_temporary-governance-tenant-authority-finalizer.yml'
          test "$(git diff --name-only "$EXPECTED_SOURCE..$temporary_head")" = "$expected_paths"
          cp .github/temporary-governance-tenant-authority-finalizer.py /tmp/finalizer.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/finalizer.py')
          text = path.read_text(encoding='utf-8')
          changed_old = '    changed = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())\n'
          changed_new = changed_old + '    changed.update(\n        subprocess.check_output(\n            ["git", "ls-files", "--others", "--exclude-standard"], text=True\n        ).splitlines()\n    )\n'
          if text.count(changed_old) != 1:
              raise SystemExit('finalizer changed-path authority anchor mismatch')
          text = text.replace(changed_old, changed_new, 1)
          tenant_create = '    tenant = Tenant(tenant_key="description-tenant", display_name="Description Tenant")\n    actor = User(\n'
          tenant_create_fixed = '    tenant = Tenant(tenant_key="description-tenant", display_name="Description Tenant")\n    db_session.add(tenant)\n    db_session.flush()\n    actor = User(\n'
          if text.count(tenant_create) != 1:
              raise SystemExit('role description tenant setup anchor mismatch')
          text = text.replace(tenant_create, tenant_create_fixed, 1)
          if text.count('        tenant=tenant,\n') != 2:
              raise SystemExit('role description tenant relation anchor mismatch')
          text = text.replace('        tenant=tenant,\n', '        tenant_id=tenant.id,\n', 2)
          add_all_old = '    db_session.add_all([tenant, actor, template])\n'
          if text.count(add_all_old) != 1:
              raise SystemExit('role description add_all anchor mismatch')
          text = text.replace(add_all_old, '    db_session.add_all([actor, template])\n', 1)
          path.write_text(text, encoding='utf-8')
          PY
          git reset --hard "$EXPECTED_SOURCE"
          git clean -ffdx
          python /tmp/finalizer.py
          test ! -e .github/temporary-governance-tenant-authority-finalizer.py
          test ! -e .github/workflows/_temporary-governance-tenant-authority-finalizer.yml
          git diff --check
          echo "TEMPORARY_HEAD=$temporary_head" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Verify tenant and governance authority
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app backend/tests
          python -m pytest -q \
            backend/tests/test_knowledge_tenant_authority.py \
            backend/tests/test_governance_review_regressions.py \
            backend/tests/test_governance_completion_contract.py \
            backend/tests/test_governance_operator_workflows.py \
            backend/tests/test_knowledge_studio_contract.py \
            backend/tests/test_knowledge_runtime_context.py \
            backend/tests/test_knowledge_rag_runtime.py \
            backend/tests/test_knowledge_runtime_relevance_guard.py

      - name: Publish clean product candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/api/governance.py \
            backend/app/api/knowledge_items.py \
            backend/app/services/governance_service.py \
            backend/app/services/knowledge_service.py \
            backend/app/services/knowledge_studio_service.py \
            backend/tests/test_governance_review_regressions.py \
            backend/tests/test_knowledge_tenant_authority.py
          git diff --cached --check
          git commit -m "fix(governance): enforce tenant and governor authority"
          git push --force-with-lease="refs/heads/$TARGET_BRANCH:$TEMPORARY_HEAD" \
            origin "HEAD:refs/heads/$TARGET_BRANCH"
