name: Temporary Tenant Authority Test Log

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/_temporary-tenant-finalizer-log-88928553774.yml

permissions:
  actions: read
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Capture failed job tail
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "88938122792"
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            --output /tmp/tenant-authority-test.log
          tail -n 600 /tmp/tenant-authority-test.log | tee /tmp/tenant-authority-test-tail.log
      - name: Upload failure tail
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-authority-test-88938122792-tail
          path: /tmp/tenant-authority-test-tail.log
          retention-days: 1
