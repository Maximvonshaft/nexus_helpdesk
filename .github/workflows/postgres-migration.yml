name: postgres-migration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Run Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: |
          set -Eeuo pipefail
          cd backend
          alembic heads
          alembic upgrade head
          alembic downgrade 20260525_0033
          alembic upgrade head

      - name: Collect registered model and migration drift
        id: model_drift
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: |
          set +e
          cd backend
          python scripts/check_model_migration_drift.py --report-json ../model-drift-report.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Require structured drift report
        run: test -s model-drift-report.json

      - name: Require successful drift inspection
        run: |
          python - <<'PY'
          import json
          data = json.load(open("model-drift-report.json", encoding="utf-8"))
          assert data["status"] in {"ok", "drift_detected"}, data
          PY

      - name: Require complete model registration
        run: |
          python - <<'PY'
          import json
          data = json.load(open("model-drift-report.json", encoding="utf-8"))
          bad = [item for item in data["drift"] if item["kind"] == "unregistered_model_table"]
          assert not bad, bad
          PY

      - name: Require table and column parity
        run: |
          python - <<'PY'
          import json
          data = json.load(open("model-drift-report.json", encoding="utf-8"))
          bad = [item for item in data["drift"] if item["kind"] in {"missing_table", "missing_column"}]
          assert not bad, bad
          PY

      - name: Require constraint and index parity
        run: |
          python - <<'PY'
          import json
          data = json.load(open("model-drift-report.json", encoding="utf-8"))
          kinds = {"missing_unique_constraint", "missing_metadata_check", "missing_check_constraint", "missing_metadata_index", "missing_index"}
          bad = [item for item in data["drift"] if item["kind"] in kinds]
          assert not bad, bad
          PY

      - name: Enforce clean model migration drift
        run: |
          python - <<'PY'
          import json
          data = json.load(open("model-drift-report.json", encoding="utf-8"))
          assert data["status"] == "ok", data
          PY
          test "${{ steps.model_drift.outputs.exit_code }}" -eq 0

      - name: Strict production-like readiness check
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
          STORAGE_BACKEND: s3
          EXTERNAL_CHANNEL_TRANSPORT: disabled
          EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
          EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ai
          WEBCHAT_ALLOWED_ORIGINS: https://example.test
        run: cd backend && python scripts/validate_production_readiness.py
