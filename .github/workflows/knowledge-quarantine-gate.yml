name: knowledge-quarantine-gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "backend/app/models_knowledge_quarantine.py"
      - "backend/app/model_registry.py"
      - "backend/app/knowledge_quarantine/**"
      - "backend/app/services/knowledge_quarantine_service.py"
      - "backend/app/services/knowledge_service.py"
      - "backend/app/services/knowledge_retrieval_service.py"
      - "backend/app/api/knowledge_items.py"
      - "backend/app/schemas_control_plane.py"
      - "backend/alembic/versions/20260713_0060_knowledge_ingestion_quarantine.py"
      - "backend/tests/test_knowledge_quarantine_*.py"
      - ".github/workflows/knowledge-quarantine-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quarantine-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/knowledge-quarantine-gate.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source identity
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Export exact-head source snapshot
        run: |
          set -Eeuo pipefail
          tar -czf /tmp/knowledge-quarantine-source.tgz \
            backend \
            .github/workflows/knowledge-quarantine-gate.yml

      - name: Upload exact-head source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: knowledge-quarantine-source-${{ github.event.pull_request.head.sha || github.sha }}
          path: /tmp/knowledge-quarantine-source.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Run quarantine contract tests
        run: pytest -q backend/tests/test_knowledge_quarantine_contract.py

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
