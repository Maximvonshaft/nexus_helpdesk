name: provider-runtime-gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/services/provider_runtime/**'
      - 'backend/app/services/provider_*.py'
      - 'backend/app/api/admin_provider*.py'
      - 'backend/app/api/webchat_fast.py'
      - 'backend/app/main.py'
      - 'backend/tests/test_provider_*.py'
      - 'backend/tests/test_webchat_fast_reply_provider_runtime.py'
      - 'backend/tests/test_oauth_*.py'
      - 'backend/tests/test_codex_*.py'
      - 'backend/alembic/versions/*provider*.py'
      - '.github/workflows/provider-runtime-gate.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provider-runtime-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio jsonschema cryptography httpx

      - name: Repository hygiene gate
        run: |
          set -Eeuo pipefail
          if git ls-files | grep -E '^(\.venv/|__pycache__/|\.pytest_cache/)'; then
            echo 'ERROR: generated local artifacts are tracked by Git.'
            exit 1
          fi
          if ! grep -qxF '.venv/' .gitignore; then
            echo 'ERROR: .venv/ must be ignored.'
            exit 1
          fi

      - name: Admin provider credential API surface gate
        run: |
          set -Eeuo pipefail
          grep -n "prefix=\"/api/admin/provider-credentials\"" backend/app/api/admin_provider_credentials.py
          grep -n "secret_values_exposed.*False" backend/app/services/provider_runtime/codex_credential_broker.py
          if git grep -nE "return .*access_token|return .*refresh_token|access_token.*JSONResponse|refresh_token.*JSONResponse" -- backend/app/api/admin_provider_credentials.py backend/app/services/provider_runtime/codex_credential_broker.py; then
            echo 'ERROR: provider credential API may expose raw token values.'
            exit 1
          fi
          if git grep -nE "(access_token|refresh_token)" -- backend/app/api/admin_provider_credentials.py; then
            echo 'ERROR: provider credential API routes must not return raw OAuth token field names.'
            exit 1
          fi

      - name: Alembic revision integrity gate
        run: |
          set -Eeuo pipefail
          test -f backend/alembic/versions/20260521_0029_provider_runtime_tables.py
          grep -n "revision = '20260521_0029'" backend/alembic/versions/20260521_0029_provider_runtime_tables.py
          grep -n "down_revision = '20260521_0028'" backend/alembic/versions/20260521_0029_provider_runtime_tables.py
          python - <<'PY'
          from pathlib import Path
          import re
          from collections import defaultdict

          seen = defaultdict(list)
          for path in sorted(Path('backend/alembic/versions').glob('*.py')):
              text = path.read_text(encoding='utf-8')
              match = re.search(r"^revision\s*=\s*['\"]([^'\"]+)['\"]", text, re.M)
              if match:
                  seen[match.group(1)].append(str(path))
          duplicates = {rev: files for rev, files in seen.items() if len(files) > 1}
          if duplicates:
              print('DUPLICATE_REVISIONS_FOUND')
              for rev, files in duplicates.items():
                  print(rev, files)
              raise SystemExit(1)
          print(f'alembic_revision_count={len(seen)}')
          print('duplicate_revisions=0')
          PY

      - name: Direct Alembic SQLite upgrade gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:////tmp/nexus_provider_runtime_gate.db
          ALLOW_DEV_AUTH: 'false'
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          set -Eeuo pipefail
          rm -f /tmp/nexus_provider_runtime_gate.db
          cd backend
          python -m alembic upgrade head

      - name: Provider Runtime targeted tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 600 python -m pytest -q \
            backend/tests/test_provider_runtime_output_contracts.py \
            backend/tests/test_provider_runtime_router.py \
            backend/tests/test_provider_credentials_crypto.py \
            backend/tests/test_provider_runtime_token_leakage.py \
            backend/tests/test_provider_runtime_tenant_isolation.py \
            backend/tests/test_webchat_fast_reply_provider_runtime.py \
            backend/tests/test_provider_runtime_backward_compat.py \
            backend/tests/test_oauth_refresh_manager.py \
            backend/tests/test_oauth_refresh_concurrency.py \
            backend/tests/test_codex_device_auth_service.py \
            backend/tests/test_codex_auth_profile_importer.py \
            backend/tests/test_codex_app_server_provider_credential_store.py \
            backend/tests/test_codex_oauth_config.py \
            backend/tests/test_codex_openclaw_manual_flow.py \
            backend/tests/test_provider_credentials_api.py

      - name: Route safety smoke
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from app.main import app
          routes = sorted(getattr(route, 'path', '') for route in app.routes)
          assert '/api/admin/provider-credentials/codex/status' in routes, routes
          assert '/api/admin/provider-credentials/codex/callback' in routes, routes
          assert '/api/admin/provider-credentials/codex/manual/start' in routes, routes
          assert '/api/admin/provider-credentials/codex/manual/complete' in routes, routes
          assert any('fast-reply' in path for path in routes), routes
          print('route_smoke_ok')
          PY
