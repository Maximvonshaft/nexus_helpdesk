name: knowledge-runtime-pg-hybrid

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/app/services/knowledge_runtime_v2/**"
      - "backend/app/services/knowledge_retrieval_service.py"
      - "backend/app/models_control_plane.py"
      - "backend/app/settings.py"
      - "backend/alembic/versions/*knowledge_runtime*"
      - "backend/scripts/backfill_knowledge_embeddings.py"
      - "backend/scripts/probe_knowledge_runtime_pg_hybrid.py"
      - ".github/workflows/knowledge-runtime-pg-hybrid.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/services/knowledge_runtime_v2/**"
      - "backend/app/services/knowledge_retrieval_service.py"
      - "backend/app/models_control_plane.py"
      - "backend/app/settings.py"
      - "backend/alembic/versions/*knowledge_runtime*"
      - "backend/scripts/backfill_knowledge_embeddings.py"
      - "backend/scripts/probe_knowledge_runtime_pg_hybrid.py"
      - ".github/workflows/knowledge-runtime-pg-hybrid.yml"

permissions:
  contents: read

jobs:
  pg-hybrid:
    name: knowledge-runtime-pg-hybrid
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on pgvector PostgreSQL
        run: cd backend && alembic upgrade head

      - name: Probe PostgreSQL FTS + pgvector + OpenAI-compatible embeddings
        run: python backend/scripts/probe_knowledge_runtime_pg_hybrid.py
