# Brotli is intentionally not enabled here: the pinned nginx:1.27-alpine
# image does not ship ngx_brotli by default. Enabling brotli requires an image
# change or a verified dynamic module, so it is deferred until staging image
# validation confirms support.

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
  text/css
  application/javascript
  application/json
  text/plain
  image/svg+xml;

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}
resolver 127.0.0.11 ipv6=off valid=30s;

upstream nexusdesk_app {
  zone nexusdesk_app 64k;
  server app:8080 resolve;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  location /assets/ {
    proxy_pass http://nexusdesk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    proxy_pass http://nexusdesk_app/index.html;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache" always;
  }

  location = /api/webchat/ws {
    proxy_pass http://nexusdesk_app/api/webchat/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_send_timeout 30s;
    proxy_read_timeout 75s;
    proxy_buffering off;
    proxy_cache off;
    add_header Cache-Control "no-store" always;
  }

  location = /webchat/live/ws {
    proxy_pass http://nexusdesk_app/webchat/live/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;
    proxy_cache off;
    add_header Cache-Control "no-store" always;
  }

  location = /webchat/live/health {
    proxy_pass http://nexusdesk_app/webchat/live/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location /api/ {
    proxy_pass http://nexusdesk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    add_header Cache-Control "no-store" always;
  }

  location /webchat/ {
    proxy_pass http://nexusdesk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache" always;
  }

  location /metrics {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://nexusdesk_app/metrics;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Metrics-Token $http_x_metrics_token;
  }

  location /healthz {
    proxy_pass http://nexusdesk_app/healthz;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /readyz {
    proxy_pass http://nexusdesk_app/readyz;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location / {
    proxy_pass http://nexusdesk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    add_header Cache-Control "no-cache" always;
  }
}
