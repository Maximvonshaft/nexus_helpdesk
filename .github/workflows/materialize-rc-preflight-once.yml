name: Materialize bounded convergence once

on:
  push:
    branches:
      - work/744-canonical-operator-console-consolidation
    paths:
      - .github/workflows/materialize-rc-preflight-once.yml

permissions:
  contents: write

concurrency:
  group: materialize-bounded-convergence-once
  cancel-in-progress: false

jobs:
  materialize:
    if: github.repository == 'Maximvonshaft/nexus_helpdesk'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact trigger source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply fail-closed bounded convergence
        run: |
          set -Eeuo pipefail
          python scripts/ci/materialize_rc_preflight_workflow.py
          python -m py_compile \
            scripts/ci/materialize_rc_preflight_workflow.py \
            scripts/ci/actions_authority_inventory.py \
            scripts/ci/reconcile_external_channel_inventory.py \
            scripts/release/rc_preflight.py \
            backend/tests/test_canonical_policy_projection_contract.py \
            backend/tests/test_webchat_voice_p0_static.py \
            backend/tests/test_webchat_voice_static_headers.py
          grep -q 'id: rc-preflight' .github/workflows/rc-test-candidate.yml
          grep -q 'artifacts/tenant-runtime/contracts.xml' .github/workflows/tenant-runtime-authority-gate.yml
          ! grep -R -E 'uses: actions/(checkout|setup-python|setup-node|upload-artifact)@v[0-9]+' .github/workflows
          git diff --check

      - name: Remove one-shot assets
        run: |
          rm scripts/ci/materialize_rc_preflight_workflow.py
          rm .github/workflows/materialize-rc-preflight-once.yml

      - name: Commit final bounded convergence
        env:
          EXPECTED_PARENT: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_PARENT}"
          git config user.name "Nexus implementation bot"
          git config user.email "noreply@github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(governance): align exact-head contracts and harden Actions"
          git push origin HEAD:work/744-canonical-operator-console-consolidation
