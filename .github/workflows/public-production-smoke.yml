name: public-production-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public NexusDesk root URL"
        required: true
        default: "https://www.leakle.com"
        type: string
      expected_git_sha:
        description: "Optional exact /healthz git_sha expected on the public route"
        required: false
        default: ""
        type: string
      expected_image_tag:
        description: "Optional exact /healthz image_tag expected on the public route"
        required: false
        default: ""
        type: string
      origin:
        description: "Exact Origin used for WebChat CORS and AI reply smoke"
        required: true
        default: "https://www.leakle.com"
        type: string
      require_ai_reply:
        description: "Require a non-empty approved Private AI Runtime reply source"
        required: true
        default: true
        type: boolean
      max_latency_ms:
        description: "Fail WebChat reply if observed public latency exceeds this value"
        required: true
        default: "25000"
        type: string
      skip_ai_reply:
        description: "Only check health, ready, demo assets, and CORS; requires require_ai_reply=false"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  public-webchat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate public smoke inputs
        id: target
        shell: bash
        env:
          RAW_BASE_URL: ${{ inputs.base_url }}
          RAW_EXPECTED_GIT_SHA: ${{ inputs.expected_git_sha }}
          RAW_EXPECTED_IMAGE_TAG: ${{ inputs.expected_image_tag }}
          RAW_ORIGIN: ${{ inputs.origin }}
          RAW_MAX_LATENCY_MS: ${{ inputs.max_latency_ms }}
          REQUIRE_AI_REPLY_INPUT: ${{ inputs.require_ai_reply }}
          SKIP_AI_REPLY_INPUT: ${{ inputs.skip_ai_reply }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os
          import re
          from urllib.parse import urlsplit

          def fail(message: str) -> None:
              raise SystemExit(f"invalid_public_smoke_input={message}")

          def single_line(name: str, *, allow_empty: bool = False, max_length: int = 2048) -> str:
              value = os.environ.get(name, "").strip()
              if not value and not allow_empty:
                  fail(f"{name}_required")
              if len(value) > max_length or any(ord(char) < 32 or ord(char) == 127 for char in value):
                  fail(f"{name}_contains_control_or_is_too_long")
              return value

          def normalize_endpoint(name: str) -> str:
              raw = single_line(name)
              parsed = urlsplit(raw)
              if parsed.scheme.lower() not in {"http", "https"}:
                  fail(f"{name}_scheme")
              if not parsed.hostname or parsed.username or parsed.password:
                  fail(f"{name}_authority")
              if parsed.path not in {"", "/"} or parsed.query or parsed.fragment:
                  fail(f"{name}_must_be_origin_or_root")
              try:
                  port = parsed.port
              except ValueError:
                  fail(f"{name}_port")
              host = parsed.hostname.lower()
              if ":" in host:
                  fail(f"{name}_ipv6_not_supported")
              authority = host if port is None else f"{host}:{port}"
              return f"{parsed.scheme.lower()}://{authority}"

          base_url = normalize_endpoint("RAW_BASE_URL")
          origin = normalize_endpoint("RAW_ORIGIN")
          expected_git_sha = single_line("RAW_EXPECTED_GIT_SHA", allow_empty=True, max_length=40)
          if expected_git_sha and re.fullmatch(r"[0-9a-f]{40}", expected_git_sha) is None:
              fail("expected_git_sha_format")
          expected_image_tag = single_line("RAW_EXPECTED_IMAGE_TAG", allow_empty=True, max_length=512)
          if expected_image_tag and re.fullmatch(r"[a-z0-9][a-z0-9._:/@+-]{0,511}", expected_image_tag) is None:
              fail("expected_image_tag_format")

          latency_raw = single_line("RAW_MAX_LATENCY_MS", max_length=9)
          if not latency_raw.isdigit():
              fail("max_latency_ms_integer")
          latency = int(latency_raw)
          if not 1 <= latency <= 300000:
              fail("max_latency_ms_range")

          require_ai_reply = os.environ.get("REQUIRE_AI_REPLY_INPUT", "false").lower() == "true"
          skip_ai_reply = os.environ.get("SKIP_AI_REPLY_INPUT", "false").lower() == "true"
          if require_ai_reply and skip_ai_reply:
              fail("require_ai_reply_conflicts_with_skip_ai_reply")

          outputs = {
              "base_url": base_url,
              "origin": origin,
              "expected_git_sha": expected_git_sha,
              "expected_image_tag": expected_image_tag,
              "max_latency_ms": str(latency),
              "require_ai_reply": "true" if require_ai_reply else "false",
              "skip_ai_reply": "true" if skip_ai_reply else "false",
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run public WebChat smoke
        id: public_smoke
        env:
          BASE_URL: ${{ steps.target.outputs.base_url }}
          EXPECTED_GIT_SHA: ${{ steps.target.outputs.expected_git_sha }}
          EXPECTED_IMAGE_TAG: ${{ steps.target.outputs.expected_image_tag }}
          WEBCHAT_SMOKE_ORIGIN: ${{ steps.target.outputs.origin }}
          REQUIRE_AI_REPLY: ${{ steps.target.outputs.require_ai_reply }}
          SKIP_AI_REPLY: ${{ steps.target.outputs.skip_ai_reply }}
          WEBCHAT_AI_REPLY_MAX_LATENCY_MS: ${{ steps.target.outputs.max_latency_ms }}
          OUT_DIR: artifacts/public-production-smoke
        shell: bash
        run: |
          set -Eeuo pipefail
          args=(
            --base-url "$BASE_URL"
            --origin "$WEBCHAT_SMOKE_ORIGIN"
            --out-dir "$OUT_DIR"
            --poll-interval-seconds 0.75
            --max-reply-ms "$WEBCHAT_AI_REPLY_MAX_LATENCY_MS"
          )
          if [ "$REQUIRE_AI_REPLY" = "true" ]; then
            args+=(--require-ai-reply)
          fi
          if [ "$SKIP_AI_REPLY" = "true" ]; then
            args+=(--allow-pending --timeout-seconds 1)
          fi
          python scripts/smoke/public_webchat_smoke.py "${args[@]}"

      - name: Upload redacted public smoke evidence immutable
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: public-production-smoke-evidence
          path: artifacts/public-production-smoke
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize public smoke safely
        if: always()
        env:
          SUMMARY_BASE_URL: ${{ steps.target.outputs.base_url }}
          SUMMARY_EXPECTED_GIT_SHA: ${{ steps.target.outputs.expected_git_sha }}
          SUMMARY_EXPECTED_IMAGE_TAG: ${{ steps.target.outputs.expected_image_tag }}
          SUMMARY_REQUIRE_AI_REPLY: ${{ steps.target.outputs.require_ai_reply }}
          SUMMARY_SKIP_AI_REPLY: ${{ steps.target.outputs.skip_ai_reply }}
          SUMMARY_MAX_LATENCY_MS: ${{ steps.target.outputs.max_latency_ms }}
          SUMMARY_SMOKE_OUTCOME: ${{ steps.public_smoke.outcome }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          lines = [
              "## Public production smoke",
              "",
              f"- Target: `{os.environ.get('SUMMARY_BASE_URL', '[validation-failed]')}`",
              f"- Smoke outcome: `{os.environ.get('SUMMARY_SMOKE_OUTCOME', 'not-run')}`",
              f"- Expected git SHA: `{os.environ.get('SUMMARY_EXPECTED_GIT_SHA', '')}`",
              f"- Expected image tag: `{os.environ.get('SUMMARY_EXPECTED_IMAGE_TAG', '')}`",
              f"- Require AI reply: `{os.environ.get('SUMMARY_REQUIRE_AI_REPLY', 'false')}`",
              f"- Skip AI reply: `{os.environ.get('SUMMARY_SKIP_AI_REPLY', 'false')}`",
              f"- Max latency ms: `{os.environ.get('SUMMARY_MAX_LATENCY_MS', '')}`",
          ]

          summary_path = Path("artifacts/public-production-smoke/summary.json")
          if summary_path.exists():
              payload = json.loads(summary_path.read_text(encoding="utf-8"))
              compact = {
                  "public": payload.get("healthz"),
                  "readyz": payload.get("readyz"),
                  "require_ai_reply": payload.get("require_ai_reply"),
                  "ai_reply": {
                      "reply_source": payload.get("reply_source"),
                      "reply_elapsed_ms": payload.get("reply_elapsed_ms"),
                      "reply_chars": payload.get("reply_chars"),
                  },
                  "errors": payload.get("errors"),
              }
              lines.extend(["", "```json", json.dumps(compact, indent=2, ensure_ascii=False), "```"])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY
