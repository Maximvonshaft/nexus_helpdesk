name: Materialize exact-head convergence bundle

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: materialize-exact-head-convergence-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work/744-canonical-operator-console-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Build bounded exact-head convergence bundle
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/materialize
          python - <<'PY'
          import re
          from pathlib import Path

          rc = Path('.github/workflows/rc-test-candidate.yml')
          text = rc.read_text(encoding='utf-8')
          pattern = r"      - name: Validate registry and release contracts\n        run: \|\n.*?(?=\n      - name: Install locked browser test dependencies)"
          replacement = "      - name: Validate registry and release contracts\n        id: rc-preflight\n        run: python scripts/release/rc_preflight.py --artifact-root artifacts/rc-test\n"
          updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'current RC preflight block: expected one match, found {count}')
          rc.write_text(updated, encoding='utf-8')

          materializer = Path('scripts/ci/materialize_rc_preflight_workflow.py')
          script = materializer.read_text(encoding='utf-8')
          marker = '\nharden_workflows()\nprint("canonical convergence materialization applied")\n'
          if script.count(marker) != 1:
              raise SystemExit('materializer hardening boundary missing')
          materializer.write_text(
              script.replace(marker, '\nprint("canonical convergence materialization applied")\n', 1),
              encoding='utf-8',
          )
          PY
          python scripts/ci/materialize_rc_preflight_workflow.py
          python -m py_compile \
            scripts/ci/actions_authority_inventory.py \
            scripts/ci/reconcile_external_channel_inventory.py \
            scripts/release/rc_preflight.py \
            backend/tests/test_canonical_policy_projection_contract.py \
            backend/tests/test_webchat_voice_p0_static.py \
            backend/tests/test_webchat_voice_static_headers.py
          grep -q 'id: rc-preflight' .github/workflows/rc-test-candidate.yml
          grep -q 'artifacts/tenant-runtime/contracts.xml' .github/workflows/tenant-runtime-authority-gate.yml

          git show d6b53c8d5a36fdaf193cb2403b98349fc47da712:.github/workflows/agent-coordination-self-test.yml > .github/workflows/agent-coordination-self-test.yml
          rm -f scripts/ci/materialize_rc_preflight_workflow.py
          rm -f .github/workflows/materialize-rc-preflight-once.yml
          git diff --check

          python - <<'PY'
          import json
          import subprocess
          import zipfile
          from pathlib import Path

          raw = subprocess.check_output(['git', 'diff', '--name-status', '-z', 'HEAD'])
          parts = raw.decode('utf-8').split('\0')
          upsert = []
          deleted = []
          index = 0
          while index < len(parts) and parts[index]:
              status = parts[index]
              path = parts[index + 1]
              index += 2
              if status.startswith('D'):
                  deleted.append(path)
              elif status.startswith(('A', 'M')):
                  upsert.append(path)
              else:
                  raise SystemExit(f'unsupported materialized change status: {status} {path}')
          manifest = {'base_sha': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(), 'upsert': sorted(upsert), 'delete': sorted(deleted)}
          root = Path('artifacts/materialize')
          (root / 'changes.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          with zipfile.ZipFile(root / 'files.zip', 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(upsert):
                  archive.write(path, path)
          PY

      - name: Upload bounded convergence bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: exact-head-convergence-bundle-${{ github.event.pull_request.head.sha }}
          path: |
            artifacts/materialize/changes.json
            artifacts/materialize/files.zip
          if-no-files-found: error
          retention-days: 1
