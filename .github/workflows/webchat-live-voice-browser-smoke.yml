name: WebChat Live Voice Browser Smoke

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - backend/app/static/webchat/widget.js
      - backend/app/static/webchat/live-voice-capture-worklet.js
      - backend/tests/test_webchat_live_voice_audioworklet.py
      - webapp/tests/live-voice-worklet-runtime.test.mjs
      - webapp/e2e/live-voice-audioworklet.spec.ts
      - webapp/playwright.voice-smoke.config.ts
      - .github/workflows/webchat-live-voice-browser-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source identity
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Setup Node immutable
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install locked web dependencies
        working-directory: webapp
        run: npm ci

      - name: Verify JavaScript syntax and Worklet runtime contract
        working-directory: webapp
        run: |
          node --check ../backend/app/static/webchat/widget.js
          node --check ../backend/app/static/webchat/live-voice-capture-worklet.js
          node --test tests/live-voice-worklet-runtime.test.mjs

      - name: Install Playwright-pinned Chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run exact-head browser lifecycle smoke
        working-directory: webapp
        env:
          CI: true
        run: npx playwright test --config playwright.voice-smoke.config.ts

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: webchat-live-voice-browser-evidence
          path: |
            webapp/playwright-report
            webapp/test-results
          if-no-files-found: ignore
          retention-days: 7
