name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile backend
        run: python -m compileall backend/app backend/scripts

      - name: Run deterministic backend tests
        run: |
          pytest -q \
            backend/tests/test_outbound_safety.py \
            backend/tests/test_next_phase_max_push.py \
            backend/tests/test_openclaw_local_ops.py \
            backend/tests/test_round20a_rectification.py \
            backend/tests/test_round20b_legacy_frontend.py \
            backend/tests/test_round27_frontend_hardening.py

      - name: Development readiness import check
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///./helpdesk_ci.db
        run: cd backend && python scripts/validate_production_readiness.py
