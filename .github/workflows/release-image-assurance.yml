name: release-image-assurance

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "backend/**"
      - "webapp/**"
      - "scripts/**"
      - "config/security/container-*.json"
      - ".github/workflows/release-image-assurance.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assure-candidate-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CANDIDATE_IMAGE: nexus-candidate:${{ github.sha }}
      ARTIFACT_DIR: artifacts/release-image
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Compile and unit-test assurance policy
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/security/release_image_assurance.py \
            scripts/security/sanitize_image_sbom.py \
            scripts/security/tests/test_release_image_assurance.py \
            scripts/security/tests/test_sanitize_image_sbom.py
          python -m unittest \
            scripts/security/tests/test_release_image_assurance.py \
            scripts/security/tests/test_sanitize_image_sbom.py

      - name: Build local candidate image only
        run: |
          set +e
          set -o pipefail
          mkdir -p "${ARTIFACT_DIR}"
          docker build \
            --progress=plain \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="1970-01-01T00:00:00Z" \
            --build-arg IMAGE_TAG="${CANDIDATE_IMAGE}" \
            --build-arg APP_VERSION="candidate" \
            --build-arg FRONTEND_BUILD_SHA="${GITHUB_SHA}" \
            --tag "${CANDIDATE_IMAGE}" \
            --file Dockerfile . 2>&1 | tee "${ARTIFACT_DIR}/candidate-build.full.log"
          build_code=${PIPESTATUS[0]}
          printf '%s\n' "${build_code}" > "${ARTIFACT_DIR}/build-exit-code"
          tail -n 120 "${ARTIFACT_DIR}/candidate-build.full.log" > "${ARTIFACT_DIR}/candidate-build-summary.txt"
          rm -f "${ARTIFACT_DIR}/candidate-build.full.log"
          if [ "${build_code}" -eq 0 ]; then
            image_id="$(docker image inspect "${CANDIDATE_IMAGE}" --format '{{.Id}}')"
            test -n "${image_id}"
            printf '%s\n' "${image_id}" > "${ARTIFACT_DIR}/image-id.txt"
            printf '%s\n' "${GITHUB_SHA}" > "${ARTIFACT_DIR}/source-sha.txt"
            test "$(docker image inspect "${CANDIDATE_IMAGE}" --format '{{index .Config.Env 0}}' | sed -n '1p')" != ""
          fi
          exit "${build_code}"

      - name: Scan candidate image with immutable Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: json
          output: artifacts/release-image/trivy.raw.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: "0"
          scanners: vuln

      - name: Generate raw CycloneDX image SBOM with immutable Syft action
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.CANDIDATE_IMAGE }}
          format: cyclonedx-json
          output-file: artifacts/release-image/image.raw.cdx.json
          upload-artifact: false

      - name: Produce minimal PII-free application SBOM
        id: sanitize_sbom
        shell: bash
        run: |
          set +e
          python scripts/security/sanitize_image_sbom.py \
            --input "${ARTIFACT_DIR}/image.raw.cdx.json" \
            --overrides config/security/container-license-metadata-overrides.json \
            --output "${ARTIFACT_DIR}/image.safe.cdx.json"
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/sbom-sanitization-exit-code"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('artifacts/release-image')
          def digest(path):
              return 'sha256:' + hashlib.sha256(path.read_bytes()).hexdigest()
          payload = {
              'schema_version': 'nexus_raw_image_evidence_digests_v1',
              'trivy_report_sha256': digest(root / 'trivy.raw.json'),
              'raw_cyclonedx_sha256': digest(root / 'image.raw.cdx.json'),
          }
          (root / 'raw-evidence-digests.json').write_text(
              json.dumps(payload, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          exit 0

      - name: Evaluate vulnerability and license policy
        id: policy
        shell: bash
        run: |
          set +e
          python scripts/security/release_image_assurance.py vulnerabilities \
            --report "${ARTIFACT_DIR}/trivy.raw.json" \
            --exceptions config/security/container-vulnerability-exceptions.json \
            --output "${ARTIFACT_DIR}/vulnerability-summary.json" \
            --today 2026-07-11
          vuln_code=$?
          python scripts/security/release_image_assurance.py licenses \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --policy config/security/container-license-policy.json \
            --output "${ARTIFACT_DIR}/license-summary.json" \
            --today 2026-07-11
          license_code=$?
          image_id="$(cat "${ARTIFACT_DIR}/image-id.txt")"
          python scripts/security/release_image_assurance.py manifest \
            --source-sha "${GITHUB_SHA}" \
            --image-id "${image_id}" \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --vulnerabilities "${ARTIFACT_DIR}/vulnerability-summary.json" \
            --licenses "${ARTIFACT_DIR}/license-summary.json" \
            --output "${ARTIFACT_DIR}/release-image-manifest.json"
          manifest_code=$?
          printf '%s\n' "${vuln_code}" > "${ARTIFACT_DIR}/vulnerability-exit-code"
          printf '%s\n' "${license_code}" > "${ARTIFACT_DIR}/license-exit-code"
          printf '%s\n' "${manifest_code}" > "${ARTIFACT_DIR}/manifest-exit-code"
          echo "vulnerability_exit=${vuln_code}" >> "$GITHUB_OUTPUT"
          echo "license_exit=${license_code}" >> "$GITHUB_OUTPUT"
          echo "manifest_exit=${manifest_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Remove raw third-party metadata before evidence upload
        if: always()
        run: |
          set -Eeuo pipefail
          rm -f "${ARTIFACT_DIR}/trivy.raw.json" "${ARTIFACT_DIR}/image.raw.cdx.json"
          test ! -e "${ARTIFACT_DIR}/trivy.raw.json"
          test ! -e "${ARTIFACT_DIR}/image.raw.cdx.json"

      - name: Scan bounded evidence for secrets and customer PII
        id: artifact_scan
        shell: bash
        run: |
          set +e
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "${ARTIFACT_DIR}/artifact-scan.json" \
            "${ARTIFACT_DIR}/candidate-build-summary.txt" \
            "${ARTIFACT_DIR}/image.safe.cdx.json" \
            "${ARTIFACT_DIR}/image.safe.cdx.json.summary.json" \
            "${ARTIFACT_DIR}/raw-evidence-digests.json" \
            "${ARTIFACT_DIR}/vulnerability-summary.json" \
            "${ARTIFACT_DIR}/license-summary.json" \
            "${ARTIFACT_DIR}/release-image-manifest.json"
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/artifact-scan-exit-code"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Attest bounded release-image manifest
        if: github.event_name == 'workflow_dispatch' && steps.sanitize_sbom.outputs.exit_code == '0' && steps.policy.outputs.manifest_exit == '0' && steps.artifact_scan.outputs.exit_code == '0'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: artifacts/release-image/release-image-manifest.json

      - name: Upload bounded release-image evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-image-assurance
          path: artifacts/release-image
          retention-days: 14
          if-no-files-found: error

      - name: Enforce release image gate
        if: always()
        run: |
          set -Eeuo pipefail
          test "$(cat "${ARTIFACT_DIR}/build-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/sbom-sanitization-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/vulnerability-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/license-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/manifest-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/artifact-scan-exit-code")" = "0"
          test "$(jq -r '.status' "${ARTIFACT_DIR}/release-image-manifest.json")" = "pass"
          test "$(jq -r '.image_pushed' "${ARTIFACT_DIR}/release-image-manifest.json")" = "false"
          test "$(jq -r '.deployment_performed' "${ARTIFACT_DIR}/release-image-manifest.json")" = "false"
