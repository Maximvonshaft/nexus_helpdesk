name: Temporary Telephony Backend Convergence

on:
  push:
    branches:
      - feat/canonical-livekit-telephony
    paths:
      - .github/workflows/_temporary-telephony-backend-convergence.yml
      - scripts/_temporary_telephony_backend_convergence.py
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/_temporary-telephony-backend-convergence.yml
      - scripts/_temporary_telephony_backend_convergence.py
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: temporary-telephony-backend-convergence
  cancel-in-progress: true

jobs:
  converge:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout temporary head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: feat/canonical-livekit-telephony
          persist-credentials: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply, verify and publish clean convergence
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/_temporary_telephony_backend_convergence.py 2>&1 | tee /tmp/telephony-backend-convergence.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: telephony-backend-convergence-${{ github.sha }}
          path: /tmp/telephony-backend-convergence.log
          if-no-files-found: warn
          retention-days: 3
