# NexusDesk sensitive path hardening.
# Unknown app routes may fall back to SPA/front-end 200, but these probe paths should never return 200.

location ~* ^/(?:\.env(?:\..*)?|\.git(?:/|$)|\.svn(?:/|$)|\.hg(?:/|$)|\.aws(?:/|$)|\.docker(?:/|$)|\.kube(?:/|$)|\.npmrc$|\.yarnrc$|\.pnpmrc$|\.DS_Store$) {
    access_log off;
    return 404;
}

location ~* ^/(?:wp-config\.php(?:\..*)?|phpinfo\.php|info\.php|credentials\.json|config\.json|serviceAccountKey\.json|firebase-admin\.json|firebase\.json|google-services\.json|GoogleService-Info\.plist|serverless\.ya?ml|terraform\.tfvars|private\.key|privatekey\.key|server\.key|key\.pem|cert\.pem|storage/logs/laravel\.log)$ {
    access_log off;
    return 404;
}
