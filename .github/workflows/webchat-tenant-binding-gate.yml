name: webchat-tenant-binding-gate

on:
  pull_request:
    paths:
      - "backend/app/models_webchat_binding.py"
      - "backend/app/model_registry.py"
      - "backend/app/services/webchat_tenant_binding.py"
      - "backend/app/services/webchat_rate_limit.py"
      - "backend/alembic/versions/20260711_0058_webchat_public_origin_bindings.py"
      - "backend/scripts/manage_webchat_origin_binding.py"
      - "backend/tests/test_webchat_public_tenant_binding.py"
      - ".github/workflows/webchat-tenant-binding-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webchat-tenant-binding:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile binding boundary
        run: |
          python -m py_compile \
            backend/app/models_webchat_binding.py \
            backend/app/services/webchat_tenant_binding.py \
            backend/app/services/webchat_rate_limit.py \
            backend/scripts/manage_webchat_origin_binding.py \
            backend/tests/test_webchat_public_tenant_binding.py
      - name: Prove one migration line containing 0058
        working-directory: backend
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          script = ScriptDirectory.from_config(Config("alembic.ini"))
          heads = script.get_heads()
          assert len(heads) == 1, heads
          assert heads[0] == "20260711_0058", heads
          revisions = {row.revision for row in script.walk_revisions("base", heads[0])}
          assert "20260711_0058" in revisions, revisions
          assert "20260711_0057" in revisions, revisions
          PY
      - name: PostgreSQL migration round trip
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          alembic downgrade 20260711_0057
          alembic upgrade head
      - name: Verify ORM and migration convergence
        run: python backend/scripts/check_model_migration_drift.py
      - name: Run binding and rate-limit regressions
        run: |
          pytest -q \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_webchat_rate_limit_bucket.py
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
