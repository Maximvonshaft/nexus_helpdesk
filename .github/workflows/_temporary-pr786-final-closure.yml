name: Temporary PR 786 Final Closure

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

concurrency:
  group: pr786-final-closure
  cancel-in-progress: true

jobs:
  close:
    if: github.event.pull_request.number == 786 && github.event.pull_request.head.ref == 'freeze/de2bf340-conversation-routing'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: true
          ref: freeze/de2bf340-conversation-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply remaining canonical fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          git rev-parse HEAD > /tmp/pr786-start-sha
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          core_path = Path('backend/app/services/nexus_osr/tool_execution_service_core.py')
          core = core_path.read_text(encoding='utf-8')
          old_import = 'from ...webchat_models import WebchatConversation\n'
          new_import = 'from ...webchat_models import WebchatConversation, WebchatHandoffRequest\n'
          if new_import not in core:
              if old_import not in core:
                  raise SystemExit('Tool Executor Core WebChat import state is unexpected')
              core = core.replace(old_import, new_import, 1)
          handler_anchor = core.index('def _production_handlers(')
          support_start = core.index('    def support_availability(', handler_anchor)
          support_end = core.index('\n    def ticket_create(', support_start)
          support = core[support_start:support_end]
          if 'request_row=request_row' not in support:
              call_start = support.index('        summary = availability_summary(\n')
              call_end = support.index('        return ActionExecutionResult(\n', call_start)
              availability_call = (
                  '        request_row = (\n'
                  '            db.get(WebchatHandoffRequest, current.current_handoff_request_id)\n'
                  '            if current.current_handoff_request_id is not None\n'
                  '            else None\n'
                  '        )\n'
                  '        if request_row is not None and request_row.conversation_id != current.id:\n'
                  '            request_row = None\n'
                  '        summary = availability_summary(\n'
                  '            db,\n'
                  '            tenant_key=control.tenant_key,\n'
                  '            country_code=control.country_code,\n'
                  '            channel_key=control.channel_key,\n'
                  '            request_row=request_row,\n'
                  '        )\n'
              )
              support = support[:call_start] + availability_call + support[call_end:]
              core = core[:support_start] + support + core[support_end:]
          summary_start = core.index('def _availability_customer_summary(')
          summary_end = core.index('\n\ndef _decision_for_policy_gate(', summary_start)
          summary_impl = dedent('''
          def _availability_customer_summary(summary: dict[str, Any]) -> str:
              online = int(summary.get("online_agents") or 0)
              available = int(summary.get("available_capacity") or 0)
              queued = int(summary.get("queue_count") or 0)
              raw_position = summary.get("queue_position")
              position = int(raw_position) if isinstance(raw_position, int) else None
              if online <= 0:
                  return "No human support agent is currently online."
              if available > 0:
                  return (
                      "Human support is available with "
                      f"{available} open conversation slot(s)."
                  )
              if position is not None and position > 0:
                  ahead = max(0, position - 1)
                  if ahead == 0:
                      return (
                          "Human support is currently at capacity. "
                          "This customer is next in the eligible queue."
                      )
                  return (
                      "Human support is currently at capacity with "
                      f"{ahead} conversation(s) ahead of this customer."
                  )
              return (
                  "Human support is currently at capacity with "
                  f"{queued} conversation(s) waiting."
              )
          ''').strip()
          core = core[:summary_start] + summary_impl + core[summary_end:]
          core_path.write_text(core, encoding='utf-8')

          service_path = Path('backend/app/services/conversation_first_service.py')
          service = service_path.read_text(encoding='utf-8')
          if 'from ..enums import SourceChannel, TicketPriority\n' not in service:
              service = service.replace(
                  'from ..models import Customer, Tenant, Ticket\n',
                  'from ..enums import SourceChannel, TicketPriority\nfrom ..models import Customer, Tenant, Ticket\n',
                  1,
              )
          if 'from ..voice_models import WebchatVoiceSession\n' not in service:
              service = service.replace(
                  'from ..utils.time import utc_now\n',
                  'from ..utils.time import utc_now\nfrom ..voice_models import WebchatVoiceSession\n',
                  1,
              )
          if 'from .nexus_osr.auto_ticket_service import create_or_reuse_ticket_from_case_context\n' not in service:
              service = service.replace(
                  'from .tenant_authority import stamp_runtime_tenant, tenant_runtime_authority_mode\n',
                  'from .nexus_osr.auto_ticket_service import create_or_reuse_ticket_from_case_context\nfrom .nexus_osr.case_context import CaseContext\nfrom .tenant_authority import stamp_runtime_tenant, tenant_runtime_authority_mode\n',
                  1,
              )
          helper = dedent('''

          def ensure_voice_ticket_for_public_conversation(
              db: Session,
              *,
              conversation_public_id: str,
              visitor_token: str | None,
          ) -> Ticket:
              """Lazily bind the existing voice control plane to one canonical Ticket.

              Text WebChat remains ticketless. This transition occurs only after the visitor
              presents a valid conversation token and explicitly initiates live voice.
              """

              query = db.query(WebchatConversation).filter(
                  WebchatConversation.public_id == conversation_public_id
              )
              if db.bind and db.bind.dialect.name.startswith("postgresql"):
                  query = query.with_for_update()
              conversation = query.first()
              if conversation is None:
                  raise HTTPException(
                      status_code=status.HTTP_404_NOT_FOUND,
                      detail="webchat conversation not found",
                  )
              _validate_token(conversation, visitor_token)
              if conversation.ticket_id is not None:
                  ticket = db.get(Ticket, conversation.ticket_id)
                  if ticket is None:
                      raise HTTPException(
                          status_code=status.HTTP_409_CONFLICT,
                          detail="webchat voice ticket relationship is invalid",
                      )
              else:
                  control = ensure_conversation_control(db, conversation=conversation)
                  customer = (
                      db.get(Customer, control.customer_id)
                      if control.customer_id is not None
                      else None
                  )
                  context = CaseContext(
                      conversation_id=conversation.id,
                      ticket_id=None,
                      channel=conversation.channel_key,
                      country_code=control.country_code,
                      issue_type="voice_support",
                  ).with_inbound_message(
                      "Customer initiated a live voice support session.",
                      channel=conversation.channel_key,
                      country_code=control.country_code,
                  )
                  result = create_or_reuse_ticket_from_case_context(
                      db,
                      case_context=context,
                      customer=customer,
                      conversation=conversation,
                      source_channel=SourceChannel.web_chat,
                      title="Live voice support",
                      description="Customer initiated a live voice support session.",
                      priority=TicketPriority.medium,
                      issue_type="voice_support",
                  )
                  ticket = result.ticket
              db.query(WebchatVoiceSession).filter(
                  WebchatVoiceSession.conversation_id == conversation.id,
                  WebchatVoiceSession.ticket_id.is_(None),
              ).update(
                  {WebchatVoiceSession.ticket_id: ticket.id},
                  synchronize_session=False,
              )
              conversation.ticket_id = ticket.id
              conversation.updated_at = utc_now()
              db.flush()
              return ticket
          ''')
          if 'def ensure_voice_ticket_for_public_conversation(' not in service:
              service = service.rstrip() + helper + '\n'
          service_path.write_text(service, encoding='utf-8')

          voice_api_path = Path('backend/app/api/webchat_voice.py')
          voice_api = voice_api_path.read_text(encoding='utf-8')
          import_line = 'from ..services.conversation_first_service import ensure_voice_ticket_for_public_conversation\n'
          if import_line not in voice_api:
              voice_api = voice_api.replace(
                  'from ..webchat_voice_config import load_webchat_voice_runtime_config\n',
                  'from ..webchat_voice_config import load_webchat_voice_runtime_config\n' + import_line,
                  1,
              )
          call_anchor = '    with managed_session(db):\n        return create_public_voice_session(\n'
          call_replacement = (
              '    with managed_session(db):\n'
              '        ensure_voice_ticket_for_public_conversation(\n'
              '            db,\n'
              '            conversation_public_id=conversation_id,\n'
              '            visitor_token=visitor_token,\n'
              '        )\n'
              '        return create_public_voice_session(\n'
          )
          if '        ensure_voice_ticket_for_public_conversation(\n' not in voice_api:
              if voice_api.count(call_anchor) != 1:
                  raise SystemExit('public voice creation anchor mismatch')
              voice_api = voice_api.replace(call_anchor, call_replacement, 1)
          voice_api_path.write_text(voice_api, encoding='utf-8')

          routing_test_path = Path('backend/tests/test_conversation_first_agent_routing.py')
          routing_test = routing_test_path.read_text(encoding='utf-8')
          routing_test = routing_test.replace(
              '    assert result["ok"] is True\n',
              '    assert result["direction"] == "agent"\n    assert result["body_text"] == "I am handling this conversation now."\n    assert result["delivery_status"] == "sent"\n',
              1,
          )
          routing_test_path.write_text(routing_test, encoding='utf-8')

          voice_test_path = Path('backend/tests/test_webchat_voice_api.py')
          voice_test = voice_test_path.read_text(encoding='utf-8')
          old_name = 'def test_public_create_voice_session_binds_conversation_without_ticket():'
          if old_name in voice_test:
              test_start = voice_test.index(old_name)
              test_end = voice_test.index(
                  '\n\ndef test_public_create_voice_session_rejects_invalid_token():',
                  test_start,
              )
              replacement = dedent('''
              def test_public_create_voice_session_lazily_binds_canonical_ticket():
                  client = TestClient(app)
                  conversation_id, visitor_token, ticket_id = _create_webchat_conversation(
                      client,
                      create_ticket=False,
                  )
                  assert ticket_id is None

                  created = client.post(
                      f"/api/webchat/conversations/{conversation_id}/voice/sessions",
                      headers={"X-Webchat-Visitor-Token": visitor_token},
                      json={"locale": "de-CH", "recording_consent": False},
                  )

                  assert created.status_code == 200, created.text
                  payload = created.json()
                  assert payload["ok"] is True
                  assert payload["voice_session_id"].startswith("wv_")
                  assert payload["provider"] == "mock"
                  assert payload["status"] == "ringing"
                  assert payload["voice_page_url"].endswith(payload["voice_session_id"])
                  assert payload["participant_token"].startswith("mock_voice_token_")
                  assert "ticket_id" not in payload
                  assert payload["recording_status"] == "disabled"
                  assert payload["transcript_status"] == "disabled"
                  assert payload["summary_status"] == "pending"

                  db = SessionLocal()
                  try:
                      row = (
                          db.query(WebchatVoiceSession)
                          .filter(WebchatVoiceSession.public_id == payload["voice_session_id"])
                          .one()
                      )
                      conversation = (
                          db.query(WebchatConversation)
                          .filter(WebchatConversation.public_id == conversation_id)
                          .one()
                      )
                      assert row.ticket_id is not None
                      assert conversation.ticket_id == row.ticket_id
                      assert row.provider == "mock"
                      events = (
                          db.query(WebchatEvent)
                          .filter(
                              WebchatEvent.conversation_id == row.conversation_id,
                              WebchatEvent.ticket_id == row.ticket_id,
                          )
                          .all()
                      )
                      event_types = {event.event_type for event in events}
                      assert "voice.session.created" in event_types
                      assert "voice.session.ringing" in event_types
                  finally:
                      db.close()
              ''').strip()
              voice_test = voice_test[:test_start] + replacement + voice_test[test_end:]
          voice_test_path.write_text(voice_test, encoding='utf-8')
          PY

      - name: Run focused regression
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py

      - name: Commit clean candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/pr786-start-sha)"
          git fetch --no-tags origin freeze/de2bf340-conversation-routing
          test "$(git rev-parse origin/freeze/de2bf340-conversation-routing)" = "$start_sha"
          git rm .github/workflows/_temporary-pr786-final-closure.yml
          git add -A
          git diff --cached --check
          test "$(find .github/workflows -maxdepth 1 -type f | sort)" = ".github/workflows/canonical-acceptance.yml"
          test -z "$(find .github -maxdepth 2 -type f -name '*pr786*' -print)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: close conversation routing authority gaps'
          git push origin HEAD:freeze/de2bf340-conversation-routing
