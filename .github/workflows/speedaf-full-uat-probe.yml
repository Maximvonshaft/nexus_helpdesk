name: speedaf-full-uat-probe

on:
  workflow_dispatch:
    inputs:
      country_code:
        description: 'Country code for waybillCode/query'
        required: true
        default: 'CH'
        type: string
      cancel_reason:
        description: 'Cancel reason code'
        required: true
        default: 'CC01'
        type: string
      write_ack:
        description: 'Must equal I_UNDERSTAND_SPEEDAF_UAT_WRITES to run write/system actions'
        required: true
        type: string

permissions:
  contents: read

jobs:
  speedaf-full-uat-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: backend
      SPEEDAF_MCP_ENABLED: ${{ secrets.SPEEDAF_UAT_MCP_ENABLED }}
      SPEEDAF_MCP_BASE_URL: ${{ secrets.SPEEDAF_UAT_MCP_BASE_URL }}
      SPEEDAF_MCP_APP_CODE: ${{ secrets.SPEEDAF_UAT_MCP_APP_CODE }}
      SPEEDAF_MCP_SECRET_KEY: ${{ secrets.SPEEDAF_UAT_MCP_SECRET_KEY }}
      SPEEDAF_MCP_CONTENT_TYPE: ${{ vars.SPEEDAF_UAT_MCP_CONTENT_TYPE || 'text/plain' }}
      SPEEDAF_MCP_DATA_MODE: ${{ vars.SPEEDAF_UAT_MCP_DATA_MODE || 'string' }}
      SPEEDAF_MCP_REQUIRE_SIGN: ${{ vars.SPEEDAF_UAT_MCP_REQUIRE_SIGN || 'false' }}
      SPEEDAF_WORK_ORDER_CREATE_ENABLED: 'true'
      SPEEDAF_UPDATE_ADDRESS_ENABLED: 'true'
      SPEEDAF_CANCEL_ENABLED: 'true'
      SPEEDAF_VOICE_CALLBACK_ENABLED: 'true'
      SPEEDAF_FULL_UAT_WRITE_ACK: ${{ inputs.write_ack }}
      SPEEDAF_FULL_UAT_WAYBILL_CODE: ${{ secrets.SPEEDAF_UAT_TEST_WAYBILL_CODE }}
      SPEEDAF_FULL_UAT_CALLER_ID: ${{ secrets.SPEEDAF_UAT_TEST_CALLER_ID }}
      SPEEDAF_FULL_UAT_WHATSAPP_PHONE: ${{ secrets.SPEEDAF_UAT_TEST_WHATSAPP_PHONE }}
      SPEEDAF_FULL_UAT_COUNTRY_CODE: ${{ inputs.country_code }}
      SPEEDAF_FULL_UAT_CANCEL_REASON: ${{ inputs.cancel_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Validate destructive UAT acknowledgement
        run: |
          set -Eeuo pipefail
          if [ "${SPEEDAF_FULL_UAT_WRITE_ACK}" != "I_UNDERSTAND_SPEEDAF_UAT_WRITES" ]; then
            echo "Refusing to run Speedaf UAT write/system probe without exact acknowledgement."
            exit 2
          fi

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt

      - name: Run full Speedaf UAT probe
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          python backend/scripts/speedaf_full_uat_probe.py \
            --waybill-code "$SPEEDAF_FULL_UAT_WAYBILL_CODE" \
            --caller-id "$SPEEDAF_FULL_UAT_CALLER_ID" \
            --whatsapp-phone "$SPEEDAF_FULL_UAT_WHATSAPP_PHONE" \
            --country-code "$SPEEDAF_FULL_UAT_COUNTRY_CODE" \
            --cancel-reason "$SPEEDAF_FULL_UAT_CANCEL_REASON" \
            --write-ack "$SPEEDAF_FULL_UAT_WRITE_ACK" \
            --output-json artifacts/speedaf-full-uat-report.json

      - name: Assert full report is sanitized
        if: always()
        run: |
          set -Eeuo pipefail
          REPORT="artifacts/speedaf-full-uat-report.json"
          test -f "$REPORT"
          for value in \
            "$SPEEDAF_FULL_UAT_WAYBILL_CODE" \
            "$SPEEDAF_FULL_UAT_CALLER_ID" \
            "$SPEEDAF_FULL_UAT_WHATSAPP_PHONE" \
            "$SPEEDAF_MCP_APP_CODE" \
            "$SPEEDAF_MCP_SECRET_KEY"; do
            if [ -n "$value" ] && grep -F "$value" "$REPORT" >/dev/null 2>&1; then
              echo 'ERROR: report contains sensitive material.'
              exit 3
            fi
          done

      - name: Upload redacted full UAT report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: speedaf-full-uat-report
          path: artifacts/speedaf-full-uat-report.json
          if-no-files-found: warn
