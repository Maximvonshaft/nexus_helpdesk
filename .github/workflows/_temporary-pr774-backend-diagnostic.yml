name: Temporary PR 774 Backend Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr774-backend-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'fix/pr774-final-backend-closure'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout isolated head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: fix/pr774-final-backend-closure

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply diagnostic patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee /tmp/pr774-patch.log
          from pathlib import Path

          def replace_once(label: str, path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              print(f'{label}: matches={count}')
              if count != 1:
                  raise SystemExit(f'replacement mismatch {path}: expected=1 actual={count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'reply contract',
              'backend/app/services/conversation_operator_service.py',
              '    return _message_payload(message)\n',
              '    return {"ok": True, **_message_payload(message)}\n',
          )
          replace_once(
              'voice test name',
              'backend/tests/test_webchat_voice_api.py',
              'def test_public_create_voice_session_binds_conversation_without_ticket():\n',
              'def test_public_create_voice_session_lazily_binds_ticket_for_voice():\n',
          )
          replace_once(
              'voice test body',
              'backend/tests/test_webchat_voice_api.py',
              '''        row = db.query(WebchatVoiceSession).filter(WebchatVoiceSession.public_id == payload["voice_session_id"]).one()
                  assert row.ticket_id is None
                  assert row.provider == "mock"
                  events = db.query(WebchatEvent).filter(
                      WebchatEvent.conversation_id == row.conversation_id,
                      WebchatEvent.ticket_id.is_(None),
                  ).all()
              ''',
              '''        row = db.query(WebchatVoiceSession).filter(
                      WebchatVoiceSession.public_id == payload["voice_session_id"]
                  ).one()
                  assert row.ticket_id is not None
                  assert row.provider == "mock"
                  conversation = db.get(WebchatConversation, row.conversation_id)
                  assert conversation is not None
                  assert conversation.ticket_id == row.ticket_id
                  events = db.query(WebchatEvent).filter(
                      WebchatEvent.conversation_id == row.conversation_id,
                      WebchatEvent.ticket_id == row.ticket_id,
                  ).all()
              ''',
          )
          compensation = Path('backend/tests/test_webchat_voice_room_compensation.py').read_text(encoding='utf-8')
          print('compensation legacy assertion:', compensation.count('canonical_list = client.get('))
          if 'canonical_list = client.get(' in compensation:
              replace_once(
                  'compensation block',
                  'backend/tests/test_webchat_voice_room_compensation.py',
                  '''    canonical_list = client.get(
                      "/api/support/conversations",
                      params={"view": "all", "channel": "all", "limit": 100},
                      headers=_admin_headers(),
                  )
                  assert canonical_list.status_code == 200, canonical_list.text
                  assert any(
                      item["session_key"].endswith(f":{payload['conversation_id']}")
                      for item in canonical_list.json()["items"]
                  )
                  ''',
                  '',
              )
          print('patch complete')
          PY

      - name: Run focused tests
        id: tests
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q backend/app 2>&1 | tee /tmp/pr774-compile.log
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py \
            2>&1 | tee /tmp/pr774-pytest.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr774-backend-diagnostic-${{ github.sha }}
          path: |
            /tmp/pr774-patch.log
            /tmp/pr774-compile.log
            /tmp/pr774-pytest.log
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce diagnostic success
        if: always()
        env:
          PATCH_OUTCOME: ${{ steps.patch.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          test "$PATCH_OUTCOME" = success
          test "$TEST_OUTCOME" = success
