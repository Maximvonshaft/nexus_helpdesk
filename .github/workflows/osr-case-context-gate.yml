name: osr-case-context-gate

on:
  pull_request:
    paths:
      - "backend/app/models_osr.py"
      - "backend/app/services/nexus_osr/case_context.py"
      - "backend/app/services/nexus_osr/case_context_persistence.py"
      - "backend/app/services/nexus_osr/persistence.py"
      - "backend/alembic/versions/*case_context*.py"
      - "backend/tests/test_nexus_osr_case_context*.py"
      - "backend/tests/test_nexus_osr_persistence.py"
      - "backend/tests/test_nexus_osr_runtime_bridge.py"
      - "backend/tests/test_nexus_osr_auto_ticket_service.py"
      - "backend/tests/test_nexus_osr_whatsapp_routing_service.py"
      - "backend/tests/test_nexus_osr_admin_api.py"
      - ".github/workflows/osr-case-context-gate.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osr-case-context-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: development
      DATABASE_URL: sqlite:////tmp/osr-case-context-gate.db
      ALLOW_DEV_AUTH: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile Case Context scope
        run: |
          python -m py_compile \
            backend/app/models_osr.py \
            backend/app/services/nexus_osr/case_context.py \
            backend/app/services/nexus_osr/case_context_persistence.py \
            backend/app/services/nexus_osr/persistence.py \
            backend/tests/test_nexus_osr_case_context_lifecycle.py \
            backend/tests/test_nexus_osr_case_context_no_row.py

      - name: Run Case Context lifecycle tests
        run: pytest -q backend/tests/test_nexus_osr_case_context_lifecycle.py backend/tests/test_nexus_osr_case_context_no_row.py

      - name: Run persistence compatibility tests
        run: pytest -q backend/tests/test_nexus_osr_persistence.py

      - name: Run runtime bridge compatibility tests
        run: pytest -q backend/tests/test_nexus_osr_runtime_bridge.py

      - name: Run auto-ticket compatibility tests
        run: pytest -q backend/tests/test_nexus_osr_auto_ticket_service.py

      - name: Run WhatsApp routing compatibility tests
        run: pytest -q backend/tests/test_nexus_osr_whatsapp_routing_service.py

      - name: Run Admin policy and permission tests
        run: |
          pytest -q backend/tests/test_nexus_osr_admin_api.py -k "admin_crud or admin_can_manage or policy_schema or validation_errors or non_admin"

      - name: Run Admin tenant isolation tests
        run: pytest -q backend/tests/test_nexus_osr_admin_api.py::test_tenant_isolation_for_list_detail_update_debug_and_control_tower

      - name: Run Admin runtime audit tests
        run: pytest -q backend/tests/test_nexus_osr_admin_api.py::test_runtime_audit_is_strictly_read_only_and_redacted

      - name: Run Admin Case Context patch tests
        run: pytest -q backend/tests/test_nexus_osr_admin_api.py::test_case_context_allows_only_safe_fields_and_redacts_before_persistence

      - name: Run Admin unified debug snapshot test
        run: pytest -q backend/tests/test_nexus_osr_admin_api.py::test_debug_snapshot_has_unified_contract_and_no_raw_payloads

      - name: Check diff whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
