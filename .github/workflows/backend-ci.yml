name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert checkout identity
        if: github.event_name == 'pull_request'
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          pip install -r backend/requirements.txt
          pip install "pytest==8.3.5"

      - name: Compile backend
        run: python -m compileall backend/app backend/scripts

      - name: Run baseline backend tests
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/backend-ci
          timeout 600 pytest -q \
            backend/tests/test_outbound_safety.py \
            backend/tests/test_outbound_message_semantics.py \
            backend/tests/test_round24_hardening.py \
            backend/tests/test_production_settings_contract.py \
            backend/tests/test_next_phase_max_push.py \
            backend/tests/test_deploy_contracts.py \
            backend/tests/test_round20a_rectification.py \
            backend/tests/test_round27_frontend_hardening.py \
            backend/tests/test_tool_governance.py \
            --junitxml=artifacts/backend-ci/baseline.xml

      - name: Run runtime retirement and observability tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_provider_runtime_status.py \
            backend/tests/test_worker_daemon_readiness.py \
            backend/tests/test_db_query_timing.py \
            backend/tests/test_observability_metrics.py \
            backend/tests/test_worker_metrics.py \
            backend/tests/test_external_channel_persistence_authority.py

      - name: Run WebCall and WebChat voice contracts
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./webcall_backend_ci.db
          LIVEKIT_API_KEY: test-key
          LIVEKIT_API_SECRET: test-secret
          LIVEKIT_URL: wss://livekit.test
          WEBCALL_BROWSER_ENTRY_ENABLED: "true"
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_static_headers.py \
            backend/tests/test_webchat_voice_mock_ui_static.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_channel_workbench_backend_contracts.py \
            --junitxml=artifacts/backend-ci/webcall-voice.xml

      - name: Run webchat performance and security tests
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_webchat_events.py \
            backend/tests/test_webchat_events_realdb.py \
            backend/tests/test_webchat_events_rbac_realdb.py \
            backend/tests/test_webchat_polling_write_throttle.py \
            backend/tests/test_webchat_event_write_isolation.py \
            backend/tests/test_webchat_admin_conversations_query_count.py

      - name: Run admin users pagination tests
        run: timeout 180 pytest -q backend/tests/test_admin_users_pagination.py

      - name: Run lite cases pagination tests
        run: timeout 180 pytest -q backend/tests/test_lite_cases_pagination.py

      - name: Run ticket search query tests
        run: timeout 180 pytest -q backend/tests/test_ticket_search_query.py

      - name: Run ticket timeline pagination tests
        run: timeout 180 pytest -q backend/tests/test_ticket_timeline_pagination.py

      - name: Run ticket detail summary tests
        run: timeout 180 pytest -q backend/tests/test_ticket_detail_summary.py

      - name: Run production drift reconciliation tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 300 pytest -q \
            backend/tests/test_release_metadata.py \
            backend/tests/test_release_metadata_consistency_gate.py \
            backend/tests/test_candidate_readiness_identity.py \
            backend/tests/test_candidate_compose_contract.py \
            backend/tests/test_support_intelligence_config.py

      - name: Run operator queue tests
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_operator_queue.py \
            backend/tests/test_operator_queue_api.py \
            backend/tests/test_operator_queue_projection.py \
            backend/tests/test_operator_queue_replay.py \
            backend/tests/test_operator_queue_pagination.py \
            backend/tests/test_operator_queue_audit.py \
            backend/tests/test_operator_queue_current_scopes.py \
            backend/tests/test_canonical_policy_projection_behavior.py \
            backend/tests/test_canonical_policy_projection_contract.py

      - name: Strict readiness configuration check
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          STORAGE_BACKEND: s3
          EXTERNAL_CHANNEL_TRANSPORT: disabled
          EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
          EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ai
          WEBCHAT_ALLOWED_ORIGINS: https://example.test
        run: cd backend && python scripts/validate_production_readiness.py

      - name: Upload bounded backend diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-ci-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/backend-ci/*.xml
          if-no-files-found: ignore
          retention-days: 2
