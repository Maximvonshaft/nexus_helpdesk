name: backend-full-regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-full-regression.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio pytest-timeout jsonschema cryptography httpx

      - name: Compile backend
        run: |
          set -Eeuo pipefail
          python -m compileall backend/app backend/scripts

      - name: Execute full backend test suite
        run: |
          set +e
          timeout 1500 python -m pytest -vv --tb=short --disable-warnings --timeout=120 --timeout-method=thread backend/tests > /tmp/backend-pytest.log 2>&1
          status=$?
          set -e
          printf '%s' "$status" > /tmp/backend-pytest-status

          echo "--- backend pytest tail (last 200 lines) ---"
          tail -n 200 /tmp/backend-pytest.log || true
          echo "--- end backend pytest tail ---"
          exit 0

      - name: Upload backend regression evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-full-regression-evidence
          path: |
            /tmp/backend-pytest.log
            /tmp/backend-pytest-status
          if-no-files-found: error
          retention-days: 7

      - name: Require backend suite to finish within 1500 seconds
        run: |
          status=$(cat /tmp/backend-pytest-status)
          test "$status" -ne 124

      - name: Require full backend test suite success
        run: |
          status=$(cat /tmp/backend-pytest-status)
          if [ "$status" -ne 0 ]; then
            echo "backend full regression failed with exit code $status" >&2
            exit "$status"
          fi
