# isolated observable trigger with strict diagnostics v2
name: Temporary Governance Tenant Finalizer

on:
  push:
    branches:
      - release/governed-operator-config-final-tenant
    paths:
      - .github/temporary-governance-tenant-finalizer.py
      - .github/workflows/_temporary-governance-tenant-finalizer.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/temporary-governance-tenant-finalizer.py
      - .github/workflows/_temporary-governance-tenant-finalizer.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temporary-governance-tenant-finalizer-isolated
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      EXPECTED_SOURCE: b147e5715b173e7d0a7e87141910ebf9004cdde3
      EXPECTED_MAIN: 613f712bf328e21ffc7a4036a1e7a9cb34e42d49
      TARGET_BRANCH: release/governed-operator-config-final-tenant
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      ENABLE_OUTBOUND_DISPATCH: "false"
      OUTBOUND_PROVIDER: disabled
    steps:
      - name: Checkout exact temporary head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: release/governed-operator-config-final-tenant
          persist-credentials: true

      - name: Reconstruct bounded candidate with diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/governance-tenant-diagnostics
          (
            set -Eeuo pipefail
            set -x
            temporary_head="$(git rev-parse HEAD)"
            echo "TEMPORARY_HEAD=$temporary_head" >> "$GITHUB_ENV"
            git fetch --no-tags origin main
            observed_main="$(git rev-parse origin/main)"
            printf 'expected_main=%s\nobserved_main=%s\nexpected_source=%s\ntemporary_head=%s\n' \
              "$EXPECTED_MAIN" "$observed_main" "$EXPECTED_SOURCE" "$temporary_head"
            test "$observed_main" = "$EXPECTED_MAIN"
            expected_paths=$'.github/temporary-governance-tenant-finalizer.py\n.github/workflows/_temporary-governance-tenant-finalizer.yml'
            observed_paths="$(git diff --name-only "$EXPECTED_SOURCE..$temporary_head")"
            printf 'expected_paths<<EOF\n%s\nEOF\nobserved_paths<<EOF\n%s\nEOF\n' \
              "$expected_paths" "$observed_paths"
            test "$observed_paths" = "$expected_paths"
            cp .github/temporary-governance-tenant-finalizer.py /tmp/governance-tenant-finalizer.py
            python - <<'PY'
            from pathlib import Path
            path = Path('/tmp/governance-tenant-finalizer.py')
            text = path.read_text(encoding='utf-8')
            if text.count('count=2,') < 2:
                raise SystemExit('expected both scoped replacement counters')
            path.write_text(text.replace('count=2,', 'count=1,', 1), encoding='utf-8')
            PY
            git reset --hard "$EXPECTED_SOURCE"
            git clean -ffdx
            python /tmp/governance-tenant-finalizer.py
            test ! -e .github/temporary-governance-tenant-finalizer.py
            test ! -e .github/workflows/_temporary-governance-tenant-finalizer.yml
          ) > /tmp/governance-tenant-diagnostics/reconstruct.log 2>&1
          status=$?
          echo "RECONSTRUCT_STATUS=$status" >> "$GITHUB_ENV"
          cat /tmp/governance-tenant-diagnostics/reconstruct.log
          exit 0

      - name: Upload reconstruction diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: governance-tenant-reconstruction-isolated
          path: /tmp/governance-tenant-diagnostics
          if-no-files-found: error
          retention-days: 1

      - name: Require exact reconstruction
        shell: bash
        run: test "$RECONSTRUCT_STATUS" = "0"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Run focused verification with diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/governance-tenant-tests
          python -m compileall -q backend/app backend/tests \
            > /tmp/governance-tenant-tests/compile.log 2>&1
          compile_status=$?
          python -m pytest -q \
            backend/tests/test_knowledge_tenant_authority.py \
            backend/tests/test_governance_review_regressions.py \
            backend/tests/test_governance_completion_contract.py \
            backend/tests/test_governance_operator_workflows.py \
            backend/tests/test_knowledge_studio_contract.py \
            backend/tests/test_knowledge_runtime_context.py \
            > /tmp/governance-tenant-tests/pytest.log 2>&1
          pytest_status=$?
          printf 'compile_status=%s\npytest_status=%s\n' \
            "$compile_status" "$pytest_status" \
            > /tmp/governance-tenant-tests/status.txt
          cat /tmp/governance-tenant-tests/compile.log
          cat /tmp/governance-tenant-tests/pytest.log
          echo "COMPILE_STATUS=$compile_status" >> "$GITHUB_ENV"
          echo "PYTEST_STATUS=$pytest_status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload focused verification diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: governance-tenant-focused-tests
          path: /tmp/governance-tenant-tests
          if-no-files-found: error
          retention-days: 1

      - name: Require focused verification
        shell: bash
        run: |
          test "$COMPILE_STATUS" = "0"
          test "$PYTEST_STATUS" = "0"

      - name: Publish clean bounded candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/api/governance.py \
            backend/app/api/knowledge_items.py \
            backend/app/services/governance_service.py \
            backend/app/services/knowledge_service.py \
            backend/app/services/knowledge_studio_service.py \
            backend/tests/test_governance_review_regressions.py \
            backend/tests/test_knowledge_tenant_authority.py
          git diff --cached --check
          git commit -m "fix(governance): enforce tenant and governor transaction authority"
          candidate_head="$(git rev-parse HEAD)"
          git push --force-with-lease="refs/heads/$TARGET_BRANCH:$TEMPORARY_HEAD" \
            origin "HEAD:refs/heads/$TARGET_BRANCH"
          echo "published_candidate=$candidate_head"
