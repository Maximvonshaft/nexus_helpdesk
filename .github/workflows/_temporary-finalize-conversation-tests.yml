name: Temporary Finalize Conversation Tests

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write

concurrency:
  group: finalize-conversation-tests
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply validated regression patches
        shell: bash
        run: |
          set -Eeuo pipefail
          patches=(
            .github/test-fix-osr-admin.patch
            .github/test-fix-tool-facade.patch
            .github/test-fix-tool-service.patch
            .github/test-fix-webchat-ai-turn.patch
            .github/test-fix-webchat-osr-audit.patch
          )
          for patch in "${patches[@]}"; do
            test -s "$patch"
            git apply --check "$patch"
            git apply "$patch"
          done
          git diff --check

      - name: Verify focused conversation-first regression
        env:
          PYTHONPATH: backend
          APP_ENV: test
          AUTO_INIT_DB: 'false'
          SEED_DEMO_DATA: 'false'
          ALLOW_DEV_AUTH: 'false'
          PROVIDER_RUNTIME_ENABLED: 'false'
          PRIVATE_AI_RUNTIME_ENABLED: 'false'
          WEBCHAT_AI_ENABLED: 'false'
          WEBCHAT_AI_AUTO_REPLY_MODE: off
          SPEEDAF_MCP_ENABLED: 'false'
          SPEEDAF_TRACK_QUERY_ENABLED: 'false'
          SPEEDAF_WORK_ORDER_CREATE_ENABLED: 'false'
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app backend/tests
          python -m pytest -q \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_osr_audit_integration.py

      - name: Remove temporary delivery artifacts and commit final tree
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f .github/test-fix-*.patch
          rm -f .github/core-fix-*.patch
          rm -f .github/_temporary-routing-patch.*
          rm -f .github/_temporary-routing-payload.*
          rm -f .github/remaining-fixes.patch.*
          rm -f .github/conversation-fixes.patch.gz
          rm -f .github/workflows/_temporary-apply-routing-patch.yml
          rm -f .github/workflows/_temporary-finalize-conversation-tests.yml
          rm -f .github/workflows/_temporary-apply-conversation-fixes.yml
          rm -f .github/workflows/_temporary-candidate-source-export.yml
          rm -f .github/workflows/_temporary-tree-sha-export.yml
          git diff --check
          git config user.name 'nexus-delivery-bot'
          git config user.email 'nexus-delivery-bot@users.noreply.github.com'
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m 'test: align conversation-first runtime regression'
          git push origin HEAD:feat/conversation-first-agent-routing
