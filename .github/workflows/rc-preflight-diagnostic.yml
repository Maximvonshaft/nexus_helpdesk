name: rc-preflight-diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/rc-preflight-diagnostic.yml"
      - ".github/workflows/rc-test-candidate.yml"
      - "docs/ai/remote-skills-registry.yaml"
      - "scripts/release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rc-preflight-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  registry-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          show-progress: false
      - name: Validate registry contract
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("docs/ai/remote-skills-registry.yaml").read_text(encoding="utf-8")
          assert text.startswith("schema: nexus.osr.remote-skills-registry.v1\n")
          assert "name: test_release_candidate_convergence" in text
          assert "auto_upgrade: false" in text
          PY

  release-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Compile release tools
        run: |
          python -m py_compile \
            scripts/release/generate_rc_test_env.py \
            scripts/release/seed_rc_test_data.py \
            scripts/release/rc_test_http_smoke.py \
            scripts/release/rc_test_side_effects.py \
            scripts/release/build_rc_test_manifest.py \
            scripts/release/validate_rc_test_manifest.py \
            scripts/release/validate_rc_test_evidence.py

  release-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install pinned test runner
        run: python -m pip install --disable-pip-version-check "pytest==8.3.5"
      - name: Run release unit tests
        run: |
          mkdir -p artifacts/rc-preflight
          python -m pytest -q scripts/release/tests --junitxml=artifacts/rc-preflight/release-tests.xml
      - name: Upload bounded release test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rc-preflight-release-tests-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/rc-preflight/release-tests.xml
          if-no-files-found: ignore
          retention-days: 1

  release-shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          show-progress: false
      - name: Validate release shell syntax
        run: bash -n scripts/release/run_rc_test_candidate.sh
