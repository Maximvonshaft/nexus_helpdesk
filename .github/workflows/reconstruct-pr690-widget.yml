name: Reconstruct PR 690 widget

on:
  push:
    branches:
      - fix/webchat-audioworklet-684
    paths:
      - .github/workflows/reconstruct-pr690-widget.yml

permissions:
  contents: write

jobs:
  restore-widget:
    if: github.repository == 'Maximvonshaft/nexus_helpdesk'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact reconstruction head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Restore immutable widget blob and self-remove
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin refs/heads/agent/pr690-preserved-9d8:refs/remotes/origin/agent/pr690-preserved-9d8
          git checkout origin/agent/pr690-preserved-9d8 -- backend/app/static/webchat/widget.js
          test "$(git hash-object backend/app/static/webchat/widget.js)" = "0d6bad9f31b021a84e469f66066decb8fa84a643"
          git rm .github/workflows/reconstruct-pr690-widget.yml
          git config user.name "nexus-pr690-reconstructor"
          git config user.email "noreply@github.com"
          git add backend/app/static/webchat/widget.js
          git diff --cached --quiet && { echo "expected reconstruction diff is empty" >&2; exit 2; }
          git commit -m "fix(webchat): restore AudioWorklet widget on post-685 main"
          git push origin HEAD:refs/heads/fix/webchat-audioworklet-684
          git push origin :refs/heads/agent/pr690-preserved-9d8 || true
