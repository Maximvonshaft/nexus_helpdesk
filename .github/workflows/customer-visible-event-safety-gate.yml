name: customer-visible-event-safety-gate

on:
  pull_request:
    paths:
      - "backend/app/services/ticket_event_sanitizer.py"
      - "backend/app/services/customer_visible_message_service.py"
      - "backend/tests/test_customer_visible_event_safety.py"
      - "backend/tests/test_ai_customer_visible_contracts.py"
      - ".github/workflows/customer-visible-event-safety-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  customer-visible-event-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/customer-visible-event-safety.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile final write boundary
        run: |
          python -m py_compile \
            backend/app/services/ticket_event_sanitizer.py \
            backend/app/services/customer_visible_message_service.py \
            backend/tests/test_customer_visible_event_safety.py
      - name: Run focused persistence and customer-visible regressions
        run: |
          pytest -q \
            backend/tests/test_customer_visible_event_safety.py \
            backend/tests/test_ai_customer_visible_contracts.py
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
