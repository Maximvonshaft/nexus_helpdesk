name: provider-runtime-gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/services/provider_runtime/**'
      - 'backend/app/services/webchat_runtime_ai_service.py'
      - 'backend/app/services/webchat_rate_limit.py'
      - 'backend/app/services/speedaf/**'
      - 'backend/app/api/admin_provider_runtime.py'
      - 'backend/tests/test_provider_runtime_*.py'
      - 'backend/tests/test_webchat_runtime_ai_service.py'
      - 'backend/tests/test_webchat_rate_limit_bucket.py'
      - 'backend/tests/test_speedaf*.py'
      - 'backend/alembic/versions/*provider*.py'
      - '.github/workflows/provider-runtime-gate.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provider-runtime-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio jsonschema cryptography httpx

      - name: Repository hygiene gate
        run: |
          set -Eeuo pipefail
          if git ls-files | grep -E '^(\.venv/|__pycache__/|\.pytest_cache/)'; then
            echo 'ERROR: generated local artifacts are tracked by Git.'
            exit 1
          fi
          if ! grep -qxF '.venv/' .gitignore; then
            echo 'ERROR: .venv/ must be ignored.'
            exit 1
          fi
          if git grep -nE 'codex_app_server|codex_direct|openai_responses|webchat_fast_reply|Please provide your tracking number' -- backend/app backend/scripts deploy webapp/src scripts; then
            echo 'ERROR: retired provider/runtime or canned reply marker found in executable production paths.'
            exit 1
          fi

      - name: Alembic revision integrity gate
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          from collections import defaultdict

          seen = defaultdict(list)
          for path in sorted(Path('backend/alembic/versions').glob('*.py')):
              text = path.read_text(encoding='utf-8')
              match = re.search(r"^revision\s*=\s*['\"]([^'\"]+)['\"]", text, re.M)
              if match:
                  seen[match.group(1)].append(str(path))
          duplicates = {rev: files for rev, files in seen.items() if len(files) > 1}
          if duplicates:
              print('DUPLICATE_REVISIONS_FOUND')
              for rev, files in duplicates.items():
                  print(rev, files)
              raise SystemExit(1)
          print(f'alembic_revision_count={len(seen)}')
          print('duplicate_revisions=0')
          PY

      - name: Direct Alembic SQLite upgrade gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:////tmp/nexus_provider_runtime_gate.db
          ALLOW_DEV_AUTH: 'false'
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          set -Eeuo pipefail
          rm -f /tmp/nexus_provider_runtime_gate.db
          cd backend
          python -m alembic upgrade head

      - name: Provider Runtime targeted tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 600 python -m pytest -q \
            backend/tests/test_provider_runtime_output_contracts.py \
            backend/tests/test_provider_runtime_private_ai_runtime_adapter.py \
            backend/tests/test_provider_runtime_router.py \
            backend/tests/test_provider_runtime_status.py \
            backend/tests/test_provider_runtime_token_leakage.py \
            backend/tests/test_webchat_runtime_ai_service.py \
            backend/tests/test_webchat_rate_limit_bucket.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_speedaf_client_contract.py \
            backend/tests/test_speedaf_status_map.py \
            backend/tests/test_speedaf_track_query.py \
            backend/tests/test_speedaf_tracking_fact_source.py

      - name: Capture application and source router contracts
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          from app.api import admin_provider_runtime as provider_module
          from app import main as main_module

          route_details = []
          for route in main_module.app.routes:
              child_routes = getattr(route, 'routes', None)
              route_details.append({
                  'type': f'{type(route).__module__}.{type(route).__name__}',
                  'path': getattr(route, 'path', None),
                  'name': getattr(route, 'name', None),
                  'child_paths': [getattr(child, 'path', None) for child in child_routes] if child_routes is not None else None,
              })

          snapshot = {
              'app_paths': [item['path'] for item in route_details if item['path'] is not None],
              'route_details': route_details,
              'source_paths': [getattr(route, 'path', '') for route in provider_module.router.routes],
              'main_file': str(Path(main_module.__file__).resolve()),
              'provider_file': str(Path(provider_module.__file__).resolve()),
              'same_router_object': main_module.admin_provider_runtime_router is provider_module.router,
              'main_router_paths': [getattr(route, 'path', '') for route in main_module.admin_provider_runtime_router.routes],
          }
          Path('/tmp/nexus-provider-routes.json').write_text(
              json.dumps(snapshot, ensure_ascii=True, indent=2),
              encoding='utf-8',
          )
          print('application_routes_captured=' + str(len(route_details)))
          print('provider_source_routes_captured=' + str(len(snapshot['source_paths'])))
          PY

      - name: Upload bounded route diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-runtime-route-diagnostics
          path: /tmp/nexus-provider-routes.json
          if-no-files-found: error
          retention-days: 1

      - name: Provider source status route declared
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/nexus-provider-routes.json').read_text(encoding='utf-8'))
          assert data['same_router_object'] is True
          assert '/api/admin/provider-runtime/status' in data['source_paths']
          assert '/api/admin/provider-runtime/status' in data['main_router_paths']
          PY

      - name: Application route tree exposes Provider status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/nexus-provider-routes.json').read_text(encoding='utf-8'))
          flattened = list(data['app_paths'])
          for item in data['route_details']:
              flattened.extend(path for path in (item.get('child_paths') or []) if path)
          assert '/api/admin/provider-runtime/status' in flattened, data['route_details']
          PY

      - name: Public WebChat init path mounted
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/nexus-provider-routes.json').read_text(encoding='utf-8'))
          flattened = list(data['app_paths'])
          for item in data['route_details']:
              flattened.extend(path for path in (item.get('child_paths') or []) if path)
          assert '/api/webchat/init' in flattened
          PY

      - name: Retired routes absent
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/nexus-provider-routes.json').read_text(encoding='utf-8'))
          flattened = list(data['app_paths'])
          for item in data['route_details']:
              flattened.extend(path for path in (item.get('child_paths') or []) if path)
          assert not any('provider-credentials/codex' in path for path in flattened)
          assert not any('webchat-fast' in path or 'fast-reply' in path for path in flattened)
          PY

      - name: Application route contract passed
        run: echo application_route_contract_ok
