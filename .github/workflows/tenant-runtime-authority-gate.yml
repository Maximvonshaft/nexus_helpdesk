name: tenant-runtime-authority-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/settings.py"
      - "backend/app/models_webchat_binding.py"
      - "backend/app/services/permissions.py"
      - "backend/app/services/ticket_service.py"
      - "backend/app/services/lite_service.py"
      - "backend/app/services/lite_pagination.py"
      - "backend/app/services/tenant_authority.py"
      - "backend/app/services/webchat_service.py"
      - "backend/app/services/webchat_tenant_binding.py"
      - "backend/app/services/support_conversation_scope.py"
      - "backend/app/api/support_conversations.py"
      - "backend/alembic/versions/20260715_0060_webchat_country_authority.py"
      - "backend/tests/test_tenant_runtime_authority.py"
      - "backend/tests/test_webchat_public_tenant_binding.py"
      - "backend/tests/test_webchat_country_authority.py"
      - "backend/tests/test_support_conversations_rbac.py"
      - "backend/tests/test_support_conversations_api.py"
      - "scripts/release/seed_rc_test_data.py"
      - "scripts/release/run_rc_test_candidate.sh"
      - "scripts/release/generate_rc_test_env.py"
      - "scripts/release/tests/test_seed_rc_test_data_contract.py"
      - "scripts/release/tests/test_generate_rc_test_env.py"
      - "scripts/release/tests/test_validate_rc_test_manifest.py"
      - "deploy/.env.rc-test.example"
      - "docs/architecture/tenant-principal-migration.md"
      - ".github/workflows/tenant-runtime-authority-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-runtime-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio pytest-timeout

      - name: Compile and run focused authority contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/settings.py \
            backend/app/models_webchat_binding.py \
            backend/app/services/tenant_authority.py \
            backend/app/services/permissions.py \
            backend/app/services/ticket_service.py \
            backend/app/services/lite_service.py \
            backend/app/services/lite_pagination.py \
            backend/app/services/webchat_service.py \
            backend/app/services/webchat_tenant_binding.py \
            backend/app/services/support_conversation_scope.py \
            backend/app/api/support_conversations.py \
            backend/alembic/versions/20260715_0060_webchat_country_authority.py \
            backend/tests/test_tenant_runtime_authority.py \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_webchat_country_authority.py \
            backend/tests/test_support_conversations_rbac.py \
            scripts/release/seed_rc_test_data.py \
            scripts/release/generate_rc_test_env.py
          bash -n scripts/release/run_rc_test_candidate.sh
          mkdir -p artifacts/tenant-runtime
          pytest -q \
            backend/tests/test_tenant_runtime_authority.py \
            backend/tests/test_lite_cases_pagination.py \
            backend/tests/test_ticket_search_query.py \
            backend/tests/test_ticket_detail_summary.py \
            backend/tests/test_ticket_timeline_pagination.py \
            backend/tests/test_production_hardening_permissions.py \
            backend/tests/test_production_settings_contract.py \
            backend/tests/test_settings.py \
            backend/tests/test_webchat_public_tenant_binding.py \
            backend/tests/test_webchat_country_authority.py \
            backend/tests/test_support_conversations_rbac.py \
            backend/tests/test_support_conversations_api.py \
            scripts/release/tests/test_seed_rc_test_data_contract.py \
            scripts/release/tests/test_generate_rc_test_env.py \
            scripts/release/tests/test_validate_rc_test_manifest.py \
            --junitxml=artifacts/tenant-runtime/contracts.xml

      - name: Upgrade disposable PostgreSQL to exact head
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          test "$(alembic current | awk '{print $1}')" = "20260715_0060"

      - name: Prove privileged cross-Tenant access fails and same-Tenant dual-write succeeds
        env:
          TENANT_RUNTIME_AUTHORITY_MODE: "enforce"
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from types import SimpleNamespace

          from fastapi import HTTPException
          from starlette.requests import Request

          from app.db import SessionLocal
          from app.enums import SourceChannel, TicketPriority, TicketSource, TicketStatus, UserRole
          from app.models import Customer, Market, Team, Tenant, Ticket, User
          from app.models_webchat_binding import WebchatPublicOriginBinding
          from app.schemas import CustomerInput, TicketCreate
          from app.services.permissions import ensure_ticket_visible
          from app.services.support_conversation_scope import apply_support_ticket_scope
          from app.services.ticket_service import create_ticket, list_tickets
          from app.services.webchat_service import create_or_resume_conversation
          from app.services.webchat_tenant_binding import resolve_public_webchat_scope

          db = SessionLocal()
          try:
              tenants = []
              actors = []
              tickets = []
              for suffix in ("a", "b"):
                  tenant = Tenant(tenant_key=f"tenant-{suffix}", display_name=f"Tenant {suffix.upper()}")
                  db.add(tenant); db.flush()
                  ownership = {
                      "tenant_id": tenant.id,
                      "tenant_assignment_source": "qualification",
                      "tenant_assignment_version": "sha256:" + (suffix * 64),
                  }
                  market = Market(code=f"M-{suffix}", name=f"Market {suffix}", country_code="ME", **ownership)
                  db.add(market); db.flush()
                  team = Team(name=f"Team {suffix}", market_id=market.id, **ownership)
                  db.add(team); db.flush()
                  actor = User(
                      username=f"tenant-{suffix}-admin",
                      display_name=f"Tenant {suffix} Admin",
                      password_hash="synthetic-not-a-credential",
                      role=UserRole.admin,
                      team_id=team.id,
                      is_active=True,
                      **ownership,
                  )
                  customer = Customer(name=f"Customer {suffix}", **ownership)
                  db.add_all([actor, customer]); db.flush()
                  ticket = Ticket(
                      ticket_no=f"TENANT-{suffix}",
                      title=f"Tenant {suffix} ticket",
                      description="Synthetic runtime authority fixture",
                      source=TicketSource.manual,
                      source_channel=SourceChannel.internal,
                      priority=TicketPriority.medium,
                      status=TicketStatus.new,
                      customer_id=customer.id,
                      market_id=market.id,
                      team_id=team.id,
                      created_by=actor.id,
                      **ownership,
                  )
                  db.add(ticket); db.flush()
                  tenants.append(tenant)
                  actors.append(actor)
                  tickets.append(ticket)
              db.commit()

              ensure_ticket_visible(actors[0], tickets[0], db)
              try:
                  ensure_ticket_visible(actors[0], tickets[1], db)
              except HTTPException as exc:
                  assert exc.status_code == 404
                  assert exc.detail["error_code"] == "tenant_resource_not_found"
              else:
                  raise AssertionError("cross-Tenant privileged access unexpectedly succeeded")

              assert [row.id for row in list_tickets(db, actors[0])] == [tickets[0].id]
              created = create_ticket(
                  db,
                  TicketCreate(
                      title="Runtime dual-write",
                      description="Synthetic authority create",
                      source=TicketSource.manual,
                      source_channel=SourceChannel.internal,
                      priority=TicketPriority.medium,
                      team_id=actors[0].team_id,
                      market_id=tickets[0].market_id,
                      customer=CustomerInput(name="Runtime Customer", email="runtime-a@invalid.test"),
                  ),
                  actors[0],
              )
              assert created.tenant_id == tenants[0].id
              assert created.customer is not None
              assert created.customer.tenant_id == tenants[0].id

              origin = "https://tenant-runtime-gate.invalid"
              db.add(WebchatPublicOriginBinding(
                  normalized_origin=origin,
                  tenant_key=tenants[0].tenant_key,
                  country_code="ME",
                  channel_key="website",
                  display_name="Tenant Runtime Gate",
                  is_active=True,
              ))
              db.flush()
              request = Request({
                  "type": "http",
                  "http_version": "1.1",
                  "method": "POST",
                  "scheme": "https",
                  "path": "/api/webchat/init",
                  "raw_path": b"/api/webchat/init",
                  "query_string": b"",
                  "headers": [(b"origin", origin.encode("ascii"))],
                  "client": ("203.0.113.40", 40000),
                  "server": ("testserver", 443),
              })
              resolve_public_webchat_scope(
                  db,
                  request=request,
                  requested_tenant_key="default",
                  requested_channel_key="default",
                  app_env="production",
              )
              webchat_result = create_or_resume_conversation(
                  db,
                  SimpleNamespace(
                      tenant_key="default",
                      channel_key="default",
                      conversation_id=None,
                      visitor_token=None,
                      visitor_name="Runtime WebChat Customer",
                      visitor_email="runtime-webchat@invalid.test",
                      visitor_phone=None,
                      visitor_ref=None,
                      origin=None,
                      page_url=origin + "/help",
                  ),
                  request,
              )
              webchat_ticket = db.query(Ticket).filter(
                  Ticket.source_chat_id == webchat_result["conversation_id"]
              ).one()
              assert webchat_ticket.tenant_id == tenants[0].id
              assert webchat_ticket.country_code == "ME"
              assert webchat_ticket.customer is not None
              assert webchat_ticket.customer.tenant_id == tenants[0].id
              scoped_ids = {
                  row.id for row in apply_support_ticket_scope(
                      db.query(Ticket), actors[0], db
                  ).all()
              }
              assert tickets[0].id in scoped_ids
              assert webchat_ticket.id in scoped_ids
              assert tickets[1].id not in scoped_ids
              db.rollback()
          finally:
              db.close()
          PY

      - name: Emit bounded authority evidence
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/tenant-runtime
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              "schema": "nexus.tenant.runtime-authority.v1",
              "mode_under_postgres_test": "enforce",
              "privileged_cross_tenant_access": "blocked",
              "same_tenant_access": "pass",
              "runtime_ticket_customer_dual_write": "pass",
              "public_webchat_relational_tenant_dual_write": "pass",
              "public_webchat_country_scope_projection": "pass",
              "support_sql_tenant_isolation": "pass",
              "rc_synthetic_principal_tenant_binding": "covered_by_contract_and_rc_gate",
              "production_mutation_performed": False,
          }
          Path("artifacts/tenant-runtime/evidence.json").write_text(
              json.dumps(payload, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/tenant-runtime/artifact-scan.json \
            artifacts/tenant-runtime/evidence.json
          test "$(jq -r '.status' artifacts/tenant-runtime/artifact-scan.json)" = "pass"

      - name: Upload bounded authority evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-runtime-authority-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            artifacts/tenant-runtime/contracts.xml
            artifacts/tenant-runtime/evidence.json
            artifacts/tenant-runtime/artifact-scan.json
          if-no-files-found: error
          retention-days: 14

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "${BASE_SHA}...${HEAD_SHA}"
