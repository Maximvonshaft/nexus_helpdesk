name: Temporary Apply Final Retirement Batch

on:
  push:
    branches:
      - fix/final-external-channel-data-retirement

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'apply final retirement batch') }}
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/final-external-channel-data-retirement
          fetch-depth: 0
      - name: Apply exact verified batch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/final-retirement.patch.gz.b64.part* | base64 -d | gzip -d > /tmp/final-retirement.patch
          echo "3c573b2b25429ac63fba8bdaea4d539d698b2b3447cc6d87703879ebe6d55bd6  /tmp/final-retirement.patch" | sha256sum -c -
          git apply --index --3way /tmp/final-retirement.patch
          git rm -f --ignore-unmatch vendor/chatwoot
          git rm -f .github/final-retirement.patch.gz.b64.part*
          git rm -f .github/workflows/_apply-final-retirement.yml
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: apply final retirement batch"
          git push origin HEAD:fix/final-external-channel-data-retirement
