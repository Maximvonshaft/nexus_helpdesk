name: Temporary Diagnose Main Merge

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Reproduce merge and capture complete evidence
        id: merge
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          set +e
          git merge --no-commit --no-ff origin/main > /tmp/merge-output.txt 2>&1
          merge_code=$?
          set -e
          {
            echo "merge_exit_code=${merge_code}"
            echo
            echo "=== merge output ==="
            cat /tmp/merge-output.txt
            echo
            echo "=== unresolved paths ==="
            git diff --name-only --diff-filter=U
            echo
            echo "=== status ==="
            git status --short
            echo
            echo "=== combined conflict diff ==="
            git diff --cc --no-ext-diff
          } > /tmp/merge-diagnostics.txt
          echo "merge_code=${merge_code}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git merge --abort
          fi
      - name: Upload merge diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: conversation-main-merge-diagnostics-${{ github.sha }}
          path: /tmp/merge-diagnostics.txt
          if-no-files-found: error
          retention-days: 3
      - name: Publish diagnostic run identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          MERGE_CODE: ${{ steps.merge.outputs.merge_code }}
        run: |
          description="merge diagnostics captured; exit=${MERGE_CODE}"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"success\",\"context\":\"main-merge-diagnostics\",\"description\":\"${description}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
