name: Temporary Canonical Routing Finalize

on:
  push:
    branches:
      - delivery/canonical-routing-7c9e2b

permissions:
  contents: write

concurrency:
  group: canonical-routing-7c9e2b
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: true
          ref: delivery/canonical-routing-7c9e2b
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Apply canonical fixes from audited script
        shell: bash
        run: |
          set -Eeuo pipefail
          git rev-parse HEAD > /tmp/canonical-routing-start-sha
          donor='985691c846cdab12c4953547ba7ce51983a7dc08'
          git cat-file -e "${donor}^{commit}"
          git show "${donor}:scripts/_pr786_finalize.py" > /tmp/canonical-routing-finalize.py
          python /tmp/canonical-routing-finalize.py
      - name: Run focused regression
        run: |
          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py
      - name: Commit clean candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/canonical-routing-start-sha)"
          git fetch --no-tags origin delivery/canonical-routing-7c9e2b
          test "$(git rev-parse origin/delivery/canonical-routing-7c9e2b)" = "$start_sha"
          git rm .github/workflows/_temporary-canonical-routing-finalize.yml
          rm -f .github/canonical-routing-7c9e2b-trigger
          git add -A
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: close conversation routing authority gaps'
          git push origin HEAD:delivery/canonical-routing-7c9e2b
