product:
  name: Nexus OSR
  expansion: Nexus Operations Service Runtime
  doctrine: >-
    Multi-country logistics customer-service and operations-closure runtime using
    MCP facts, customer-visible knowledge, short-lived Case Context, governed
    outbound, policy-controlled tool execution, handoff, ticketing, routing,
    debug/eval/audit, and Control Tower surfaces. It is not a chatbot.

safety_kernel:
  no_c_end_long_term_memory: true
  case_context_scope: short_lived_case_scoped
  live_fact_authority: mcp_or_approved_operational_sources
  customer_claims_are_facts: false
  previous_ai_replies_are_facts: false
  customer_visible_boundary: CustomerVisibleMessageService_or_governed_outbound_contract
  tool_execution_boundary:
    - ToolExecutionPolicy
    - PolicyGate
    - ControlledActionExecutor
    - current_governed_equivalent
  human_online_action: existing_handoff
  human_offline_action: automatic_ticket_when_escalation_required
  high_risk_escalation_required:
    - formal_complaint
    - compensation
    - refund
    - legal_threat
    - personal_data_request
    - serious_service_failure
  configuration_driven:
    - country
    - language
    - channel
    - queue
    - tool
    - policy
    - whatsapp_routing
    - group
  redaction_required_for:
    - raw_prompt
    - provider_payload
    - raw_tool_arguments
    - raw_tool_results
    - tracking_number
    - phone
    - email
    - credentials
    - provider_group_id
  prohibited_actions:
    - production_deploy
    - release_tag
    - real_external_customer_message
    - funds_or_refund_action
    - legal_action
    - identity_action
    - irreversible_deletion

