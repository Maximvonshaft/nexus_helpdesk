name: Security Remediation Retry

on:
  push:
    branches:
      - security-remediation-retry

permissions:
  contents: write

jobs:
  correct-and-trigger:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout validated remediation staging commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: 4af9fb1e592d9bb91123a20597e05f97f22b7f77
      - name: Correct focused test manifest and trigger exact retry
        shell: bash
        env:
          BRANCH: fix/722-final-production-convergence
          EXPECTED_CURRENT: 59e989bf37807a871daa71a7aa7a54311ce68d41
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "4af9fb1e592d9bb91123a20597e05f97f22b7f77"
          grep -Fxq '            backend/tests/test_webchat_card_evidence_contract.py \' .github/workflows/final-security-remediation.yml
          sed -i '/backend\/tests\/test_webchat_card_evidence_contract.py/d' .github/workflows/final-security-remediation.yml
          test "$(git diff --name-only | wc -l)" = 1
          test "$(git diff --name-only)" = ".github/workflows/final-security-remediation.yml"
          git diff --check
          git config user.name "nexus-security-retry"
          git config user.email "nexus-security-retry@users.noreply.github.com"
          git add .github/workflows/final-security-remediation.yml
          git commit -m "chore: correct final remediation test manifest"
          git push --force-with-lease="refs/heads/$BRANCH:$EXPECTED_CURRENT" origin "HEAD:refs/heads/$BRANCH"
          git push origin --delete security-remediation-retry >/dev/null 2>&1 || true
