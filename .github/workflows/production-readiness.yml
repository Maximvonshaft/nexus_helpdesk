name: production-readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-readiness-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Build frontend_dist
        run: |
          cd webapp
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: cd backend && alembic upgrade head

      - name: Strict production readiness check
        env:
          APP_ENV: production
          DATABASE_URL: postgresql+psycopg://helpdesk:helpdesk@127.0.0.1:5432/helpdesk
          SECRET_KEY: ci-production-readiness-secret-change-in-real-prod-1234567890
          ALLOWED_ORIGINS: https://console.example.com
          WEBCHAT_ALLOWED_ORIGINS: https://www.example.com
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ai
          STORAGE_BACKEND: s3
          S3_BUCKET: ci-dummy-bucket
          S3_REGION: us-east-1
          EXTERNAL_CHANNEL_TRANSPORT: disabled
          EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
          EXTERNAL_CHANNEL_BRIDGE_ENABLED: "false"
          EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
          OUTBOUND_EMAIL_PRODUCTION_PILOT_ENABLED: "false"
          OUTBOUND_EMAIL_TEST_SEND_MAX_AGE_HOURS: "24"
          METRICS_ENABLED: "true"
          METRICS_TOKEN: ci-metrics-token
          REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
          KNOWLEDGE_EMBEDDINGS_ENABLED: "true"
          KNOWLEDGE_EMBEDDING_PROVIDER: openai_compatible
          KNOWLEDGE_EMBEDDING_MODEL: text-embedding-3-small
          KNOWLEDGE_EMBEDDING_API_KEY_FILE: /run/secrets/knowledge_embedding_api_key
        run: cd backend && python scripts/validate_production_readiness.py

      - name: Manual staging smoke workflow contract check
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/manual-staging-smoke.yml')
          if not path.exists():
              print('manual_staging_smoke_workflow_absent=ok')
              raise SystemExit(0)
          text = path.read_text(encoding='utf-8')
          required = [
              'workflow_dispatch:',
              'base_url:',
              '/healthz',
              '/readyz',
              'content-security-policy:',
              'permissions-policy:',
              'STAGING_METRICS_TOKEN',
              'check_outbound_email_admin',
              'check_outbound_email_test_send',
              'outbound_email_test_send_gate.py',
              'OUTBOUND_EMAIL_TEST_TO',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'MISSING_MANUAL_STAGING_SMOKE_CONTRACTS={missing}')
          forbidden = [
              'SPEEDAF_CANCEL_ENABLED: true',
              'SPEEDAF_UPDATE_ADDRESS_ENABLED: true',
              'SPEEDAF_WORK_ORDER_CREATE_ENABLED: true',
              'SPEEDAF_VOICE_CALLBACK_ENABLED: true',
              '/open-api/mcp/workOrder/create',
              '/open-api/mcp/order/updateAddress',
              '/open-api/mcp/order/cancel',
              '/open-api/mcp/callData/voice/callBack',
          ]
          found = [item for item in forbidden if item in text]
          if found:
              raise SystemExit(f'FORBIDDEN_MANUAL_STAGING_SMOKE_CONTENT={found}')
          print('manual_staging_smoke_workflow_contracts_ok')
          PY

      - name: Public production smoke workflow contract check
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/public-production-smoke.yml')
          script = Path('scripts/smoke/public_webchat_smoke.py')
          if not workflow.exists():
              raise SystemExit('public_production_smoke_workflow_missing')
          if not script.exists():
              raise SystemExit('public_webchat_smoke_script_missing')

          workflow_text = workflow.read_text(encoding='utf-8')
          script_text = script.read_text(encoding='utf-8')
          required_workflow = [
              'workflow_dispatch:',
              'base_url:',
              'expected_git_sha:',
              'expected_image_tag:',
              'require_ai_reply:',
              'max_latency_ms:',
              'scripts/smoke/public_webchat_smoke.py',
              'actions/upload-artifact@v4',
          ]
          missing_workflow = [item for item in required_workflow if item not in workflow_text]
          if missing_workflow:
              raise SystemExit(f'MISSING_PUBLIC_PRODUCTION_SMOKE_WORKFLOW_CONTRACTS={missing_workflow}')

          required_script = [
              '/healthz',
              '/readyz',
              '/webchat/demo/',
              '/api/webchat/init',
              'release_metadata_complete',
              'reply_starts_json',
              'PUBLIC_WEBCHAT_SMOKE_PASS=true',
          ]
          missing_script = [item for item in required_script if item not in script_text]
          if missing_script:
              raise SystemExit(f'MISSING_PUBLIC_WEBCHAT_SMOKE_SCRIPT_CONTRACTS={missing_script}')

          forbidden_script = [
              'Authorization',
              'Bearer ',
              'OPENAI_API_KEY',
              'AI_RUNTIME_TOKEN',
          ]
          found_forbidden = [item for item in forbidden_script if item in script_text]
          if found_forbidden:
              raise SystemExit(f'FORBIDDEN_PUBLIC_WEBCHAT_SMOKE_SECRET_USAGE={found_forbidden}')

          print('public_production_smoke_contracts_ok')
          PY
