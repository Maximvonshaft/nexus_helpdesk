name: speedaf-contract-gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/api/speedaf*.py'
      - 'backend/app/api/webchat_fast.py'
      - 'backend/app/services/speedaf/**'
      - 'backend/app/services/tracking_fact*.py'
      - 'backend/app/services/background_jobs.py'
      - 'backend/alembic/versions/*speedaf*.py'
      - 'backend/tests/test_speedaf*.py'
      - 'docs/speedaf-mcp-full-closure/**'
      - 'docs/speedaf-mcp-uat-github-workflow.md'
      - '.github/workflows/speedaf-contract-gate.yml'
      - '.github/workflows/speedaf-uat-smoke.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  speedaf-contract-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio httpx

      - name: Compile Speedaf surfaces
        run: |
          set -Eeuo pipefail
          python -m compileall \
            backend/app/api/speedaf_actions.py \
            backend/app/api/speedaf_cancel.py \
            backend/app/services/speedaf \
            backend/app/services/tracking_fact_schema.py \
            backend/app/services/tracking_fact_service.py \
            backend/app/services/background_jobs.py

      - name: Speedaf safety scan
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          runtime_roots = [Path('backend'), Path('scripts'), Path('deploy')]
          docs_roots = [Path('docs')]
          excluded_doc_prefixes = (
              'docs/speedaf-mcp-full-closure/',
              'docs/production-gates/',
          )

          write_flag = re.compile(r'SPEEDAF_(?:CANCEL|UPDATE_ADDRESS|WORK_ORDER_CREATE|VOICE_CALLBACK)_ENABLED\s*=\s*(?:true|TRUE|1|yes|YES|on|ON)')
          credential = re.compile(r'(?:appCode|secretKey|SPEEDAF_[A-Z0-9_]*(?:SECRET|TOKEN|KEY)|SPEEDAF_[A-Z0-9_]*SIGN)\s*[:=]\s*[\"\']?(?P<value>[A-Za-z0-9_\-]{20,})')
          placeholder = re.compile(r'(?:PASTE|PLACEHOLDER|EXAMPLE|DUMMY|REDACTED|CHANGEME|YOUR_|_HERE)', re.IGNORECASE)

          violations: list[str] = []

          def read_text_files(roots: list[Path]):
              for root in roots:
                  if not root.exists():
                      continue
                  for path in root.rglob('*'):
                      if not path.is_file():
                          continue
                      try:
                          yield path, path.read_text(encoding='utf-8')
                      except UnicodeDecodeError:
                          continue

          for path, text in read_text_files(runtime_roots):
              for idx, line in enumerate(text.splitlines(), 1):
                  if write_flag.search(line):
                      violations.append(f'{path}:{idx}: Speedaf write feature flag enabled in runtime file')
                  match = credential.search(line)
                  if match and not placeholder.search(match.group('value')):
                      violations.append(f'{path}:{idx}: possible Speedaf credential-like material')

          for path, text in read_text_files(docs_roots):
              value = path.as_posix()
              if any(value.startswith(prefix) for prefix in excluded_doc_prefixes):
                  continue
              for idx, line in enumerate(text.splitlines(), 1):
                  match = credential.search(line)
                  if match and not placeholder.search(match.group('value')):
                      violations.append(f'{path}:{idx}: possible Speedaf credential-like material')

          if violations:
              print('\n'.join(violations))
              sys.exit(1)
          print('speedaf_safety_scan_ok')
          PY

      - name: Speedaf UAT workflow contract assertions
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/speedaf-uat-smoke.yml')
          text = path.read_text(encoding='utf-8')
          required = [
              'workflow_dispatch:',
              'secrets.SPEEDAF_UAT_MCP_APP_CODE',
              'secrets.SPEEDAF_UAT_MCP_SECRET_KEY',
              'secrets.SPEEDAF_UAT_TEST_CALLER_ID',
              'secrets.SPEEDAF_UAT_TEST_WAYBILL_CODE',
              'smoke_speedaf_mcp_contract.sh',
              'Upload sanitized smoke report',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'MISSING_SPEEDAF_UAT_WORKFLOW_CONTRACTS={missing}')
          forbidden = [
              'SPEEDAF_CANCEL_ENABLED: true',
              'SPEEDAF_UPDATE_ADDRESS_ENABLED: true',
              'SPEEDAF_WORK_ORDER_CREATE_ENABLED: true',
              'SPEEDAF_VOICE_CALLBACK_ENABLED: true',
              '/open-api/mcp/workOrder/create',
              '/open-api/mcp/order/updateAddress',
              '/open-api/mcp/order/cancel',
              '/open-api/mcp/callData/voice/callBack',
              'vars.SPEEDAF_UAT_TEST_CALLER_ID',
              'vars.SPEEDAF_UAT_TEST_WAYBILL_CODE',
              'secrets.SPEEDAF_UAT_APP_CODE',
              'secrets.SPEEDAF_UAT_SECRET_KEY',
          ]
          found = [item for item in forbidden if item in text]
          if found:
              raise SystemExit(f'FORBIDDEN_SPEEDAF_UAT_WORKFLOW_CONTENT={found}')
          print('speedaf_uat_workflow_contracts_ok')
          PY

      - name: Speedaf static contract assertions
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          cancel = Path('backend/app/api/speedaf_cancel.py').read_text(encoding='utf-8')
          actions = Path('backend/app/api/speedaf_actions.py').read_text(encoding='utf-8')
          voice = Path('backend/app/api/webchat_voice.py').read_text(encoding='utf-8')
          voice_service = Path('backend/app/services/webchat_voice_service.py').read_text(encoding='utf-8')
          jobs = Path('backend/app/services/background_jobs.py').read_text(encoding='utf-8')
          tracking = Path('backend/app/services/speedaf/tracking_fact_source.py').read_text(encoding='utf-8')
          schema = Path('backend/app/services/tracking_fact_schema.py').read_text(encoding='utf-8')

          required_cancel = [
              'cancel-preview',
              'confirmToken',
              '_query_order_status',
              'is_cancel_terminal_status',
              'speedaf_cancel_idempotency',
              'SPEEDAF_CANCEL_ENABLED',
              'CAP_SPEEDAF_CANCEL_WRITE',
          ]
          missing = [item for item in required_cancel if item not in cancel]
          if missing:
              raise SystemExit(f'MISSING_CANCEL_CONTRACTS={missing}')

          required_actions = [
              'SPEEDAF_WORK_ORDER_CREATE_ENABLED',
              'SPEEDAF_UPDATE_ADDRESS_ENABLED',
              'enqueue_speedaf_address_update_job',
              'status="queued"',
              'WORK_ORDER_SPEEDAF_DESCRIPTION_MAX_LENGTH = 200',
              'speedaf_address_update_idempotency',
          ]
          missing = [item for item in required_actions if item not in actions]
          if missing:
              raise SystemExit(f'MISSING_ACTION_CONTRACTS={missing}')

          required_voice = [
              'speedaf/callback',
              'SpeedafVoiceCallbackRequest',
              'queue_speedaf_voice_callback',
              'SPEEDAF_VOICE_CALLBACK_ENABLED',
              'speedaf.voice.callback',
          ]
          combined_voice = '\n'.join([voice, voice_service, jobs])
          missing = [item for item in required_voice if item not in combined_voice]
          if missing:
              raise SystemExit(f'MISSING_VOICE_CALLBACK_CONTRACTS={missing}')

          required_tracking = [
              'query_waybills_by_caller',
              'multiple_waybill_candidates',
              'needs_customer_selection',
          ]
          missing = [item for item in required_tracking if item not in tracking]
          if missing:
              raise SystemExit(f'MISSING_TRACKING_CONTRACTS={missing}')

          required_schema = ['safe_candidates', 'waybill_suffix', 'waybill_hash']
          missing = [item for item in required_schema if item not in schema]
          if missing:
              raise SystemExit(f'MISSING_SAFE_CANDIDATE_SCHEMA={missing}')

          print('speedaf_static_contracts_ok')
          PY

      - name: PostgreSQL migration contract
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: |
          set -Eeuo pipefail
          cd backend
          alembic heads
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Speedaf focused tests
        run: |
          set -Eeuo pipefail
          timeout 600 python -m pytest -q \
            backend/tests/test_speedaf_tracking_full_value.py \
            backend/tests/test_speedaf_cancel_controlled_action.py \
            backend/tests/test_speedaf_workorder_address_actions.py \
            backend/tests/test_speedaf_tool_governance.py \
            backend/tests/test_speedaf_uat_probe_report_redaction.py \
            backend/tests/test_speedaf_uat_workflow_safety.py \
            backend/tests/test_webchat_voice_api.py
