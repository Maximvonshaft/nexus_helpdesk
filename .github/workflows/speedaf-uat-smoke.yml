name: speedaf-uat-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Speedaf UAT base URL'
        required: true
        default: 'https://uat-api.speedaf.com'
      country_code:
        description: 'Country code used for waybillCode/query'
        required: true
        default: 'CH'
      content_type:
        description: 'MCP Content-Type compatibility mode'
        required: true
        default: 'text/plain'
        type: choice
        options:
          - text/plain
          - application/json
      data_mode:
        description: 'MCP data wrapper compatibility mode'
        required: true
        default: 'string'
        type: choice
        options:
          - string
          - object
      timeout_seconds:
        description: 'HTTP timeout seconds'
        required: true
        default: '8'

permissions:
  contents: read

env:
  REPORT_DIR: /tmp/nexus-speedaf-mcp-smoke

jobs:
  speedaf-uat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Validate required secrets and variables
        env:
          SPEEDAF_MCP_APP_CODE: ${{ secrets.SPEEDAF_UAT_MCP_APP_CODE }}
          SPEEDAF_MCP_SECRET_KEY: ${{ secrets.SPEEDAF_UAT_MCP_SECRET_KEY }}
          SPEEDAF_MCP_TEST_CALLER_ID: ${{ secrets.SPEEDAF_UAT_TEST_CALLER_ID }}
          SPEEDAF_MCP_TEST_WAYBILL_CODE: ${{ secrets.SPEEDAF_UAT_TEST_WAYBILL_CODE }}
        run: |
          set -Eeuo pipefail
          missing=0
          for name in SPEEDAF_MCP_APP_CODE SPEEDAF_MCP_SECRET_KEY SPEEDAF_MCP_TEST_CALLER_ID SPEEDAF_MCP_TEST_WAYBILL_CODE; do
            if [ -z "${!name:-}" ]; then
              echo "MISSING_REQUIRED_INPUT=$name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure repository secrets SPEEDAF_UAT_MCP_APP_CODE / SPEEDAF_UAT_MCP_SECRET_KEY / SPEEDAF_UAT_TEST_CALLER_ID / SPEEDAF_UAT_TEST_WAYBILL_CODE before running this workflow."
            exit 2
          fi

      - name: Run read-only Speedaf UAT smoke
        env:
          SPEEDAF_MCP_BASE_URL: ${{ inputs.base_url }}
          SPEEDAF_MCP_APP_CODE: ${{ secrets.SPEEDAF_UAT_MCP_APP_CODE }}
          SPEEDAF_MCP_SECRET_KEY: ${{ secrets.SPEEDAF_UAT_MCP_SECRET_KEY }}
          SPEEDAF_MCP_COUNTRY_CODE_DEFAULT: ${{ inputs.country_code }}
          SPEEDAF_MCP_CONTENT_TYPE: ${{ inputs.content_type }}
          SPEEDAF_MCP_DATA_MODE: ${{ inputs.data_mode }}
          SPEEDAF_MCP_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
          SPEEDAF_MCP_TEST_CALLER_ID: ${{ secrets.SPEEDAF_UAT_TEST_CALLER_ID }}
          SPEEDAF_MCP_TEST_WAYBILL_CODE: ${{ secrets.SPEEDAF_UAT_TEST_WAYBILL_CODE }}
        run: |
          set -Eeuo pipefail
          bash scripts/smoke/smoke_speedaf_mcp_contract.sh

      - name: Assert smoke report is sanitized
        run: |
          set -Eeuo pipefail
          REPORT="$REPORT_DIR/speedaf_mcp_contract_report.txt"
          test -f "$REPORT"
          if grep -E '[0-9]{6,}|SPEEDAF_UAT_MCP_APP_CODE|SPEEDAF_UAT_MCP_SECRET_KEY' "$REPORT" >/dev/null 2>&1; then
            echo 'ERROR: sanitized report still contains sensitive-looking material.'
            exit 3
          fi
          echo 'speedaf_uat_smoke_report_sanitized=ok'

      - name: Upload sanitized smoke report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: speedaf-uat-smoke-report
          path: /tmp/nexus-speedaf-mcp-smoke/speedaf_mcp_contract_report.txt
          if-no-files-found: error
          retention-days: 14
