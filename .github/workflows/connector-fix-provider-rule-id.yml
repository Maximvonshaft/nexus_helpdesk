name: connector-fix-provider-rule-id

on:
  push:
    branches:
      - audit/p0-tenant-preflight-546-20260712
    paths:
      - ".github/workflows/connector-fix-provider-rule-id.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout owned branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/p0-tenant-preflight-546-20260712
          fetch-depth: 0
          persist-credentials: true
      - name: Replace retired Provider Rule identity
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/tenant-principal-preflight.yml')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "scenario = 'webchat_fast_reply'": "scenario = 'webchat_runtime_reply'",
              "id = '00000000-0031-4000-8000-000000000031'": "id = '00000000-0050-4000-8000-000000000050'",
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count == 1:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f'EXPECTED_BLOCK_COUNT:{old}:{count}')
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          grep -q "scenario = 'webchat_runtime_reply'" .github/workflows/tenant-principal-preflight.yml
          grep -q "00000000-0050-4000-8000-000000000050" .github/workflows/tenant-principal-preflight.yml
      - name: Commit exact correction
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name "nexus-tenant-qualification"
          git config user.email "nexus-tenant-qualification@users.noreply.github.com"
          git add .github/workflows/tenant-principal-preflight.yml
          git commit -m "test(tenant): map the current legacy Provider Rule explicitly"
          git push origin HEAD:audit/p0-tenant-preflight-546-20260712
