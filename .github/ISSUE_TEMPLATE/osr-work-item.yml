name: Nexus OSR Work Item
description: Define one coherent, independently claimable, implementable, reviewable, rollbackable, and closable unit of work.
title: "[OSR Work] "
labels:
  - osr-work-order
body:
  - type: markdown
    attributes:
      value: |
        A Work Item is the lifecycle and acceptance source of truth. The Issue assignee is the account-level owner. The Issue comment thread owns the active Agent Run claim, lease, heartbeat, interruption handoff, and reclaim history. The linked Pull Request owns implementation facts and exact-head evidence.

        Claimable Work Items normally have `Lifecycle: Ready`, `Current PR: none`, `Blocked by: none`, and no valid unexpired claim. Before any branch or file write, post `## AGENT_CLAIM`, re-read the complete thread, and confirm that your claim is the earliest valid claim. The default lease is 120 minutes from the latest valid claim or heartbeat comment.

        Before any graceful incomplete exit, post `## AGENT_HANDOFF` with bounded, redacted evidence and the next safe action. A hard-crashed session is recovered after lease expiry through `## AGENT_RECLAIM`.

  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      description: Link exactly one M1-M12 Epic Issue, or write governance/release integration when applicable.
      placeholder: "#494"
    validations:
      required: true

  - type: dropdown
    id: lifecycle
    attributes:
      label: Lifecycle
      description: Initial Work Item lifecycle. Use Ready only when it is claimable now; otherwise use Backlog or Blocked.
      options:
        - Backlog
        - Ready
        - In Progress
        - In Review
        - Release Gate
        - Blocked
    validations:
      required: true

  - type: input
    id: current_pr
    attributes:
      label: Current PR
      description: Link the single current implementation Pull Request, write pending after a valid claim but before PR creation, or none.
      placeholder: "none"
    validations:
      required: true

  - type: input
    id: blocked_by
    attributes:
      label: Blocked by
      description: Link every blocking Issue, or write none.
      placeholder: "none or #473"
    validations:
      required: true

  - type: input
    id: supersedes
    attributes:
      label: Supersedes
      description: Link superseded Issues or Pull Requests, or write none.
      placeholder: "none"
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Feature
        - Bug
        - Tech debt
        - Security
        - Research
        - Release
        - Governance
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current verified behavior
      description: Describe the current code/runtime behavior with file, function, table, endpoint, test, or operational evidence. Separate facts from assumptions.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected observable outcome
      description: Describe one coherent end state that can be independently accepted and closed.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Owned scope
      description: List modules, APIs, tables, workers, UI surfaces, tests, and documentation this Work Item owns. A vertical slice may span layers when it remains one contract and rollback boundary.
    validations:
      required: true

  - type: textarea
    id: concurrency_resources
    attributes:
      label: Declared concurrency and conflict resources
      description: Declare resources that another active Agent must compare before parallel writes.
      placeholder: |
        Write paths:
        - backend/app/services/...
        Contracts:
        - KnowledgeReadinessResult
        Database/migrations:
        - knowledge_items / knowledge_chunks
        - migration: yes/no
        Workflows/generated files:
        - .github/workflows/...
        External mutable resources:
        - none
    validations:
      required: true

  - type: textarea
    id: forbidden_scope
    attributes:
      label: Forbidden scope and safety constraints
      description: State what must not change or be bypassed.
      placeholder: |
        - No CustomerVisibleMessageService bypass
        - No cross-tenant reads
        - No direct provider or sidecar call
        - No production deployment
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use a testable checklist covering observable behavior, isolation, idempotency, concurrency, audit, privacy, failure states, and complete vertical closure.
      placeholder: |
        - [ ] Functional outcome
        - [ ] Tenant/country/channel isolation
        - [ ] Idempotency and duplicate-event behavior
        - [ ] Concurrency and rollback
        - [ ] Audit and redaction
        - [ ] Failure and recovery behavior
        - [ ] End-to-end operator or runtime outcome
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Required validation and runtime evidence
      description: Define focused tests, integration/regression tests, database/runtime environment, migration checks, accessibility/performance checks, and exact-head release evidence.
    validations:
      required: true

  - type: textarea
    id: migration_rollback
    attributes:
      label: Migration, rollout, repair, and rollback
      description: State schema/data impact, upgrade/downgrade/re-upgrade, feature flags, repair steps, and rollback behavior. Write None with justification if not applicable.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependency, stack, and merge order
      description: Link blocked-by and blocking Issues, declare independent or stacked development, and define required merge order. This must agree with Blocked by.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Agent comment contract

        Use the exact headings below in the Issue thread:

        - `## AGENT_CLAIM` before any writes; include Run ID, 120-minute lease, starting main, intended branch/PR, declared resources, and dependency check.
        - `## AGENT_HEARTBEAT` after branch/PR creation and meaningful checkpoints; include branch, PR, head, checks, blocker, next action, and lease renewal.
        - `## AGENT_HANDOFF` before any graceful incomplete exit; include reason, main/branch/PR/head, files, tests, migration state, bounded error evidence, cleanup, next safe action, and claim release.
        - `## AGENT_RECLAIM` after explicit release or lease expiry; re-read all facts and continue the existing PR when safe.

        Do not copy credentials, raw customer/provider payloads, tracking numbers, contact data, addresses, unsafe logs, or secrets into comments.

  - type: checkboxes
    id: readiness
    attributes:
      label: Ready criteria
      options:
        - label: The current behavior was verified against current main.
          required: true
        - label: This Work Item is a coherent vertical outcome with one acceptance and rollback boundary.
          required: true
        - label: Dependencies and blocked state are explicit.
          required: true
        - label: Concurrency resources are declared for cross-Agent comparison.
          required: true
        - label: No other active Work Item or Pull Request owns an exclusive conflicting resource.
          required: true
        - label: One current implementation Pull Request will be used.
          required: true
        - label: The assignee is account-level ownership; the comment lease identifies the active Agent Run.
          required: true
        - label: Green CI alone will not be treated as production proof.
          required: true
