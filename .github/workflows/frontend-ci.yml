name: Frontend CI

on:
  pull_request:
    paths:
      - "webapp/**"
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
    paths:
      - "webapp/**"
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Architecture, typecheck, lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Single-frontend architecture gate
        run: |
          set -Eeuo pipefail
          npm run architecture 2>&1 | tee frontend-architecture.log

      - name: Unit contracts
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run size-report

      - name: Upload frontend audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-ci-audit
          path: webapp/frontend-architecture.log
          if-no-files-found: warn
          retention-days: 14
