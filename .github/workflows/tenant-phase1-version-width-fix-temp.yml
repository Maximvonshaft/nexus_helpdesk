name: tenant-phase1-version-width-fix-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase1-version-width-fix-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase1-version-width-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase1-width.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Correct assignment version width and tests
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          models = Path('backend/app/models.py')
          source = models.read_text(encoding='utf-8')
          old = 'tenant_assignment_version: Mapped[Optional[str]] = mapped_column(String(64), nullable=True)'
          new = 'tenant_assignment_version: Mapped[Optional[str]] = mapped_column(String(80), nullable=True)'
          if source.count(old) != 6:
              raise SystemExit(f'model width replacement count={source.count(old)}')
          models.write_text(source.replace(old, new), encoding='utf-8')

          migration = Path('backend/alembic/versions/20260713_0059_add_tenant_principal.py')
          source = migration.read_text(encoding='utf-8')
          old = 'sa.Column("tenant_assignment_version", sa.String(length=64), nullable=True)'
          new = 'sa.Column("tenant_assignment_version", sa.String(length=80), nullable=True)'
          if source.count(old) != 1:
              raise SystemExit(f'migration width replacement count={source.count(old)}')
          migration.write_text(source.replace(old, new), encoding='utf-8')

          tests = Path('backend/tests/test_tenant_principal_additive_schema.py')
          source = tests.read_text(encoding='utf-8')
          old = '        assert columns["tenant_assignment_version"]["nullable"] is True\n'
          new = old + '        assert columns["tenant_assignment_version"]["type"].length == 80\n'
          if source.count(old) != 1:
              raise SystemExit(f'inspector assertion count={source.count(old)}')
          source = source.replace(old, new, 1)
          old = '        assert table.c.tenant_assignment_version.nullable is True\n'
          new = old + '        assert table.c.tenant_assignment_version.type.length == 80\n'
          if source.count(old) != 1:
              raise SystemExit(f'metadata assertion count={source.count(old)}')
          source = source.replace(old, new, 1)
          digest = 'sha256:' + ('a' * 64)
          old = "tenant_assignment_version = 'sha256:test' WHERE id = 1"
          new = f"tenant_assignment_version = '{digest}' WHERE id = 1"
          if source.count(old) != 1:
              raise SystemExit(f'digest fixture replacement count={source.count(old)}')
          tests.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify corrected schema contract
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/models.py \
            backend/alembic/versions/20260713_0059_add_tenant_principal.py \
            backend/tests/test_tenant_principal_additive_schema.py
          pytest -q \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py
          git diff --check

      - name: Remove bootstrap and commit verified width correction
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/tenant-phase1-version-width-fix-temp.yml
          git add -A
          git diff --cached --check
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): preserve full assignment mapping digest (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
