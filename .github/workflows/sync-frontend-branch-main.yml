name: Sync frontend convergence branch with main

on:
  push:
    branches:
      - feat/customer-service-console-purge
    paths:
      - .github/workflows/sync-frontend-branch-main.yml

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout frontend convergence branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/customer-service-console-purge
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge exact current main
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:feat/customer-service-console-purge
