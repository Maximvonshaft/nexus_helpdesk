# Single-server / VM pilot deployment with an in-compose PostgreSQL service.
# Use with deploy/.env.prod.local-postgres.example copied to deploy/.env.prod and filled with real secrets.

services:
  postgres:
    image: m.daocloud.io/docker.io/library/postgres:16-alpine
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_worker.py --worker-id worker-main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  sync-daemon:
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_openclaw_sync_daemon.py --worker-id worker-openclaw-sync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  event-daemon:
    image: nexusdesk/helpdesk:round27
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OPENCLAW_DEPLOYMENT_MODE: remote_gateway
      OPENCLAW_TRANSPORT: mcp
      OPENCLAW_CLI_FALLBACK_ENABLED: "false"
      REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
      OPENCLAW_EVENT_DRIVER_ENABLED: "true"
    volumes:
      - /run/secrets:/run/secrets:ro
    command: python scripts/run_openclaw_event_daemon.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_HOST_PORT:-18081}:80"
    depends_on:
      - app
    restart: unless-stopped
