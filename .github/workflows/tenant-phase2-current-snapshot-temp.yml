name: tenant-phase2-current-snapshot-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase2-current-snapshot-temp.yml
      - .github/patches/tenant-lock-receipt-path.part00
      - .github/patches/tenant-lock-receipt-path.part01
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-lock-receipt-path-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend:scripts/qualification/tenant
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-lock-receipt-path.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact current head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reassemble and apply lock/receipt-path patch
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          encoded = ''.join(
              Path(f'.github/patches/tenant-lock-receipt-path.part{index:02d}').read_text(encoding='ascii').strip()
              for index in range(2)
          )
          if len(encoded) != 2392:
              raise SystemExit(f'lock_patch_encoded_size_mismatch:{len(encoded)}')
          archive = base64.b64decode(encoded, validate=True)
          archive_digest = hashlib.sha256(archive).hexdigest()
          if archive_digest != 'd6097fe0d63b27e9eae8eb223bd764e6a82ff981c2b6cdef0fc27a37199ba5c9':
              raise SystemExit(f'lock_patch_archive_digest_mismatch:{archive_digest}')
          patch = gzip.decompress(archive)
          patch_digest = hashlib.sha256(patch).hexdigest()
          if patch_digest != '2f97446f5c9dd824069395f0071b7a1ffd1f50fcf1d5557b06457e6b7a540b03':
              raise SystemExit(f'lock_patch_digest_mismatch:{patch_digest}')
          if patch.count(b'diff --git ') != 2:
              raise SystemExit('lock_patch_file_count_mismatch')
          Path('/tmp/tenant-lock-receipt-path.patch').write_bytes(patch)
          PY
          git apply --check --whitespace=error-all /tmp/tenant-lock-receipt-path.patch
          git apply --index --whitespace=error-all /tmp/tenant-lock-receipt-path.patch

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Verify lock and receipt path contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/tenant/tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py
          pytest -q \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py
          git diff --cached --check

      - name: Remove patch transport and commit verified fix
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/patches/tenant-lock-receipt-path.part00 \
            .github/patches/tenant-lock-receipt-path.part01 \
            helpdesk.db
          rm -rf .pytest_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/patches/tenant-lock-receipt-path.part00',
              '.github/patches/tenant-lock-receipt-path.part01',
              'scripts/qualification/tenant/tenant_principal_backfill.py',
              'scripts/qualification/tenant/test_tenant_principal_backfill.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected_staged_paths:{sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): lock assignment scope and preserve receipts (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
