x-app-image: &app_image
  image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
  env_file:
    - .env.prod
  environment: &app_env
    APP_ENV: production
    AUTO_INIT_DB: "false"
    SEED_DEMO_DATA: "false"
    EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
    EXTERNAL_CHANNEL_TRANSPORT: disabled
    EXTERNAL_CHANNEL_SYNC_ENABLED: "false"
    EXTERNAL_CHANNEL_EVENT_DRIVER_ENABLED: "false"
    EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
    WEBCHAT_RATE_LIMIT_BACKEND: ${WEBCHAT_RATE_LIMIT_BACKEND:-database}
    WEBCHAT_WS_ENABLED: ${WEBCHAT_WS_ENABLED:-false}
    WEBCHAT_WS_ADMIN_ENABLED: ${WEBCHAT_WS_ADMIN_ENABLED:-false}
    WEBCHAT_WS_PUBLIC_ENABLED: ${WEBCHAT_WS_PUBLIC_ENABLED:-false}
    WEBCHAT_WS_BROKER: ${WEBCHAT_WS_BROKER:-database}
    WEBCHAT_WS_REPLAY_POLL_MS: ${WEBCHAT_WS_REPLAY_POLL_MS:-500}
    WEBCHAT_WS_FALLBACK_POLL_MS: ${WEBCHAT_WS_FALLBACK_POLL_MS:-4000}
    WEBCHAT_WS_HEARTBEAT_MS: ${WEBCHAT_WS_HEARTBEAT_MS:-25000}
    WEBCHAT_WS_HELLO_TIMEOUT_MS: ${WEBCHAT_WS_HELLO_TIMEOUT_MS:-5000}
    WEBCHAT_WS_MAX_CONNECTIONS: ${WEBCHAT_WS_MAX_CONNECTIONS:-1000}
    WEBCHAT_WS_MAX_CONNECTIONS_PER_USER: ${WEBCHAT_WS_MAX_CONNECTIONS_PER_USER:-10}
    REQUIRE_PROMETHEUS_CLIENT_IN_PRODUCTION: "true"
    DB_SLOW_QUERY_MS: ${DB_SLOW_QUERY_MS:-500}
    CODEX_APP_SERVER_AUTH_MODE: ${CODEX_APP_SERVER_AUTH_MODE:-per_request}
    CODEX_APP_SERVER_LEGACY_LOGIN_STATE_ENABLED: ${CODEX_APP_SERVER_LEGACY_LOGIN_STATE_ENABLED:-false}
    CODEX_APP_SERVER_TOTAL_TIMEOUT_MS: ${CODEX_APP_SERVER_TOTAL_TIMEOUT_MS:-10000}
    CODEX_APP_SERVER_CONNECT_TIMEOUT_MS: ${CODEX_APP_SERVER_CONNECT_TIMEOUT_MS:-250}
    GIT_SHA: ${GIT_SHA:-unknown}
    BUILD_TIME: ${BUILD_TIME:-unknown}
    IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    APP_VERSION: ${APP_VERSION:-server}
    FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
  volumes: &app_volumes
    - /run/secrets:/run/secrets:ro
    - ${NEXUSDESK_RUNTIME_SECRETS_DIR:-/opt/nexus_helpdesk/deploy/runtime_secrets}/ai_runtime_token:/run/nexus/ai_runtime_token:ro
    - ${NEXUSDESK_RUNTIME_SECRETS_DIR:-/opt/nexus_helpdesk/deploy/runtime_secrets}/codex_app_server_bridge_token:/run/nexus/codex_app_server_bridge_token:ro
    - ${NEXUSDESK_UPLOADS_DIR:-/opt/nexus_helpdesk/data/uploads}:/app/backend/uploads
  logging: &json_logging
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  restart: unless-stopped

x-worker-healthcheck: &worker_healthcheck
  test:
    - CMD-SHELL
    - "python -c \"from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_worker.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('worker-ok')\""
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  postgres:
    logging: *json_logging
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexusdesk} -d $${POSTGRES_DB:-nexusdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    logging: *json_logging
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
        APP_VERSION: ${APP_VERSION:-server}
        FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:-unknown}
    image: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
    env_file:
      - .env.prod
    environment:
      <<: *app_env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-30}
    volumes: *app_volumes
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-18081}:8080"
    command:
      - /bin/sh
      - -c
      - >-
        exec gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        --workers "$${WEB_CONCURRENCY:-2}"
        --timeout "$${WEB_TIMEOUT:-30}"
        --bind 0.0.0.0:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker-outbound:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-outbound --queue outbound
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-background:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-background --queue background
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-handoff-snapshot:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-handoff-snapshot --queue handoff-snapshot
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  worker-webchat-ai:
    <<: *app_image
    command: python scripts/run_worker.py --worker-id worker-webchat-ai --queue webchat-ai
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  webcall-ai-agent:
    <<: *app_image
    profiles:
      - webcall-ai
    command: python -m app.services.webcall_ai_production.agent_worker
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'webcall_ai_production.agent_worker' in cmd, cmd; from app.services.webcall_ai_production.agent_worker import health; assert health()['ok']; print('webcall-ai-agent-ok')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      app:
        condition: service_healthy

  codex-app-server-bridge:
    <<: *app_image
    profiles:
      - codex-app-server
    environment:
      APP_ENV: production
      BIND_HOST: 0.0.0.0
      PORT: "18794"
      CODEX_APP_SERVER_TOKEN_FILE: /run/nexus/codex_app_server_bridge_token
      CODEX_APP_SERVER_AUTH_MODE: ${CODEX_APP_SERVER_AUTH_MODE:-per_request}
      CODEX_APP_SERVER_LEGACY_LOGIN_STATE_ENABLED: ${CODEX_APP_SERVER_LEGACY_LOGIN_STATE_ENABLED:-false}
      CODEX_APP_SERVER_BRIDGE_MODE: ${CODEX_APP_SERVER_BRIDGE_MODE:-real}
      CODEX_APP_SERVER_RUNTIME_BACKEND: ${CODEX_APP_SERVER_RUNTIME_BACKEND:-python_cli_pool}
      CODEX_APP_SERVER_REAL_UPSTREAM_URL_PYTHON: ${CODEX_APP_SERVER_REAL_UPSTREAM_URL_PYTHON:-http://codex-private-reply-engine:18796/reply}
      CODEX_APP_SERVER_REAL_UPSTREAM_URL_NODE: ${CODEX_APP_SERVER_REAL_UPSTREAM_URL_NODE:-http://codex-appserver-runtime:18810/reply}
      CODEX_APP_SERVER_REPLY_GENERATION_BACKEND: ${CODEX_APP_SERVER_REPLY_GENERATION_BACKEND:-}
      CODEX_APP_SERVER_UPSTREAM_TIMEOUT_SECONDS: ${CODEX_APP_SERVER_UPSTREAM_TIMEOUT_SECONDS:-9}
      CODEX_APP_SERVER_READYZ_TIMEOUT_SECONDS: ${CODEX_APP_SERVER_READYZ_TIMEOUT_SECONDS:-30}
    volumes:
      - ${NEXUSDESK_RUNTIME_SECRETS_DIR:-/opt/nexus_helpdesk/deploy/runtime_secrets}/codex_app_server_bridge_token:/run/nexus/codex_app_server_bridge_token:ro
    ports:
      - "172.18.0.1:18794:18794"
    command: python /app/deploy/codex_app_server_bridge_proxy.py
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18794/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  codex-appserver-runtime:
    <<: *app_image
    profiles:
      - codex-app-server
    environment:
      APP_ENV: production
      HOME: /home/appuser
      BIND_HOST: 0.0.0.0
      GIT_SHA: ${GIT_SHA:-unknown}
      IMAGE_TAG: ${IMAGE_TAG:-nexusdesk/helpdesk:server}
      APP_VERSION: ${APP_VERSION:-server}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      CODEX_APPSERVER_RUNTIME_ENABLED: ${CODEX_APPSERVER_RUNTIME_ENABLED:-true}
      CODEX_APPSERVER_HOST: 0.0.0.0
      CODEX_APPSERVER_PORT: "18810"
      CODEX_APPSERVER_PERFORMANCE_PROFILE: ${CODEX_APPSERVER_PERFORMANCE_PROFILE:-webchat_fast}
      CODEX_APPSERVER_MODEL: ${CODEX_APPSERVER_MODEL:-gpt-5.3-codex-spark}
      CODEX_APPSERVER_REASONING_EFFORT: ${CODEX_APPSERVER_REASONING_EFFORT:-low}
      CODEX_APPSERVER_SERVICE_TIER: ${CODEX_APPSERVER_SERVICE_TIER:-priority}
      CODEX_APPSERVER_THREAD_MODE: ${CODEX_APPSERVER_THREAD_MODE:-ephemeral}
      CODEX_APPSERVER_CLIENT_CACHE_TTL_SECONDS: ${CODEX_APPSERVER_CLIENT_CACHE_TTL_SECONDS:-1800}
      CODEX_APPSERVER_MAX_CONCURRENCY: ${CODEX_APPSERVER_MAX_CONCURRENCY:-4}
      CODEX_APPSERVER_QUEUE_TIMEOUT_MS: ${CODEX_APPSERVER_QUEUE_TIMEOUT_MS:-750}
      CODEX_APPSERVER_REPLY_TIMEOUT_MS: ${CODEX_APPSERVER_REPLY_TIMEOUT_MS:-8000}
      CODEX_APPSERVER_STATE_DIR: /tmp/nexus-codex-runtime
      CODEX_APPSERVER_WORK_DIR: /tmp/nexus-codex-runtime/webchat-workdir
    expose:
      - "18810"
    command: ["node", "/app/tools/nexus-codex-runtime/dist/src/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18810/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  codex-app-server-upstream:
    <<: *app_image
    profiles:
      - codex-app-server
    environment:
      APP_ENV: production
      BIND_HOST: 0.0.0.0
      PORT: "18795"
      CODEX_APP_SERVER_PRIVATE_REPLY_URL: ${CODEX_APP_SERVER_PRIVATE_REPLY_URL:-}
      CODEX_APP_SERVER_REPLY_GENERATION_BACKEND: ${CODEX_APP_SERVER_REPLY_GENERATION_BACKEND:-unconfigured}
      CODEX_APP_SERVER_PRIVATE_TIMEOUT_SECONDS: ${CODEX_APP_SERVER_PRIVATE_TIMEOUT_SECONDS:-30}
      CODEX_APP_SERVER_PRIVATE_READYZ_TIMEOUT_SECONDS: ${CODEX_APP_SERVER_PRIVATE_READYZ_TIMEOUT_SECONDS:-30}
    ports:
      - "172.18.0.1:18795:18795"
    command: python /app/deploy/codex_app_server_private_upstream_proxy.py
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18795/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  codex-private-reply-engine:
    <<: *app_image
    profiles:
      - codex-app-server
    environment:
      APP_ENV: production
      BIND_HOST: 0.0.0.0
      PORT: "18796"
      CODEX_PRIVATE_REPLY_ENGINE_MODEL_URL: ${CODEX_PRIVATE_REPLY_ENGINE_MODEL_URL:-}
      CODEX_PRIVATE_REPLY_ENGINE_MODEL_TIMEOUT_SECONDS: ${CODEX_PRIVATE_REPLY_ENGINE_MODEL_TIMEOUT_SECONDS:-30}
      CODEX_PRIVATE_REPLY_ENGINE_READYZ_TIMEOUT_SECONDS: ${CODEX_PRIVATE_REPLY_ENGINE_READYZ_TIMEOUT_SECONDS:-30}
      CODEX_APP_SERVER_REPLY_GENERATION_BACKEND: ${CODEX_APP_SERVER_REPLY_GENERATION_BACKEND:-unconfigured}
    expose:
      - "18796"
    command: python /app/deploy/codex_private_reply_engine.py
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18796/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  legacy-worker:
    <<: *app_image
    profiles:
      - legacy-worker
    command: python scripts/run_worker.py --worker-id worker-main --queue all
    healthcheck: *worker_healthcheck
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    profiles: ["edge-nginx"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
