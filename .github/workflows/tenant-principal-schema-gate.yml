name: tenant-principal-schema-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/models.py"
      - "backend/app/model_registry.py"
      - "backend/alembic/versions/20260713_0059_add_tenant_principal.py"
      - "backend/tests/test_tenant_principal_additive_schema.py"
      - "scripts/qualification/tenant/**"
      - "docs/architecture/tenant-principal-migration.md"
      - ".github/workflows/tenant-principal-schema-gate.yml"
      - ".github/workflows/tenant-principal-preflight.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-additive-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact proposed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked backend dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt

      - name: Compile and run focused schema contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/models.py \
            backend/alembic/versions/20260713_0059_add_tenant_principal.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          pytest -q \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py
          python -m unittest scripts/qualification/tenant/test_tenant_principal_preflight.py

      - name: Upgrade disposable PostgreSQL to Phase 1 head
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          test "$(alembic heads | awk '{print $1}')" = "20260713_0059"

      - name: Seed explicit relational ownership after additive upgrade
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from app.db import SessionLocal
          from app.enums import SourceChannel, TicketPriority, TicketSource, TicketStatus, UserRole
          from app.model_registry import register_all_models
          from app.models import ChannelAccount, Customer, Market, Team, Tenant, Ticket, User

          register_all_models()
          db = SessionLocal()
          try:
              tenant = Tenant(tenant_key="tenant-schema-a", display_name="Schema Tenant A")
              db.add(tenant); db.flush()
              ownership = {
                  "tenant_id": tenant.id,
                  "tenant_assignment_source": "schema_gate",
                  "tenant_assignment_version": "sha256:schema-gate-v1",
              }
              market = Market(code="SCHEMA-A", name="Schema Market A", country_code="ME", **ownership)
              db.add(market); db.flush()
              team = Team(name="Schema Team A", team_type="qualification", market_id=market.id, **ownership)
              db.add(team); db.flush()
              user = User(
                  username="schema-tenant-agent",
                  display_name="Schema Tenant Agent",
                  password_hash="synthetic-not-a-credential",
                  role=UserRole.agent,
                  team_id=team.id,
                  **ownership,
              )
              channel = ChannelAccount(
                  provider="synthetic",
                  account_id="schema-tenant-channel",
                  market_id=market.id,
                  **ownership,
              )
              customer = Customer(name="Schema Tenant Customer", **ownership)
              db.add_all([user, channel, customer]); db.flush()
              ticket = Ticket(
                  ticket_no="SCHEMA-TENANT-0001",
                  title="Schema Tenant Preservation",
                  description="Synthetic schema gate row",
                  customer_id=customer.id,
                  source=TicketSource.manual,
                  source_channel=SourceChannel.internal,
                  priority=TicketPriority.medium,
                  status=TicketStatus.new,
                  assignee_id=user.id,
                  created_by=user.id,
                  team_id=team.id,
                  market_id=market.id,
                  country_code="ME",
                  channel_account_id=channel.id,
                  **ownership,
              )
              db.add(ticket)
              db.commit()
          finally:
              db.close()
          PY
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM tenants WHERE tenant_key='tenant-schema-a'")" = "1"
          for table in markets teams users channel_accounts customers tickets; do
            test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM ${table} WHERE tenant_id IS NOT NULL")" -ge "1"
          done

      - name: Downgrade one revision and prove core rows survive
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic downgrade -1
          test "$(alembic current | awk '{print $1}')" = "20260711_0058"
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT to_regclass('public.tenants') IS NULL")" = "t"
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM tickets WHERE ticket_no='SCHEMA-TENANT-0001'")" = "1"
          for table in markets teams users channel_accounts customers tickets; do
            test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM information_schema.columns WHERE table_schema='public' AND table_name='${table}' AND column_name IN ('tenant_id','tenant_assignment_source','tenant_assignment_version')")" = "0"
          done

      - name: Re-upgrade and prove no implicit Tenant or backfill
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          test "$(alembic current | awk '{print $1}')" = "20260713_0059"
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM tenants")" = "0"
          test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM tickets WHERE ticket_no='SCHEMA-TENANT-0001' AND tenant_id IS NULL AND tenant_assignment_source IS NULL AND tenant_assignment_version IS NULL")" = "1"
          for table in markets teams users channel_accounts customers tickets; do
            test "$(psql "postgresql://helpdesk@127.0.0.1:5432/helpdesk" -Atc "SELECT count(*) FROM information_schema.columns WHERE table_schema='public' AND table_name='${table}' AND column_name IN ('tenant_id','tenant_assignment_source','tenant_assignment_version')")" = "3"
          done

      - name: Emit bounded migration evidence
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/tenant-schema
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              "schema": "nexus.tenant.additive-schema.v1",
              "revision": "20260713_0059",
              "down_revision": "20260711_0058",
              "tenant_rows_inserted_by_migration": 0,
              "implicit_backfill_performed": False,
              "upgrade_downgrade_reupgrade": "pass",
              "core_rows_preserved": True,
              "production_mutation_performed": False,
          }
          Path("artifacts/tenant-schema/evidence.json").write_text(
              json.dumps(payload, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/tenant-schema/artifact-scan.json \
            artifacts/tenant-schema/evidence.json
          test "$(jq -r '.status' artifacts/tenant-schema/artifact-scan.json)" = "pass"

      - name: Upload bounded schema evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-principal-schema-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            artifacts/tenant-schema/evidence.json
            artifacts/tenant-schema/artifact-scan.json
          retention-days: 14
          if-no-files-found: error

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
