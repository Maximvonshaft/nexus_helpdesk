name: operations-dispatch-runtime-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/operations_dispatch_runtime/**"
      - "backend/scripts/run_operations_dispatch_worker.py"
      - "backend/tests/test_operations_dispatch_runtime.py"
      - "deploy/docker-compose.operations-dispatch.yml"
      - ".github/workflows/operations-dispatch-runtime-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile isolated runtime
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/operations_dispatch_runtime/__init__.py \
            backend/app/operations_dispatch_runtime/config.py \
            backend/app/operations_dispatch_runtime/adapters.py \
            backend/app/operations_dispatch_runtime/worker.py \
            backend/scripts/run_operations_dispatch_worker.py \
            backend/tests/test_operations_dispatch_runtime.py

      - name: Run governed execution tests
        run: pytest -q backend/tests/test_operations_dispatch_runtime.py

      - name: Prove CLI is inert by default
        env:
          DATABASE_URL: sqlite:////tmp/operations-dispatch-worker.db
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from app.model_registry import register_all_models
          from app.db import Base, engine
          register_all_models()
          Base.metadata.create_all(engine)
          PY
          output="$(python backend/scripts/run_operations_dispatch_worker.py --once)"
          printf '%s\n' "$output"
          grep -q 'status=blocked' <<<"$output"
          grep -q 'operations_dispatch_mode_disabled' <<<"$output"

      - name: Prove exactly one dormant consumer role
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          text = Path('deploy/docker-compose.operations-dispatch.yml').read_text(encoding='utf-8')
          assert len(re.findall(r'^  worker-operations-dispatch:\s*$', text, flags=re.M)) == 1
          assert text.count('run_operations_dispatch_worker.py') == 2, text
          assert 'restart: unless-stopped' in text
          assert 'healthcheck:' in text
          assert 'depends_on:' in text
          PY

      - name: Prove no production Provider adapter exists in this slice
        run: |
          set -Eeuo pipefail
          ! grep -RIn --exclude='test_*' --exclude='*.md' \
            -E '(requests\.|httpx\.|urllib\.request|cloud[_-]?api|native[_-]?sidecar)' \
            backend/app/operations_dispatch_runtime backend/scripts/run_operations_dispatch_worker.py
          grep -q 'mode="disabled"' backend/scripts/run_operations_dispatch_worker.py
          grep -q 'tenant_authority_ready=False' backend/scripts/run_operations_dispatch_worker.py

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
