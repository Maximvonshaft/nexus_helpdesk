name: ticket-event-persistence-gate

on:
  pull_request:
    paths:
      - "backend/app/models.py"
      - "backend/app/enums.py"
      - "backend/app/api/**/*.py"
      - "backend/app/services/**/*.py"
      - "backend/scripts/repair_ticket_events.py"
      - "backend/tests/test_ticket_event_*.py"
      - "backend/tests/test_customer_visible_event_safety.py"
      - "backend/tests/test_channel_workbench_backend_contracts.py"
      - "backend/tests/test_qa_training_contract.py"
      - "backend/tests/test_speedaf*.py"
      - "backend/tests/test_nexus_osr_auto_ticket_service.py"
      - "backend/tests/test_nexus_osr_operations_dispatch_outbox.py"
      - "backend/tests/test_nexus_osr_tool_execution_service.py"
      - "backend/tests/test_nexus_osr_whatsapp_routing_service.py"
      - "backend/tests/test_webchat_ai_turn_runtime.py"
      - "backend/tests/test_webchat_ai_decision_runtime.py"
      - "backend/tests/test_webchat_handoff_control.py"
      - "backend/tests/test_webchat_voice_api.py"
      - "backend/tests/test_webchat_voice_room_compensation.py"
      - "docs/engineering/ticket-event-persistence-contract.md"
      - "docs/superpowers/specs/2026-07-12-ticket-event-persistence-design.md"
      - "docs/superpowers/plans/2026-07-12-ticket-event-persistence.md"
      - ".github/workflows/ticket-event-persistence-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ticket-event-persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/ticket-event-persistence.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile persistence boundary and tests
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/services/ticket_event_payload.py \
            backend/app/services/ticket_event_sanitizer.py \
            backend/app/services/ticket_event_writer.py \
            backend/app/services/ticket_event_classification.py \
            backend/app/services/ticket_event_repair.py \
            backend/scripts/repair_ticket_events.py \
            backend/tests/test_ticket_event_writer.py \
            backend/tests/test_ticket_event_writer_falsey_payload.py \
            backend/tests/test_ticket_event_external_comment_classification.py \
            backend/tests/test_ticket_event_classification.py \
            backend/tests/test_ticket_event_architecture.py \
            backend/tests/test_ticket_event_repair.py \
            backend/tests/test_qa_training_contract.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_ai_decision_runtime.py
      - name: Run writer and representative caller contracts
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_ticket_event_writer.py \
            backend/tests/test_ticket_event_writer_falsey_payload.py \
            backend/tests/test_ticket_event_external_comment_classification.py \
            backend/tests/test_ticket_event_classification.py \
            backend/tests/test_ticket_event_architecture.py \
            backend/tests/test_ticket_event_repair.py \
            backend/tests/test_customer_visible_event_safety.py \
            backend/tests/test_channel_workbench_backend_contracts.py \
            backend/tests/test_qa_training_contract.py \
            backend/tests/test_speedaf_tracking_full_value.py \
            backend/tests/test_speedaf_cancel_controlled_action.py \
            backend/tests/test_speedaf_workorder_address_actions.py \
            backend/tests/test_speedaf_tool_governance.py \
            backend/tests/test_speedaf_uat_probe_report_redaction.py \
            backend/tests/test_speedaf_uat_workflow_safety.py \
            backend/tests/test_nexus_osr_auto_ticket_service.py \
            backend/tests/test_nexus_osr_operations_dispatch_outbox.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_whatsapp_routing_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_webchat_ai_decision_runtime.py \
            backend/tests/test_webchat_handoff_control.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            --junitxml=ticket-event-persistence-junit.xml
      - name: Upload bounded test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ticket-event-persistence-junit-${{ github.event.pull_request.head.sha || github.sha }}
          path: ticket-event-persistence-junit.xml
          if-no-files-found: error
          retention-days: 7
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
