name: Agent Coordination Self Test

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: write

concurrency:
  group: agent-coordination-self-test-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  proposed-agent-coordination-self-test:
    name: proposed-agent-coordination-self-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact proposed head for tests only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned test dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --disable-pip-version-check "pytest==8.3.5" "PyYAML==6.0.2"

      - name: Compile proposed policy
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/ci/agent_coordination_model.py \
            scripts/ci/agent_coordination_core.py \
            scripts/ci/agent_coordination_gate.py \
            scripts/ci/agent_coordination_reclaim_adapter.py \
            scripts/ci/agent_coordination_policy_gate.py \
            scripts/ci/agent_coordination_path_policy.py \
            scripts/ci/agent_coordination_open_pr_policy.py \
            scripts/ci/agent_coordination_entrypoint.py

      - name: Run proposed policy tests
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/agent-coordination
          python -m pytest -q \
            scripts/ci/tests/test_agent_coordination*.py \
            --junitxml=artifacts/agent-coordination/tests.xml

      - name: Check proposed diff whitespace
        run: |
          set -Eeuo pipefail
          git diff --check "${{ github.event.pull_request.base.sha }}"...HEAD

      - name: Upload bounded self-test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-coordination-self-test-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: artifacts/agent-coordination/tests.xml
          if-no-files-found: warn
          retention-days: 7

  synchronize-pr685-latest-main:
    if: github.event.pull_request.head.ref == 'agent/webchat-live-voice-423-20260713'
    name: synchronize-pr685-latest-main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR branch with push authority
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/webchat-live-voice-423-20260713
          fetch-depth: 0
          persist-credentials: true

      - name: Merge exact latest main and restore workflow authority
        env:
          MAIN_SHA: 6fdfc71888fd0d6d95f1165d234e57d73da92ac3
          BRANCH_NAME: agent/webchat-live-voice-423-20260713
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git config user.name "Maximvonshaft"
          git config user.email "202882752+Maximvonshaft@users.noreply.github.com"
          git fetch origin "$MAIN_SHA"
          if ! git merge --no-commit --no-ff "$MAIN_SHA"; then
            git status --short
            exit 1
          fi
          git checkout "$MAIN_SHA" -- .github/workflows/agent-coordination-self-test.yml
          git diff --check
          git add -A
          git commit -m "chore: sync PR685 with latest main"
          git push origin "HEAD:${BRANCH_NAME}"
