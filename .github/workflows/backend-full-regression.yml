name: backend-full-regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-full-regression.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio jsonschema cryptography httpx

      - name: Compile backend
        run: |
          set -Eeuo pipefail
          python -m compileall backend/app backend/scripts

      - name: Run full backend test suite
        run: |
          set +e
          timeout 900 python -m pytest -q --disable-warnings backend/tests > /tmp/backend-pytest.log 2>&1
          status=$?
          set -e

          echo "--- backend pytest tail (last 200 lines) ---"
          tail -n 200 /tmp/backend-pytest.log || true
          echo "--- end backend pytest tail ---"

          if [ "$status" -eq 124 ]; then
            echo "backend full regression exceeded the 900-second test timeout" >&2
          elif [ "$status" -ne 0 ]; then
            echo "backend full regression failed with exit code $status" >&2
          fi
          exit "$status"
