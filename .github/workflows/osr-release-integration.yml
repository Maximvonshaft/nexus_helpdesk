name: osr-release-integration

on:
  pull_request:
    paths:
      - "backend/app/services/nexus_osr/**"
      - "backend/app/services/knowledge_runtime_v2/**"
      - "backend/app/services/knowledge_readiness_service.py"
      - "backend/app/models_osr.py"
      - "backend/app/models_operations_dispatch.py"
      - "backend/alembic/versions/**"
      - "backend/scripts/probe_nexus_osr_integration.py"
      - "backend/tests/test_nexus_osr_release_integration.py"
      - ".github/workflows/osr-release-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osr-release-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: backend
      APP_ENV: development
      ALLOW_DEV_AUTH: "false"
      DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      OSR_TOOL_EXECUTION_MODE: observe_only
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile integration boundary
        run: |
          python -m py_compile \
            backend/app/services/nexus_osr/escalation_orchestration_service.py \
            backend/app/services/nexus_osr/integration_readiness_service.py \
            backend/app/services/nexus_osr/whatsapp_routing_service.py \
            backend/app/services/nexus_osr/operations_dispatch_outbox.py \
            backend/app/services/webchat_ai_safe_service.py \
            backend/scripts/probe_nexus_osr_integration.py \
            backend/tests/test_nexus_osr_release_integration.py

      - name: Prove one Alembic head
        working-directory: backend
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          heads = ScriptDirectory.from_config(Config("alembic.ini")).get_heads()
          if len(heads) != 1:
              raise SystemExit(f"EXPECTED_ONE_ALEMBIC_HEAD={heads}")
          print(f"alembic_head={heads[0]}")
          PY

      - name: PostgreSQL upgrade downgrade re-upgrade
        working-directory: backend
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Verify model migration convergence
        run: python backend/scripts/check_model_migration_drift.py

      - name: Run combined OSR business-chain regression
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          pytest -q \
            backend/tests/test_nexus_osr_release_integration.py \
            backend/tests/test_nexus_osr_queue_escalation_entrypoint.py \
            backend/tests/test_nexus_osr_webchat_escalation_hook.py \
            backend/tests/test_nexus_osr_auto_ticket_postgres.py \
            backend/tests/test_nexus_osr_operations_dispatch_postgres.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_knowledge_k1_retrieval_isolation.py \
            backend/tests/test_knowledge_readiness_contract.py \
            --junitxml=artifacts/osr-release-integration.junit.xml

      - name: Build bounded machine-readable integration evidence
        if: always()
        run: |
          set -Eeuo pipefail
          python backend/scripts/probe_nexus_osr_integration.py \
            --junit artifacts/osr-release-integration.junit.xml \
            | tee artifacts/osr-release-integration.json

      - name: Assert evidence contract
        if: always()
        run: |
          set -Eeuo pipefail
          test -s artifacts/osr-release-integration.json
          test "$(wc -c < artifacts/osr-release-integration.json)" -le 8192
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/osr-release-integration.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == "nexus_osr_integration_test_evidence_v1"
          assert report["status"] in {"ready", "not_ready", "unavailable"}
          assert set(report) == {
              "schema_version", "status", "ready", "evaluated_at", "reason_codes",
              "counts", "checks", "source_sha256",
          }
          assert set(report["counts"]) == {"tests", "failures", "errors", "skipped"}
          encoded = json.dumps(report, sort_keys=True).lower()
          for forbidden in (
              "tracking_number", "waybill", "phone", "email", "address",
              "authorization", "bearer ", "api_key", "provider_payload", "tool_arguments",
          ):
              assert forbidden not in encoded, forbidden
          PY

      - name: Check diff whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Upload integration evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osr-release-integration
          path: |
            artifacts/osr-release-integration.junit.xml
            artifacts/osr-release-integration.json
          if-no-files-found: warn
