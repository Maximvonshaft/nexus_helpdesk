name: Canonical Acceptance

on: {pull_request: {branches: [main]}, push: {branches: [main]}, workflow_dispatch: {}}

concurrency:
  group: canonical-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  PYTHONPATH: backend
  APP_ENV: test
  AUTO_INIT_DB: "false"
  SEED_DEMO_DATA: "false"
  ALLOW_DEV_AUTH: "false"
  PROVIDER_RUNTIME_ENABLED: "false"
  PROVIDER_RUNTIME_TRAFFIC_MODE: control
  PROVIDER_RUNTIME_KILL_SWITCH: "true"
  PROVIDER_RUNTIME_CANARY_PERCENT: "0"
  PRIVATE_AI_RUNTIME_ENABLED: "false"
  WEBCHAT_AI_ENABLED: "false"
  WEBCHAT_AI_AUTO_REPLY_MODE: off
  WEBCHAT_HUMAN_CALL_ENABLED: "false"
  WEBCHAT_LIVE_AI_VOICE_ENABLED: "false"
  ENABLE_OUTBOUND_DISPATCH: "false"
  OUTBOUND_PROVIDER: disabled
  WHATSAPP_NATIVE_ENABLED: "false"
  WHATSAPP_DISPATCH_MODE: disabled
  EMAIL_MAILBOX_SYNC_ENABLED: "false"
  SPEEDAF_MCP_ENABLED: "false"
  SPEEDAF_TRACK_QUERY_ENABLED: "false"
  SPEEDAF_WORK_ORDER_CREATE_ENABLED: "false"
  SPEEDAF_UPDATE_ADDRESS_ENABLED: "false"
  SPEEDAF_CANCEL_ENABLED: "false"
  SPEEDAF_VOICE_CALLBACK_ENABLED: "false"
  OPERATIONS_DISPATCH_MODE: disabled
  OPERATIONS_DISPATCH_ADAPTER: disabled

jobs:
  candidate-identity:
    name: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      source_sha: ${{ steps.identity.outputs.source_sha }}
      tree_sha: ${{ steps.identity.outputs.tree_sha }}
    steps:
      - name: Checkout exact event Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Prove exact identity and current-main relation
        id: identity
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        run: |
          set -Eeuo pipefail
          source_sha="$(git rev-parse HEAD)"
          tree_sha="$(git rev-parse 'HEAD^{tree}')"
          test "$source_sha" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          behind=0
          ahead=0
          if [[ "$EVENT_NAME" = "pull_request" ]]; then
            git fetch --no-tags origin "$BASE_SHA"
            behind="$(git rev-list --count "$source_sha..$BASE_SHA")"
            ahead="$(git rev-list --count "$BASE_SHA..$source_sha")"
            test "$behind" = "0"
          fi
          printf 'source_sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"
          printf 'tree_sha=%s\n' "$tree_sha" >> "$GITHUB_OUTPUT"
          jq -n \
            --arg source_sha "$source_sha" \
            --arg tree_sha "$tree_sha" \
            --arg base_sha "$BASE_SHA" \
            --argjson ahead "$ahead" \
            --argjson behind "$behind" \
            '{schema:"nexus.actions-candidate-identity.v1",source_sha:$source_sha,tree_sha:$tree_sha,base_sha:$base_sha,ahead:$ahead,behind:$behind,clean:true}' \
            > /tmp/candidate-identity.json
      - name: Upload candidate identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: candidate-identity-${{ steps.identity.outputs.source_sha }}
          path: /tmp/candidate-identity.json
          if-no-files-found: error
          retention-days: 30

  static-authority:
    name: static-authority
    needs: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout frozen Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact Python dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Run canonical static verifier
        run: |
          mkdir -p /tmp/nexus-static
          python scripts/verify_repository.py --static-only \
            --expected-sha "${{ needs.candidate-identity.outputs.source_sha }}" \
            --evidence-out /tmp/nexus-static/repository-static.json
      - name: Upload static evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: static-authority-${{ needs.candidate-identity.outputs.source_sha }}
          path: /tmp/nexus-static
          if-no-files-found: error
          retention-days: 30

  security-supply-chain:
    name: security-supply-chain
    needs: candidate-identity
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout frozen Head with reachable history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            config/security/security-tool-requirements.txt
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Initialize CodeQL for Python and JavaScript
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: python,javascript-typescript
          build-mode: none
          queries: security-extended
      - name: Install exact application and security dependencies
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          python -m pip install --disable-pip-version-check -r config/security/security-tool-requirements.txt
      - name: Run tracked-tree and reachable-history secret assurance
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-security
          python scripts/security/scan_repository.py \
            --root . \
            --output /tmp/nexus-security/repository-secret-scan.json
          python scripts/security/scan_git_history.py \
            --root . \
            --max-blob-bytes 33554432 \
            --output /tmp/nexus-security/history-secret-scan.json
      - name: Run Python SAST and dependency assurance
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m bandit -r backend/app -ll -ii -f json \
            -o /tmp/nexus-security/bandit.json
          python -m pip_audit -r backend/requirements.txt --strict \
            --format json --output /tmp/nexus-security/python-dependencies.json
          python -m pip_audit -r backend/requirements.txt --strict \
            --format cyclonedx-json --output /tmp/nexus-security/python-sbom.cdx.json
      - name: Run frontend dependency assurance and generate SBOM
        working-directory: webapp
        shell: bash
        run: |
          set -Eeuo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=high --json > /tmp/nexus-security/frontend-dependencies.json
          npm sbom --package-lock-only --sbom-format=cyclonedx \
            > /tmp/nexus-security/frontend-sbom.cdx.json
      - name: Analyze exact Head with CodeQL
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          upload: never
          upload-database: false
          output: /tmp/nexus-security/codeql
          category: canonical-security
      - name: Enforce zero CodeQL findings
        run: |
          python scripts/security/assert_sarif_clean.py \
            --input /tmp/nexus-security/codeql \
            --exceptions config/security/codeql-exceptions.json \
            --output /tmp/nexus-security/codeql-summary.json
      - name: Upload bounded security and supply-chain evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-evidence-${{ needs.candidate-identity.outputs.source_sha }}
          path: /tmp/nexus-security
          if-no-files-found: error
          retention-days: 30

  backend-full:
    name: backend-full
    needs: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout frozen Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact Python dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Compile production Python
        run: python -m compileall -q backend/app backend/scripts scripts/qualification scripts/release
      - name: Run complete backend regression
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-backend
          python -m pytest -q backend/tests 2>&1 | tee /tmp/nexus-backend/pytest.log
      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-evidence-${{ needs.candidate-identity.outputs.source_sha }}
          path: /tmp/nexus-backend
          if-no-files-found: warn
          retention-days: 30

  frontend-browser:
    name: frontend-browser
    needs: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout frozen Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install exact frontend dependencies
        working-directory: webapp
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify architecture, lint, types, units and build
        working-directory: webapp
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-frontend
          npm run verify 2>&1 | tee /tmp/nexus-frontend/verify.log
      - name: Install Playwright Chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium
      - name: Run browser journeys
        working-directory: webapp
        env:
          RC_RUN_BROWSER_SMOKE: "true"
        run: npm run e2e
      - name: Upload frontend and browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-evidence-${{ needs.candidate-identity.outputs.source_sha }}
          path: |
            /tmp/nexus-frontend
            webapp/package.json
            webapp/package-lock.json
            webapp/playwright-report
            webapp/test-results
            frontend_dist
          if-no-files-found: warn
          retention-days: 30

  postgres-acceptance:
    name: postgres-acceptance
    needs: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: docker.io/pgvector/pgvector:0.8.5-pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_DB: nexus_ci_acceptance
          POSTGRES_USER: nexus_ci
          POSTGRES_PASSWORD: nexus_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_ci -d nexus_ci_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://nexus_ci:nexus_ci_only@127.0.0.1:5432/nexus_ci_acceptance
      JWT_SECRET_KEY: ci-only-not-a-production-secret-0123456789abcdef
      AI_REPLY_CONTRACT_SECRET: ci-only-contract-secret-0123456789abcdef
    steps:
      - name: Checkout frozen Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact Python dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Rehearse Alembic with visible diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-postgres
          cd backend
          python -m alembic upgrade head 2>&1 | tee /tmp/nexus-postgres/alembic-upgrade.log
          python -m alembic downgrade -1 2>&1 | tee /tmp/nexus-postgres/alembic-downgrade.log
          python -m alembic upgrade head 2>&1 | tee /tmp/nexus-postgres/alembic-reupgrade.log
      - name: Run disposable PostgreSQL acceptance
        run: |
          python scripts/qualification/postgres_acceptance.py \
            --evidence-dir /tmp/nexus-postgres \
            --source-sha "${{ needs.candidate-identity.outputs.source_sha }}" \
            --tree-sha "${{ needs.candidate-identity.outputs.tree_sha }}" \
            --output /tmp/nexus-postgres/postgres-acceptance-run.json
      - name: Upload PostgreSQL evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: postgres-evidence-${{ needs.candidate-identity.outputs.source_sha }}
          path: /tmp/nexus-postgres
          if-no-files-found: error
          retention-days: 30

  image-smoke:
    name: image-smoke
    needs: candidate-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: docker.io/pgvector/pgvector:0.8.5-pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_DB: nexus_image_acceptance
          POSTGRES_USER: nexus_image
          POSTGRES_PASSWORD: nexus_image_only
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_image -d nexus_image_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout frozen Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
      - name: Build exact-Head image
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nexus-image
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build --pull=false \
            --build-arg GIT_SHA="$SOURCE_SHA" \
            --build-arg BUILD_TIME="$build_time" \
            --build-arg IMAGE_TAG="nexus-ci:$SOURCE_SHA" \
            --build-arg APP_VERSION="pr-$SOURCE_SHA" \
            --build-arg FRONTEND_BUILD_SHA="$SOURCE_SHA" \
            --tag "nexus-ci:$SOURCE_SHA" . 2>&1 | tee /tmp/nexus-image/build.log
          test "$(docker image inspect "nexus-ci:$SOURCE_SHA" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "$SOURCE_SHA"
          docker image inspect "nexus-ci:$SOURCE_SHA" > /tmp/nexus-image/image-inspect.json
      - name: Run Trivy vulnerability inventory
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: nexus-ci:${{ needs.candidate-identity.outputs.source_sha }}
          format: json
          output: /tmp/nexus-image/trivy.raw.json
          scanners: vuln
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '0'
      - name: Generate image CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: nexus-ci:${{ needs.candidate-identity.outputs.source_sha }}
          format: cyclonedx
          output: /tmp/nexus-image/image.raw.cdx.json
          scanners: vuln
          ignore-unfixed: false
          exit-code: '0'
      - name: Set up Node for frontend SBOM
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Generate frontend CycloneDX SBOM
        working-directory: webapp
        run: |
          npm sbom --package-lock-only --sbom-format=cyclonedx \
            > /tmp/nexus-image/frontend.raw.cdx.json
      - name: Migrate disposable image database
        env:
          SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
          DATABASE_URL: postgresql+psycopg://nexus_image:nexus_image_only@127.0.0.1:55432/nexus_image_acceptance
        run: |
          docker run --rm --network host \
            -e PYTHONPATH=/app/backend \
            -e APP_ENV=test \
            -e DATABASE_URL="$DATABASE_URL" \
            -e JWT_SECRET_KEY=ci-only-not-a-production-secret-0123456789abcdef \
            -e AI_REPLY_CONTRACT_SECRET=ci-only-contract-secret-0123456789abcdef \
            -e PROVIDER_RUNTIME_ENABLED=false \
            -e PROVIDER_RUNTIME_KILL_SWITCH=true \
            -e ENABLE_OUTBOUND_DISPATCH=false \
            -e WHATSAPP_NATIVE_ENABLED=false \
            "nexus-ci:$SOURCE_SHA" python -m alembic upgrade head
      - name: Start isolated candidate and prove health
        env:
          SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
          DATABASE_URL: postgresql+psycopg://nexus_image:nexus_image_only@127.0.0.1:55432/nexus_image_acceptance
        run: |
          set -Eeuo pipefail
          docker run -d --name nexus-ci-candidate --network host \
            -e PYTHONPATH=/app/backend \
            -e APP_ENV=test \
            -e DATABASE_URL="$DATABASE_URL" \
            -e JWT_SECRET_KEY=ci-only-not-a-production-secret-0123456789abcdef \
            -e AI_REPLY_CONTRACT_SECRET=ci-only-contract-secret-0123456789abcdef \
            -e PROVIDER_RUNTIME_ENABLED=false \
            -e PROVIDER_RUNTIME_TRAFFIC_MODE=control \
            -e PROVIDER_RUNTIME_KILL_SWITCH=true \
            -e PROVIDER_RUNTIME_CANARY_PERCENT=0 \
            -e PRIVATE_AI_RUNTIME_ENABLED=false \
            -e WEBCHAT_AI_ENABLED=false \
            -e WEBCHAT_HUMAN_CALL_ENABLED=false \
            -e WEBCHAT_LIVE_AI_VOICE_ENABLED=false \
            -e ENABLE_OUTBOUND_DISPATCH=false \
            -e OUTBOUND_PROVIDER=disabled \
            -e WHATSAPP_NATIVE_ENABLED=false \
            -e WHATSAPP_DISPATCH_MODE=disabled \
            -e SPEEDAF_MCP_ENABLED=false \
            -e OPERATIONS_DISPATCH_MODE=disabled \
            "nexus-ci:$SOURCE_SHA"
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8080/healthz > /tmp/nexus-image/healthz.json; then
              break
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8080/healthz | tee /tmp/nexus-image/healthz.json
          curl --fail --silent http://127.0.0.1:8080/readyz | tee /tmp/nexus-image/readyz.json
          docker logs nexus-ci-candidate > /tmp/nexus-image/candidate.log 2>&1
          jq -n \
            --arg source_sha "$SOURCE_SHA" \
            --argjson health "$(cat /tmp/nexus-image/healthz.json)" \
            --argjson ready "$(cat /tmp/nexus-image/readyz.json)" \
            '{schema:"nexus.runtime-smoke-summary.v1",source_sha:$source_sha,health:$health,ready:$ready,synthetic:true,provider_enabled:false,outbound_enabled:false}' \
            > /tmp/nexus-image/runtime-smoke-summary.txt
      - name: Run controlled release-image assurance
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
          CANDIDATE_IMAGE: nexus-ci:${{ needs.candidate-identity.outputs.source_sha }}
          RELEASE_IMAGE_DIR: /tmp/nexus-image
        run: bash scripts/release/run_controlled_image_assurance.sh
      - name: Upload image and deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-smoke-${{ needs.candidate-identity.outputs.source_sha }}
          path: /tmp/nexus-image
          if-no-files-found: warn
          retention-days: 30
      - name: Remove isolated candidate
        if: always()
        run: docker rm -f nexus-ci-candidate >/dev/null 2>&1 || true

  required-gate:
    name: required-gate
    if: always()
    needs:
      - candidate-identity
      - static-authority
      - security-supply-chain
      - backend-full
      - frontend-browser
      - postgres-acceptance
      - image-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce all canonical jobs
        shell: bash
        env:
          CANDIDATE_IDENTITY: ${{ needs.candidate-identity.result }}
          STATIC_AUTHORITY: ${{ needs.static-authority.result }}
          SECURITY_SUPPLY_CHAIN: ${{ needs.security-supply-chain.result }}
          BACKEND_FULL: ${{ needs.backend-full.result }}
          FRONTEND_BROWSER: ${{ needs.frontend-browser.result }}
          POSTGRES_ACCEPTANCE: ${{ needs.postgres-acceptance.result }}
          IMAGE_SMOKE: ${{ needs.image-smoke.result }}
        run: |
          set -Eeuo pipefail
          printf '%s\n' \
            "candidate-identity=$CANDIDATE_IDENTITY" \
            "static-authority=$STATIC_AUTHORITY" \
            "security-supply-chain=$SECURITY_SUPPLY_CHAIN" \
            "backend-full=$BACKEND_FULL" \
            "frontend-browser=$FRONTEND_BROWSER" \
            "postgres-acceptance=$POSTGRES_ACCEPTANCE" \
            "image-smoke=$IMAGE_SMOKE"
          for result in \
            "$CANDIDATE_IDENTITY" \
            "$STATIC_AUTHORITY" \
            "$SECURITY_SUPPLY_CHAIN" \
            "$BACKEND_FULL" \
            "$FRONTEND_BROWSER" \
            "$POSTGRES_ACCEPTANCE" \
            "$IMAGE_SMOKE"
          do
            test "$result" = success
          done

  controlled-build-publish:
    name: controlled-build-publish
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.required-gate.result == 'success' }}
    needs: [candidate-identity, required-gate]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
      RC_SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
      RC_ENV_FILE: deploy/.env.rc-test
      RC_EVIDENCE_DIR: artifacts/rc-test
      RC_FAILURE_DIR: artifacts/controlled-rc-failure
      ASSURANCE_FAILURE_DIR: artifacts/controlled-image-assurance-failure
      RC_RUN_BROWSER_SMOKE: "true"
      RC_BASE_URL: http://127.0.0.1:18083
      RC_PUBLIC_ORIGIN: http://127.0.0.1:18083
      COMPOSE_PROJECT_NAME: nexus_controlled_${{ github.run_id }}
      CANDIDATE_IMAGE: nexusdesk/helpdesk:rc-test-${{ needs.candidate-identity.outputs.source_sha }}
      RELEASE_IMAGE_DIR: artifacts/release-image
      CONTROLLED_DIR: artifacts/controlled
      RC_POSTGRES_IMAGE_PIN: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
      RC_NGINX_IMAGE_PIN: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    steps:
      - name: Checkout accepted main candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Enforce exact current main
        run: |
          set -Eeuo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install locked browser dependencies
        working-directory: webapp
        run: |
          set -Eeuo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          npx playwright install --with-deps chromium
          mkdir -p ../artifacts/release-image
          npm sbom --package-lock-only --sbom-format=cyclonedx > ../artifacts/release-image/frontend.raw.cdx.json
      - name: Execute existing one-build RC chain
        id: controlled_rc
        run: |
          set +e
          run_log="${RUNNER_TEMP}/controlled-rc-run.log"
          rm -f "$run_log"
          bash scripts/release/run_controlled_rc_gate.sh 2>&1 | tee "$run_log"
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 0 ]; then
            python scripts/release/capture_controlled_rc_failure.py \
              --capture \
              --log "$run_log" \
              --evidence-dir "$RC_EVIDENCE_DIR" \
              --exit-code "$code"
          fi
          exit "$code"
      - name: Validate and scan bounded RC failure evidence
        id: rc_failure_scan
        if: ${{ always() && steps.controlled_rc.outcome == 'failure' }}
        run: |
          set -Eeuo pipefail
          summary="$RC_EVIDENCE_DIR/failure-summary.json"
          python scripts/release/capture_controlled_rc_failure.py --validate "$summary"
          rm -rf "$RC_FAILURE_DIR"
          mkdir -p "$RC_FAILURE_DIR"
          cp "$summary" "$RC_FAILURE_DIR/failure-summary.json"
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "$RC_FAILURE_DIR/artifact-scan.json" \
            "$RC_FAILURE_DIR/failure-summary.json"
          test "$(jq -r '.status' "$RC_FAILURE_DIR/artifact-scan.json")" = pass
      - name: Upload bounded RC failure evidence
        if: ${{ always() && steps.rc_failure_scan.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: controlled-rc-failure-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/controlled-rc-failure
          retention-days: 14
          if-no-files-found: error
      - name: Verify runtime imports
        run: |
          set -Eeuo pipefail
          mkdir -p "$RELEASE_IMAGE_DIR"
          docker run --rm --entrypoint sh "$CANDIDATE_IMAGE" -c \
            'set -eu; python -c "import app.main, psycopg, cryptography, argon2"; gunicorn --check-config app.main:app' \
            > "$RELEASE_IMAGE_DIR/runtime-smoke-summary.txt" 2>&1
      - name: Scan same RC image with immutable Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: json
          output: artifacts/release-image/trivy.raw.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: "0"
          scanners: vuln
      - name: Generate same-image CycloneDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.CANDIDATE_IMAGE }}
          format: cyclonedx-json
          output-file: artifacts/release-image/image.raw.cdx.json
          upload-artifact: false
      - name: Evaluate image assurance and compliance
        id: image_assurance
        run: |
          set +e
          bash scripts/release/run_controlled_image_assurance.sh
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Build and scan bounded image-assurance failure evidence
        id: assurance_failure_scan
        if: ${{ always() && steps.image_assurance.outcome == 'failure' }}
        env:
          ASSURANCE_EXIT_CODE: ${{ steps.image_assurance.outputs.exit_code }}
        run: |
          set -Eeuo pipefail
          rm -rf "$ASSURANCE_FAILURE_DIR"
          mkdir -p "$ASSURANCE_FAILURE_DIR"
          summary="$ASSURANCE_FAILURE_DIR/failure-summary.json"
          python scripts/release/capture_controlled_image_assurance_failure.py \
            --capture \
            --release-image-dir "$RELEASE_IMAGE_DIR" \
            --source-sha "$SOURCE_SHA" \
            --exit-code "${ASSURANCE_EXIT_CODE:-1}" \
            --output "$summary"
          python scripts/release/capture_controlled_image_assurance_failure.py --validate "$summary"
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "$ASSURANCE_FAILURE_DIR/artifact-scan.json" \
            "$summary"
          test "$(jq -r '.status' "$ASSURANCE_FAILURE_DIR/artifact-scan.json")" = pass
      - name: Upload bounded image-assurance failure evidence
        if: ${{ always() && steps.assurance_failure_scan.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: controlled-image-assurance-failure-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/controlled-image-assurance-failure
          retention-days: 14
          if-no-files-found: error
      - name: Publish and pull back the assured binary
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: bash scripts/release/publish_controlled_image.sh
      - name: Upload controlled build evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: controlled-build-${{ needs.candidate-identity.outputs.source_sha }}
          path: |
            artifacts/rc-test
            artifacts/release-image
            artifacts/controlled
          retention-days: 30
          if-no-files-found: error

  controlled-recovery:
    name: controlled-recovery
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.required-gate.result == 'success' }}
    needs: [candidate-identity, required-gate]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: docker.io/pgvector/pgvector:0.8.5-pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: nexus_recovery_admin
          POSTGRES_PASSWORD: nexus_recovery_admin
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_recovery_admin -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
      SOURCE_APP_URL: postgresql+psycopg://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      SOURCE_NATIVE_URL: postgresql://nexus_recovery_source:nexus_recovery_source@127.0.0.1:5432/nexus_source
      RESTORE_APP_URL: postgresql+psycopg://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RESTORE_NATIVE_URL: postgresql://nexus_recovery_restore:nexus_recovery_restore@127.0.0.1:5432/nexus_restore
      RECOVERY_ADMIN_NATIVE_URL: postgresql://nexus_recovery_admin:nexus_recovery_admin@127.0.0.1:5432/postgres
      RECOVERY_ALLOW_DATABASE_RECREATE: I_UNDERSTAND
      QUALIFICATION_MARKER: QUAL-RCV-001
      RTO_TARGET_SECONDS: "120"
      RPO_TARGET_SECONDS: "60"
      EVIDENCE_ROOT: artifacts/recovery
    steps:
      - name: Checkout accepted main candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install recovery dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Reuse repository recovery authority
        run: bash scripts/release/run_controlled_recovery_gate.sh
      - name: Upload controlled recovery evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: controlled-recovery-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/recovery/*.json
          retention-days: 30
          if-no-files-found: error

  controlled-bind-attest:
    name: controlled-bind-attest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.controlled-build-publish.result == 'success' && needs.controlled-recovery.result == 'success' }}
    needs: [candidate-identity, controlled-build-publish, controlled-recovery]
    permissions:
      attestations: write
      contents: read
      id-token: write
      issues: write
      packages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ needs.candidate-identity.outputs.source_sha }}
      FINAL_DIR: artifacts/final-controlled-candidate
    steps:
      - name: Checkout accepted main candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.candidate-identity.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download controlled build evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: controlled-build-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/build
      - name: Download controlled recovery evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: controlled-recovery-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/recovery
      - name: Resolve immutable registry identity
        id: identity
        run: |
          set -Eeuo pipefail
          receipt=artifacts/build/controlled/registry-publish-receipt.json
          test "$(jq -r '.status' "$receipt")" = pass
          test "$(jq -r '.source_sha' "$receipt")" = "$SOURCE_SHA"
          image="$(jq -r '.registry_image' "$receipt")"
          digest="$(jq -r '.registry_digest' "$receipt")"
          local_id="$(jq -r '.local_image_id' "$receipt")"
          pulled_id="$(jq -r '.pulled_image_id' "$receipt")"
          [[ "$image" =~ ^ghcr\.io/[a-z0-9._/-]+$ ]]
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$local_id" = "$pulled_id"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "local_id=$local_id" >> "$GITHUB_OUTPUT"
          echo "pulled_id=$pulled_id" >> "$GITHUB_OUTPUT"
      - name: Authenticate GHCR for registry attestation
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
      - name: Attest exact registry digest
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ steps.identity.outputs.image }}
          subject-digest: ${{ steps.identity.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
      - name: Clear GHCR registry credentials
        if: ${{ always() }}
        run: docker logout ghcr.io >/dev/null 2>&1 || true
      - name: Build final evidence-bound candidate
        env:
          REGISTRY_IMAGE: ${{ steps.identity.outputs.image }}
          REGISTRY_DIGEST: ${{ steps.identity.outputs.digest }}
          LOCAL_IMAGE_ID: ${{ steps.identity.outputs.local_id }}
          PULLED_IMAGE_ID: ${{ steps.identity.outputs.pulled_id }}
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
        run: bash scripts/release/finalize_controlled_candidate.sh
      - name: Upload final controlled candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: controlled-candidate-${{ needs.candidate-identity.outputs.source_sha }}
          path: artifacts/final-controlled-candidate
          retention-days: 30
          if-no-files-found: error
      - name: Record exact controlled candidate
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          manifest="$FINAL_DIR/controlled-candidate-manifest.json"
          source="$(jq -r '.candidate.source_sha' "$manifest")"
          image="$(jq -r '.candidate.registry_reference' "$manifest")"
          migration="$(jq -r '.candidate.migration_revision' "$manifest")"
          body="$(printf '%s\n' \
            '## FINAL_CONTROLLED_CANDIDATE' \
            "- Workflow run: \`${GITHUB_RUN_ID}\` — all jobs succeeded." \
            "- Exact source: \`${source}\`." \
            "- Immutable image: \`${image}\`." \
            "- Migration: \`${migration}\`." \
            '- Production ready: `false`.' \
            '- Deployment performed: `false`.' \
            '- External effects authorized: `false`.')"
          gh api --method POST "repos/${GH_REPO}/issues/724/comments" --raw-field body="$body" >/dev/null
          echo '## Controlled candidate published' >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${source}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${image}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migration: \`${migration}\`" >> "$GITHUB_STEP_SUMMARY"
          echo '- Production ready: `false`' >> "$GITHUB_STEP_SUMMARY"
          echo '- Deployment performed: `false`' >> "$GITHUB_STEP_SUMMARY"
