name: Canonical verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canonical-verification-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  CI: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: backend
  APP_ENV: test
  SECRET_KEY: canonical-verification-only-secret-never-use-in-production
  AUTO_INIT_DB: "false"
  SEED_DEMO_DATA: "false"
  ALLOW_DEV_AUTH: "false"
  OUTBOUND_PROVIDER: disabled
  ENABLE_OUTBOUND_DISPATCH: "false"
  EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
  EXTERNAL_CHANNEL_TRANSPORT: disabled
  EXTERNAL_CHANNEL_SYNC_ENABLED: "false"
  EXTERNAL_CHANNEL_INBOUND_AUTO_SYNC_ENABLED: "false"
  EXTERNAL_CHANNEL_EVENT_DRIVER_ENABLED: "false"
  EXTERNAL_CHANNEL_BRIDGE_ENABLED: "false"
  EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
  KNOWLEDGE_EMBEDDINGS_ENABLED: "false"
  WEBCHAT_TRACKING_FACT_LOOKUP_ENABLED: "false"

jobs:
  authority:
    name: Canonical authority
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify sole implementation authority
        run: python scripts/verify_repository.py --static-only

      - name: Record candidate identity
        run: |
          echo "candidate_sha=$(git rev-parse HEAD)"
          git status --short
          test -z "$(git status --porcelain)"

  repository-verification:
    name: Full repository verification
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: sqlite+pysqlite:///./canonical-verification.db
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement backend/requirements.txt pytest

      - name: Install frontend and browser dependencies
        working-directory: webapp
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps chrome

      - name: Run canonical full verification
        run: python scripts/verify_repository.py

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-browser-failure-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            webapp/playwright-report/
            webapp/test-results/

  migration-rehearsal:
    name: PostgreSQL migration rehearsal
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://nexus:nexus@127.0.0.1:5432/nexus_ci
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement backend/requirements.txt

      - name: Upgrade, rollback and re-upgrade
        working-directory: backend
        run: |
          alembic upgrade head
          alembic current | tee /tmp/alembic-current-head.txt
          grep -q "20260715_0060" /tmp/alembic-current-head.txt
          alembic downgrade -1
          alembic current | tee /tmp/alembic-current-rollback.txt
          grep -q "20260713_0059" /tmp/alembic-current-rollback.txt
          alembic upgrade head
          alembic current | tee /tmp/alembic-current-final.txt
          grep -q "20260715_0060" /tmp/alembic-current-final.txt

  candidate-image:
    name: Candidate image and health contract
    needs: authority
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment contract
        run: bash scripts/ci/validate_deploy_contract.sh

      - name: Build exact candidate image
        run: |
          GIT_SHA="$(git rev-parse HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          IMAGE_TAG="nexusdesk/helpdesk:canonical-${GIT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          docker build \
            --build-arg "GIT_SHA=${GIT_SHA}" \
            --build-arg "BUILD_TIME=${BUILD_TIME}" \
            --build-arg "IMAGE_TAG=${IMAGE_TAG}" \
            --build-arg "APP_VERSION=canonical-${GIT_SHA}" \
            --build-arg "FRONTEND_BUILD_SHA=${GIT_SHA}" \
            --tag "${IMAGE_TAG}" \
            .
          docker image inspect "${IMAGE_TAG}"

      - name: Verify packaged authorities
        run: |
          docker run --rm --entrypoint sh "$IMAGE_TAG" -c '
            test -f /app/frontend_dist/index.html
            test -f /app/backend/app/main.py
            test ! -e /app/frontend
          '

      - name: Verify health and readiness
        run: |
          container_id="$(docker run -d \
            -e APP_ENV=test \
            -e SECRET_KEY=canonical-container-smoke-only-never-production \
            -e DATABASE_URL=sqlite:////tmp/candidate.db \
            -e AUTO_INIT_DB=true \
            -e SEED_DEMO_DATA=false \
            -e OUTBOUND_PROVIDER=disabled \
            -e ENABLE_OUTBOUND_DISPATCH=false \
            -e EXTERNAL_CHANNEL_TRANSPORT=disabled \
            -e EXTERNAL_CHANNEL_DEPLOYMENT_MODE=disabled \
            -e EXTERNAL_CHANNEL_SYNC_ENABLED=false \
            -e EXTERNAL_CHANNEL_EVENT_DRIVER_ENABLED=false \
            -e EXTERNAL_CHANNEL_BRIDGE_ENABLED=false \
            -e EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED=false \
            -e UPLOAD_ROOT=/tmp/uploads \
            -p 127.0.0.1:18081:8080 \
            "$IMAGE_TAG")"
          cleanup() {
            docker logs "$container_id" || true
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:18081/healthz >/tmp/healthz.json; then
              break
            fi
            sleep 2
          done
          cat /tmp/healthz.json
          curl --fail --show-error --silent http://127.0.0.1:18081/readyz | tee /tmp/readyz.json
