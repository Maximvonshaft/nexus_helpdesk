# Standalone candidate compose for side-by-side smoke testing.
#
# Use a separate Compose project and a candidate env file:
#   COMPOSE_PROJECT_NAME=nexusdesk_candidate docker compose \
#     -f deploy/docker-compose.candidate.yml \
#     --env-file deploy/.env.candidate up -d app-candidate worker-outbound-candidate whatsapp-sidecar-candidate
#
# Do not map this candidate to public nginx until the smoke and rollback runbook
# gates pass.

x-candidate-app: &candidate_app
  image: ${IMAGE_TAG:?set release IMAGE_TAG}
  env_file:
    - .env.candidate
  environment: &candidate_app_env
    APP_ENV: production
    AUTO_INIT_DB: "false"
    SEED_DEMO_DATA: "false"
    RELEASE_CANDIDATE: "true"
    GIT_SHA: ${GIT_SHA:?set release GIT_SHA}
    BUILD_TIME: ${BUILD_TIME:?set release BUILD_TIME}
    IMAGE_TAG: ${IMAGE_TAG:?set release IMAGE_TAG}
    APP_VERSION: ${APP_VERSION:?set release APP_VERSION}
    FRONTEND_BUILD_SHA: ${FRONTEND_BUILD_SHA:?set release FRONTEND_BUILD_SHA}
  volumes: &candidate_app_volumes
    - /run/secrets:/run/secrets:ro
    - /opt/nexus_helpdesk/deploy/runtime_secrets/ai_runtime_token:/run/nexus/ai_runtime_token:ro
    - /opt/nexus_helpdesk/data/uploads:/app/backend/uploads:rw
    - /var/backups/nexusdesk/uploads:/var/backups/nexusdesk/uploads:ro
  networks:
    - candidate
    - production_runtime
  restart: unless-stopped

x-candidate-worker-healthcheck: &candidate_worker_healthcheck
  test:
    - CMD-SHELL
    - "python -c \"from pathlib import Path; cmd=Path('/proc/1/cmdline').read_text(errors='replace'); assert 'scripts/run_worker.py' in cmd, cmd; from sqlalchemy import text; from app.db import SessionLocal; db=SessionLocal(); db.execute(text('select 1')); db.close(); print('candidate-worker-ok')\""
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  app-candidate:
    <<: *candidate_app
    environment:
      <<: *candidate_app_env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-30}
    ports:
      - "127.0.0.1:${CANDIDATE_APP_PORT:-18082}:8080"
    command:
      - /bin/sh
      - -c
      - >-
        exec gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        --workers "$${WEB_CONCURRENCY:-2}"
        --timeout "$${WEB_TIMEOUT:-30}"
        --bind 0.0.0.0:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker-outbound-candidate:
    <<: *candidate_app
    command: python scripts/run_worker.py --worker-id worker-outbound-candidate --queue outbound
    healthcheck: *candidate_worker_healthcheck
    depends_on:
      app-candidate:
        condition: service_healthy

  whatsapp-sidecar-candidate:
    image: node:22-bookworm-slim
    working_dir: /app
    init: true
    restart: unless-stopped
    command: sh -lc "npm ci && npm run build && npm run start"
    environment:
      WA_SIDECAR_PORT: "18793"
      WA_SIDECAR_CONNECTOR_MODE: "${WA_SIDECAR_CONNECTOR_MODE:-baileys}"
      WA_SIDECAR_AUTO_START_ACCOUNTS: "${WA_SIDECAR_AUTO_START_ACCOUNTS:-wa-main}"
      WA_SIDECAR_BROWSER_PLATFORM: "${WA_SIDECAR_BROWSER_PLATFORM:-Ubuntu}"
      WA_SIDECAR_BROWSER_NAME: "${WA_SIDECAR_BROWSER_NAME:-NexusDesk}"
      WA_SIDECAR_BROWSER_VERSION: "${WA_SIDECAR_BROWSER_VERSION:-22.04.4}"
      WA_SIDECAR_KEEP_ALIVE_INTERVAL_MS: "${WA_SIDECAR_KEEP_ALIVE_INTERVAL_MS:-25000}"
      WA_SIDECAR_CONNECT_TIMEOUT_MS: "${WA_SIDECAR_CONNECT_TIMEOUT_MS:-60000}"
      WA_SIDECAR_DEFAULT_QUERY_TIMEOUT_MS: "${WA_SIDECAR_DEFAULT_QUERY_TIMEOUT_MS:-60000}"
      WA_SIDECAR_OPERATION_TIMEOUT_MS: "${WA_SIDECAR_OPERATION_TIMEOUT_MS:-60000}"
      WA_SIDECAR_QR_TTL_MS: "${WA_SIDECAR_QR_TTL_MS:-120000}"
      WA_SIDECAR_RECONNECT_BASE_DELAY_MS: "${WA_SIDECAR_RECONNECT_BASE_DELAY_MS:-2000}"
      WA_SIDECAR_RECONNECT_MAX_DELAY_MS: "${WA_SIDECAR_RECONNECT_MAX_DELAY_MS:-60000}"
      WA_SIDECAR_RECONNECT_MAX_ATTEMPTS: "${WA_SIDECAR_RECONNECT_MAX_ATTEMPTS:-20}"
      WA_SIDECAR_ALLOW_FROM_ME_INBOUND: "${WA_SIDECAR_ALLOW_FROM_ME_INBOUND:-false}"
      WA_SIDECAR_FROM_ME_MODE: "${WA_SIDECAR_FROM_ME_MODE:-ignore}"
      WA_SIDECAR_FROM_ME_TEST_PREFIX: "${WA_SIDECAR_FROM_ME_TEST_PREFIX:-NEXUS_SELF_INBOUND_TEST}"
      WA_SIDECAR_INTERNAL_TOKEN: "${WA_SIDECAR_INTERNAL_TOKEN:?set WA_SIDECAR_INTERNAL_TOKEN outside this file}"
      WHATSAPP_SESSION_ROOT: "/data/whatsapp-sessions"
      NEXUS_BACKEND_URL: "${CANDIDATE_NEXUS_BACKEND_URL:-http://app-candidate:8080}"
      NEXUS_CONNECTOR_KEY: "${NEXUS_CONNECTOR_KEY:?set NEXUS_CONNECTOR_KEY outside this file}"
      NEXUS_CONNECTOR_HMAC_SECRET: "${NEXUS_CONNECTOR_HMAC_SECRET:?set NEXUS_CONNECTOR_HMAC_SECRET outside this file}"
      NEXUS_CALLBACK_TIMEOUT_MS: "${NEXUS_CALLBACK_TIMEOUT_MS:-8000}"
      LOG_LEVEL: "${WA_SIDECAR_LOG_LEVEL:-info}"
    volumes:
      - ../connectors/whatsapp-sidecar:/app
      - ${CANDIDATE_WHATSAPP_SESSION_ROOT:-/opt/nexus_helpdesk/data/whatsapp-sessions-candidate}:/data/whatsapp-sessions
    ports:
      - "127.0.0.1:${CANDIDATE_WA_SIDECAR_PORT:-18795}:18793"
    networks:
      - candidate
    depends_on:
      app-candidate:
        condition: service_healthy

networks:
  candidate: {}
  production_runtime:
    name: ${CANDIDATE_EXTERNAL_NETWORK:-deploy_default}
    external: true
