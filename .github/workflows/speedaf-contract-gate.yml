name: speedaf-contract-gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/api/speedaf*.py'
      - 'backend/app/api/webchat_fast.py'
      - 'backend/app/services/speedaf/**'
      - 'backend/app/services/tracking_fact*.py'
      - 'backend/app/services/background_jobs.py'
      - 'backend/alembic/versions/*speedaf*.py'
      - 'backend/tests/test_speedaf*.py'
      - 'docs/speedaf-mcp-full-closure/**'
      - '.github/workflows/speedaf-contract-gate.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  speedaf-contract-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio httpx

      - name: Compile Speedaf surfaces
        run: |
          set -Eeuo pipefail
          python -m compileall \
            backend/app/api/speedaf_actions.py \
            backend/app/api/speedaf_cancel.py \
            backend/app/services/speedaf \
            backend/app/services/tracking_fact_schema.py \
            backend/app/services/tracking_fact_service.py \
            backend/app/services/background_jobs.py

      - name: Speedaf safety grep
        run: |
          set -Eeuo pipefail
          if git grep -nE 'SPEEDAF_(CANCEL|UPDATE_ADDRESS|WORK_ORDER_CREATE)_ENABLED\s*=\s*(true|TRUE|1|yes|YES|on|ON)' -- ':!docs/**' ':!.github/workflows/speedaf-contract-gate.yml'; then
            echo 'ERROR: Speedaf write feature flag must not be enabled in repository files.'
            exit 1
          fi
          if git grep -nE '(appCode|secretKey|SPEEDAF_[A-Z0-9_]*(SECRET|TOKEN|KEY)|SPEEDAF_[A-Z0-9_]*SIGN)\s*[:=]\s*["'"'']?[A-Za-z0-9_\-]{20,}' -- backend docs ':!docs/speedaf-mcp-full-closure/**' ':!.github/workflows/speedaf-contract-gate.yml'; then
            echo 'ERROR: possible Speedaf credential-like material found.'
            exit 1
          fi
          if git grep -n 'SPEEDAF_VOICE_CALLBACK_ENABLED.*true' -- backend docs; then
            echo 'ERROR: voice callback must remain disabled/excluded.'
            exit 1
          fi

      - name: Speedaf static contract assertions
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          cancel = Path('backend/app/api/speedaf_cancel.py').read_text(encoding='utf-8')
          actions = Path('backend/app/api/speedaf_actions.py').read_text(encoding='utf-8')
          tracking = Path('backend/app/services/speedaf/tracking_fact_source.py').read_text(encoding='utf-8')
          schema = Path('backend/app/services/tracking_fact_schema.py').read_text(encoding='utf-8')

          required_cancel = [
              'cancel-preview',
              'confirmToken',
              '_query_order_status',
              'is_cancel_terminal_status',
              'speedaf_cancel_idempotency',
              'SPEEDAF_CANCEL_ENABLED',
              'CAP_SPEEDAF_CANCEL_WRITE',
          ]
          missing = [item for item in required_cancel if item not in cancel]
          if missing:
              raise SystemExit(f'MISSING_CANCEL_CONTRACTS={missing}')

          required_actions = [
              'SPEEDAF_WORK_ORDER_CREATE_ENABLED',
              'SPEEDAF_UPDATE_ADDRESS_ENABLED',
              'enqueue_speedaf_address_update_job',
              'status="queued"',
              'WORK_ORDER_SPEEDAF_DESCRIPTION_MAX_LENGTH = 200',
              'speedaf_address_update_idempotency',
          ]
          missing = [item for item in required_actions if item not in actions]
          if missing:
              raise SystemExit(f'MISSING_ACTION_CONTRACTS={missing}')

          required_tracking = [
              'query_waybills_by_caller',
              'multiple_waybill_candidates',
              'needs_customer_selection',
          ]
          missing = [item for item in required_tracking if item not in tracking]
          if missing:
              raise SystemExit(f'MISSING_TRACKING_CONTRACTS={missing}')

          required_schema = ['safe_candidates', 'waybill_suffix', 'waybill_hash']
          missing = [item for item in required_schema if item not in schema]
          if missing:
              raise SystemExit(f'MISSING_SAFE_CANDIDATE_SCHEMA={missing}')

          print('speedaf_static_contracts_ok')
          PY

      - name: PostgreSQL migration contract
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          APP_ENV: development
        run: |
          set -Eeuo pipefail
          cd backend
          alembic heads
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Speedaf focused tests
        run: |
          set -Eeuo pipefail
          timeout 600 python -m pytest -q \
            backend/tests/test_speedaf_tracking_full_value.py \
            backend/tests/test_speedaf_cancel_controlled_action.py \
            backend/tests/test_speedaf_workorder_address_actions.py
