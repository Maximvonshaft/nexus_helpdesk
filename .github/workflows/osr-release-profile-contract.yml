name: osr-release-profile-contract

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/services/nexus_osr/release_profiles.py"
      - "backend/tests/test_nexus_osr_release_profiles.py"
      - "docs/engineering/osr-release-profile-contract.md"
      - "docs/superpowers/specs/2026-07-13-osr-release-profile-contract-design.md"
      - "docs/superpowers/plans/2026-07-13-osr-release-profile-contract.md"
      - ".github/workflows/osr-release-profile-contract.yml"
  push:
    branches: [main]
    paths:
      - "backend/app/services/nexus_osr/release_profiles.py"
      - "backend/tests/test_nexus_osr_release_profiles.py"
      - ".github/workflows/osr-release-profile-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-profile-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: backend
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Diagnose immutable tree identities
        if: github.event_name == 'pull_request'
        run: |
          set -Eeuo pipefail
          {
            echo "HEAD_TREE=$(git rev-parse 'HEAD^{tree}')"
            echo "MAIN_TREE=$(git rev-parse 'origin/main^{tree}')"
          } | tee tree-identities.txt

      - name: Upload tree identity diagnostic
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: osr-release-profile-tree-identities
          path: tree-identities.txt
          if-no-files-found: error
          retention-days: 1

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compile release profile authority
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/services/nexus_osr/release_profiles.py \
            backend/tests/test_nexus_osr_release_profiles.py

      - name: Run release profile contract tests
        run: |
          set -Eeuo pipefail
          python -m unittest -v backend.tests.test_nexus_osr_release_profiles

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
