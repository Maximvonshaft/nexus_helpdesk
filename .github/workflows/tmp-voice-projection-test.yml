name: Temporary Voice Projection Test

on:
  push:
    branches:
      - fix/webchat-voice-transcript-projection

permissions:
  contents: read

jobs:
  focused-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Run focused voice projection regressions
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:////tmp/nexus_voice_projection_ci.db
        run: >-
          python -m pytest -q
          backend/tests/test_webchat_voice_transcript_projection.py
          backend/tests/test_webchat_polling_write_throttle.py
          backend/tests/test_live_voice_orchestration.py
