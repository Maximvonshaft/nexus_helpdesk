name: connector-refine-worker-readiness

on:
  pull_request:
    paths:
      - ".github/scripts/connector_refine_worker_readiness.py"
      - ".github/workflows/connector-refine-worker-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Apply deterministic refinement
        run: |
          set -Eeuo pipefail
          python .github/scripts/connector_refine_worker_readiness.py
          python -m py_compile \
            backend/app/settings.py \
            backend/app/services/nexus_osr/business_readiness_service.py \
            backend/scripts/run_worker.py \
            backend/tests/test_nexus_osr_business_readiness.py \
            backend/tests/test_run_worker_heartbeat.py
          git diff --check
          grep -q 'SHADOW_REQUIRED_WORKERS' backend/app/services/nexus_osr/business_readiness_service.py
          grep -q 'WORKER_HEARTBEAT_INTERVAL_SECONDS' backend/app/settings.py
      - name: Commit refinement
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-readiness-automation"
          git config user.email "nexus-readiness-automation@users.noreply.github.com"
          git add \
            backend/app/settings.py \
            backend/app/services/nexus_osr/business_readiness_service.py \
            backend/tests/test_nexus_osr_business_readiness.py
          git commit -m "fix(readiness): align worker evidence to release profile"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
