server {
    server_name www.leakle.com;

    client_max_body_size 25m;

    location /assets/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:18081/healthz;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /readyz {
        proxy_pass http://127.0.0.1:18081/readyz;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /api/webchat/fast-reply {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:18081/api/webchat/fast-reply;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1s;
        proxy_send_timeout 8s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
    }

    location = /api/webchat/fast-reply/stream {
        client_max_body_size 32k;
        proxy_pass http://127.0.0.1:18081/api/webchat/fast-reply/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1s;
        proxy_send_timeout 8s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering "no" always;
        add_header Cache-Control "no-store" always;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.leakle.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.leakle.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = www.leakle.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name www.leakle.com;
    return 404; # managed by Certbot


}