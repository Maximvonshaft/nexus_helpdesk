name: Nexus OSR Work Item
description: Define one independently assignable, implementable, reviewable, and closable unit of work.
title: "[OSR Work] "
labels:
  - osr-work-order
body:
  - type: markdown
    attributes:
      value: |
        A Work Item is the lifecycle and ownership source of truth. The Issue assignee is the owner. Keep Lifecycle, Current PR, Blocked by, and Supersedes updated as work changes. The linked Pull Request owns implementation facts and exact-head evidence.

  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      description: Link exactly one M1-M12 Epic Issue, or write governance/release integration when applicable.
      placeholder: "#491"
    validations:
      required: true

  - type: dropdown
    id: lifecycle
    attributes:
      label: Lifecycle
      description: Initial Work Item lifecycle. Update the Issue body when this changes.
      options:
        - Backlog
        - Ready
        - In Progress
        - In Review
        - Release Gate
        - Blocked
    validations:
      required: true

  - type: input
    id: current_pr
    attributes:
      label: Current PR
      description: Link the single current implementation Pull Request, or write none when no PR exists.
      placeholder: "none"
    validations:
      required: true

  - type: input
    id: blocked_by
    attributes:
      label: Blocked by
      description: Link every blocking Issue, or write none.
      placeholder: "none or #484"
    validations:
      required: true

  - type: input
    id: supersedes
    attributes:
      label: Supersedes
      description: Link superseded Issues or Pull Requests, or write none.
      placeholder: "none"
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Feature
        - Bug
        - Tech debt
        - Security
        - Research
        - Release
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current verified behavior
      description: Describe the current code/runtime behavior with file, function, table, endpoint, or test evidence.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe the end state in observable terms.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Owned scope
      description: List modules, APIs, tables, workers, UI surfaces, and tests this Work Item owns.
    validations:
      required: true

  - type: textarea
    id: forbidden_scope
    attributes:
      label: Forbidden scope and safety constraints
      description: State what must not change or be bypassed.
      placeholder: |
        - No CustomerVisibleMessageService bypass
        - No cross-tenant reads
        - No direct provider or sidecar call
        - No production deployment
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use a testable checklist covering behavior, isolation, idempotency, concurrency, audit, privacy, and failure states.
      placeholder: |
        - [ ] Functional behavior
        - [ ] Tenant/country/channel isolation
        - [ ] Idempotency and duplicate-event behavior
        - [ ] Concurrency and rollback
        - [ ] Audit and redaction
        - [ ] Failure and recovery behavior
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Required validation and runtime evidence
      description: Define focused tests, database/runtime environment, migration checks, and exact-head release evidence.
    validations:
      required: true

  - type: textarea
    id: migration_rollback
    attributes:
      label: Migration, rollout, and rollback
      description: State schema/data impact, upgrade/downgrade, feature flags, repair steps, and rollback behavior. Write None with justification if not applicable.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependency and merge order
      description: Link blocked-by and blocking Issues and define merge order. This must agree with the Blocked by field.
    validations:
      required: true

  - type: checkboxes
    id: readiness
    attributes:
      label: Ready criteria
      options:
        - label: The current behavior was verified against current main.
          required: true
        - label: This Work Item is independently reviewable and closable.
          required: true
        - label: No other active Work Item or Pull Request owns the same scope.
          required: true
        - label: One current implementation Pull Request will be used.
          required: true
        - label: The Issue assignee will be treated as the current owner.
          required: true
        - label: Green CI alone will not be treated as production proof.
          required: true
