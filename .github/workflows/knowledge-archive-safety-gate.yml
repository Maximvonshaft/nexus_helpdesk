name: knowledge-archive-safety-gate

on:
  pull_request:
    paths:
      - "backend/app/services/knowledge_archive_safety.py"
      - "backend/app/services/knowledge_document_service.py"
      - "backend/tests/test_knowledge_archive_safety.py"
      - ".github/workflows/knowledge-archive-safety-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hostile-ooxml-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/knowledge-archive-safety.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
      - name: Compile archive boundary
        run: |
          python -m py_compile \
            backend/app/services/knowledge_archive_safety.py \
            backend/app/services/knowledge_document_service.py \
            backend/tests/test_knowledge_archive_safety.py
      - name: Run adversarial and positive extraction tests
        run: pytest -q backend/tests/test_knowledge_archive_safety.py
      - name: Assert production parser wiring
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('backend/app/services/knowledge_document_service.py').read_text(encoding='utf-8')
          assert 'SafeKnowledgeArchive(content, limits=limits)' in text
          assert 'parse_bounded_xml' in text
          assert 'def _read_zip_member' not in text
          assert 'import zipfile' not in text
          PY
      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
