schema_version: nexus-osr-plan-v3

governance:
  model: issue_only
  work_item_state_authority: work_item_issue_body_assignee_and_state
  epic_capability_authority: epic_issues_490_through_501
  navigation_index_issue: 489
  audit_portfolio_issue: 467
  historical_control_issue: 461
  project_control_enabled: false
  project_optional_visualization_only: true
  note: >-
    Lifecycle, ownership, blockers, current Pull Requests and closure state are
    owned by executable Work Item Issues. Issue #489 is a stable navigation
    index and must not duplicate exact SHAs, CI results or implementation facts.

repository:
  name: Maximvonshaft/nexus_helpdesk
  default_branch: main

product:
  name: Nexus OSR
  expansion: Nexus Operations Service Runtime
  doctrine: >-
    Multi-country logistics customer-service and operations-closure runtime
    using MCP facts, customer-visible knowledge, short-lived Case Context,
    governed outbound, policy-controlled tool execution, handoff, ticketing,
    routing, debug/eval/audit, Admin, Operator, Analytics, SkillBank and
    Production Readiness capabilities. It is not a chatbot.

safety_kernel:
  no_c_end_long_term_memory: true
  case_context_scope: short_lived_case_scoped
  live_fact_authority: mcp_or_approved_operational_sources
  customer_claims_are_facts: false
  previous_ai_replies_are_facts: false
  customer_visible_boundary: CustomerVisibleMessageService_or_governed_outbound_contract
  tool_execution_boundary:
    - ToolExecutionPolicy
    - PolicyGate
    - ControlledActionExecutor
    - current_governed_equivalent
  human_online_action: existing_handoff
  human_offline_action: automatic_ticket_when_escalation_required
  configuration_driven:
    - country
    - language
    - channel
    - queue
    - tool
    - policy
    - whatsapp_routing
    - group
  redaction_required_for:
    - raw_prompt
    - provider_payload
    - raw_tool_arguments
    - raw_tool_results
    - tracking_number
    - phone
    - email
    - credentials
    - provider_group_id
  prohibited_actions:
    - production_deploy_without_release_authorization
    - release_tag_without_release_authorization
    - real_external_customer_message_without_governed_outbound
    - funds_or_refund_action_without_governed_authorization
    - legal_action_without_governed_authorization
    - identity_action_without_governed_authorization
    - irreversible_deletion_without_governed_authorization

lifecycle_contract:
  states:
    - Backlog
    - Ready
    - In Progress
    - In Review
    - Release Gate
    - Blocked
    - Done
    - Not Planned
  required_work_item_control_fields:
    - parent_epic
    - lifecycle
    - owner
    - current_pr
    - blocked_by
    - supersedes
  completion_authority:
    done: issue_closed_with_completed_reason
    not_planned: issue_closed_with_not_planned_reason
  ownership_authority: issue_assignee
  implementation_authority: linked_current_pull_request

ownership_contract:
  issue_assignee_required_for_in_progress: true
  explicit_lifecycle_in_work_item_required: true
  one_current_pull_request_per_work_item: true
  comment_based_claims_enabled: false
  action_claim_enabled: false
  maximum_active_implementation_work_items: 2
  maximum_release_candidates: 1

merge_policy:
  one_pull_request_at_a_time: true
  reread_main_after_each_merge: true
  recompute_downstream_base_after_each_merge: true
  old_base_green_checks_are_merge_authority: false
  exact_head_acceptance_required: true
  parallel_schema_work_must_converge_to_one_alembic_head: true

capabilities:
  - id: M1
    epic_issue: 490
    name: RuntimeDecision and Case Context Kernel
  - id: M2
    epic_issue: 491
    name: Escalation, Handoff and Auto-ticket Closure
    stable_dependency: ticket_safety_before_configured_escalation
  - id: M3
    epic_issue: 492
    name: Governed Tool Execution
  - id: M4
    epic_issue: 493
    name: Tracking Truth Layer
  - id: M5
    epic_issue: 494
    name: Customer-visible Knowledge Quality
    stable_dependency: knowledge_k1_before_k2
  - id: M6
    epic_issue: 495
    name: Channel Gateway and Operations Routing
  - id: M7
    epic_issue: 496
    name: Debug, Eval and Audit
  - id: M8
    epic_issue: 497
    name: Admin Policy APIs and Control Tower
  - id: M9
    epic_issue: 498
    name: Operator Workspace and Queues
    depends_on: [M2, M4, M5, M6, M8]
  - id: M10
    epic_issue: 499
    name: Operations Analytics and Control Tower Maturity
    depends_on: [M9]
  - id: M11
    epic_issue: 500
    name: Internal SOP SkillBank
    depends_on: [M5, M8, M9]
  - id: M12
    epic_issue: 501
    name: Production Hardening and Readiness
    production_posture: NO_GO_until_runtime_evidence_is_complete

release_evidence:
  green_ci_alone_is_production_proof: false
  required_as_applicable:
    - focused_unit_and_contract_tests
    - full_regression_checks
    - postgresql_migration_and_concurrency
    - staging_or_production_like_runtime
    - backup_restore_and_recovery_objectives
    - load_capacity_rate_limit_and_failure_injection
    - logs_metrics_traces_alerts_and_pii_redaction
    - incident_rollback_canary_retention_and_dsar_runbooks
    - exact_release_candidate_and_post_merge_acceptance

roadmap_files:
  purpose: stable_strategy_and_governance_only
  live_status_authority: executable_work_item_issues
  update_after_every_status_transition: false
  manual_live_status_duplication_allowed: false
  manual_main_sha_tracking_allowed: false
