name: Temporary Merge Main Into PR 774

on:
  push:
    branches:
      - fix/pr-774-agent-routing-takeover

permissions:
  contents: write
  issues: write

concurrency:
  group: merge-main-into-pr-774
  cancel-in-progress: true

jobs:
  merge-main:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: feat/conversation-first-agent-routing
      - name: Merge latest main and push
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          git merge --no-edit origin/main
          git diff --check HEAD^ HEAD
          git push origin HEAD:feat/conversation-first-agent-routing
          final_sha="$(git rev-parse HEAD)"
          gh api repos/${REPOSITORY}/issues/774/comments \
            -f body="<!-- pr774-main-integration -->Merged latest \`main\` into #774. Integrated Head: \`${final_sha}\`."
