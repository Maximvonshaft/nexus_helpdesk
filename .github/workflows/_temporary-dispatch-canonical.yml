name: Temporary Dispatch Canonical Acceptance

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact dispatcher Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}
      - name: Remove dispatcher and publish final Head
        id: final
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/_temporary-dispatch-canonical.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary canonical dispatcher"
          git push origin HEAD:feat/conversation-first-agent-routing
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch exact final candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/dispatches" \
            --data '{"ref":"feat/conversation-first-agent-routing"}'
      - name: Publish canonical run identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
        run: |
          set -Eeuo pipefail
          run_id=""
          for _attempt in $(seq 1 30); do
            runs="$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/workflows/canonical-acceptance.yml/runs?branch=feat%2Fconversation-first-agent-routing&event=workflow_dispatch&per_page=20")"
            run_id="$(jq -r --arg sha "${FINAL_SHA}" '.workflow_runs[] | select(.head_sha == $sha) | .id' <<<"${runs}" | head -n 1)"
            if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
              break
            fi
            sleep 2
          done
          test -n "${run_id}"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${FINAL_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"canonical-acceptance-dispatched\",\"description\":\"run_id=${run_id}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${run_id}\"}"
