name: connector-fix-readiness-diagnostics

on:
  pull_request:
    paths:
      - ".github/scripts/connector_fix_readiness_diagnostics.py"
      - ".github/workflows/connector-fix-readiness-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Apply deterministic fixes
        run: |
          set -Eeuo pipefail
          python .github/scripts/connector_fix_readiness_diagnostics.py
          python -m py_compile \
            backend/app/services/nexus_osr/release_profiles.py \
            backend/tests/test_nexus_osr_business_readiness.py
          git diff --check
      - name: Commit fixes
        run: |
          set -Eeuo pipefail
          git config user.name "nexus-readiness-automation"
          git config user.email "nexus-readiness-automation@users.noreply.github.com"
          git add \
            backend/app/services/nexus_osr/release_profiles.py \
            backend/tests/test_nexus_osr_business_readiness.py
          git commit -m "fix(readiness): fail closed on sensitive reasons and register models"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
