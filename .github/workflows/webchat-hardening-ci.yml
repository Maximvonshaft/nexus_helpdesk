name: webchat-hardening-ci

on:
  pull_request:
    paths:
      - 'backend/app/services/webchat_fast_output_parser.py'
      - 'backend/app/services/webchat_fast_stream_parser.py'
      - 'backend/app/services/webchat_fast_rate_limit.py'
      - 'backend/app/services/webchat_handoff_snapshot_service.py'
      - 'backend/tests/test_webchat_fast_hostile_output_corpus.py'
      - 'backend/tests/test_webchat_fast_handoff_linkage.py'
      - 'backend/tests/test_webchat_fast_reply_api.py'
      - 'backend/tests/test_webchat_fast_stream_contract.py'
      - 'backend/tests/test_streaming_reply_extractor_unit.py'
      - '.github/workflows/webchat-hardening-ci.yml'
  workflow_dispatch:

jobs:
  webchat-hardening-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: development
      DATABASE_URL: sqlite:////tmp/nexusdesk_webchat_hardening_ci.db
      PYTHONPATH: backend
      WEBCHAT_FAST_AI_ENABLED: 'false'
      WEBCHAT_ALLOWED_ORIGINS: http://localhost,https://example.test
      WEBCHAT_ALLOW_NO_ORIGIN: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile hardening modules
        run: |
          python -m compileall \
            backend/app/services/webchat_fast_output_parser.py \
            backend/app/services/webchat_fast_stream_parser.py \
            backend/app/services/webchat_fast_rate_limit.py \
            backend/app/services/webchat_handoff_snapshot_service.py

      - name: Run WebChat hardening regression tests
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_webchat_fast_hostile_output_corpus.py \
            backend/tests/test_streaming_reply_extractor_unit.py \
            backend/tests/test_webchat_fast_stream_contract.py \
            backend/tests/test_webchat_fast_reply_api.py \
            backend/tests/test_webchat_fast_handoff_linkage.py
