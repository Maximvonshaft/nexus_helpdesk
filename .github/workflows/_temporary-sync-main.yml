name: Temporary Diagnose Resolved Main Merge Tests

on:
  push:
    branches:
      - feat/conversation-first-agent-routing

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONPATH: backend
      APP_ENV: test
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
      ALLOW_DEV_AUTH: "false"
      PROVIDER_RUNTIME_ENABLED: "false"
      PRIVATE_AI_RUNTIME_ENABLED: "false"
      WEBCHAT_AI_ENABLED: "false"
      WEBCHAT_AI_AUTO_REPLY_MODE: off
      SPEEDAF_MCP_ENABLED: "false"
    steps:
      - name: Checkout exact branch Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install exact backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Reproduce audited resolution
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          set +e
          git merge --no-commit --no-ff origin/main > /tmp/merge-output.txt 2>&1
          merge_code=$?
          set -e
          test "$merge_code" = "1"
          unresolved="$(git diff --name-only --diff-filter=U | sort)"
          expected=$'backend/app/api/ticket_perf.py\nbackend/tests/test_nexus_osr_admin_api.py\nbackend/tests/test_retired_persistence_absence.py'
          test "$unresolved" = "$expected"
          git checkout --theirs -- \
            backend/app/api/ticket_perf.py \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py
          git add \
            backend/app/api/ticket_perf.py \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py
          test -z "$(git diff --name-only --diff-filter=U)"
      - name: Capture merge-sensitive test output
        id: tests
        shell: bash
        run: |
          set +e
          python -m pytest -vv \
            backend/tests/test_nexus_osr_admin_api.py \
            backend/tests/test_retired_persistence_absence.py \
            backend/tests/test_ticket_detail_summary.py \
            backend/tests/test_ticket_summary_evidence_truth.py \
            > /tmp/merge-sensitive-pytest.log 2>&1
          code=$?
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload exact merge test diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: resolved-main-merge-tests-${{ github.sha }}
          path: |
            /tmp/merge-output.txt
            /tmp/merge-sensitive-pytest.log
          if-no-files-found: error
          retention-days: 3
      - name: Abort local merge and publish run identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
        run: |
          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git merge --abort
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${SHA}" \
            --data "{\"state\":\"success\",\"context\":\"resolved-merge-test-diagnostics\",\"description\":\"pytest exit=${TEST_EXIT}\",\"target_url\":\"https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
