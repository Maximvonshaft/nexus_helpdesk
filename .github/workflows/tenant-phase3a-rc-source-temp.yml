name: tenant-phase3a-rc-source-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase3a-rc-source-temp.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Create byte-complete source snapshot
        run: |
          set -Eeuo pipefail
          archive="${RUNNER_TEMP}/tenant-phase3a-rc-source.tar.gz"
          checksum="${RUNNER_TEMP}/tenant-phase3a-rc-source.sha256"
          tar --exclude=.git -czf "${archive}" .
          test -s "${archive}"
          sha256sum "${archive}" > "${checksum}"

      - name: Upload temporary source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-phase3a-rc-source-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ${{ runner.temp }}/tenant-phase3a-rc-source.tar.gz
            ${{ runner.temp }}/tenant-phase3a-rc-source.sha256
          if-no-files-found: error
          retention-days: 1
