name: ai-resource-probe-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/ai/**"
      - "config/ai-resource-probe.example.json"
      - "docs/engineering/ai-resource-server-probe.md"
      - ".github/workflows/ai-resource-probe-gate.yml"
  push:
    branches: [main]
    paths:
      - "scripts/ai/**"
      - "config/ai-resource-probe.example.json"
      - "docs/engineering/ai-resource-server-probe.md"
      - ".github/workflows/ai-resource-probe-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-resource-probe-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compile probe
        run: python -m py_compile scripts/ai/probe_ai_resource_server.py

      - name: Run no-network probe contracts
        run: python -m unittest discover -s scripts/ai/tests -p 'test_*.py' -v

      - name: Parse example config and smoke CLI
        run: |
          python - <<'PY'
          import importlib.util
          import json
          import sys
          from pathlib import Path

          module_path = Path("scripts/ai/probe_ai_resource_server.py")
          spec = importlib.util.spec_from_file_location("probe_ai_resource_server", module_path)
          assert spec and spec.loader
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)
          payload = json.loads(Path("config/ai-resource-probe.example.json").read_text(encoding="utf-8"))
          config = module.parse_config(payload)
          assert len(config.targets) == 3
          assert all(target.mode == "passive" for target in config.targets)
          PY
          python scripts/ai/probe_ai_resource_server.py --help >/dev/null
