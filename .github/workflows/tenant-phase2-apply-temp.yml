name: tenant-phase2-apply-temp

on:
  pull_request:
    paths:
      - .github/patches/tenant-phase2.patch.gz.b64
      - .github/workflows/tenant-phase2-apply-temp.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tenant-phase2-apply-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend:scripts/qualification/tenant
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-phase2-apply.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Decode and apply verified Phase 2 patch
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          encoded = Path('.github/patches/tenant-phase2.patch.gz.b64').read_text(encoding='ascii').strip()
          archive = base64.b64decode(encoded, validate=True)
          if hashlib.sha256(archive).hexdigest() != '86481bb570f61fd5ff4d90b56a5b766cbfa981c7ec80b2852c8b996c13243dfd':
              raise SystemExit('tenant_phase2_archive_digest_mismatch')
          patch = gzip.decompress(archive)
          if hashlib.sha256(patch).hexdigest() != '32787d3a19c51edf9154f452c5ba01139861204bfd8f2bbaf0ac9df57159c16c':
              raise SystemExit('tenant_phase2_patch_digest_mismatch')
          if patch.count(b'diff --git ') != 9:
              raise SystemExit('tenant_phase2_patch_file_count_mismatch')
          Path('/tmp/tenant-phase2.patch').write_bytes(patch)
          PY
          git apply --check --whitespace=error-all /tmp/tenant-phase2.patch
          git apply --index --whitespace=error-all /tmp/tenant-phase2.patch

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Verify focused Phase 2 implementation
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/qualification/tenant/tenant_principal_resolution.py \
            scripts/qualification/tenant/tenant_principal_preflight.py \
            scripts/qualification/tenant/tenant_principal_backfill.py \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py
          PYTHONPATH=backend python -m unittest \
            scripts/qualification/tenant/test_tenant_principal_preflight.py
          pytest -q \
            scripts/qualification/tenant/test_tenant_principal_preflight.py \
            scripts/qualification/tenant/test_tenant_principal_backfill.py \
            backend/tests/test_tenant_principal_additive_schema.py \
            backend/tests/test_migration_drift_gate.py
          python scripts/qualification/tenant/tenant_principal_backfill.py --help >/tmp/tenant-backfill-help.txt
          git diff --cached --check

      - name: Remove transfer files and commit verified implementation
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/patches/tenant-phase2.patch.gz.b64 \
            .github/workflows/tenant-phase2-apply-temp.yml \
            helpdesk.db
          rm -rf .pytest_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/tenant-phase2-source-snapshot-temp.yml',
              '.github/workflows/tenant-principal-backfill-gate.yml',
              '.github/workflows/tenant-principal-preflight.yml',
              '.github/patches/tenant-phase2.patch.gz.b64',
              '.github/workflows/tenant-phase2-apply-temp.yml',
              'docs/architecture/tenant-principal-migration.md',
              'scripts/qualification/tenant/tenant_principal_resolution.py',
              'scripts/qualification/tenant/tenant_principal_preflight.py',
              'scripts/qualification/tenant/tenant_principal_backfill.py',
              'scripts/qualification/tenant/test_tenant_principal_preflight.py',
              'scripts/qualification/tenant/test_tenant_principal_backfill.py',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-bot'
          git config user.email 'nexus-osr-tenant-bot@users.noreply.github.com'
          git commit -m 'feat(tenant): add approved bounded backfill (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
