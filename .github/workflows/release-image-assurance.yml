name: release-image-assurance

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "THIRD_PARTY_NOTICES.md"
      - "backend/**"
      - "webapp/**"
      - "scripts/**"
      - "config/security/container-*.json"
      - "deploy/docker-compose.server.yml"
      - "deploy/docker-compose.candidate.yml"
      - ".github/workflows/release-image-assurance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assure-candidate-image:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CANDIDATE_IMAGE: nexus-candidate:${{ github.event.pull_request.head.sha || github.sha }}
      ARTIFACT_DIR: artifacts/release-image
      EXACT_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      MAX_SUMMARY_BYTES: "262144"
    steps:
      - name: Checkout immutable
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node immutable
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Generate exact frontend CycloneDX from lockfile
        working-directory: webapp
        run: |
          set -Eeuo pipefail
          npm ci
          mkdir -p ../artifacts/release-image
          npm sbom --sbom-format=cyclonedx > ../artifacts/release-image/frontend.raw.cdx.json
          test -s ../artifacts/release-image/frontend.raw.cdx.json
          test "$(wc -c < ../artifacts/release-image/frontend.raw.cdx.json)" -le 33554432

      - name: Compile and unit-test assurance policy
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/security/release_image_assurance.py \
            scripts/security/sanitize_image_sbom.py \
            scripts/security/finalize_image_sbom.py \
            scripts/security/extract_installed_license_evidence.py \
            scripts/security/verify_license_compliance.py \
            scripts/security/bind_release_image_compliance.py \
            scripts/security/validate_release_image_evidence.py \
            scripts/security/validate_release_image_policy_inputs.py \
            scripts/security/tests/test_release_image_assurance.py \
            scripts/security/tests/test_sanitize_image_sbom.py \
            scripts/security/tests/test_finalize_image_sbom.py \
            scripts/security/tests/test_verify_license_compliance.py \
            scripts/security/tests/test_release_image_policy_inputs.py \
            scripts/security/tests/test_bind_release_image_compliance.py \
            scripts/security/tests/test_candidate_image_runtime_contract.py \
            scripts/security/tests/test_alpine_image_sbom.py \
            scripts/security/tests/test_frontend_npm_sbom.py
          python -m unittest \
            scripts/security/tests/test_release_image_assurance.py \
            scripts/security/tests/test_sanitize_image_sbom.py \
            scripts/security/tests/test_finalize_image_sbom.py \
            scripts/security/tests/test_verify_license_compliance.py \
            scripts/security/tests/test_release_image_policy_inputs.py \
            scripts/security/tests/test_bind_release_image_compliance.py \
            scripts/security/tests/test_candidate_image_runtime_contract.py \
            scripts/security/tests/test_alpine_image_sbom.py \
            scripts/security/tests/test_frontend_npm_sbom.py

      - name: Build local candidate image only
        run: |
          set +e
          set -o pipefail
          mkdir -p "${ARTIFACT_DIR}"
          docker build \
            --progress=plain \
            --build-arg GIT_SHA="${EXACT_SOURCE_SHA}" \
            --build-arg BUILD_TIME="1970-01-01T00:00:00Z" \
            --build-arg IMAGE_TAG="${CANDIDATE_IMAGE}" \
            --build-arg APP_VERSION="candidate" \
            --build-arg FRONTEND_BUILD_SHA="${EXACT_SOURCE_SHA}" \
            --tag "${CANDIDATE_IMAGE}" \
            --file Dockerfile . 2>&1 | tee "${ARTIFACT_DIR}/candidate-build.full.log"
          build_code=${PIPESTATUS[0]}
          printf '%s\n' "${build_code}" > "${ARTIFACT_DIR}/build-exit-code"
          tail -c "${MAX_SUMMARY_BYTES}" "${ARTIFACT_DIR}/candidate-build.full.log" > "${ARTIFACT_DIR}/candidate-build-summary.txt"
          test "$(wc -c < "${ARTIFACT_DIR}/candidate-build-summary.txt")" -le "${MAX_SUMMARY_BYTES}"
          rm -f "${ARTIFACT_DIR}/candidate-build.full.log"
          if [ "${build_code}" -eq 0 ]; then
            image_id="$(docker image inspect "${CANDIDATE_IMAGE}" --format '{{.Id}}')"
            test -n "${image_id}"
            printf '%s\n' "${image_id}" > "${ARTIFACT_DIR}/image-id.txt"
            printf '%s\n' "${EXACT_SOURCE_SHA}" > "${ARTIFACT_DIR}/source-sha.txt"
          fi
          exit "${build_code}"

      - name: Verify candidate runtime imports and server configuration
        shell: bash
        run: |
          set +e
          mkdir -p "${ARTIFACT_DIR}"
          docker run --rm --entrypoint sh "${CANDIDATE_IMAGE}" -c \
            'set -eu; python -c "import app.main, psycopg, cryptography, argon2"; gunicorn --check-config app.main:app' \
            > "${ARTIFACT_DIR}/runtime-smoke.full.log" 2>&1
          code=$?
          tail -c "${MAX_SUMMARY_BYTES}" "${ARTIFACT_DIR}/runtime-smoke.full.log" > "${ARTIFACT_DIR}/runtime-smoke-summary.txt"
          test "$(wc -c < "${ARTIFACT_DIR}/runtime-smoke-summary.txt")" -le "${MAX_SUMMARY_BYTES}"
          rm -f "${ARTIFACT_DIR}/runtime-smoke.full.log"
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/runtime-smoke-exit-code"
          exit 0

      - name: Scan candidate image with immutable Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: json
          output: artifacts/release-image/trivy.raw.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: "0"
          scanners: vuln

      - name: Generate raw CycloneDX image SBOM with immutable Syft action
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.CANDIDATE_IMAGE }}
          format: cyclonedx-json
          output-file: artifacts/release-image/image.raw.cdx.json
          upload-artifact: false

      - name: Produce minimal PII-free shipped dependency SBOM
        shell: bash
        run: |
          set +e
          python scripts/security/sanitize_image_sbom.py \
            --input "${ARTIFACT_DIR}/image.raw.cdx.json" \
            --frontend-input "${ARTIFACT_DIR}/frontend.raw.cdx.json" \
            --overrides config/security/container-license-metadata-overrides.json \
            --output "${ARTIFACT_DIR}/image.preliminary.cdx.json"
          preliminary_code=$?
          python scripts/security/finalize_image_sbom.py \
            --input "${ARTIFACT_DIR}/image.preliminary.cdx.json" \
            --overrides config/security/container-license-metadata-overrides.json \
            --output "${ARTIFACT_DIR}/image.safe.cdx.json"
          final_code=$?
          printf '%s\n' "${preliminary_code}" > "${ARTIFACT_DIR}/sbom-preliminary-exit-code"
          printf '%s\n' "${final_code}" > "${ARTIFACT_DIR}/sbom-sanitization-exit-code"
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('artifacts/release-image')
          def digest(path):
              return 'sha256:' + hashlib.sha256(path.read_bytes()).hexdigest()
          payload = {
              'schema_version': 'nexus_raw_release_evidence_digests_v2',
              'trivy_report_sha256': digest(root / 'trivy.raw.json'),
              'raw_cyclonedx_sha256': digest(root / 'image.raw.cdx.json'),
              'raw_frontend_cyclonedx_sha256': digest(root / 'frontend.raw.cdx.json'),
          }
          (root / 'raw-evidence-digests.json').write_text(
              json.dumps(payload, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          exit 0

      - name: Validate complete release-image policy inputs
        id: policy_inputs
        shell: bash
        run: |
          set +e
          policy_date="$(date -u +%F)"
          printf '%s\n' "${policy_date}" > "${ARTIFACT_DIR}/policy-evaluated-on.txt"
          python scripts/security/validate_release_image_policy_inputs.py \
            --trivy "${ARTIFACT_DIR}/trivy.raw.json" \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --vulnerability-exceptions config/security/container-vulnerability-exceptions.json \
            --license-policy config/security/container-license-policy.json \
            --license-compliance config/security/container-license-compliance.json \
            --output "${ARTIFACT_DIR}/policy-input-validation.json" \
            --today "${policy_date}"
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/policy-input-validation-exit-code"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Extract installed LGPL license evidence from candidate
        shell: bash
        run: |
          set +e
          docker run --rm --entrypoint python "${CANDIDATE_IMAGE}" \
            /app/scripts/security/extract_installed_license_evidence.py \
            --package psycopg \
            --package psycopg-binary \
            > "${ARTIFACT_DIR}/installed-license-evidence.json"
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/installed-license-evidence-exit-code"
          exit 0

      - name: Evaluate vulnerability and license policy
        id: policy
        shell: bash
        run: |
          set +e
          policy_date="$(cat "${ARTIFACT_DIR}/policy-evaluated-on.txt")"
          python scripts/security/release_image_assurance.py vulnerabilities \
            --report "${ARTIFACT_DIR}/trivy.raw.json" \
            --exceptions config/security/container-vulnerability-exceptions.json \
            --output "${ARTIFACT_DIR}/vulnerability-summary.json" \
            --today "${policy_date}"
          vuln_code=$?
          python scripts/security/release_image_assurance.py licenses \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --policy config/security/container-license-policy.json \
            --output "${ARTIFACT_DIR}/license-summary.json" \
            --today "${policy_date}"
          license_code=$?
          image_id="$(cat "${ARTIFACT_DIR}/image-id.txt")"
          python scripts/security/release_image_assurance.py manifest \
            --source-sha "${EXACT_SOURCE_SHA}" \
            --image-id "${image_id}" \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --vulnerabilities "${ARTIFACT_DIR}/vulnerability-summary.json" \
            --licenses "${ARTIFACT_DIR}/license-summary.json" \
            --output "${ARTIFACT_DIR}/release-image-manifest.json"
          manifest_code=$?
          printf '%s\n' "${vuln_code}" > "${ARTIFACT_DIR}/vulnerability-exit-code"
          printf '%s\n' "${license_code}" > "${ARTIFACT_DIR}/license-exit-code"
          printf '%s\n' "${manifest_code}" > "${ARTIFACT_DIR}/manifest-exit-code"
          echo "vulnerability_exit=${vuln_code}" >> "$GITHUB_OUTPUT"
          echo "license_exit=${license_code}" >> "$GITHUB_OUTPUT"
          echo "manifest_exit=${manifest_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify exact LGPL compliance and bind candidate identity
        id: compliance
        shell: bash
        run: |
          set +e
          policy_date="$(cat "${ARTIFACT_DIR}/policy-evaluated-on.txt")"
          python scripts/security/verify_license_compliance.py \
            --compliance config/security/container-license-compliance.json \
            --policy config/security/container-license-policy.json \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --installed "${ARTIFACT_DIR}/installed-license-evidence.json" \
            --notice THIRD_PARTY_NOTICES.md \
            --output "${ARTIFACT_DIR}/license-compliance-evidence.json" \
            --today "${policy_date}"
          compliance_code=$?
          image_id="$(cat "${ARTIFACT_DIR}/image-id.txt")"
          python scripts/security/bind_release_image_compliance.py \
            --source-sha "${EXACT_SOURCE_SHA}" \
            --image-id "${image_id}" \
            --manifest "${ARTIFACT_DIR}/release-image-manifest.json" \
            --policy-input-validation "${ARTIFACT_DIR}/policy-input-validation.json" \
            --compliance "${ARTIFACT_DIR}/license-compliance-evidence.json" \
            --installed "${ARTIFACT_DIR}/installed-license-evidence.json" \
            --output "${ARTIFACT_DIR}/release-image-compliance-binding.json"
          binding_code=$?
          printf '%s\n' "${compliance_code}" > "${ARTIFACT_DIR}/license-compliance-exit-code"
          printf '%s\n' "${binding_code}" > "${ARTIFACT_DIR}/compliance-binding-exit-code"
          echo "compliance_exit=${compliance_code}" >> "$GITHUB_OUTPUT"
          echo "binding_exit=${binding_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Remove raw third-party metadata before evidence upload
        if: always()
        run: |
          set -Eeuo pipefail
          rm -f \
            "${ARTIFACT_DIR}/trivy.raw.json" \
            "${ARTIFACT_DIR}/image.raw.cdx.json" \
            "${ARTIFACT_DIR}/frontend.raw.cdx.json" \
            "${ARTIFACT_DIR}/image.preliminary.cdx.json" \
            "${ARTIFACT_DIR}/image.preliminary.cdx.json.summary.json"
          test ! -e "${ARTIFACT_DIR}/trivy.raw.json"
          test ! -e "${ARTIFACT_DIR}/image.raw.cdx.json"
          test ! -e "${ARTIFACT_DIR}/frontend.raw.cdx.json"

      - name: Scan bounded free-text evidence
        id: artifact_scan
        shell: bash
        run: |
          set +e
          python scripts/security/scan_artifacts.py \
            --root . \
            --output "${ARTIFACT_DIR}/artifact-scan.json" \
            "${ARTIFACT_DIR}/candidate-build-summary.txt" \
            "${ARTIFACT_DIR}/runtime-smoke-summary.txt" \
            THIRD_PARTY_NOTICES.md
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/artifact-scan-exit-code"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate structured evidence schemas
        id: structured_scan
        shell: bash
        run: |
          set +e
          python scripts/security/validate_release_image_evidence.py \
            --sbom "${ARTIFACT_DIR}/image.safe.cdx.json" \
            --sbom-summary "${ARTIFACT_DIR}/image.safe.cdx.json.summary.json" \
            --raw-digests "${ARTIFACT_DIR}/raw-evidence-digests.json" \
            --vulnerabilities "${ARTIFACT_DIR}/vulnerability-summary.json" \
            --licenses "${ARTIFACT_DIR}/license-summary.json" \
            --manifest "${ARTIFACT_DIR}/release-image-manifest.json" \
            --output "${ARTIFACT_DIR}/structured-evidence-scan.json"
          code=$?
          printf '%s\n' "${code}" > "${ARTIFACT_DIR}/structured-evidence-scan-exit-code"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded release-image evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-image-assurance
          path: artifacts/release-image
          retention-days: 14
          if-no-files-found: error

      - name: Enforce release image gate
        if: always()
        run: |
          set -Eeuo pipefail
          test "$(cat "${ARTIFACT_DIR}/build-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/runtime-smoke-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/sbom-preliminary-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/sbom-sanitization-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/policy-input-validation-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/installed-license-evidence-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/vulnerability-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/license-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/manifest-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/license-compliance-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/compliance-binding-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/artifact-scan-exit-code")" = "0"
          test "$(cat "${ARTIFACT_DIR}/structured-evidence-scan-exit-code")" = "0"
          test "$(jq -r '.status' "${ARTIFACT_DIR}/policy-input-validation.json")" = "pass"
          test "$(jq -r '.status' "${ARTIFACT_DIR}/release-image-manifest.json")" = "pass"
          test "$(jq -r '.status' "${ARTIFACT_DIR}/license-compliance-evidence.json")" = "pass"
          test "$(jq -r '.status' "${ARTIFACT_DIR}/release-image-compliance-binding.json")" = "pass"
          test "$(jq -r '.image_pushed' "${ARTIFACT_DIR}/release-image-compliance-binding.json")" = "false"
          test "$(jq -r '.deployment_performed' "${ARTIFACT_DIR}/release-image-compliance-binding.json")" = "false"

  attest-release-image:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: assure-candidate-image
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download bounded evidence from this workflow run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/release-image
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name release-image-assurance \
            --dir artifacts/release-image
          test -f artifacts/release-image/release-image-compliance-binding.json
          test "$(jq -r '.status' artifacts/release-image/release-image-compliance-binding.json)" = "pass"

      - name: Attest bounded release-image compliance binding
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: artifacts/release-image/release-image-compliance-binding.json
