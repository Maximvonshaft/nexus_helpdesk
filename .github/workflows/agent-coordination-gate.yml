name: Agent Coordination Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: agent-coordination-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trusted-coordination-preflight:
    name: trusted-agent-coordination-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compile trusted coordination gate
        working-directory: trusted
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/ci/agent_coordination_model.py \
            scripts/ci/agent_coordination_core.py \
            scripts/ci/agent_coordination_gate.py \
            scripts/ci/agent_coordination_reclaim_adapter.py \
            scripts/ci/agent_coordination_policy_gate.py \
            scripts/ci/agent_coordination_path_policy.py \
            scripts/ci/agent_coordination_open_pr_policy.py \
            scripts/ci/agent_coordination_entrypoint.py

      - name: Evaluate proposed pull request with trusted base policy
        working-directory: trusted
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          python scripts/ci/agent_coordination_entrypoint.py \
            --output artifacts/agent-coordination/report.json \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Upload bounded trusted coordination evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trusted-agent-coordination-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: trusted/artifacts/agent-coordination/report.json
          if-no-files-found: warn
          retention-days: 7
