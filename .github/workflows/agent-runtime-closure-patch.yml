name: Agent Runtime Closure Patch

on:
  push:
    branches:
      - feat/agent-runtime-operating-system

permissions:
  contents: write

concurrency:
  group: agent-runtime-closure-patch
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[closure-patch]') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout current branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feat/agent-runtime-operating-system
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Apply exact closure patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str, *, count: int = 1) -> None:
              target = Path(path)
              source = target.read_text(encoding="utf-8")
              actual = source.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count} exact matches, found {actual}")
              target.write_text(source.replace(old, new, count), encoding="utf-8")

          runtime = "backend/app/services/agent_runtime/runtime.py"
          replace_exact(
              runtime,
              """        result = await run_agent_with_db(db, request=request, started=started)\n        db.commit()\n        return result\n""",
              """        result = await run_agent_with_db(db, request=request, started=started)\n        return result\n""",
          )
          replace_exact(
              runtime,
              """            try:\n                db.commit()\n            except Exception:\n                _safe_rollback(db)\n                observations = _failed_tool_observations(\n                    decision,\n                    error_code=\"tool_transaction_commit_failed\",\n                )\n                state.elapsed_ms = _elapsed(started)\n                _record_tool_observations(\n                    state,\n                    round_index=round_index,\n                    decision=decision,\n                    observations=observations,\n                    provider=result.provider,\n                    elapsed_ms=result.elapsed_ms,\n                    error_code=\"tool_transaction_commit_failed\",\n                )\n                _record_tool_events(\n                    db,\n                    run=run,\n                    observations=observations,\n                    round_index=round_index,\n                )\n                return _terminal_fallback(\n                    db,\n                    run=run,\n                    request=request,\n                    state=state,\n                    error_code=\"tool_transaction_commit_failed\",\n                    elapsed_ms=state.elapsed_ms,\n                    release_snapshot=release_snapshot,\n                )\n""",
              "",
          )
          replace_exact(
              runtime,
              """    executable &= playbook_tools\n    manifest = release_snapshot.get(\"manifest\")\n    if not isinstance(manifest, dict) or not manifest.get(\"integrations\"):\n        executable -= {\"integration.read\", \"integration.write\"}\n""",
              """    manifest = release_snapshot.get(\"manifest\")\n    integrations_bound = bool(\n        isinstance(manifest, dict) and manifest.get(\"integrations\")\n    )\n    integration_invocation_tools = {\"integration.read\", \"integration.write\"}\n    if integrations_bound and playbook_tools.intersection(\n        integration_invocation_tools\n    ):\n        playbook_tools.add(\"integration.search\")\n        if executable.intersection(integration_invocation_tools):\n            executable.add(\"integration.search\")\n    executable &= playbook_tools\n    if not integrations_bound:\n        executable -= {\n            \"integration.search\",\n            \"integration.read\",\n            \"integration.write\",\n        }\n""",
          )

          integration = "backend/app/services/agent_integration_service.py"
          replace_exact(
              integration,
              """    if is_write and not operation_row.get(\"requires_confirmation\"):\n        return IntegrationCallResult(\n            False,\n            integration.resource_key,\n            operation,\n            \"blocked\",\n            {},\n            \"integration_write_confirmation_contract_missing\",\n        )\n    payload = dict(arguments or {})\n""",
              """    if is_write and not operation_row.get(\"requires_confirmation\"):\n        return IntegrationCallResult(\n            False,\n            integration.resource_key,\n            operation,\n            \"blocked\",\n            {},\n            \"integration_write_confirmation_contract_missing\",\n        )\n    result_allowlist = operation_row.get(\"result_allowlist\")\n    if not isinstance(result_allowlist, list) or not any(\n        str(item or \"\").strip() for item in result_allowlist\n    ):\n        return IntegrationCallResult(\n            False,\n            integration.resource_key,\n            operation,\n            \"blocked\",\n            {},\n            \"integration_result_projection_required\",\n        )\n    payload = dict(arguments or {})\n""",
          )
          replace_exact(
              integration,
              "projected = _project_result(response, operation_row.get(\"result_allowlist\") or [])",
              "projected = _project_result(response, result_allowlist)",
          )
          replace_exact(
              integration,
              """    if not allowlist:\n        return _sanitize(source)\n""",
              "",
          )

          router = "backend/app/services/provider_runtime/router.py"
          replace_exact(
              router,
              """        return _unavailable(\n            \"provider_runtime_configuration_invalid\",\n            summary,\n        )\n""",
              """        error_code = (\n            reason\n            if reason\n            in {\n                \"provider_runtime_output_contract_invalid\",\n                \"provider_runtime_output_contract_mismatch\",\n            }\n            else \"provider_runtime_configuration_invalid\"\n        )\n        return _unavailable(error_code, summary)\n""",
          )

          architecture_test = "backend/tests/test_agent_playbook_runtime_architecture.py"
          replace_exact(
              architecture_test,
              "from __future__ import annotations\n\nimport json\n",
              "from __future__ import annotations\n\nimport ast\nimport json\n",
          )
          replace_exact(
              architecture_test,
              """    monkeypatch.setattr(\n        agent_runtime,\n        \"record_run_snapshot\",\n        lambda *_args, **_kwargs: None,\n    )\n""",
              """    monkeypatch.setattr(\n        agent_runtime,\n        \"record_run_snapshot\",\n        lambda *_args, **_kwargs: None,\n    )\n    run = SimpleNamespace(\n        id=1,\n        trace_id=\"trace-1\",\n        tenant_key=\"tenant\",\n        session_id=\"session\",\n        request_id=\"request\",\n        release_id=1,\n        status=\"running\",\n        final_action=None,\n        error_code=None,\n    )\n    monkeypatch.setattr(agent_runtime, \"start_agent_run\", lambda *_args, **_kwargs: run)\n    monkeypatch.setattr(agent_runtime, \"bind_agent_run_release\", lambda *_args, **_kwargs: None)\n    monkeypatch.setattr(agent_runtime, \"append_agent_event\", lambda *_args, **_kwargs: None)\n    monkeypatch.setattr(agent_runtime, \"finish_agent_run\", lambda *_args, **_kwargs: run)\n""",
          )
          old_commit_test_start = "class _FailingCommitDb(_Db):\n"
          old_commit_test_end = "\n\ndef test_public_agent_access_policy_does_not_derive_grants_from_visible_tools(\n"
          source = Path(architecture_test).read_text(encoding="utf-8")
          if source.count(old_commit_test_start) != 1 or source.count(old_commit_test_end) != 1:
              raise SystemExit("runtime architecture commit test boundary mismatch")
          before, remainder = source.split(old_commit_test_start, 1)
          _retired, after = remainder.split(old_commit_test_end, 1)
          replacement = """def test_canonical_runtime_leaves_tool_transaction_commit_to_worker() -> None:\n    source = (\n        ROOT / \"backend/app/services/agent_runtime/runtime.py\"\n    ).read_text(encoding=\"utf-8\")\n    assert \"tool_transaction_commit_failed\" not in source\n    tree = ast.parse(source)\n    functions = {\n        node.name: node\n        for node in tree.body\n        if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))\n        and node.name in {\"run_agent\", \"run_agent_with_db\"}\n    }\n    assert set(functions) == {\"run_agent\", \"run_agent_with_db\"}\n    for function in functions.values():\n        assert not any(\n            isinstance(node, ast.Call)\n            and isinstance(node.func, ast.Attribute)\n            and node.func.attr == \"commit\"\n            for node in ast.walk(function)\n        )\n\n\ndef test_public_agent_access_policy_does_not_derive_grants_from_visible_tools(\n"""
          Path(architecture_test).write_text(before + replacement + after, encoding="utf-8")

          residue_test = "backend/tests/test_agent_runtime_operating_system_residue.py"
          residue = Path(residue_test).read_text(encoding="utf-8")
          marker = "\n\ndef test_prompt_compiler_is_the_only_parent_and_specialist_budget_authority() -> None:\n"
          addition = """\n\ndef test_canonical_runtime_has_no_retired_outer_tool_commit_failure() -> None:\n    source = (\n        BACKEND / \"app/services/agent_runtime/runtime.py\"\n    ).read_text(encoding=\"utf-8\")\n    assert \"tool_transaction_commit_failed\" not in source\n    tree = ast.parse(source)\n    for node in tree.body:\n        if isinstance(node, ast.AsyncFunctionDef) and node.name in {\n            \"run_agent\",\n            \"run_agent_with_db\",\n        }:\n            assert not any(\n                isinstance(child, ast.Call)\n                and isinstance(child.func, ast.Attribute)\n                and child.func.attr == \"commit\"\n                for child in ast.walk(node)\n            )\n"""
          if residue.count(marker) != 1:
              raise SystemExit("residue insertion marker mismatch")
          Path(residue_test).write_text(residue.replace(marker, addition + marker, 1), encoding="utf-8")

          audit_test = "backend/tests/test_provider_runtime_bounded_audit_boundary.py"
          replace_exact(
              audit_test,
              """    monkeypatch.setattr(\n        agent_runtime,\n        \"record_run_snapshot\",\n        lambda *_args, **_kwargs: None,\n    )\n""",
              """    monkeypatch.setattr(\n        agent_runtime,\n        \"record_run_snapshot\",\n        lambda *_args, **_kwargs: None,\n    )\n    run = SimpleNamespace(\n        id=1,\n        trace_id=\"trace-1\",\n        tenant_key=\"tenant-1\",\n        session_id=\"session-1\",\n        request_id=\"request-1\",\n        release_id=1,\n        status=\"running\",\n        final_action=None,\n        error_code=None,\n    )\n    monkeypatch.setattr(agent_runtime, \"start_agent_run\", lambda *_args, **_kwargs: run)\n    monkeypatch.setattr(agent_runtime, \"bind_agent_run_release\", lambda *_args, **_kwargs: None)\n    monkeypatch.setattr(agent_runtime, \"append_agent_event\", lambda *_args, **_kwargs: None)\n    monkeypatch.setattr(agent_runtime, \"finish_agent_run\", lambda *_args, **_kwargs: run)\n""",
          )

          correctness_test = "backend/tests/test_agent_runtime_correctness_convergence.py"
          replace_exact(
              correctness_test,
              """    monkeypatch.setenv(\"PROVIDER_RUNTIME_TRAFFIC_MODE\", \"canary\")\n""",
              """    monkeypatch.setenv(\"PROVIDER_RUNTIME_ENABLED\", \"true\")\n    monkeypatch.setenv(\"PROVIDER_RUNTIME_TRAFFIC_MODE\", \"canary\")\n    monkeypatch.setenv(\"PROVIDER_RUNTIME_KILL_SWITCH\", \"false\")\n    monkeypatch.setenv(\"PROVIDER_RUNTIME_CANARY_PERCENT\", \"100\")\n""",
          )

          worker_test = "backend/tests/test_agent_session_specialist_fork.py"
          replace_exact(
              worker_test,
              "monkeypatch.setattr(tool_adapter, \"SessionLocal\", lambda: worker)",
              "monkeypatch.setattr(tool_adapter, \"_worker_session\", lambda _db: worker)",
          )
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run focused closure regression
        working-directory: backend
        env:
          APP_ENV: test
          PYTHONPATH: .
          PROVIDER_RUNTIME_ENABLED: 'false'
          PROVIDER_RUNTIME_TRAFFIC_MODE: control
          PROVIDER_RUNTIME_KILL_SWITCH: 'true'
          PROVIDER_RUNTIME_CANARY_PERCENT: '0'
          PRIVATE_AI_RUNTIME_ENABLED: 'false'
        run: |
          python -m compileall -q app
          python -m pytest -q \
            tests/test_agent_playbook_runtime_architecture.py \
            tests/test_agent_runtime_operating_system_residue.py \
            tests/test_agent_progressive_integration_discovery.py \
            tests/test_provider_runtime_router.py \
            tests/test_provider_runtime_bounded_audit_boundary.py \
            tests/test_agent_runtime_correctness_convergence.py \
            tests/test_agent_session_specialist_fork.py

      - name: Commit closure patch and remove workflow
        shell: bash
        run: |
          git config user.name "nexus-closure-bot"
          git config user.email "nexus-closure-bot@users.noreply.github.com"
          git rm .github/workflows/agent-runtime-closure-patch.yml
          git add backend/app backend/tests
          git diff --cached --check
          git commit -m "[closure-patch] Close Agent Runtime review blockers"
          git push origin HEAD:feat/agent-runtime-operating-system
