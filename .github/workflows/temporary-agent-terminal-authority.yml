name: Temporary Agent Terminal Authority Finalizer

# One-shot self-deleting workflow. The accepted Head must not contain this file.
on:
  push:
    branches:
      - refactor/generic-agent-runtime-final-b7e41d
    paths:
      - .github/workflows/temporary-agent-terminal-authority.yml

permissions:
  contents: write

concurrency:
  group: temporary-agent-terminal-authority
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout latest convergence Head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: refactor/generic-agent-runtime-final-b7e41d
          fetch-depth: 0
          persist-credentials: true

      - name: Apply terminal authority convergence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          ROOT = Path.cwd()
          AGENT_SERVICE = ROOT / "backend/app/services/agent_runtime/service.py"
          FALLBACK = ROOT / "backend/app/services/agent_runtime/fallback.py"
          RUNTIME_WRAPPER = ROOT / "backend/app/services/webchat_runtime_ai_service.py"
          TICKET_SERVICE = ROOT / "backend/app/services/webchat_ai_service.py"
          TICKETLESS_SERVICE = ROOT / "backend/app/services/conversation_ai_service.py"
          ARCH_TESTS = ROOT / "backend/tests/test_agent_runtime_architecture.py"
          TURN_TESTS = ROOT / "backend/tests/test_webchat_ai_turn_runtime.py"
          RESIDUE = ROOT / "scripts/ci/check_agent_runtime_residue.py"
          GENERIC_ARCH = ROOT / "docs/architecture/generic-agent-skill-runtime.md"
          CONVERSATION_ARCH = ROOT / "docs/architecture/conversation-first-agent-routing.md"
          WORKFLOW = ROOT / ".github/workflows/temporary-agent-terminal-authority.yml"

          def replace_once(text: str, old: str, new: str, *, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          def add_import(text: str, anchor: str, import_line: str, *, label: str) -> str:
              if import_line in text:
                  return text
              return replace_once(text, anchor, anchor + import_line, label=label)

          FALLBACK.write_text(
              '''from __future__ import annotations


def customer_visible_runtime_fallback(
    language: str | None,
    body: str | None,
) -> str:
    """Return the single deterministic customer-visible Runtime fallback."""

    hint = str(language or "").strip().lower()
    source = str(body or "")
    if hint == "zh" or any("\\u4e00" <= char <= "\\u9fff" for char in source):
        return "抱歉，我暂时无法完成这次处理。请稍后重试，或者告诉我是否需要转人工客服。"
    if hint == "de":
        return "Entschuldigung, ich konnte diese Anfrage gerade nicht abschließen. Bitte versuchen Sie es erneut oder bitten Sie um menschlichen Support."
    return "Sorry, I could not complete that request right now. Please try again or ask for human support."
''',
              encoding="utf-8",
          )

          agent = AGENT_SERVICE.read_text(encoding="utf-8")
          agent = add_import(
              agent,
              "from .skill_registry import prompt_skill_catalog\n",
              "from .fallback import customer_visible_runtime_fallback\n",
              label="Agent fallback import",
          )
          final_start = agent.index('        if decision.next_action != "call_tool":\n')
          final_end = agent.index('        if round_index >= max_rounds:\n', final_start)
          final_block = '''        if decision.next_action != "call_tool":
            handoff_committed = _committed_handoff_observed(state)
            handoff_requested = (
                decision.next_action == "request_handoff"
                or decision.handoff_required
            )
            if handoff_requested and not handoff_committed:
                state.traces.append(
                    AgentRoundTrace(
                        round_index=round_index,
                        next_action=decision.next_action,
                        provider=result.provider,
                        elapsed_ms=result.elapsed_ms,
                        error_code="handoff_tool_side_effect_missing",
                    )
                )
                return _fallback_result(
                    request,
                    state=state,
                    error_code="handoff_tool_side_effect_missing",
                    elapsed_ms=state.elapsed_ms,
                )
            state.traces.append(
                AgentRoundTrace(
                    round_index=round_index,
                    next_action=decision.next_action,
                    provider=result.provider,
                    elapsed_ms=result.elapsed_ms,
                )
            )
            effective_handoff_reason = None
            if handoff_committed:
                effective_handoff_reason = (
                    decision.handoff_reason or "handoff_requested"
                )
            return RuntimeAIProviderResult(
                ok=True,
                ai_generated=True,
                reply_source=result.provider,
                raw_provider=result.raw_provider or result.provider,
                raw_payload_safe_summary=_safe_summary(
                    state,
                    decision=decision,
                    provider_summary=result.raw_payload_safe_summary,
                ),
                reply=decision.customer_reply,
                intent=decision.intent,
                handoff_required=handoff_committed,
                handoff_reason=effective_handoff_reason,
                recommended_agent_action=(
                    "Review the conversation and take over."
                    if handoff_committed
                    else None
                ),
                tool_calls=list(state.executed_calls),
                elapsed_ms=state.elapsed_ms,
                error_code=None,
                retry_after_ms=None,
            )

'''
          agent = agent[:final_start] + final_block + agent[final_end:]
          helper_anchor = "\ndef _failed_tool_observations(\n"
          helper = '''
def _committed_handoff_observed(state: AgentRunState) -> bool:
    """Derive handoff truth only from a committed canonical Tool Observation."""

    return any(
        observation.tool_name == "handoff.request.create"
        and observation.ok
        and observation.status in {"executed", "duplicate"}
        for observation in state.observations
    )

'''
          if "def _committed_handoff_observed(" not in agent:
              agent = replace_once(
                  agent,
                  helper_anchor,
                  helper + helper_anchor,
                  label="Committed handoff helper",
              )
          agent = agent.replace(
              "reply = _localized_fallback(request.language, request.body)",
              "reply = customer_visible_runtime_fallback(request.language, request.body)",
          )
          if "def _localized_fallback(" in agent:
              start = agent.index("\ndef _localized_fallback(")
              end = agent.index("\ndef _safe_summary(", start)
              agent = agent[:start] + agent[end:]
          AGENT_SERVICE.write_text(agent, encoding="utf-8")

          wrapper = RUNTIME_WRAPPER.read_text(encoding="utf-8")
          wrapper = add_import(
              wrapper,
              "from .agent_runtime.service import run_agent\n",
              "from .agent_runtime.fallback import customer_visible_runtime_fallback\n",
              label="Runtime wrapper fallback import",
          )
          wrapper = wrapper.replace(
              "reply=_fallback(language, body)",
              "reply=customer_visible_runtime_fallback(language, body)",
          )
          if "def _fallback(" in wrapper:
              wrapper = wrapper[: wrapper.index("\ndef _fallback(")].rstrip() + "\n"
          RUNTIME_WRAPPER.write_text(wrapper, encoding="utf-8")

          ticket = TICKET_SERVICE.read_text(encoding="utf-8")
          ticket = add_import(
              ticket,
              "from .agent_runtime.access_policy import resolve_webchat_agent_access\n",
              "from .agent_runtime.fallback import customer_visible_runtime_fallback\n",
              label="Ticket-backed fallback import",
          )
          ticket = ticket.replace(
              "_localized_fallback(language, visitor_message.body or \"\")",
              "customer_visible_runtime_fallback(language, visitor_message.body)",
          )
          if "def _localized_fallback(" in ticket:
              start = ticket.index("\ndef _localized_fallback(")
              end = ticket.index("\ndef _is_whatsapp_conversation(", start)
              ticket = ticket[:start] + ticket[end:]
          TICKET_SERVICE.write_text(ticket, encoding="utf-8")

          ticketless = TICKETLESS_SERVICE.read_text(encoding="utf-8")
          ticketless = add_import(
              ticketless,
              "from .agent_runtime.access_policy import resolve_webchat_agent_access\n",
              "from .agent_runtime.fallback import customer_visible_runtime_fallback\n",
              label="Ticketless fallback import",
          )
          boundary_start = ticketless.index(
              "    safe_runtime_trace = sanitized_ai_turn_runtime_trace(\n"
          )
          boundary_end = ticketless.index(
              "    message = WebchatMessage(\n",
              boundary_start,
          )
          terminal_boundary = '''    safe_runtime_trace = (
        sanitized_ai_turn_runtime_trace(result.runtime_trace) or {}
    )
    final_body = " ".join(str(result.reply or "").strip().split())
    fallback_reason = None
    if not result.ok or not final_body:
        fallback_reason = result.error_code or "agent_runtime_no_reply"
        final_body = customer_visible_runtime_fallback(
            language,
            visitor_message.body,
        )

    if suppress_stale_reply_if_needed(
        db,
        conversation=conversation,
        turn=turn,
        reason="conversation_state_changed_during_ticketless_runtime",
    ):
        return {
            "status": "superseded",
            "reason": "conversation_state_changed_during_ticketless_runtime",
            "reply_source": "suppressed",
            "runtime_trace": safe_runtime_trace,
            "bridge_elapsed_ms": result.elapsed_ms,
        }

    policy = evaluate_customer_visible_policy(final_body)
    if not policy.allowed or not policy.normalized_body.strip():
        fallback_reason = "customer_visible_policy_blocked"
        final_body = customer_visible_runtime_fallback(
            language,
            visitor_message.body,
        )
        policy = evaluate_customer_visible_policy(final_body)
        if not policy.allowed or not policy.normalized_body.strip():
            raise RuntimeError("customer_visible_fallback_rejected")
    final_body = policy.normalized_body
    if fallback_reason:
        safe_runtime_trace = {
            **safe_runtime_trace,
            "terminal_fallback_reason": fallback_reason,
        }

    # Tool effects are committed in the Agent Runtime's transaction. Refresh the
    # conversation for downstream projections without re-implementing Tool truth.
    db.expire(conversation)
    reply_source = (
        "agent_runtime:fallback" if fallback_reason else result.reply_source
    )
    fallback_applied = bool(fallback_reason) or not result.ai_generated

'''
          ticketless = (
              ticketless[:boundary_start]
              + terminal_boundary
              + ticketless[boundary_end:]
          )
          ticketless = ticketless.replace(
              "body=policy.normalized_body,",
              "body=final_body,",
          )
          ticketless = ticketless.replace(
              '"reply_source": result.reply_source,',
              '"reply_source": reply_source,',
          )
          ticketless = ticketless.replace(
              '"fallback": not result.ai_generated,',
              '"fallback": fallback_applied,',
          )
          ticketless = ticketless.replace(
              '''"fallback_reason": (
                    result.error_code if not result.ai_generated else None
                ),''',
              '''"fallback_reason": (
                    fallback_reason
                    or (result.error_code if not result.ai_generated else None)
                ),''',
          )
          ticketless = ticketless.replace(
              '''"fallback_reason": (
            result.error_code if not result.ai_generated else None
        ),''',
              '''"fallback_reason": (
            fallback_reason
            or (result.error_code if not result.ai_generated else None)
        ),''',
          )
          TICKETLESS_SERVICE.write_text(ticketless, encoding="utf-8")

          arch_tests = ARCH_TESTS.read_text(encoding="utf-8")
          if "test_model_only_handoff_final_fails_closed" not in arch_tests:
              arch_tests += '''

@pytest.mark.asyncio
async def test_model_only_handoff_final_fails_closed(monkeypatch) -> None:
    async def route(_self, _request):
        return ProviderResult(
            ok=True,
            provider="private_ai_runtime",
            raw_provider="private_ai_runtime",
            reply_source="private_ai_runtime",
            elapsed_ms=3,
            structured_output={
                "customer_reply": "I will connect you to a human.",
                "intent": "human_handoff",
                "next_action": "request_handoff",
                "handoff_required": True,
                "handoff_reason": "customer_requested_human",
                "tool_calls": [],
            },
            raw_payload_safe_summary={"model": "test"},
        )

    monkeypatch.setattr(agent_service.ProviderRuntimeRouter, "route", route)
    monkeypatch.setattr(
        agent_service,
        "_authoritative_provider_audit_exists",
        lambda *_args, **_kwargs: True,
    )
    result = await agent_service._run_agent_with_db(
        _Db(),
        request=RuntimeAIProviderRequest(
            tenant_key="tenant",
            channel_key="website",
            session_id="session",
            body="I need a human.",
            request_id="request-handoff-without-tool",
            metadata={},
        ),
        started=0.0,
    )

    assert result.ai_generated is False
    assert result.handoff_required is False
    assert result.error_code == "handoff_tool_side_effect_missing"
    assert result.reply


@pytest.mark.asyncio
async def test_committed_handoff_observation_is_terminal_authority(monkeypatch) -> None:
    outputs = [
        {
            "customer_reply": None,
            "intent": "human_handoff",
            "next_action": "call_tool",
            "handoff_required": False,
            "tool_calls": [
                {
                    "tool_name": "handoff.request.create",
                    "arguments": {"reason": "customer_requested_human"},
                }
            ],
        },
        {
            "customer_reply": "A human handoff has been requested.",
            "intent": "human_handoff",
            "next_action": "reply",
            "handoff_required": False,
            "tool_calls": [],
        },
    ]

    async def route(_self, _request):
        return ProviderResult(
            ok=True,
            provider="private_ai_runtime",
            raw_provider="private_ai_runtime",
            reply_source="private_ai_runtime",
            elapsed_ms=3,
            structured_output=outputs.pop(0),
            raw_payload_safe_summary={"model": "test"},
        )

    def execute(_db, *, calls, context, allow_high_risk_writes=False):
        del calls, context, allow_high_risk_writes
        return [
            ToolObservation(
                tool_name="handoff.request.create",
                ok=True,
                status="executed",
                result={"handoff_request_id": 1, "status": "requested"},
            )
        ]

    monkeypatch.setattr(agent_service.ProviderRuntimeRouter, "route", route)
    monkeypatch.setattr(
        agent_service,
        "_authoritative_provider_audit_exists",
        lambda *_args, **_kwargs: True,
    )
    monkeypatch.setattr(agent_service, "execute_agent_tool_calls", execute)
    result = await agent_service._run_agent_with_db(
        _Db(),
        request=RuntimeAIProviderRequest(
            tenant_key="tenant",
            channel_key="website",
            session_id="session",
            body="I need a human.",
            request_id="request-committed-handoff",
            metadata={
                "agent_allowed_tools": ["handoff.request.create"],
                "agent_execution_context": {
                    "granted_permissions": ["webchat:handoff:create"]
                },
            },
        ),
        started=0.0,
    )

    assert result.ai_generated is True
    assert result.handoff_required is True
    assert result.handoff_reason == "handoff_requested"
    assert result.error_code is None


def test_customer_visible_runtime_fallback_has_one_authority() -> None:
    from app.services.agent_runtime.fallback import (
        customer_visible_runtime_fallback,
    )

    assert customer_visible_runtime_fallback("zh", "hello").startswith("抱歉")
    for relative in (
        "backend/app/services/agent_runtime/service.py",
        "backend/app/services/webchat_runtime_ai_service.py",
        "backend/app/services/webchat_ai_service.py",
        "backend/app/services/conversation_ai_service.py",
    ):
        source = Path(relative).read_text(encoding="utf-8")
        assert "customer_visible_runtime_fallback" in source
        assert "def _localized_fallback(" not in source
    wrapper = Path(
        "backend/app/services/webchat_runtime_ai_service.py"
    ).read_text(encoding="utf-8")
    assert "def _fallback(" not in wrapper
'''
          ARCH_TESTS.write_text(arch_tests, encoding="utf-8")

          turn_tests = TURN_TESTS.read_text(encoding="utf-8")
          if "test_ticketless_runtime_failure_persists_terminal_fallback" not in turn_tests:
              turn_tests += '''


def test_ticketless_runtime_failure_persists_terminal_fallback(monkeypatch):
    _ensure_schema_and_user()
    _clear_webchat_ai_jobs()
    client = TestClient(app)
    conversation_id, visitor_token = _init_conversation(client)
    sent = _send(
        client,
        conversation_id,
        visitor_token,
        "Please help me.",
        "turn-runtime-terminal-fallback-1",
    )
    ai_turn_id = sent["ai_turn_id"]

    from app.services import conversation_ai_service, webchat_ai_orchestration_service

    monkeypatch.setattr(
        webchat_ai_orchestration_service.settings,
        "webchat_ai_auto_reply_mode",
        "runtime",
    )
    monkeypatch.setattr(
        conversation_ai_service,
        "_run_runtime",
        lambda **_kwargs: WebchatRuntimeReplyResult(
            ok=False,
            ai_generated=False,
            reply_source="private_ai_runtime",
            reply=None,
            intent=None,
            handoff_required=False,
            handoff_reason=None,
            recommended_agent_action=None,
            elapsed_ms=5,
            error_code="all_providers_failed",
            retry_after_ms=1500,
            runtime_trace={
                "agent_runtime": True,
                "error_code": "all_providers_failed",
            },
            tool_calls=[],
        ),
    )

    db = SessionLocal()
    try:
        job = db.query(BackgroundJob).filter(
            BackgroundJob.dedupe_key == f"webchat-ai-turn:{ai_turn_id}"
        ).first()
        assert job is not None
        job.next_run_at = None
        db.commit()
        processed = dispatch_pending_webchat_ai_reply_jobs(
            db,
            worker_id="terminal-fallback-worker",
        )
        assert any(item.job_type == WEBCHAT_AI_REPLY_JOB for item in processed)
        db.commit()
    finally:
        db.close()

    polled = client.get(
        f"/api/webchat/conversations/{conversation_id}/messages",
        headers={"X-Webchat-Visitor-Token": visitor_token},
    )
    assert polled.status_code == 200, polled.text
    agent_messages = [
        message
        for message in polled.json()["messages"]
        if message.get("author_label") == "AI Assistant"
        and message.get("ai_turn_id") == ai_turn_id
    ]
    assert len(agent_messages) == 1
    assert agent_messages[0]["body"]

    db = SessionLocal()
    try:
        turn = db.get(WebchatAITurn, ai_turn_id)
        assert turn is not None
        assert turn.status == "completed"
        message = db.query(WebchatMessage).filter(
            WebchatMessage.ai_turn_id == ai_turn_id,
            WebchatMessage.direction == "agent",
        ).one()
        metadata = json.loads(message.metadata_json or "{}")
        assert metadata["fallback"] is True
        assert metadata["fallback_reason"] == "all_providers_failed"
        assert metadata["reply_source"] == "agent_runtime:fallback"
    finally:
        db.close()
'''
          TURN_TESTS.write_text(turn_tests, encoding="utf-8")

          residue = RESIDUE.read_text(encoding="utf-8")
          for marker in (
              '    "def _localized_fallback(",\n',
              '    "def _fallback(language:",\n',
              '    "handoff_required=decision.handoff_required",\n',
              '    "if result.handoff_required and not conversation.current_handoff_request_id:",\n',
          ):
              if marker not in residue:
                  residue = replace_once(
                      residue,
                      '    "**_legacy",\n',
                      '    "**_legacy",\n' + marker,
                      label="Runtime terminal residue marker",
                  )
          RESIDUE.write_text(residue, encoding="utf-8")

          generic_arch = GENERIC_ARCH.read_text(encoding="utf-8")
          generic_arch = generic_arch.replace(
              "9. Always emit one customer-visible final response, including a deterministic fallback when the model or Tool infrastructure is unavailable.",
              "9. Always emit one customer-visible final response, including a deterministic fallback when model output, Tool infrastructure, or customer-visible policy validation is unavailable. A handoff terminal state is valid only when a committed handoff Tool Observation exists.",
          )
          if "- committed Tool side-effect authority for terminal handoff state" not in generic_arch:
              generic_arch = generic_arch.replace(
                  "- customer-visible terminal response\n",
                  "- customer-visible terminal response\n- committed Tool side-effect authority for terminal handoff state\n",
              )
          if "- model-only handoff claims without a committed Tool Observation" not in generic_arch:
              generic_arch = generic_arch.replace(
                  "- silent failure after a customer message has been accepted\n",
                  "- silent failure after a customer message has been accepted\n- model-only handoff claims without a committed Tool Observation\n",
              )
          GENERIC_ARCH.write_text(generic_arch, encoding="utf-8")

          conversation_arch = CONVERSATION_ARCH.read_text(encoding="utf-8")
          terminal_lines = (
              "- Missing or rejected model text is replaced by the canonical "
              "customer-visible Runtime fallback; an accepted customer message "
              "never ends in a blank response.\n"
              "- `handoff_required` is projected only from a committed "
              "`handoff.request.create` Tool Observation, never from a model flag alone.\n"
          )
          if "accepted customer message never ends in a blank response" not in conversation_arch:
              conversation_arch = conversation_arch.replace(
                  "- Provider/runtime failure still produces one deterministic customer-visible terminal response.\n",
                  "- Provider/runtime failure still produces one deterministic customer-visible terminal response.\n"
                  + terminal_lines,
              )
          CONVERSATION_ARCH.write_text(conversation_arch, encoding="utf-8")

          WORKFLOW.unlink()
          PY

      - name: Run focused terminal and architecture regression
        shell: bash
        env:
          PYTHONPATH: backend
          APP_ENV: test
          AUTO_INIT_DB: "false"
          SEED_DEMO_DATA: "false"
          ALLOW_DEV_AUTH: "false"
          PROVIDER_RUNTIME_ENABLED: "false"
          PRIVATE_AI_RUNTIME_ENABLED: "false"
          WEBCHAT_AI_ENABLED: "false"
        run: |
          test ! -e .github/workflows/temporary-agent-terminal-authority.yml
          python -m compileall -q \
            backend/app/services/agent_runtime \
            backend/app/services/conversation_ai_service.py \
            backend/app/services/webchat_ai_service.py \
            backend/app/services/webchat_runtime_ai_service.py
          pytest -q \
            backend/tests/test_agent_runtime_architecture.py \
            backend/tests/test_agent_tool_schema_and_access_authority.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            backend/tests/test_agent_runtime_residue.py
          python scripts/ci/check_agent_runtime_residue.py
          python scripts/verify_repository.py

      - name: Commit clean terminal authority Head
        shell: bash
        run: |
          git config user.name "Nexus Canonical Delivery"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Enforce customer-visible Agent terminal authority"
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d
