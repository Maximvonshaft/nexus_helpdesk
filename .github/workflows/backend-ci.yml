name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile backend
        run: python -m compileall backend/app backend/scripts

      - name: Run baseline backend tests
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_outbound_safety.py \
            backend/tests/test_outbound_message_semantics.py \
            backend/tests/test_round24_hardening.py \
            backend/tests/test_production_settings_contract.py \
            backend/tests/test_next_phase_max_push.py \
            backend/tests/test_deploy_contracts.py \
            backend/tests/test_deploy_v222_contracts.py \
            backend/tests/test_round20a_rectification.py \
            backend/tests/test_round20b_legacy_frontend.py \
            backend/tests/test_round27_frontend_hardening.py \
            backend/tests/test_tool_governance.py

      - name: Run runtime retirement and observability tests
        env:
          PYTHONPATH: backend
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_codex_app_server_image_contract.py \
            backend/tests/test_provider_runtime_status.py \
            backend/tests/test_worker_daemon_readiness.py \
            backend/tests/test_db_query_timing.py \
            backend/tests/test_observability_metrics.py \
            backend/tests/test_worker_metrics.py

      - name: Run WebChat voice readiness header tests
        run: |
          set -Eeuo pipefail
          timeout 300 pytest -q backend/tests/test_webchat_voice_static_headers.py

      - name: Run WebChat voice API foundation tests
        run: |
          set -Eeuo pipefail
          timeout 300 pytest -q \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py

      - name: Run webchat performance and security tests
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_webchat_events.py \
            backend/tests/test_webchat_events_realdb.py \
            backend/tests/test_webchat_events_rbac_realdb.py \
            backend/tests/test_webchat_polling_write_throttle.py \
            backend/tests/test_webchat_event_write_isolation.py \
            backend/tests/test_webchat_admin_conversations_query_count.py

      - name: Run admin users pagination tests
        run: |
          set -Eeuo pipefail
          timeout 180 pytest -q backend/tests/test_admin_users_pagination.py

      - name: Run lite cases pagination tests
        run: |
          set -Eeuo pipefail
          timeout 180 pytest -q backend/tests/test_lite_cases_pagination.py

      - name: Run ticket search query tests
        run: |
          set -Eeuo pipefail
          timeout 180 pytest -q backend/tests/test_ticket_search_query.py

      - name: Run ticket timeline pagination tests
        run: |
          set -Eeuo pipefail
          timeout 180 pytest -q backend/tests/test_ticket_timeline_pagination.py

      - name: Run ticket detail summary tests
        run: |
          set -Eeuo pipefail
          timeout 180 pytest -q backend/tests/test_ticket_detail_summary.py

      - name: Run production drift reconciliation tests
        run: |
          set -Eeuo pipefail
          export PYTHONPATH=backend
          timeout 300 pytest -q \
            backend/tests/test_release_metadata.py \
            backend/tests/test_release_metadata_consistency_gate.py \
            backend/tests/test_webchat_voice_mock_ui_static.py \
            backend/tests/test_candidate_compose_contract.py \
            backend/tests/test_support_intelligence_config.py \
            backend/tests/test_whatsapp_lite_session_dedupe.py

      - name: Run operator queue tests
        run: |
          set -Eeuo pipefail
          timeout 600 pytest -q \
            backend/tests/test_operator_queue.py \
            backend/tests/test_operator_queue_api.py \
            backend/tests/test_operator_queue_projection.py \
            backend/tests/test_operator_queue_replay.py \
            backend/tests/test_operator_queue_pagination.py \
            backend/tests/test_operator_queue_audit.py

      - name: Strict readiness configuration check
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
          STORAGE_BACKEND: s3
          EXTERNAL_CHANNEL_TRANSPORT: disabled
          EXTERNAL_CHANNEL_DEPLOYMENT_MODE: disabled
          EXTERNAL_CHANNEL_CLI_FALLBACK_ENABLED: "false"
          WEBCHAT_RATE_LIMIT_BACKEND: database
          WEBCHAT_AI_AUTO_REPLY_MODE: safe_ack
          WEBCHAT_ALLOWED_ORIGINS: https://example.test
        run: cd backend && python scripts/validate_production_readiness.py
