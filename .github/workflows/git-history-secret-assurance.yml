name: git-history-secret-assurance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  git-history-secret-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compile history assurance
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/security/scanner.py \
            scripts/security/scan_git_history.py \
            scripts/security/scan_artifacts.py \
            scripts/security/tests/test_scan_git_history.py

      - name: Run security scanner tests
        id: scanner_tests
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          python -m unittest discover -s scripts/security/tests -p 'test_*.py' -v

      - name: Scan complete reachable history
        id: history_scan
        if: steps.scanner_tests.outcome == 'success'
        run: |
          set +e
          mkdir -p artifacts
          python scripts/security/scan_git_history.py \
            --root . \
            --allowlist config/security/secret-scan-allowlist.json \
            --max-blob-bytes 8388608 \
            --output artifacts/security-git-history-scan.json
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Ensure bounded history report exists
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          if [[ ! -s artifacts/security-git-history-scan.json ]]; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          reason = "scanner_tests_failed" if os.environ.get("TEST_OUTCOME") != "success" else "history_report_missing"
          report = {
              "schema_version": "nexus_security_git_history_scan_v1",
              "status": "fail",
              "complete": False,
              "failure_reason": reason,
              "object_id_length": 0,
              "source_sha": None,
              "refs_sha256": None,
              "commit_count": 0,
              "reachable_object_count": 0,
              "reachable_blob_count": 0,
              "accounted_blob_count": 0,
              "scanned_text_blob_count": 0,
              "binary_blob_count": 0,
              "oversized_binary_blob_count": 0,
              "unscanned_oversized_blob_count": 0,
              "unscanned_oversized": [],
              "unscanned_oversized_truncated": False,
              "finding_count": 0,
              "suppressed_count": 0,
              "by_rule": [],
              "findings": [],
              "findings_truncated": False,
          }
          Path("artifacts/security-git-history-scan.json").write_text(
              json.dumps(report, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          fi
          test -s artifacts/security-git-history-scan.json
          test "$(wc -c < artifacts/security-git-history-scan.json)" -le 65536

      - name: Validate bounded history evidence
        id: artifact_scan
        if: always()
        run: |
          set +e
          python scripts/security/scan_artifacts.py \
            --root . \
            --output artifacts/security-git-history-report-scan.json \
            artifacts/security-git-history-scan.json
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Finalize always-present status evidence
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
          ARTIFACT_EXIT: ${{ steps.artifact_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_report = Path("artifacts/security-git-history-report-scan.json")
          if not artifact_report.is_file():
              artifact_report.write_text(
                  json.dumps({
                      "schema_version": "nexus_security_artifact_scan_v1",
                      "status": "fail",
                      "scanned_files": 0,
                      "finding_count": 0,
                      "suppressed_count": 0,
                      "by_rule": {},
                      "findings": [],
                      "truncated": False,
                      "failure_reason": "artifact_report_missing",
                  }, sort_keys=True, separators=(",", ":")) + "\n",
                  encoding="utf-8",
              )
          status = {
              "schema_version": "nexus_security_git_history_assurance_status_v1",
              "scanner_tests": os.environ.get("TEST_OUTCOME") or "unknown",
              "history_scan_exit_code": int(os.environ.get("HISTORY_EXIT") or 98),
              "artifact_scan_exit_code": int(os.environ.get("ARTIFACT_EXIT") or 98),
          }
          Path("artifacts/security-git-history-exit-status.json").write_text(
              json.dumps(status, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          test -s artifacts/security-git-history-report-scan.json
          test -s artifacts/security-git-history-exit-status.json

      - name: Upload bounded history evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: git-history-secret-assurance
          path: |
            artifacts/security-git-history-scan.json
            artifacts/security-git-history-report-scan.json
            artifacts/security-git-history-exit-status.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce complete clean history assurance
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.scanner_tests.outcome }}
          HISTORY_EXIT: ${{ steps.history_scan.outputs.exit_code || '98' }}
          ARTIFACT_EXIT: ${{ steps.artifact_scan.outputs.exit_code || '98' }}
        run: |
          set -Eeuo pipefail
          test "$TEST_OUTCOME" = "success"
          test "$HISTORY_EXIT" = "0"
          test "$ARTIFACT_EXIT" = "0"
          python - <<'PY'
          import json
          from pathlib import Path

          history = json.loads(Path("artifacts/security-git-history-scan.json").read_text(encoding="utf-8"))
          artifact = json.loads(Path("artifacts/security-git-history-report-scan.json").read_text(encoding="utf-8"))
          if history.get("status") != "pass" or history.get("complete") is not True:
              raise SystemExit("git_history_assurance_failed")
          if history.get("accounted_blob_count") != history.get("reachable_blob_count"):
              raise SystemExit("git_history_accounting_incomplete")
          if artifact.get("status") != "pass":
              raise SystemExit("git_history_evidence_scan_failed")
          PY

      - name: Check exact-head whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
