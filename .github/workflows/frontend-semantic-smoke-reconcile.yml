name: frontend-semantic-smoke-reconcile

on:
  push:
    branches:
      - fix/frontend-semantic-621
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/frontend-semantic-smoke-reconcile.yml

permissions:
  contents: write

jobs:
  patch-existing-login-smoke:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/frontend-semantic-621
          fetch-depth: 0
          persist-credentials: true

      - name: Reconcile accepted Login heading assertion
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('webapp/e2e/smoke.spec.ts')
          lines = path.read_text(encoding='utf-8').splitlines()
          try:
              start = lines.index("test('login page renders', async ({ page }) => {")
          except ValueError as exc:
              raise SystemExit('login smoke test block not found') from exc
          end = next((idx for idx in range(start + 1, min(start + 12, len(lines))) if lines[idx] == '})'), None)
          if end is None:
              raise SystemExit('login smoke test block end not found')
          block = lines[start:end + 1]
          heading_matches = [idx for idx, line in enumerate(block) if "getByRole('heading'" in line]
          button_matches = [idx for idx, line in enumerate(block) if "getByRole('button'" in line]
          if heading_matches != [2] or button_matches != [4]:
              raise SystemExit(f'unexpected login smoke structure: headings={heading_matches}, buttons={button_matches}')
          block[2] = "  await expect(page.getByRole('heading', { level: 1, name: '进入运营工作台' })).toBeVisible()"
          block[4] = "  await expect(page.getByRole('button', { name: '登录运营工作台' })).toBeVisible()"
          lines[start:end + 1] = block
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git diff --check

      - name: Publish bounded test-contract correction
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webapp/e2e/smoke.spec.ts
          git commit -m "test(frontend): align Login smoke with product authority"
          git push origin HEAD:fix/frontend-semantic-621
