name: apply-tenant-runtime-phase3a-temp

on:
  pull_request:
    paths:
      - .github/workflows/apply-tenant-runtime-phase3a-temp.yml
      - .github/patches/tenant-runtime-phase3a.part00
      - .github/patches/tenant-runtime-phase3a.part01
      - .github/patches/tenant-runtime-phase3a.part02
      - .github/patches/tenant-runtime-phase3a.part03
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-tenant-runtime-phase3a-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: backend
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/tenant-runtime-phase3a-apply.db
      AUTO_INIT_DB: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python immutable
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install locked dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Reconstruct and apply verified Phase 3A patch
        run: |
          set -Eeuo pipefail
          cat .github/patches/tenant-runtime-phase3a.part0* \
            | base64 --decode \
            > "${RUNNER_TEMP}/tenant-runtime-phase3a.patch.gz"
          test "$(sha256sum "${RUNNER_TEMP}/tenant-runtime-phase3a.patch.gz" | awk '{print $1}')" = "3c1607696bab495f7c509a0b9d8ad3757688f572936c4a1db5406ac8910b0acf"
          gzip -dc "${RUNNER_TEMP}/tenant-runtime-phase3a.patch.gz" \
            > "${RUNNER_TEMP}/tenant-runtime-phase3a.patch"
          test "$(sha256sum "${RUNNER_TEMP}/tenant-runtime-phase3a.patch" | awk '{print $1}')" = "2946813c8831d11e3af90564b660a7215f4d247c6c85a660e7d4650c438378e7"
          test "$(grep -c '^diff --git ' "${RUNNER_TEMP}/tenant-runtime-phase3a.patch")" = "10"
          git apply --check --whitespace=error-all "${RUNNER_TEMP}/tenant-runtime-phase3a.patch"
          git apply --whitespace=error-all "${RUNNER_TEMP}/tenant-runtime-phase3a.patch"

      - name: Verify focused and integration contracts
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            backend/app/settings.py \
            backend/app/services/tenant_authority.py \
            backend/app/services/permissions.py \
            backend/app/services/ticket_service.py \
            backend/app/services/lite_service.py \
            backend/app/services/lite_pagination.py \
            backend/tests/test_tenant_runtime_authority.py
          pytest -q \
            backend/tests/test_tenant_runtime_authority.py \
            backend/tests/test_lite_cases_pagination.py \
            backend/tests/test_nexus_osr_auto_ticket_postgres.py \
            backend/tests/test_nexus_osr_auto_ticket_service.py \
            backend/tests/test_production_hardening_permissions.py \
            backend/tests/test_production_settings_contract.py \
            backend/tests/test_settings.py \
            backend/tests/test_ticket_detail_summary.py \
            backend/tests/test_ticket_lightweight_contract.py \
            backend/tests/test_ticket_search_query.py \
            backend/tests/test_ticket_summary_evidence_truth.py \
            backend/tests/test_ticket_timeline_pagination.py
          git diff --check

      - name: Remove all bootstrap files and commit formal implementation
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -Eeuo pipefail
          rm -f \
            .github/workflows/apply-tenant-runtime-phase3a-temp.yml \
            .github/patches/tenant-runtime-phase3a.part00 \
            .github/patches/tenant-runtime-phase3a.part01 \
            .github/patches/tenant-runtime-phase3a.part02 \
            .github/patches/tenant-runtime-phase3a.part03
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/apply-tenant-runtime-phase3a-temp.yml',
              '.github/workflows/tenant-runtime-source-snapshot-temp.yml',
              '.github/workflows/tenant-runtime-authority-gate.yml',
              '.github/patches/tenant-runtime-phase3a.part00',
              '.github/patches/tenant-runtime-phase3a.part01',
              '.github/patches/tenant-runtime-phase3a.part02',
              '.github/patches/tenant-runtime-phase3a.part03',
              'backend/app/settings.py',
              'backend/app/services/permissions.py',
              'backend/app/services/ticket_service.py',
              'backend/app/services/lite_service.py',
              'backend/app/services/lite_pagination.py',
              'backend/app/services/tenant_authority.py',
              'backend/tests/test_tenant_runtime_authority.py',
              'docs/architecture/tenant-principal-migration.md',
          }
          actual = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True,
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected staged paths: {sorted(actual)}')
          PY
          git config user.name 'nexus-osr-tenant-runtime-bot'
          git config user.email 'nexus-osr-tenant-runtime-bot@users.noreply.github.com'
          git commit -m 'fix(tenant): enforce core runtime authority (#546)'
          git push origin HEAD:"${HEAD_BRANCH}"
