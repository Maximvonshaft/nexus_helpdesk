name: Temporary PR 786 Ticketless Voice Closure

on:
  push:
    branches:
      - freeze/de2bf340-conversation-routing

permissions:
  contents: write

concurrency:
  group: pr786-ticketless-voice-closure
  cancel-in-progress: true

jobs:
  close:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: freeze/de2bf340-conversation-routing

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Rebuild one canonical candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(git rev-parse HEAD)"
          printf '%s' "$start_sha" > /tmp/pr786-start-sha
          base='9f3b092561db26b262c9457f7ec82e204d1dd0ce'
          main='2589bcccc631d26aff589f07a91b33914b24413e'
          git cat-file -e "${base}^{commit}"
          git cat-file -e "${main}^{commit}"
          git reset --hard "$base"
          rm -f backend/tests/test_ticketless_voice_ticket_binding.py

          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_between(path: str, start: str, end: str, replacement: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              start_index = text.find(start)
              if start_index < 0:
                  raise SystemExit(f'start marker missing for {path}: {start!r}')
              end_index = text.find(end, start_index)
              if end_index < 0:
                  raise SystemExit(f'end marker missing for {path}: {end!r}')
              file.write_text(
                  text[:start_index] + dedent(replacement).rstrip() + text[end_index:],
                  encoding='utf-8',
              )

          # Queue position belongs to the one private Tool Executor.
          core_path = Path('backend/app/services/nexus_osr/tool_execution_service_core.py')
          core = core_path.read_text(encoding='utf-8')
          old_import = 'from ...webchat_models import WebchatConversation\n'
          new_import = 'from ...webchat_models import WebchatConversation, WebchatHandoffRequest\n'
          if new_import not in core:
              if core.count(old_import) != 1:
                  raise SystemExit('Tool Executor WebChat import mismatch')
              core = core.replace(old_import, new_import, 1)
          handler_anchor = core.index('def _production_handlers(')
          support_start = core.index('    def support_availability(', handler_anchor)
          support_end = core.index('\n    def ticket_create(', support_start)
          support = core[support_start:support_end]
          call_start = support.index('        summary = availability_summary(\n')
          call_end = support.index('        return ActionExecutionResult(\n', call_start)
          support_call = '''        request_row = (
              db.get(WebchatHandoffRequest, current.current_handoff_request_id)
              if current.current_handoff_request_id is not None
              else None
          )
          if request_row is not None and request_row.conversation_id != current.id:
              request_row = None
          summary = availability_summary(
              db,
              tenant_key=control.tenant_key,
              country_code=control.country_code,
              channel_key=control.channel_key,
              request_row=request_row,
          )
'''
          support = support[:call_start] + support_call + support[call_end:]
          core = core[:support_start] + support + core[support_end:]
          summary_start = core.index('def _availability_customer_summary(')
          summary_end = core.index('\n\ndef _decision_for_policy_gate(', summary_start)
          summary_impl = dedent('''
          def _availability_customer_summary(summary: dict[str, Any]) -> str:
              online = int(summary.get("online_agents") or 0)
              available = int(summary.get("available_capacity") or 0)
              queued = int(summary.get("queue_count") or 0)
              raw_position = summary.get("queue_position")
              position = int(raw_position) if isinstance(raw_position, int) else None
              if online <= 0:
                  return "No human support agent is currently online."
              if available > 0:
                  return (
                      "Human support is available with "
                      f"{available} open conversation slot(s)."
                  )
              if position is not None and position > 0:
                  ahead = max(0, position - 1)
                  if ahead == 0:
                      return (
                          "Human support is currently at capacity. "
                          "This customer is next in the eligible queue."
                      )
                  return (
                      "Human support is currently at capacity with "
                      f"{ahead} conversation(s) ahead of this customer."
                  )
              return (
                  "Human support is currently at capacity with "
                  f"{queued} conversation(s) waiting."
              )
          ''').strip()
          core = core[:summary_start] + summary_impl + core[summary_end:]
          core_path.write_text(core, encoding='utf-8')

          # Generalize the existing voice lifecycle authority. Ticket-scoped and
          # ticketless routes call the same functions; visibility remains server-side.
          service = 'backend/app/services/webchat_voice_service.py'
          helper_and_accept = '''
          def _conversation_for_voice_session(
              db: Session,
              session: WebchatVoiceSession,
          ) -> WebchatConversation:
              conversation = db.get(WebchatConversation, session.conversation_id)
              if conversation is None:
                  raise HTTPException(
                      status_code=status.HTTP_409_CONFLICT,
                      detail="voice session conversation is missing",
                  )
              return conversation


          def _authorize_voice_session_operation(
              db: Session,
              *,
              current_user: User,
              session: WebchatVoiceSession,
              ticket_id: int | None,
          ) -> tuple[WebchatConversation, Ticket | None]:
              if ticket_id is not None and session.ticket_id != ticket_id:
                  raise HTTPException(
                      status_code=status.HTTP_404_NOT_FOUND,
                      detail="webchat voice session not found",
                  )
              conversation = _conversation_for_voice_session(db, session)
              ticket = _ensure_voice_session_visible(
                  db,
                  current_user,
                  session,
                  conversation,
              )
              return conversation, ticket


          def accept_admin_voice_session(
              db: Session,
              *,
              voice_session_public_id: str,
              current_user: User,
              ticket_id: int | None = None,
          ) -> dict[str, Any]:
              ensure_can_accept_webcall_voice(current_user, db)
              session = _load_voice_session(db, voice_session_public_id)
              _authorize_voice_session_operation(
                  db,
                  current_user=current_user,
                  session=session,
                  ticket_id=ticket_id,
              )
              now = utc_now()
              if _mark_missed_if_expired(db, session=session, now=now):
                  db.flush()
                  raise _conflict(DETAIL_EXPIRED)
              if session.status in TERMINAL_STATUSES:
                  raise _conflict(_closed_accept_detail(session.status))
              if (
                  session.accepted_by_user_id is not None
                  and session.accepted_by_user_id != current_user.id
              ):
                  raise _conflict(DETAIL_ALREADY_ACCEPTED_BY_OTHER)
              if (
                  session.status not in ACCEPT_READY_STATUSES
                  and session.status not in ACCEPTED_STATUSES
              ):
                  raise _conflict(DETAIL_NOT_ACCEPTABLE)

              first_accept = session.accepted_by_user_id is None
              session.status = "active"
              session.accepted_by_user_id = current_user.id
              session.accepted_at = session.accepted_at or now
              session.active_at = session.active_at or now
              session.updated_at = now
              value, ttl, identity = _issue_token(
                  session,
                  "agent",
                  str(current_user.id),
              )
              existing = (
                  db.query(WebchatVoiceParticipant)
                  .filter(
                      WebchatVoiceParticipant.voice_session_id == session.id,
                      WebchatVoiceParticipant.provider_identity == identity,
                  )
                  .first()
              )
              if existing is None:
                  db.add(
                      WebchatVoiceParticipant(
                          voice_session_id=session.id,
                          participant_type="agent",
                          user_id=current_user.id,
                          provider_identity=identity,
                          status="invited",
                          created_at=now,
                      )
                  )
              if first_accept:
                  _write_voice_event(
                      db,
                      conversation_id=session.conversation_id,
                      ticket_id=session.ticket_id,
                      event_type="voice.session.accepted",
                      payload={
                          "voice_session_id": session.public_id,
                          "accepted_by_user_id": current_user.id,
                      },
                  )
                  _emit_voice_observability(session, "voice.session.accepted")
                  _write_voice_event(
                      db,
                      conversation_id=session.conversation_id,
                      ticket_id=session.ticket_id,
                      event_type="voice.session.active",
                      payload={
                          "voice_session_id": session.public_id,
                          "accepted_by_user_id": current_user.id,
                      },
                  )
                  _emit_voice_observability(session, "voice.session.active")
              db.flush()
              return _serialize_session(
                  session,
                  participant_token=value,
                  expires_in_seconds=ttl,
                  participant_identity=identity,
              )
          '''
          replace_between(
              service,
              'def accept_admin_voice_session(',
              '\n\n\ndef reject_admin_voice_session(',
              helper_and_accept,
          )

          reject = '''
          def reject_admin_voice_session(
              db: Session,
              *,
              voice_session_public_id: str,
              current_user: User,
              ticket_id: int | None = None,
              reason: str | None = None,
          ) -> dict[str, Any]:
              ensure_can_reject_webcall_voice(current_user, db)
              session = _load_voice_session(db, voice_session_public_id)
              _authorize_voice_session_operation(
                  db,
                  current_user=current_user,
                  session=session,
                  ticket_id=ticket_id,
              )
              now = utc_now()
              if _mark_missed_if_expired(db, session=session, now=now):
                  db.flush()
                  raise _conflict(DETAIL_EXPIRED)
              if session.status in TERMINAL_STATUSES:
                  return {
                      "ok": True,
                      "status": session.status,
                      "voice_session_id": session.public_id,
                      "accepted_by_user_id": session.accepted_by_user_id,
                  }
              if (
                  session.accepted_by_user_id is not None
                  or session.status in ACCEPTED_STATUSES
              ):
                  raise _conflict(DETAIL_ALREADY_ACTIVE)
              if session.status not in REJECT_READY_STATUSES:
                  raise _conflict(DETAIL_NOT_REJECTABLE)

              session.status = "cancelled"
              session.ended_at = session.ended_at or now
              session.ended_by_user_id = current_user.id
              session.updated_at = now
              _close_provider_room_for_session(session)
              _write_voice_event(
                  db,
                  conversation_id=session.conversation_id,
                  ticket_id=session.ticket_id,
                  event_type="voice.session.rejected",
                  payload={
                      "voice_session_id": session.public_id,
                      "rejected_by_user_id": current_user.id,
                      "reason": reason or None,
                  },
              )
              _emit_voice_observability(session, "voice.session.rejected")
              _ensure_final_voice_call_message(db, session=session)
              db.flush()
              return {
                  "ok": True,
                  "status": session.status,
                  "voice_session_id": session.public_id,
                  "accepted_by_user_id": session.accepted_by_user_id,
              }
          '''
          replace_between(
              service,
              'def reject_admin_voice_session(',
              '\ndef end_admin_voice_session(',
              reject,
          )

          end = '''
          def end_admin_voice_session(
              db: Session,
              *,
              voice_session_public_id: str,
              current_user: User,
              ticket_id: int | None = None,
          ) -> dict[str, Any]:
              ensure_can_end_webcall_voice(current_user, db)
              session = _load_voice_session(db, voice_session_public_id)
              _authorize_voice_session_operation(
                  db,
                  current_user=current_user,
                  session=session,
                  ticket_id=ticket_id,
              )
              _end_voice_session(
                  db,
                  session=session,
                  ended_by_user_id=current_user.id,
              )
              return {
                  "ok": True,
                  "status": session.status,
                  "voice_session_id": session.public_id,
                  "accepted_by_user_id": session.accepted_by_user_id,
              }
          '''
          replace_between(
              service,
              'def end_admin_voice_session(',
              '\n\ndef _close_provider_room_for_session(',
              end,
          )

          # Add canonical voice-session-addressed endpoints. Existing ticket
          # routes remain bounded adapters to the same service authority.
          api_path = Path('backend/app/api/webchat_voice.py')
          api = api_path.read_text(encoding='utf-8')
          marker = '@router.get("/voice/runtime-config")\n'
          if marker not in api:
              raise SystemExit('voice API insertion marker missing')
          ticketless_routes = dedent('''
          @router.post("/admin/voice/{voice_session_id}/accept")
          def accept_voice_session(
              voice_session_id: str,
              db: Session = Depends(get_db),
              current_user=Depends(get_current_user),
          ) -> dict:
              try:
                  result = accept_admin_voice_session(
                      db,
                      voice_session_public_id=voice_session_id,
                      current_user=current_user,
                  )
                  db.commit()
                  return result
              except HTTPException as exc:
                  if (
                      exc.status_code == status.HTTP_409_CONFLICT
                      and exc.detail == DETAIL_EXPIRED
                  ):
                      db.commit()
                  else:
                      db.rollback()
                  raise
              except Exception:
                  db.rollback()
                  raise


          @router.post("/admin/voice/{voice_session_id}/reject")
          def reject_voice_session(
              voice_session_id: str,
              payload: WebchatVoiceRejectRequest | None = None,
              db: Session = Depends(get_db),
              current_user=Depends(get_current_user),
          ) -> dict:
              with managed_session(db):
                  return reject_admin_voice_session(
                      db,
                      voice_session_public_id=voice_session_id,
                      current_user=current_user,
                      reason=payload.reason if payload else None,
                  )


          @router.post("/admin/voice/{voice_session_id}/end")
          def end_voice_session(
              voice_session_id: str,
              db: Session = Depends(get_db),
              current_user=Depends(get_current_user),
          ) -> dict:
              with managed_session(db):
                  return end_admin_voice_session(
                      db,
                      voice_session_public_id=voice_session_id,
                      current_user=current_user,
                  )


          ''')
          api_path.write_text(
              api.replace(marker, ticketless_routes + marker, 1),
              encoding='utf-8',
          )

          # Integration coverage: no Ticket is created, explicit scope is
          # required, and the same session can be accepted and ended.
          Path('backend/tests/test_ticketless_voice_control.py').write_text(
              dedent('''\
              from __future__ import annotations

              import os
              import sys
              from pathlib import Path

              from fastapi.testclient import TestClient

              os.environ.setdefault("APP_ENV", "development")
              os.environ.setdefault(
                  "DATABASE_URL",
                  "sqlite:////tmp/nexus_ticketless_voice_control.db",
              )
              os.environ.setdefault("ALLOW_DEV_AUTH", "false")

              ROOT = Path(__file__).resolve().parents[1]
              sys.path.insert(0, str(ROOT))
              sys.path.insert(0, str(ROOT.parent))

              from app.auth_service import create_access_token  # noqa: E402
              from app.db import Base, SessionLocal, engine  # noqa: E402
              from app.enums import UserRole  # noqa: E402
              from app.main import app  # noqa: E402
              from app.models import Ticket, User  # noqa: E402
              from app.models_agent_routing import ConversationControl  # noqa: E402
              from app.operator_models import OperatorQueueScopeGrant  # noqa: E402
              from app.voice_models import WebchatVoiceSession  # noqa: E402
              from app.webchat_models import WebchatConversation, WebchatEvent  # noqa: E402


              def setup_module() -> None:
                  os.environ["WEBCHAT_VOICE_ENABLED"] = "false"
                  os.environ["WEBCHAT_HUMAN_CALL_ENABLED"] = "true"
                  os.environ["WEBCHAT_LIVE_AI_VOICE_ENABLED"] = "false"
                  os.environ["WEBCHAT_VOICE_PROVIDER"] = "mock"
                  Base.metadata.create_all(bind=engine)
                  db = SessionLocal()
                  try:
                      if db.get(User, 9501) is None:
                          db.add(
                              User(
                                  id=9501,
                                  username="ticketless_voice_agent",
                                  display_name="Ticketless Voice Agent",
                                  password_hash="test",
                                  role=UserRole.admin,
                                  is_active=True,
                              )
                          )
                      db.commit()
                  finally:
                      db.close()


              def _headers() -> dict[str, str]:
                  return {"Authorization": f"Bearer {create_access_token(9501)}"}


              def _create_ticketless_voice(client: TestClient) -> tuple[str, str]:
                  initialized = client.post(
                      "/api/webchat/init",
                      json={
                          "tenant_key": "ticketless-voice",
                          "channel_key": "website",
                          "visitor_name": "Ticketless Caller",
                      },
                  )
                  assert initialized.status_code == 200, initialized.text
                  conversation_id = initialized.json()["conversation_id"]
                  visitor_token = initialized.json()["visitor_token"]
                  db = SessionLocal()
                  try:
                      conversation = (
                          db.query(WebchatConversation)
                          .filter(WebchatConversation.public_id == conversation_id)
                          .one()
                      )
                      control = (
                          db.query(ConversationControl)
                          .filter(
                              ConversationControl.conversation_id == conversation.id
                          )
                          .one()
                      )
                      control.country_code = "ME"
                      db.add(
                          OperatorQueueScopeGrant(
                              user_id=9501,
                              tenant_key=control.tenant_key,
                              country_code="ME",
                              channel_key=control.channel_key,
                              enabled=True,
                          )
                      )
                      db.commit()
                  finally:
                      db.close()
                  created = client.post(
                      f"/api/webchat/conversations/{conversation_id}/voice/sessions",
                      headers={"X-Webchat-Visitor-Token": visitor_token},
                      json={},
                  )
                  assert created.status_code == 200, created.text
                  return conversation_id, created.json()["voice_session_id"]


              def test_ticketless_voice_accept_and_end_without_creating_ticket():
                  client = TestClient(app)
                  conversation_id, voice_session_id = _create_ticketless_voice(client)

                  queue = client.get(
                      "/api/webchat/admin/voice/sessions?status=ringing&limit=20",
                      headers=_headers(),
                  )
                  assert queue.status_code == 200, queue.text
                  item = next(
                      row
                      for row in queue.json()["items"]
                      if row["voice_session_id"] == voice_session_id
                  )
                  assert item["ticket_id"] is None

                  accepted = client.post(
                      f"/api/webchat/admin/voice/{voice_session_id}/accept",
                      headers=_headers(),
                  )
                  assert accepted.status_code == 200, accepted.text
                  assert accepted.json()["status"] == "active"
                  assert accepted.json()["participant_token"]

                  ended = client.post(
                      f"/api/webchat/admin/voice/{voice_session_id}/end",
                      headers=_headers(),
                  )
                  assert ended.status_code == 200, ended.text
                  assert ended.json()["status"] == "ended"

                  db = SessionLocal()
                  try:
                      conversation = (
                          db.query(WebchatConversation)
                          .filter(WebchatConversation.public_id == conversation_id)
                          .one()
                      )
                      session = (
                          db.query(WebchatVoiceSession)
                          .filter(WebchatVoiceSession.public_id == voice_session_id)
                          .one()
                      )
                      assert conversation.ticket_id is None
                      assert session.ticket_id is None
                      assert db.query(Ticket).count() == 0
                      events = (
                          db.query(WebchatEvent)
                          .filter(
                              WebchatEvent.conversation_id == conversation.id,
                              WebchatEvent.ticket_id.is_(None),
                          )
                          .all()
                      )
                      event_types = {event.event_type for event in events}
                      assert "voice.session.accepted" in event_types
                      assert "voice.session.ended" in event_types
                  finally:
                      db.close()
              '''),
              encoding='utf-8',
          )
          PY

      - name: Run focused regression
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_agent_routing_scope_fifo.py \
            backend/tests/test_ticketless_resume_projection.py \
            backend/tests/test_ticketless_support_scope_isolation.py \
            backend/tests/test_ticketless_voice_control.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_p0_gap_closure.py \
            backend/tests/test_webchat_voice_room_compensation.py

      - name: Publish single clean commit
        shell: bash
        run: |
          set -Eeuo pipefail
          start_sha="$(cat /tmp/pr786-start-sha)"
          git fetch --no-tags origin freeze/de2bf340-conversation-routing
          test "$(git rev-parse origin/freeze/de2bf340-conversation-routing)" = "$start_sha"
          git add -A
          git diff --cached --check
          git reset --soft 2589bcccc631d26aff589f07a91b33914b24413e
          git add -A
          test -z "$(find .github/workflows -maxdepth 1 -type f -name '_temporary-*' -print)"
          test -z "$(find .github -maxdepth 2 -type f -name '*pr786*' -print)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '[P0] Deliver conversation-first governed agent routing'
          git push origin HEAD:freeze/de2bf340-conversation-routing \
            --force-with-lease=refs/heads/freeze/de2bf340-conversation-routing:$start_sha
