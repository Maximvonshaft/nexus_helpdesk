name: Temporary Terminal Reply Convergence

on:
  push:
    branches:
      - refactor/generic-agent-runtime-final-b7e41d
    paths:
      - .github/workflows/temporary-terminal-reply-convergence.yml

permissions:
  contents: write

concurrency:
  group: temporary-terminal-reply-convergence
  cancel-in-progress: false

jobs:
  converge:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout current branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: refactor/generic-agent-runtime-final-b7e41d
          fetch-depth: 0
          persist-credentials: true

      - name: Apply convergence and self-delete
        run: python scripts/temporary_terminal_reply_convergence.py

      - name: Verify clean production shape
        run: |
          test ! -e scripts/temporary_terminal_reply_convergence.py
          test ! -e .github/workflows/temporary-terminal-reply-convergence.yml
          test -e backend/app/services/agent_runtime/terminal_reply.py
          git diff --check
          python -m compileall -q \
            backend/app/services/agent_runtime \
            backend/app/services/conversation_ai_service.py \
            backend/app/services/webchat_ai_service.py \
            backend/app/services/webchat_runtime_ai_service.py \
            backend/tests/test_webchat_ai_turn_runtime.py \
            scripts/ci/check_agent_runtime_residue.py

      - name: Commit clean final tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(agent): guarantee one customer-visible terminal reply"
          git pull --rebase origin refactor/generic-agent-runtime-final-b7e41d
          git push origin HEAD:refactor/generic-agent-runtime-final-b7e41d
