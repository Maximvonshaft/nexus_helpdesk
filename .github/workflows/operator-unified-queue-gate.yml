name: operator-unified-queue-gate

on:
  pull_request:
    paths:
      - "backend/app/api/operator_queue.py"
      - "backend/app/operator_models.py"
      - "backend/app/operator_schemas.py"
      - "backend/app/services/operator_queue.py"
      - "backend/app/services/operator_queue_scope.py"
      - "backend/app/services/operator_work_queue.py"
      - "backend/app/services/permissions.py"
      - "backend/app/services/nexus_osr/operations_dispatch_outbox.py"
      - "backend/alembic/versions/20260711_0057_operator_queue_scope_grants.py"
      - "backend/scripts/check_model_migration_drift.py"
      - "backend/tests/test_operator_queue*.py"
      - "backend/tests/test_unified_operator_queue*.py"
      - ".github/workflows/operator-unified-queue-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: operator-unified-queue-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  operator-unified-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: backend
      APP_ENV: development
      ALLOW_DEV_AUTH: "false"
      POSTGRES_DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk

    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Assert checkout identity
        if: github.event_name == 'pull_request'
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Compile queue boundary
        run: |
          python -m py_compile \
            backend/app/api/operator_queue.py \
            backend/app/operator_models.py \
            backend/app/operator_schemas.py \
            backend/app/services/operator_queue_scope.py \
            backend/app/services/operator_work_queue.py \
            backend/tests/test_unified_operator_queue.py \
            backend/tests/test_unified_operator_queue_postgres.py

      - name: Prove one migration line with queue grant revision
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.POSTGRES_DATABASE_URL }}
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          script = ScriptDirectory.from_config(Config("alembic.ini"))
          heads = script.get_heads()
          assert len(heads) == 1, heads
          assert script.get_revision("20260711_0057") is not None
          ancestry = {revision.revision for revision in script.walk_revisions("base", heads[0])}
          assert "20260711_0057" in ancestry, ancestry
          PY

      - name: PostgreSQL migration round trip
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.POSTGRES_DATABASE_URL }}
        run: |
          set -Eeuo pipefail
          alembic upgrade head
          alembic downgrade 20260710_0056
          alembic upgrade head

      - name: Verify model and migration convergence
        env:
          DATABASE_URL: ${{ env.POSTGRES_DATABASE_URL }}
        run: python backend/scripts/check_model_migration_drift.py

      - name: Run complete queue regression
        env:
          DATABASE_URL: sqlite:////tmp/operator-unified-queue-gate.db
        run: |
          mkdir -p artifacts/operator-queue
          pytest -q \
            backend/tests/test_operator_queue*.py \
            backend/tests/test_unified_operator_queue.py \
            --junitxml=artifacts/operator-queue/sqlite.xml

      - name: Run PostgreSQL representative-volume cursor proof
        env:
          DATABASE_URL: ${{ env.POSTGRES_DATABASE_URL }}
        run: |
          pytest -q backend/tests/test_unified_operator_queue_postgres.py \
            --junitxml=artifacts/operator-queue/postgres.xml

      - name: Check exact-head whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            git diff --check HEAD~1...HEAD
          fi

      - name: Upload bounded queue diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: operator-queue-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/operator-queue/*.xml
          if-no-files-found: ignore
          retention-days: 2
