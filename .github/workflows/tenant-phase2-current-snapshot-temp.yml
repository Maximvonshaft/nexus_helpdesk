name: tenant-phase2-current-snapshot-temp

on:
  pull_request:
    paths:
      - .github/workflows/tenant-phase2-current-snapshot-temp.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact current head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Create exact source snapshot
        run: |
          set -Eeuo pipefail
          archive="${RUNNER_TEMP}/tenant-phase2-current.tar.gz"
          tar --exclude=.git -czf "${archive}" .
          test -s "${archive}"
          sha256sum "${archive}" > "${RUNNER_TEMP}/tenant-phase2-current.sha256"
      - name: Upload snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tenant-phase2-current-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ${{ runner.temp }}/tenant-phase2-current.tar.gz
            ${{ runner.temp }}/tenant-phase2-current.sha256
          retention-days: 1
          if-no-files-found: error
