name: PR 774 Candidate Builder

on:
  push:
    branches:
      - ops/pr774-policy-finalizer

permissions:
  contents: write
  issues: write

concurrency:
  group: pr774-candidate-builder-v2
  cancel-in-progress: true

jobs:
  build-test-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout fixed business baseline
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ea65c07f6b3179b4bbd589fa658b13ca5395c25b

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Apply fixes and run focused regression
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          {
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(text: str, old: str, new: str, *, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          core_path = Path('backend/app/services/nexus_osr/tool_execution_service_core.py')
          core = core_path.read_text(encoding='utf-8')
          core = replace_once(
              core,
              'from ...webchat_models import WebchatConversation\n',
              'from ...webchat_models import WebchatConversation, WebchatHandoffRequest\n',
              label='core import',
          )
          handler_anchor = core.index('def _production_handlers(')
          call_start = core.index('        summary = availability_summary(\n', handler_anchor)
          call_end = core.index('        return ActionExecutionResult(\n', call_start)
          availability_call = '''        request_row = (
              db.get(WebchatHandoffRequest, current.current_handoff_request_id)
              if current.current_handoff_request_id is not None
              else None
          )
          if request_row is not None and request_row.conversation_id != current.id:
              request_row = None
          summary = availability_summary(
              db,
              tenant_key=control.tenant_key,
              country_code=control.country_code,
              channel_key=control.channel_key,
              request_row=request_row,
          )
'''
          core = core[:call_start] + availability_call + core[call_end:]
          summary_start = core.index('def _availability_customer_summary(')
          summary_end = core.index('\n\ndef _decision_for_policy_gate(', summary_start)
          summary_impl = dedent('''
          def _availability_customer_summary(summary: dict[str, Any]) -> str:
              online = int(summary.get("online_agents") or 0)
              available = int(summary.get("available_capacity") or 0)
              queued = int(summary.get("queue_count") or 0)
              raw_position = summary.get("queue_position")
              position = int(raw_position) if isinstance(raw_position, int) else None
              if online <= 0:
                  return "No human support agent is currently online."
              if available > 0:
                  return (
                      "Human support is available with "
                      f"{available} open conversation slot(s)."
                  )
              if position is not None and position > 0:
                  ahead = max(0, position - 1)
                  if ahead == 0:
                      return (
                          "Human support is currently at capacity. "
                          "This customer is next in the eligible queue."
                      )
                  return (
                      "Human support is currently at capacity with "
                      f"{ahead} conversation(s) ahead of this customer."
                  )
              return (
                  "Human support is currently at capacity with "
                  f"{queued} conversation(s) waiting."
              )
          ''').strip()
          core = core[:summary_start] + summary_impl + core[summary_end:]
          core_path.write_text(core, encoding='utf-8')

          Path('backend/app/services/nexus_osr/tool_execution_service.py').write_text(
              dedent('''\
              """Public governed tool-execution authority.

              The private core owns the single executor, handler registry, policy,
              audit and idempotency implementation. This module is the stable public
              import path and does not mutate imported modules.
              """

              from __future__ import annotations

              from . import tool_execution_service_core as _core
              from .tool_execution_service_core import *  # noqa: F401,F403

              _production_handlers = _core._production_handlers
              _availability_customer_summary = _core._availability_customer_summary


              def __getattr__(name: str):
                  return getattr(_core, name)
              '''),
              encoding='utf-8',
          )

          reply_path = Path('backend/app/services/conversation_operator_service.py')
          reply = reply_path.read_text(encoding='utf-8')
          reply = replace_once(
              reply,
              '    return _message_payload(message)\n',
              '    return {"ok": True, **_message_payload(message)}\n',
              label='reply result',
          )
          reply_path.write_text(reply, encoding='utf-8')

          voice_path = Path('backend/tests/test_webchat_voice_api.py')
          voice = voice_path.read_text(encoding='utf-8')
          voice = replace_once(
              voice,
              'def test_public_create_voice_session_binds_conversation_without_ticket():\n',
              'def test_public_create_voice_session_lazily_binds_required_ticket():\n',
              label='voice test name',
          )
          voice_anchor = voice.index('def test_public_create_voice_session_lazily_binds_required_ticket():')
          voice_start = voice.index('        row = db.query(WebchatVoiceSession).filter(', voice_anchor)
          voice_end = voice.index('        event_types = {event.event_type for event in events}\n', voice_start)
          voice_db_assertions = '''        row = db.query(WebchatVoiceSession).filter(WebchatVoiceSession.public_id == payload["voice_session_id"]).one()
          conversation = db.get(WebchatConversation, row.conversation_id)
          assert row.ticket_id is not None
          assert conversation is not None
          assert conversation.ticket_id == row.ticket_id
          assert row.provider == "mock"
          events = db.query(WebchatEvent).filter(
              WebchatEvent.conversation_id == row.conversation_id,
              WebchatEvent.ticket_id == row.ticket_id,
          ).all()
'''
          voice = voice[:voice_start] + voice_db_assertions + voice[voice_end:]
          voice_path.write_text(voice, encoding='utf-8')

          compensation_path = Path('backend/tests/test_webchat_voice_room_compensation.py')
          compensation = compensation_path.read_text(encoding='utf-8')
          compensation = replace_once(
              compensation,
              'from app.services.voice_provider import VoiceProviderError\n',
              'from app.services.voice_provider import VoiceProviderError\nfrom app.webchat_models import WebchatConversation\n',
              label='compensation import',
          )
          helper_anchor = compensation.index('def _create_webchat_conversation(')
          list_start = compensation.index('    canonical_list = client.get(\n', helper_anchor)
          return_marker = '    return payload["conversation_id"], payload["visitor_token"]\n'
          list_end = compensation.index(return_marker, list_start)
          persisted_check = '''    db = SessionLocal()
    try:
        conversation = (
            db.query(WebchatConversation)
            .filter(WebchatConversation.public_id == payload["conversation_id"])
            .one()
        )
        assert conversation.ticket_id is None
    finally:
        db.close()
'''
          compensation = (
              compensation[:list_start]
              + persisted_check
              + compensation[list_end:]
          )
          compensation_path.write_text(compensation, encoding='utf-8')
          PY

          python -m compileall -q backend/app
          python -m pytest -q \
            backend/tests/test_canonical_service_authorities.py \
            backend/tests/test_nexus_osr_tool_execution_service.py \
            backend/tests/test_nexus_osr_tool_execution_facade.py \
            backend/tests/test_support_availability_queue_position.py \
            backend/tests/test_conversation_first_agent_routing.py \
            backend/tests/test_webchat_voice_api.py \
            backend/tests/test_webchat_voice_room_compensation.py \
            backend/tests/test_ticketless_voice_ticket_binding.py
          } 2>&1 | tee /tmp/pr774-candidate.log

      - name: Report bounded failure diagnostics
        if: steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY' > /tmp/pr774-comment.txt
          from pathlib import Path
          import re
          text = Path('/tmp/pr774-candidate.log').read_text(encoding='utf-8', errors='replace')[-10000:]
          text = re.sub(r'(?i)Bearer\s+[A-Za-z0-9._~+/=-]{12,}', 'Bearer [redacted]', text)
          text = re.sub(r'\bsk-(?:proj-)?[A-Za-z0-9_-]{12,}\b', 'sk-[redacted]', text)
          print('Isolated candidate builder failed before publishing. Bounded diagnostics:\n\n```text')
          print(text)
          print('```')
          PY
          gh api repos/Maximvonshaft/nexus_helpdesk/issues/774/comments \
            -f body="$(cat /tmp/pr774-comment.txt)"

      - name: Stop after failed verification
        if: steps.verify.outcome == 'failure'
        run: exit 1

      - name: Publish isolated candidate
        if: steps.verify.outcome == 'success'
        shell: bash
        run: |
          set -Eeuo pipefail
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: close PR 774 canonical backend regressions'
          git push origin HEAD:refs/heads/candidate/pr774-backend-closure --force
