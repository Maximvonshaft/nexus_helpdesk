name: osr-ticket-safety-gate

on:
  pull_request:
    paths:
      - "backend/app/services/nexus_osr/auto_ticket_service.py"
      - "backend/tests/test_nexus_osr_auto_ticket_service.py"
      - "backend/tests/test_nexus_osr_auto_ticket_postgres.py"
      - "backend/tests/test_nexus_osr_tool_execution_service.py"
      - "backend/tests/test_nexus_osr_case_context*.py"
      - ".github/workflows/osr-ticket-safety-gate.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osr-ticket-safety-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: helpdesk
          POSTGRES_USER: helpdesk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpdesk -d helpdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: backend
      APP_ENV: development
      ALLOW_DEV_AUTH: "false"
      SQLITE_DATABASE_URL: sqlite:////tmp/osr-ticket-safety-gate.db

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          pip install pytest-timeout

      - name: Compile ticket safety scope
        run: |
          python -m py_compile \
            backend/app/services/nexus_osr/auto_ticket_service.py \
            backend/tests/test_nexus_osr_auto_ticket_service.py \
            backend/tests/test_nexus_osr_auto_ticket_postgres.py

      - name: Run SQLite ticket transaction and reuse tests
        env:
          DATABASE_URL: ${{ env.SQLITE_DATABASE_URL }}
        run: pytest -q --timeout=60 backend/tests/test_nexus_osr_auto_ticket_service.py

      - name: Run Case Context lifecycle compatibility
        env:
          DATABASE_URL: ${{ env.SQLITE_DATABASE_URL }}
        run: pytest -q --timeout=60 backend/tests/test_nexus_osr_case_context_lifecycle.py backend/tests/test_nexus_osr_case_context_no_row.py

      - name: Run governed tool caller compatibility
        env:
          DATABASE_URL: ${{ env.SQLITE_DATABASE_URL }}
        run: pytest -q --timeout=60 backend/tests/test_nexus_osr_tool_execution_service.py

      - name: Prove one Alembic head
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
        run: |
          cd backend
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          config = Config("alembic.ini")
          heads = ScriptDirectory.from_config(config).get_heads()
          assert len(heads) == 1, heads
          PY

      - name: Upgrade PostgreSQL to current head
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
        run: cd backend && alembic upgrade head

      - name: Run PostgreSQL conversation and identifier concurrency tests
        env:
          DATABASE_URL: postgresql+psycopg://helpdesk@127.0.0.1:5432/helpdesk
        run: pytest -q --timeout=90 backend/tests/test_nexus_osr_auto_ticket_postgres.py

      - name: Prove safe ticket event payload and domain migration isolation
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          source = Path("backend/app/services/nexus_osr/auto_ticket_service.py").read_text(encoding="utf-8")
          assert "count() + 1" not in source
          assert "case_context.as_dict()" not in source
          assert "with_for_update()" in source
          assert "close_case_context(" in source
          assert "MAX_TICKET_NO_GENERATION_ATTEMPTS = 5" in source

          changed = set(subprocess.check_output([
            "git", "diff", "--name-only",
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}",
          ], text=True).splitlines())
          ticket_domain_changed = any(
            path == "backend/app/services/nexus_osr/auto_ticket_service.py"
            or path == "backend/tests/test_nexus_osr_tool_execution_service.py"
            or path.startswith("backend/tests/test_nexus_osr_auto_ticket")
            or path.startswith("backend/tests/test_nexus_osr_case_context")
            for path in changed
          )
          if ticket_domain_changed:
            assert not any(path.startswith("backend/alembic/versions/") for path in changed), changed
          PY

      - name: Check exact-head diff whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
