# Optional WhatsApp sidecar overlay.
#
# Usage:
#   docker compose -f deploy/docker-compose.server.yml \
#     -f deploy/docker-compose.whatsapp-sidecar.example.yml \
#     --env-file deploy/.env.prod up -d whatsapp-sidecar
#
# Keep real tokens in deploy/.env.prod, Docker secrets, or the host secret manager.

services:
  whatsapp-sidecar:
    image: node:22-bookworm-slim
    working_dir: /app
    init: true
    restart: unless-stopped
    command: sh -lc "npm ci && npm run build && npm run start"
    environment:
      WA_SIDECAR_PORT: "${WA_SIDECAR_PORT:-18793}"
      WA_SIDECAR_CONNECTOR_MODE: "${WA_SIDECAR_CONNECTOR_MODE:-baileys}"
      WA_SIDECAR_ALLOW_FROM_ME_INBOUND: "${WA_SIDECAR_ALLOW_FROM_ME_INBOUND:-false}"
      WA_SIDECAR_FROM_ME_MODE: "${WA_SIDECAR_FROM_ME_MODE:-ignore}"
      WA_SIDECAR_FROM_ME_TEST_PREFIX: "${WA_SIDECAR_FROM_ME_TEST_PREFIX:-NEXUS_SELF_INBOUND_TEST}"
      WA_SIDECAR_INTERNAL_TOKEN: "${WA_SIDECAR_INTERNAL_TOKEN:?set WA_SIDECAR_INTERNAL_TOKEN outside this file}"
      WHATSAPP_SESSION_ROOT: "/data/whatsapp-sessions"
      NEXUS_BACKEND_URL: "${NEXUS_BACKEND_URL:?set NEXUS_BACKEND_URL to the intended Nexus backend service}"
      NEXUS_CONNECTOR_KEY: "${NEXUS_CONNECTOR_KEY:?set NEXUS_CONNECTOR_KEY outside this file}"
      NEXUS_CONNECTOR_HMAC_SECRET: "${NEXUS_CONNECTOR_HMAC_SECRET:?set NEXUS_CONNECTOR_HMAC_SECRET outside this file}"
      NEXUS_CALLBACK_TIMEOUT_MS: "${NEXUS_CALLBACK_TIMEOUT_MS:-8000}"
      LOG_LEVEL: "${WA_SIDECAR_LOG_LEVEL:-info}"
    volumes:
      - ../connectors/whatsapp-sidecar:/app
      - ../data/whatsapp-sessions:/data/whatsapp-sessions
    ports:
      - "127.0.0.1:${WA_SIDECAR_PORT:-18793}:18793"
    depends_on:
      app:
        condition: service_healthy
