name: frontend-convergence-finalizer

on:
  push:
    branches:
      - work/744-canonical-operator-console-consolidation
    paths:
      - scripts/ci/.frontend-convergence-finalizer/**
      - .github/workflows/frontend-convergence-finalizer.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: frontend-convergence-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    name: Apply and verify canonical convergence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact canonical branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: work/744-canonical-operator-console-consolidation
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Execute fail-closed convergence transaction
        env:
          EXPECTED_HEAD: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          exec > >(tee /tmp/frontend-convergence-finalizer.log) 2>&1
          report_failure() {
            status=$?
            tail -c 12000 /tmp/frontend-convergence-finalizer.log > /tmp/frontend-convergence-finalizer-tail.log || true
            python - <<'PY'
          import json, os
          from pathlib import Path
          log = Path('/tmp/frontend-convergence-finalizer-tail.log').read_text(encoding='utf-8', errors='replace')
          body = (
              '## FRONTEND_CONVERGENCE_FINALIZER — fail-closed diagnostic\n\n'
              f'- Exact input Head: `{os.environ["EXPECTED_HEAD"]}`\n'
              f'- Run: {os.environ["RUN_URL"]}\n'
              '- No convergence commit was pushed.\n\n'
              '```text\n' + log[-10000:] + '\n```'
          )
          Path('/tmp/comment.json').write_text(json.dumps({'body': body}), encoding='utf-8')
          PY
            curl --fail-with-body --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/748/comments" \
              --data-binary @/tmp/comment.json || true
            exit "${status}"
          }
          trap report_failure ERR

          test "$(git branch --show-current)" = "work/744-canonical-operator-console-consolidation"
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          git fetch --no-tags origin 4906188ac77d5d6c1e8409bbb1d5d7e519674a73
          cat scripts/ci/.frontend-convergence-finalizer/part-*.pyfrag > scripts/ci/frontend_convergence_finalizer.py
          python -m py_compile scripts/ci/frontend_convergence_finalizer.py
          python scripts/ci/frontend_convergence_finalizer.py
          rm -rf scripts/ci/.frontend-convergence-finalizer

          cd webapp
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --loglevel=error
          npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck -- --pretty false
          npm run lint
          npm run build
          npm run architecture
          cd ..
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "refactor(frontend): converge canonical console and retire duplicate frontend"
          NEW_HEAD="$(git rev-parse HEAD)"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:work/744-canonical-operator-console-consolidation
          trap - ERR

          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          body = (
              '## FRONTEND_CONVERGENCE_FINALIZER — verified migration committed\n\n'
              f'- Input Head: `{os.environ["EXPECTED_HEAD"]}`\n'
              f'- New Head: `{head}`\n'
              f'- Run: {os.environ["RUN_URL"]}\n'
              '- Local transaction gates passed before push: Node contracts, typecheck, lint, production build, architecture/residue gates, and diff integrity.\n'
              '- The push used `GITHUB_TOKEN`, so a separate owner-authored metadata commit is still required to trigger the full repository exact-head CI matrix.'
          )
          Path('/tmp/comment.json').write_text(json.dumps({'body': body}), encoding='utf-8')
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/748/comments" \
            --data-binary @/tmp/comment.json
