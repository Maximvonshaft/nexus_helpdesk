name: webchat-fast-reply-ci

on:
  pull_request:
    paths:
      - 'backend/app/api/webchat_fast.py'
      - 'backend/app/services/webchat_fast_*.py'
      - 'backend/app/services/webchat_handoff_policy.py'
      - 'backend/app/services/webchat_handoff_snapshot*.py'
      - 'backend/app/services/provider_runtime/**'
      - 'backend/app/static/webchat/widget.js'
      - 'backend/app/static/webchat/demo/**'
      - 'backend/tests/test_webchat_fast*.py'
      - 'scripts/smoke/webchat_fast_reply_concurrency_smoke.py'
      - 'scripts/smoke/browser_bundle_secret_scan.py'
      - 'deploy/docker-compose.server.yml'
      - 'deploy/nginx/default.conf'
      - 'docs/webchat-*.md'
      - '.github/workflows/webchat-fast-reply-ci.yml'
  workflow_dispatch:

jobs:
  targeted-webchat-fast-reply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: development
      DATABASE_URL: sqlite:////tmp/nexusdesk_webchat_fast_reply_ci.db
      PYTHONPATH: backend
      WEBCHAT_FAST_AI_ENABLED: 'false'
      WEBCHAT_ALLOWED_ORIGINS: http://localhost,https://example.test
      WEBCHAT_ALLOW_NO_ORIGIN: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile WebChat fast reply modules and smoke scripts
        run: |
          python -m compileall \
            backend/app/api/webchat_fast.py \
            backend/app/services/webchat_fast_ai_service.py \
            backend/app/services/webchat_fast_config.py \
            backend/app/services/webchat_fast_idempotency.py \
            backend/app/services/webchat_fast_idempotency_db.py \
            backend/app/services/webchat_fast_output_parser.py \
            backend/app/services/webchat_fast_rate_limit.py \
            backend/app/services/webchat_fast_reply_metrics.py \
            backend/app/services/webchat_fast_stream_parser.py \
            backend/app/services/webchat_fast_stream_service.py \
            backend/app/services/webchat_handoff_policy.py \
            backend/app/services/webchat_handoff_snapshot_service.py \
            backend/app/services/webchat_handoff_snapshot_worker.py \
            scripts/smoke/webchat_fast_reply_concurrency_smoke.py \
            scripts/smoke/browser_bundle_secret_scan.py

      - name: Run targeted WebChat fast reply tests
        run: |
          set -Eeuo pipefail
          pytest -q \
            backend/tests/test_webchat_fast_reply_output_parser.py \
            backend/tests/test_webchat_fast_reply_api.py \
            backend/tests/test_webchat_fast_idempotency_db.py \
            backend/tests/test_webchat_fast_audit_regressions.py \
            backend/tests/test_webchat_fast_final_audit_fixes.py \
            backend/tests/test_webchat_fast_handoff_policy.py \
            backend/tests/test_webchat_fast_ai_provider_router_phase1.py \
            backend/tests/test_webchat_fast_stream_safety.py \
            backend/tests/test_webchat_fast_reply_provider_runtime.py \
            backend/tests/test_webchat_widget_fast_mode_static.py \
            backend/tests/test_webchat_fast_runtime_config_static.py

      - name: Browser/static ExternalChannel exposure scan
        run: |
          python scripts/smoke/browser_bundle_secret_scan.py \
            --static backend/app/static/webchat
